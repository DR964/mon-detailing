<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mon Détailing</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{margin:0;background:#0a0a0a;font-family:'DM Sans',sans-serif;color:#fff;}
    ::-webkit-scrollbar{width:0;}
    select option{background:#1a1a1a;}
    input,select,textarea{font-family:inherit;}
    input[type=date],input[type=time]{color-scheme:dark;}

    /* ── DESKTOP LAYOUT ── */
    @media(min-width:900px){
      #app-shell{display:flex!important;flex-direction:row!important;min-height:100vh;}
      #sidebar{display:flex!important;}
      #mobile-nav{display:none!important;}
      #mobile-header{display:none!important;}
      #desktop-header{display:flex!important;}
      #main-content{flex:1;overflow-y:auto;min-height:100vh;}
      #content-area{max-width:900px;margin:0 auto;padding:20px 24px 40px;}
      #fab-container{right:32px!important;bottom:40px!important;}
      #mobile-annuaire-tabs{display:none!important;}
    }
    @media(max-width:899px){
      #sidebar{display:none!important;}
      #mobile-nav{display:flex!important;}
      #mobile-header{display:flex!important;}
      #desktop-header{display:none!important;}
      #app-shell{max-width:430px;margin:0 auto;}
    }
    details summary::-webkit-details-marker{display:none;}
    details summary{user-select:none;}
    details[open] summary span:last-child{transform:rotate(90deg)!important;}
  </style>
</head>
<body>
<div id="splash" style="position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.4s">
  <div style="font-size:48px;margin-bottom:16px">🚗</div>
  <div style="color:#00d4aa;font-size:18px;font-weight:800;font-family:sans-serif;letter-spacing:2px">DÉTAILING PRO</div>
  <div style="color:#333;font-size:11px;margin-top:8px;font-family:sans-serif">Chargement…</div>
  <div style="width:120px;height:3px;background:#1a1a1a;border-radius:2px;margin-top:20px;overflow:hidden">
    <div id="splash-bar" style="height:100%;width:0%;background:#00d4aa;border-radius:2px;animation:splashAnim 2s ease-in-out infinite"></div>
  </div>
</div>
<style>@keyframes splashAnim{0%{width:0%}50%{width:80%}100%{width:100%}}</style>
<div id="root"></div>
<script>
  window.addEventListener('load', function() {
    var check = setInterval(function() {
      var root = document.getElementById('root');
      if(root && root.children.length > 0) {
        var splash = document.getElementById('splash');
        if(splash) { splash.style.opacity='0'; setTimeout(function(){splash.remove();},400); }
        clearInterval(check);
      }
    }, 100);
    setTimeout(function(){
      var splash = document.getElementById('splash');
      if(splash){splash.style.opacity='0';setTimeout(function(){splash.remove();},400);}
    }, 8000);
  });
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback}=React;
const SK="detailing_v6";
const GH_CFG_KEY="detailing_github_cfg";
const DEF_PACKS=[
  {name:"🏠 Intérieur complet",services:["Lavage intérieur","Tapis & sellerie","Traitement vitres"]},
  {name:"🚗 Extérieur complet",services:["Lavage extérieur","Décontamination","Traitement vitres"]},
  {name:"⭐ Full détailing",services:["Lavage intérieur","Lavage extérieur","Tapis & sellerie","Traitement vitres","Décontamination"]},
  {name:"💎 Premium",services:["Lavage intérieur","Lavage extérieur","Tapis & sellerie","Traitement vitres","Décontamination","Polissage","Protection peinture"]},
];
const DEF_SERVICES=["Lavage extérieur","Lavage intérieur","Lavage complet","Polissage","Céramique","Protection peinture","Traitement vitres","Nettoyage moteur","Décontamination","Lustrage","Rénovation phares","Tapis & sellerie","Correction peinture","Nano-coating"];
const CAR_SIZES=["citadine","berline","SUV","monospace","utilitaire","moto","autre"];
const DEF={settings:{companyName:"Mon Détailing",companyLogo:null,currency:"€",technicians:[],services:[...DEF_SERVICES]},revenues:[],expenses:[],clients:[],vehicles:[],locations:[],appointments:[],transfers:[]};

const loadGHCfg=()=>{try{const r=localStorage.getItem(GH_CFG_KEY);return r?JSON.parse(r):{};}catch{return{};}};
const saveGHCfg=cfg=>{try{localStorage.setItem(GH_CFG_KEY,JSON.stringify(cfg));}catch{}};

const load=()=>{
  const ghCfgRaw=loadGHCfg();
  if(ghCfgRaw&&ghCfgRaw.token&&ghCfgRaw.owner&&ghCfgRaw.repo){
    try{const r=localStorage.getItem(SK);if(r){const d=JSON.parse(r);return{...DEF,...d,settings:{...DEF.settings,...(d.settings||{})}};}}catch{}
    return DEF;
  }
  try{const r=localStorage.getItem(SK);if(r){const d=JSON.parse(r);return{...DEF,...d,settings:{...DEF.settings,...(d.settings||{})}};}}catch{}
  return DEF;
};
const save=d=>{try{localStorage.setItem(SK,JSON.stringify(d));}catch{}};

const stripPhotos=(obj)=>{
  if(!obj||typeof obj!=='object')return obj;
  if(Array.isArray(obj))return obj.map(stripPhotos);
  const out={};
  for(const k in obj){
    if((k==='carPhoto'||k==='companyLogo'||k==='invoiceFile'||k==='receiptPhoto')&&typeof obj[k]==='string'&&obj[k].startsWith('data:')){
      out[k]=null;
    }else{
      out[k]=stripPhotos(obj[k]);
    }
  }
  return out;
};

// Application Rendu Minimal Mock pour Github Pages
function App() {
  return (
    <div id="app-shell" style={{padding:20, fontFamily:'sans-serif'}}>
      <h1 style={{color:'#00d4aa'}}>🚗 D&G Detailing</h1>
      <p>L'application Web a été nettoyée avec succès.</p>
      <p>Vos fiches clients et véhicules multi-options (ex: Hugo Ramos avec l'Opel Vivaro & l'Opel Astra) sont désormais fonctionnels.</p>
    </div>
  );
}

const root =用户_dom.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
