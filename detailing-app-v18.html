function StatsPage({data,setData,currency}){
  const now=new Date();
  const[period,setPeriod]=useState("year");
  const[chartType,setChartType]=useState("bar"); // bar | line | area
  const[metric,setMetric]=useState("revenue"); // revenue | count | duration | ratio | expenses | profit | rentability
  const[groupBy,setGroupBy]=useState("month"); // month | week | technician | service | city | size | payment
  const[selCity,setSelCity]=useState(null);
  const[selTx,setSelTx]=useState(null);

  const totalRev=data.revenues.reduce((s,r)=>s+r.amount,0);
  const totalExp=data.expenses.reduce((s,e)=>s+e.amount,0);
  const profit=totalRev-totalExp;
  const rent=totalRev>0?((profit/totalRev)*100).toFixed(1):0;

  // Filter revenues by period
  const filteredRevs=data.revenues.filter(r=>{
    const d=new Date(r.date);
    if(period==="year")return d.getFullYear()===now.getFullYear();
    if(period==="month")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    return true; // all
  });
  const filteredExps=data.expenses.filter(e=>{
    const d=new Date(e.date);
    if(period==="year")return d.getFullYear()===now.getFullYear();
    if(period==="month")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    return true;
  });

  // Compute chart data based on groupBy + metric
  const computeData=()=>{
    const getValue=(revs,exps=[])=>{
      if(metric==="revenue")return revs.reduce((s,r)=>s+r.amount,0);
      if(metric==="count")return revs.length;
      if(metric==="duration")return revs.reduce((s,r)=>s+(r.duration||0),0)/60;
      if(metric==="ratio"){const t=revs.reduce((s,r)=>s+r.amount,0),dur=revs.reduce((s,r)=>s+(r.duration||0),0);return dur>0?t/(dur/60):0;}
      if(metric==="expenses")return exps.reduce((s,e)=>s+e.amount,0);
      if(metric==="profit"){return revs.reduce((s,r)=>s+r.amount,0)-exps.reduce((s,e)=>s+e.amount,0);}
      if(metric==="rentability"){const r=revs.reduce((s,r)=>s+r.amount,0),e=exps.reduce((s,e)=>s+e.amount,0);return r>0?(((r-e)/r)*100):0;}
      return 0;
    };

    if(groupBy==="month"){
      const labels=MONTHS;
      return labels.map((m,i)=>{
        const revs=filteredRevs.filter(r=>new Date(r.date).getMonth()===i);
        const exps=filteredExps.filter(e=>new Date(e.date).getMonth()===i);
        return{label:m,value:Math.max(0,getValue(revs,exps)),highlight:i===now.getMonth()};
      });
    }
    if(groupBy==="week"){
      const labels=["S1","S2","S3","S4"];
      const fd=new Date(now.getFullYear(),now.getMonth(),1);
      return labels.map((_,i)=>{
        const revs=filteredRevs.filter(r=>{const d=new Date(r.date);return d.getMonth()===now.getMonth()&&Math.floor((d.getDate()+fd.getDay()-1)/7)===i;});
        const exps=filteredExps.filter(e=>{const d=new Date(e.date);return d.getMonth()===now.getMonth()&&Math.floor((d.getDate()+fd.getDay()-1)/7)===i;});
        return{label:labels[i],value:Math.max(0,getValue(revs,exps))};
      });
    }
    if(groupBy==="technician"){
      const techs=(data.settings&&data.settings.technicians)||[];
      return techs.map(t=>{
        const revs=filteredRevs.filter(r=>r.technicians&&r.technicians.includes(t));
        const exps=filteredExps.filter(e=>e.paidByTechs&&e.paidByTechs.includes(t));
        return{label:t,value:Math.max(0,getValue(revs,exps))};
      });
    }
    if(groupBy==="service"){
      const allServices=[...new Set(filteredRevs.flatMap(r=>r.prestations||[]))].slice(0,8);
      return allServices.map(s=>{
        const revs=filteredRevs.filter(r=>r.prestations&&r.prestations.includes(s));
        return{label:s.length>8?s.slice(0,8)+"…":s,value:Math.max(0,getValue(revs,[]))};
      });
    }
    if(groupBy==="city"){
      const normCity=s=>s?s.trim().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/(?:^|\s)\S/g,c=>c.toUpperCase()):"";
      const cityMap={};
      filteredRevs.forEach(r=>{
        const city=normCity(r.locationCity||(r.location?r.location.trim().split(/\s+/).pop():""));
        if(!city)return;
        if(!cityMap[city])cityMap[city]=[];
        cityMap[city].push(r);
      });
      return Object.entries(cityMap).sort((a,b)=>b[1].length-a[1].length).slice(0,8).map(([city,revs])=>({label:city,value:Math.max(0,getValue(revs,[]))}));
    }
    if(groupBy==="size"){
      return CAR_SIZES.map(s=>{
        const revs=filteredRevs.filter(r=>r.vehicleSize===s);
        return{label:s,value:Math.max(0,getValue(revs,[]))};
      });
    }
    if(groupBy==="payment"){
      const methods=["espèce","carte","chèque","virement"];
      return methods.map(m=>{
        const revs=filteredRevs.filter(r=>r.paymentMethod===m);
        return{label:m,value:Math.max(0,getValue(revs,[]))};
      });
    }
    if(groupBy==="supplier"){
      // Group expenses by supplier/shop
      const supplierMap={};
      filteredExps.forEach(e=>{
        const s=e.supplier||"Sans magasin";
        if(!supplierMap[s])supplierMap[s]={exps:[],amount:0};
        supplierMap[s].exps.push(e);
        supplierMap[s].amount+=e.amount;
      });
      return Object.entries(supplierMap).sort((a,b)=>b[1].amount-a[1].amount).slice(0,10).map(([s,v])=>({label:s.length>10?s.slice(0,10)+"…":s,value:v.amount}));
    }
    return [];
  };

  const chartData=computeData();
  const maxVal=Math.max(...chartData.map(d=>d.value),1);

  // City stats for PAR VILLE section
  const normCity=s=>s?s.trim().replace(/\s+/g," ").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/(?:^|\s)\S/g,c=>c.toUpperCase()):"";
  const cityStats={};
  data.revenues.forEach(r=>{
    const rawCity=r.locationCity||(r.location?r.location.trim().split(/\s+/).filter(Boolean).slice(-1)[0]:"");
    const city=normCity(rawCity);if(!city)return;
    const zip=r.locationZip||"";const key=zip?`${city}||${zip}`:city;
    if(!cityStats[key])cityStats[key]={city,zip,count:0,revenue:0,clients:new Set(),revs:[]};
    cityStats[key].count++;cityStats[key].revenue+=r.amount;
    if(r.clientId)cityStats[key].clients.add(r.clientId);
    cityStats[key].revs.push(r);
  });
  // Supplier stats for PAR MAGASIN section
  const supplierStats={};
  data.expenses.forEach(e=>{
    const s=e.supplier||(e.productName?"(sans magasin)":"—");
    if(!supplierStats[s])supplierStats[s]={name:s,count:0,total:0,exps:[],products:new Set()};
    supplierStats[s].count++;supplierStats[s].total+=e.amount;
    supplierStats[s].exps.push(e);
    (e.items||[]).forEach(it=>it.description&&supplierStats[s].products.add(it.description));
  });

  const METRICS=[["revenue","💰 Revenus"],["count","🔢 Lavages"],["duration","⏱ Temps (h)"],["ratio","📈 €/heure"],["expenses","🔴 Dépenses"],["profit","✨ Bénéfice"],["rentability","📊 Rentabilité %"]];
  const GROUPS=[["month","📅 Mois"],["week","📆 Semaine"],["technician","👤 Tech."],["service","🛠 Prestation"],["city","📍 Ville"],["size","🚗 Taille"],["payment","💳 Paiement"],["supplier","🏪 Magasin"]];
  const PERIODS=[["month","Ce mois"],["year","Cette année"],["all","Tout"]];
  const CHART_TYPES=[["bar","▐ Barres"],["line","∿ Ligne"],["pie","◉ Camembert"]];

  // Render chart
  const fmtVal=v=>{if(v===0)return"";if(v>=1000)return`${(v/1000).toFixed(1)}k`;return v%1===0?String(Math.round(v)):(v.toFixed(1));};
  const chartH=120;
  const PIE_COLORS=["#00d4aa","#7c3aed","#ff6b35","#ffd700","#00aaff","#ff4757","#a78bfa","#00e5bb"];
  const ChartViz=()=>{
    if(chartType==="bar"){
      return(
        <div style={{display:"flex",alignItems:"flex-end",gap:3,height:chartH+28,padding:"0 2px"}}>
          {chartData.map((d,i)=>{
            const barH=Math.max(2,(d.value/maxVal)*(chartH-18));
            const color=d.highlight?"#ff6b35":"#00d4aa";
            return(
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",height:"100%"}}>
                {d.value>0&&<span style={{fontSize:7,color,fontWeight:700,marginBottom:2,whiteSpace:"nowrap",textAlign:"center"}}>{fmtVal(d.value)}</span>}
                <div style={{width:"100%",height:barH,background:color,borderRadius:"3px 3px 0 0",opacity:d.value===0?0.15:1}}/>
                <span style={{fontSize:7,color:"#666",marginTop:3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"100%",textAlign:"center"}}>{d.label}</span>
              </div>
            );
          })}
        </div>
      );
    }
    if(chartType==="pie"){
      const total=chartData.reduce((s,d)=>s+d.value,0);
      if(total===0)return<div style={{height:80,display:"flex",alignItems:"center",justifyContent:"center",color:"#333",fontSize:12}}>Aucune donnée</div>;
      const cx=80,cy=75,r=65;
      let angle=-Math.PI/2;
      const slices=chartData.filter(d=>d.value>0).map((d,i)=>{
        const sweep=(d.value/total)*2*Math.PI;
        const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
        angle+=sweep;
        const x2=cx+r*Math.cos(angle),y2=cy+r*Math.sin(angle);
        const large=sweep>Math.PI?1:0;
        const midA=angle-sweep/2;
        const lx=cx+(r+14)*Math.cos(midA),ly=cy+(r+14)*Math.sin(midA);
        const pct=Math.round((d.value/total)*100);
        return{path:`M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`,color:PIE_COLORS[i%PIE_COLORS.length],label:d.label,pct,value:d.value,lx,ly,sweep};
      });
      return(
        <div style={{display:"flex",gap:12,alignItems:"center"}}>
          <svg width="160" height="150" viewBox="0 0 160 150">
            {slices.map((s,i)=>(
              <g key={i}>
                <path d={s.path} fill={s.color} stroke="#0a0a0a" strokeWidth="1.5"/>
                {s.sweep>0.3&&<text x={s.lx} y={s.ly} textAnchor="middle" dominantBaseline="middle" fontSize="8" fill="#fff" fontWeight="bold">{s.pct}%</text>}
              </g>
            ))}
          </svg>
          <div style={{flex:1,display:"flex",flexDirection:"column",gap:5}}>
            {slices.map((s,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:10,height:10,borderRadius:2,background:s.color,flexShrink:0}}/>
                <span style={{fontSize:10,color:"#ccc",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.label}</span>
                <span style={{fontSize:10,color:s.color,fontWeight:700}}>{fmtVal(s.value)}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }
    // Line
    const pts=chartData.map((d,i)=>({x:10+(i/(Math.max(chartData.length-1,1)))*(280),y:chartH-8-(d.value/maxVal)*(chartH-20)}));
    const pathD=pts.map((p,i)=>`${i===0?"M":"L"} ${p.x} ${p.y}`).join(" ");
    return(
      <div style={{position:"relative",height:chartH+28}}>
        <svg width="100%" height={chartH+4} viewBox={`0 0 300 ${chartH+4}`} style={{overflow:"visible"}}>
          <path d={pathD} fill="none" stroke="#00d4aa" strokeWidth="2.5" strokeLinejoin="round"/>
          {pts.map((p,i)=>(
            <g key={i}>
              <circle cx={p.x} cy={p.y} r="4" fill={chartData[i].highlight?"#ff6b35":"#00d4aa"}/>
              {chartData[i].value>0&&<text x={p.x} y={p.y-8} textAnchor="middle" fontSize="8" fill="#00d4aa" fontWeight="bold">{fmtVal(chartData[i].value)}</text>}
            </g>
          ))}
        </svg>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
          {chartData.map((d,i)=><span key={i} style={{fontSize:7,color:"#666",flex:1,textAlign:"center",overflow:"hidden",whiteSpace:"nowrap"}}>{d.label}</span>)}
        </div>
      </div>
    );
  };

  return(
    <div style={{paddingBottom:80}}>
      {/* KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
        <div style={{background:"#0a1a14",border:"1px solid #00d4aa22",borderRadius:12,padding:"9px",textAlign:"center"}}><div style={{fontSize:9,color:"#666"}}>REVENUS</div><div style={{color:"#00d4aa",fontWeight:700,fontSize:14}}>{fmt(totalRev,currency)}</div></div>
        <div style={{background:"#1a0a0a",border:"1px solid #ff475722",borderRadius:12,padding:"9px",textAlign:"center"}}><div style={{fontSize:9,color:"#666"}}>DÉPENSES</div><div style={{color:"#ff4757",fontWeight:700,fontSize:14}}>{fmt(totalExp,currency)}</div></div>
        <div style={{background:profit>=0?"#0a1a14":"#1a0a0a",border:`1px solid ${profit>=0?"#00d4aa22":"#ff475722"}`,borderRadius:12,padding:"9px",textAlign:"center"}}><div style={{fontSize:9,color:"#666"}}>BÉNÉFICE</div><div style={{color:profit>=0?"#00d4aa":"#ff4757",fontWeight:700,fontSize:14}}>{fmt(profit,currency)}</div></div>
      </div>

      {/* Interactive Chart Builder */}
      <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:14,marginBottom:12}}>
        <div style={{fontSize:12,color:"#666",fontWeight:600,marginBottom:10}}>📊 TABLEAU DE BORD INTERACTIF</div>

        {/* Period */}
        <div style={{marginBottom:8}}>
          <div style={{fontSize:10,color:"#555",marginBottom:4}}>PÉRIODE</div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {PERIODS.map(([v,l])=><button key={v} onClick={()=>setPeriod(v)} style={{background:period===v?"#fff":"#1a1a1a",border:"1px solid #252525",color:period===v?"#000":"#666",padding:"4px 11px",borderRadius:20,fontSize:10,cursor:"pointer",fontWeight:600}}>{l}</button>)}
          </div>
        </div>

        {/* Metric */}
        <div style={{marginBottom:8}}>
          <div style={{fontSize:10,color:"#555",marginBottom:4}}>DONNÉES</div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {METRICS.map(([v,l])=><button key={v} onClick={()=>setMetric(v)} style={{background:metric===v?"#00d4aa":"#1a1a1a",border:`1px solid ${metric===v?"#00d4aa":"#252525"}`,color:metric===v?"#000":"#666",padding:"4px 10px",borderRadius:20,fontSize:10,cursor:"pointer",fontWeight:metric===v?700:400}}>{l}</button>)}
          </div>
        </div>

        {/* Group by */}
        <div style={{marginBottom:8}}>
          <div style={{fontSize:10,color:"#555",marginBottom:4}}>REGROUPER PAR</div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {GROUPS.map(([v,l])=><button key={v} onClick={()=>setGroupBy(v)} style={{background:groupBy===v?"#7c3aed":"#1a1a1a",border:`1px solid ${groupBy===v?"#7c3aed":"#252525"}`,color:groupBy===v?"#fff":"#666",padding:"4px 10px",borderRadius:20,fontSize:10,cursor:"pointer",fontWeight:groupBy===v?700:400}}>{l}</button>)}
          </div>
        </div>

        {/* Chart type */}
        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,color:"#555",marginBottom:4}}>TYPE DE GRAPHIQUE</div>
          <div style={{display:"flex",gap:5}}>
            {CHART_TYPES.map(([v,l])=><button key={v} onClick={()=>setChartType(v)} style={{background:chartType===v?"#ff6b35":"#1a1a1a",border:`1px solid ${chartType===v?"#ff6b35":"#252525"}`,color:chartType===v?"#fff":"#666",padding:"4px 12px",borderRadius:20,fontSize:10,cursor:"pointer",fontWeight:chartType===v?700:400}}>{l}</button>)}
          </div>
        </div>

        {/* Chart */}
        {chartData.length>0&&chartData.some(d=>d.value>0)
          ?<ChartViz/>
          :<div style={{height:80,display:"flex",alignItems:"center",justifyContent:"center",color:"#333",fontSize:12}}>Aucune donnée pour cette sélection</div>
        }
      </div>

      {/* Rentabilité barre */}
      <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:14,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
          <span style={{fontSize:11,color:"#666"}}>Rentabilité globale</span>
          <span style={{fontSize:15,fontWeight:700,color:parseFloat(rent)>50?"#00d4aa":"#ff6b35"}}>{rent}%</span>
        </div>
        <div style={{height:6,background:"#1e1e1e",borderRadius:3,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${Math.max(0,Math.min(100,rent))}%`,background:"linear-gradient(90deg,#00d4aa,#00a882)",borderRadius:3}}/>
        </div>
      </div>

      {/* Par ville */}
      {Object.keys(cityStats).length>0&&(
        <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:14,marginBottom:12}}>
          <div style={{fontSize:12,color:"#666",fontWeight:600,marginBottom:10}}>PAR VILLE</div>
          {Object.entries(cityStats).sort((a,b)=>b[1].revenue-a[1].revenue).map(([key,s])=>(
            <div key={key} onClick={()=>setSelCity(s)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 10px",marginBottom:4,borderRadius:10,background:"#1a1a1a",cursor:"pointer",border:"1px solid #252525"}}>
              <div>
                <div style={{color:"#fff",fontWeight:500,fontSize:13}}>📍 {s.city}{s.zip?<span style={{color:"#555",fontSize:11,marginLeft:6}}>{s.zip}</span>:""}</div>
                <div style={{fontSize:11,color:"#444"}}>{s.count} lavage{s.count>1?"s":""} · {s.clients.size} client{s.clients.size>1?"s":""}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{color:"#00d4aa",fontWeight:700}}>{fmt(s.revenue,currency)}</div>
                <span style={{color:"#444",fontSize:12}}>›</span>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Par magasin */}
      {Object.keys(supplierStats).length>0&&(
        <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:14,marginBottom:12}}>
          <div style={{fontSize:12,color:"#ff6b35",fontWeight:600,marginBottom:10}}>🏪 PAR MAGASIN / FOURNISSEUR</div>
          {Object.entries(supplierStats).sort((a,b)=>b[1].total-a[1].total).map(([key,s])=>(
            <div key={key} style={{background:"#1a0a0a",border:"1px solid #ff475715",borderRadius:10,padding:"10px 12px",marginBottom:6}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{color:"#ff6b35",fontWeight:700,fontSize:13}}>🏪 {s.name}</div>
                  <div style={{color:"#555",fontSize:11}}>{s.count} achat{s.count>1?"s":""} · {s.products.size>0?`${s.products.size} produit${s.products.size>1?"s":""} différent${s.products.size>1?"s":""}`:""}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{color:"#ff4757",fontWeight:700,fontSize:14}}>— {fmt(s.total,currency)}</div>
                  <div style={{color:"#444",fontSize:10}}>moy. {fmt(s.total/s.count,currency)}/achat</div>
                </div>
              </div>
              {s.products.size>0&&(
                <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:5}}>
                  {[...s.products].slice(0,6).map((p,i)=>(
                    <span key={i} style={{background:"#1a1a1a",border:"1px solid #252525",color:"#666",borderRadius:20,padding:"2px 8px",fontSize:9}}>{p}</span>
                  ))}
                  {s.products.size>6&&<span style={{color:"#333",fontSize:9,padding:"2px 4px"}}>+{s.products.size-6}</span>}
                </div>
              )}
            </div>
          ))}
          <div style={{marginTop:10,background:"#1a0a0a",border:"1px solid #ff475522",borderRadius:10,padding:"9px 12px",display:"flex",justifyContent:"space-between"}}>
            <span style={{color:"#555",fontSize:12}}>Total dépenses fournisseurs</span>
            <span style={{color:"#ff4757",fontWeight:700,fontSize:14}}>{fmt(Object.values(supplierStats).reduce((s,v)=>s+v.total,0),currency)}</span>
          </div>
        </div>
      )}
      {selCity&&(
        <Modal title={`📍 ${selCity.city}${selCity.zip?" ("+selCity.zip+")":""}`} onClose={()=>{setSelCity(null);setSelTx(null);}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
            <div style={{background:"#0a1a14",borderRadius:10,padding:"9px",textAlign:"center"}}><div style={{fontSize:9,color:"#666"}}>LAVAGES</div><div style={{color:"#00d4aa",fontWeight:700,fontSize:18}}>{selCity.count}</div></div>
            <div style={{background:"#0a1a14",borderRadius:10,padding:"9px",textAlign:"center"}}><div style={{fontSize:9,color:"#666"}}>CLIENTS</div><div style={{color:"#fff",fontWeight:700,fontSize:18}}>{selCity.clients.size}</div></div>
            <div style={{background:"#0a1a14",borderRadius:10,padding:"9px",textAlign:"center"}}><div style={{fontSize:9,color:"#666"}}>TOTAL</div><div style={{color:"#00d4aa",fontWeight:700,fontSize:15}}>{fmt(selCity.revenue,currency)}</div></div>
          </div>
          <div style={{fontSize:11,color:"#666",marginBottom:8,fontWeight:600}}>TOUS LES LAVAGES</div>
          {[...selCity.revs].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(r=>{
            const v=data.vehicles.find(vx=>vx.id===r.vehicleId);
            const c=data.clients.find(cx=>cx.id===r.clientId);
            return(
              <div key={r.id} onClick={()=>setSelTx(r)} style={{background:"#1a1a1a",borderRadius:10,padding:"9px 11px",marginBottom:7,display:"flex",gap:10,alignItems:"center",cursor:"pointer"}}>
                {r.carPhoto?<img src={r.carPhoto} style={{width:48,height:36,objectFit:"cover",borderRadius:6,flexShrink:0}}/>:<div style={{width:48,height:36,background:"#252525",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{vehicleEmoji(r.vehicleSize)}</div>}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{color:"#fff",fontSize:12,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{v?`${v.brand} ${v.model}`:r.plate||"Véhicule"}</div>
                  <div style={{color:"#555",fontSize:11}}>{c?`${c.firstName} ${c.lastName}`:"—"} · {fmtD(r.date)}</div>
                </div>
                <div style={{color:r.isGift?"#666":"#00d4aa",fontWeight:700,fontSize:13,flexShrink:0}}>{r.isGift?"🎁":fmt(r.amount,currency)}</div>
              </div>
            );
          })}
        </Modal>
      )}
      {selTx&&<TxDetail tx={selTx} data={data} setData={setData} currency={currency} onClose={()=>setSelTx(null)}/>}
    </div>
  );
}

// ===================== CLIENTS PAGE =====================
function ClientsPage({data,setData,currency}){
  const[sort,setSort]=useState("revenue"),[dir,setDir]=useState("desc"),[sel,setSel]=useState(null),[search,setSearch]=useState(""),[editSel,setEditSel]=useState(null);

  const enrich=data.clients.map(c=>{
    const revs=data.revenues.filter(r=>r.clientId===c.id);
    const vehicles=[...new Set(revs.map(r=>r.vehicleId).filter(Boolean))].map(vid=>data.vehicles.find(v=>v.id===vid)).filter(Boolean);
    return{...c,revs,totalRevenue:revs.reduce((s,r)=>s+r.amount,0),vehicles};
  });

  const sorted=[...enrich].filter(c=>`${c.firstName} ${c.lastName}`.toLowerCase().includes(search.toLowerCase())).sort((a,b)=>{
    const m=dir==="desc"?-1:1;
    if(sort==="revenue")return m*(a.totalRevenue-b.totalRevenue);
    if(sort==="note")return m*((a.note||0)-(b.note||0));
    if(sort==="date"){const ar=a.revs.length>0?new Date(a.revs[a.revs.length-1].date):0;const br=b.revs.length>0?new Date(b.revs[b.revs.length-1].date):0;return m*(ar-br);}
    return 0;
  });

  const SB=({f,l})=><button onClick={()=>{if(sort===f)setDir(d=>d==="asc"?"desc":"asc");else{setSort(f);setDir("desc");}}} style={{background:sort===f?"#1e1e1e":"transparent",border:"1px solid #252525",color:sort===f?"#fff":"#666",padding:"4px 9px",borderRadius:20,fontSize:10,cursor:"pointer"}}>{l} {sort===f?(dir==="desc"?"↓":"↑"):""}</button>;

  // Edit client modal
  const EditClient=({client,onClose})=>{
    const[form,setForm]=useState({...client});
    const set=(k,v)=>setForm(f=>({...f,[k]:v}));
    const handleSave=()=>{
      const addr=[form.streetNum,form.streetName,form.zip,form.city].filter(Boolean).join(" ");
      const nd={...data,clients:data.clients.map(c=>c.id===form.id?{...form,address:addr}:c)};
      setData(nd);save(nd);onClose();
    };
    return(
      <Modal title="Modifier le client" onClose={onClose}>
        <Field label="Prénom"><input style={inp} value={form.firstName||""} onChange={e=>set("firstName",e.target.value)}/></Field>
        <Field label="Nom"><input style={inp} value={form.lastName||""} onChange={e=>set("lastName",e.target.value)}/></Field>
        <Field label="Téléphone"><input style={inp} value={form.phone||""} onChange={e=>set("phone",e.target.value)}/></Field>
        <div style={{display:"grid",gridTemplateColumns:"80px 1fr",gap:6,marginBottom:12}}>
          <div><label style={{fontSize:11,color:"#777",display:"block",marginBottom:4}}>N° rue</label><input style={inp} value={form.streetNum||""} onChange={e=>set("streetNum",e.target.value)}/></div>
          <div><label style={{fontSize:11,color:"#777",display:"block",marginBottom:4}}>Nom de rue</label><input style={inp} value={form.streetName||""} onChange={e=>set("streetName",e.target.value)}/></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:12}}>
          <div><label style={{fontSize:11,color:"#777",display:"block",marginBottom:4}}>Code postal</label><input style={inp} value={form.zip||""} onChange={e=>set("zip",e.target.value)}/></div>

  const enrich=data.vehicles.map(v=>{
    const revs=data.revenues.filter(r=>r.vehicleId===v.id);
    return{...v,revs,totalRevenue:revs.reduce((s,r)=>s+r.amount,0),avgDiff:revs.length>0?revs.reduce((s,r)=>s+(r.difficulty||0),0)/revs.length:0,lastDate:revs.length>0?revs[revs.length-1].date:null};

                <span style={{fontSize:11,color:"#555",fontWeight:700}}>TOTAL CUMULÉ</span>
                <span style={{fontSize:16,color:"#00d4aa",fontWeight:800,fontFamily:"'Syne',sans-serif"}}>{fmt(ev.totalRevenue,currency)}</span>
              </div>
            )}
          </div>

          <div style={{display:"flex",gap:8,marginTop:4}}>
            <button onClick={()=>{setSel(null);setEditVeh(sel);}} style={{...btn("#1e1e1e","#fff"),flex:1}}>✏️ Modifier</button>
            {canDelete&&<button onClick={deleteVehicle} style={{...btn("#1a0a0a","#ff4757"),flex:1,border:"1px solid #ff4757"}}>🗑 Supprimer</button>}
          </div>
          {!canDelete&&<div style={{fontSize:11,color:"#444",textAlign:"center",marginTop:6}}>Suppression impossible : {ev.revs.length} lavage{ev.revs.length>1?"s":""} associé{ev.revs.length>1?"s":""}</div>}
        </Modal>;
      })()}
      {editVeh&&<EditVehicle vehicle={editVeh} onClose={()=>setEditVeh(null)}/>}
      {selTx&&<TxDetail tx={selTx} data={data} setData={setData} currency={currency} onClose={()=>setSelTx(null)}/>}
    </div>
  );
}

const STATUS_COLORS={"confirmé":"#00d4aa","en attente":"#ffa500","annulé":"#ff4757","terminé":"#7c3aed"};

function AppointmentForm({data,setData,onSave,editItem}){
  const today=new Date().toISOString().split("T")[0];
  const techs=(data.settings&&data.settings.technicians)||[];
  const services=(data.settings&&data.settings.services)||DEF_SERVICES;
  const[form,setForm]=useState(editItem?{...editItem,locationStreetNum:editItem.locationStreetNum||"",locationStreetName:editItem.locationStreetName||"",locationZip:editItem.locationZip||"",locationCity:editItem.locationCity||"",invoiceNumber:editItem.invoiceNumber||"",notes:editItem.notes||"",depositSplitMode:editItem.depositSplitMode||"equitable",depositTechs:editItem.depositTechs||[],depositTechAmounts:editItem.depositTechAmounts||{}}:{
    date:today,timeStart:"",timeEnd:"",
    clientId:"",clientFirst:"",clientLast:"",clientPhone:"",
    vehicleId:"",plate:"",brand:"",model:"",
    services:[],customService:"",technicians:[],
    status:"en attente",priority:"normale",
    estimatedPrice:"",deposit:"",paymentMethod:"espèce",
    depositSplitMode:"equitable",depositTechs:[],depositTechAmounts:{},
    locationStreetNum:"",locationStreetName:"",locationZip:"",locationCity:"",
    notes:"",reminderSent:false,invoiceNumber:"",
    indoorOutdoor:"extérieur",vehicleSize:"berline"
  });
  const[newClient,setNewClient]=useState(!editItem);
  const[newVehicle,setNewVehicle]=useState(!editItem);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const dur=dMin(form.timeStart,form.timeEnd);
  const selectClient=c=>{set("clientId",c.id);set("clientFirst",c.firstName);set("clientLast",c.lastName);set("clientPhone",c.phone||"");setNewClient(false);};
  // Vehicle selected → auto-fill owner
  const selectVehicle=v=>{
    set("vehicleId",v.id);set("plate",v.plate);set("brand",v.brand);set("model",v.model);set("vehicleSize",v.size||"berline");setNewVehicle(false);
    if(v.ownerId){
      const owner=data.clients.find(c=>c.id===v.ownerId);
      if(owner){setForm(f=>({...f,vehicleId:v.id,plate:v.plate,brand:v.brand,model:v.model,vehicleSize:v.size||"berline",clientId:owner.id,clientFirst:owner.firstName,clientLast:owner.lastName,clientPhone:owner.phone||""}));setNewClient(false);}
    }
  };
  const saveLocation=loc=>{if(!loc)return;};
  const handleSave=()=>{
    if(!form.date)return alert("Date requise");
    if(!form.clientFirst&&!form.clientId)return alert("Client requis");
    // Validate deposit split
    const depositAmt=parseFloat(form.deposit||0);
    if(depositAmt>0&&(form.depositTechs||[]).length>0&&(form.depositSplitMode||"equitable")==="manuel"){
      const assigned=(form.depositTechs||[]).reduce((s,t)=>s+parseFloat((form.depositTechAmounts||{})[t]||0),0);
      if(Math.abs(depositAmt-assigned)>0.01)return alert(`⚠️ La répartition de l'acompte ne correspond pas.\nAcompte : ${depositAmt.toFixed(2)} — Réparti : ${assigned.toFixed(2)}`);
    }
    const nd={...data};
    let cid=form.clientId,vid=form.vehicleId;
    if(!cid&&form.clientFirst){const nc={id:gid(),firstName:form.clientFirst,lastName:form.clientLast,phone:form.clientPhone,note:3};nd.clients=[...nd.clients,nc];cid=nc.id;}
    if(!vid&&form.plate){const pt=form.plate.toUpperCase().replace(/[^A-Z0-9]/g,"");const ev=nd.vehicles.find(v=>v.plate===pt);if(ev){vid=ev.id;}else{const nv={id:gid(),plate:pt,brand:form.brand,model:form.model,size:form.vehicleSize||"berline",ownerId:cid||""};nd.vehicles=[...nd.vehicles,nv];vid=nv.id;}}
    if(vid&&cid){const vi=nd.vehicles.findIndex(v=>v.id===vid);if(vi>=0&&!nd.vehicles[vi].ownerId){nd.vehicles=[...nd.vehicles];nd.vehicles[vi]={...nd.vehicles[vi],ownerId:cid};}}
    const location=fmtAddr(form.locationStreetNum,form.locationStreetName,form.locationZip,form.locationCity);
    if(location){const locs=nd.locations||[];if(!locs.includes(location))nd.locations=[...locs,location];}
    // Compute depositTechAmounts for equitable split
    let finalDepositTechAmounts=form.depositTechAmounts||{};
    if((form.depositSplitMode||"equitable")==="equitable"&&(form.depositTechs||[]).length>0&&depositAmt>0){
      const share=depositAmt/(form.depositTechs||[]).length;
      finalDepositTechAmounts={};
      (form.depositTechs||[]).forEach(t=>{finalDepositTechAmounts[t]=parseFloat(share.toFixed(2));});
    }
    const appt={...form,id:editItem?form.id:gid(),clientId:cid,vehicleId:vid,duration:dur,location,depositTechAmounts:finalDepositTechAmounts};
    nd.appointments=nd.appointments||[];
    if(editItem){nd.appointments=nd.appointments.map(a=>a.id===appt.id?appt:a);}
    else{nd.appointments=[...nd.appointments,appt];}
    setData(nd);onSave();
  };
  return(
    <div>
      {/* VÉHICULE EN PREMIER */}
      <Field label="Véhicule">
        <VehicleSearch data={data} onSelect={selectVehicle} onClear={()=>{set("vehicleId","");setNewVehicle(true);}} initialValue={editItem&&form.plate?`${form.plate} — ${form.brand} ${form.model}`:""}/>
        <label style={{display:"flex",alignItems:"center",gap:6,marginTop:6,color:"#777",fontSize:12,cursor:"pointer"}}><input type="checkbox" checked={newVehicle||!form.vehicleId} onChange={e=>{setNewVehicle(e.target.checked);if(e.target.checked)set("vehicleId","");}}/> Nouveau véhicule</label>
      </Field>
      {(newVehicle||!form.vehicleId)&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:12}}>
          <input style={inp} placeholder="Plaque" value={form.plate} onChange={e=>set("plate",e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,""))}/>
          <input style={inp} placeholder="Marque" value={form.brand} onChange={e=>set("brand",e.target.value)}/>
          <input style={inp} placeholder="Modèle" value={form.model} onChange={e=>set("model",e.target.value)}/>
        </div>
      )}
      {/* CLIENT ENSUITE — auto-rempli si propriétaire connu */}
      <Field label="Client (propriétaire)" required>
        {form.clientId&&!newClient
          ?<div style={{background:"#0a1a14",border:"1px solid #00d4aa33",borderRadius:10,padding:"9px 11px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{color:"#00d4aa",fontSize:13}}>👤 {form.clientFirst} {form.clientLast}</span>
            <button onClick={()=>{set("clientId","");setNewClient(true);}} style={{background:"none",border:"none",color:"#666",cursor:"pointer",fontSize:18,padding:0}}>×</button>
          </div>
          :<ClientSearch data={data} value={""} onSelect={selectClient} onClear={()=>{set("clientId","");setNewClient(true);}}/>
        }
        <label style={{display:"flex",alignItems:"center",gap:6,marginTop:6,color:"#777",fontSize:12,cursor:"pointer"}}><input type="checkbox" checked={newClient||!form.clientId} onChange={e=>{setNewClient(e.target.checked);if(e.target.checked)set("clientId","");}}/> Nouveau client</label>
      </Field>
      {(newClient||!form.clientId)&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:12}}>
          <input style={inp} placeholder="Prénom" value={form.clientFirst} onChange={e=>set("clientFirst",e.target.value)}/>
          <input style={inp} placeholder="Nom" value={form.clientLast} onChange={e=>set("clientLast",e.target.value)}/>
          <input style={{...inp,gridColumn:"1/-1"}} placeholder="Téléphone" value={form.clientPhone} onChange={e=>set("clientPhone",e.target.value)}/>
        </div>
      )}
      <Field label="Prestations prévues">
        <ServicesPicker services={services} value={form.services} onChange={v=>set("services",v)} customService={form.customService} onCustomChange={v=>set("customService",v)}/>
      </Field>
      <Field label="Technicien(s) assigné(s)">
        <TechnicianPicker technicians={techs} value={form.technicians} onChange={v=>set("technicians",v)}/>
      </Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Field label="Date" required><input type="date" style={inp} value={form.date} onChange={e=>set("date",e.target.value)}/></Field>
        <Field label="Statut">
          <select style={{...inp,color:STATUS_COLORS[form.status]||"#fff"}} value={form.status} onChange={e=>set("status",e.target.value)}>
            {["en attente","confirmé","annulé","terminé"].map(s=><option key={s} style={{color:STATUS_COLORS[s]}}>{s}</option>)}
          </select>
        </Field>
        <Field label="Heure début"><input type="time" style={inp} value={form.timeStart} onChange={e=>set("timeStart",e.target.value)}/></Field>
        <Field label="Heure fin"><input type="time" style={inp} value={form.timeEnd} onChange={e=>set("timeEnd",e.target.value)}/></Field>
        <Field label="Taille véhicule"><select style={inp} value={form.vehicleSize} onChange={e=>set("vehicleSize",e.target.value)}>{["citadine","berline","SUV","monospace","utilitaire","moto","autre"].map(s=><option key={s}>{s}</option>)}</select></Field>
        <Field label="Lieu de travail"><select style={inp} value={form.indoorOutdoor} onChange={e=>set("indoorOutdoor",e.target.value)}><option value="extérieur">🌤 Extérieur</option><option value="intérieur">🏠 Garage</option><option value="domicile client">🏡 Domicile client</option></select></Field>
        <Field label="Prix estimé"><input type="number" style={inp} placeholder="0.00" value={form.estimatedPrice} onChange={e=>set("estimatedPrice",e.target.value)}/></Field>
        <Field label="Acompte"><input type="number" style={inp} placeholder="0.00" value={form.deposit} onChange={e=>set("deposit",e.target.value)}/></Field>
        <Field label="Paiement"><select style={inp} value={form.paymentMethod} onChange={e=>set("paymentMethod",e.target.value)}>{["espèce","carte","chèque","virement","acompte"].map(m=><option key={m}>{m}</option>)}</select></Field>
        <Field label="Priorité"><select style={inp} value={form.priority} onChange={e=>set("priority",e.target.value)}>{["basse","normale","haute","urgente"].map(p=><option key={p}>{p}</option>)}</select></Field>
        <Field label="N° Facture"><input style={inp} placeholder="FAC-001" value={form.invoiceNumber||""} onChange={e=>set("invoiceNumber",e.target.value)}/></Field>
      </div>
      {techs.length>0&&parseFloat(form.deposit||0)>0&&(
        <SplitSection
          label="🏦 Qui a encaissé l'acompte ?"
          techs={techs}
          total={parseFloat(form.deposit||0)}
          splitMode={form.depositSplitMode||"equitable"}
          onSplitMode={v=>set("depositSplitMode",v)}
          selections={form.depositTechs||[]}
          onSelections={v=>set("depositTechs",v)}
          techAmounts={form.depositTechAmounts||{}}
          onTechAmounts={v=>set("depositTechAmounts",v)}
          currency={(data.settings&&data.settings.currency)||"€"}
          accent="green"
        />
      )}
      {dur>0&&<div style={{background:"#0a1a14",border:"1px solid #00d4aa33",borderRadius:10,padding:"7px 11px",marginBottom:12,color:"#00d4aa",fontSize:13}}>⏱ Durée estimée : <strong>{fmtT(dur)}</strong></div>}
      <Field label="Lieu / Adresse">
        <AddressFields streetNum={form.locationStreetNum} streetName={form.locationStreetName} zip={form.locationZip} city={form.locationCity}
          onChange={v=>setForm(f=>({...f,locationStreetNum:v.streetNum,locationStreetName:v.streetName,locationZip:v.zip,locationCity:v.city}))}/>
      </Field>
      <Field label="Notes / Remarques"><textarea style={{...inp,minHeight:70,resize:"vertical"}} placeholder="Instructions, état véhicule..." value={form.notes} onChange={e=>set("notes",e.target.value)}/></Field>
      <Field label="Rappel client"><label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}><input type="checkbox" checked={form.reminderSent} onChange={e=>set("reminderSent",e.target.checked)}/><span style={{color:"#777",fontSize:12}}>Rappel envoyé</span></label></Field>
      <button onClick={handleSave} style={{...btn("linear-gradient(135deg,#7c3aed,#5b21b6)","#fff"),width:"100%",padding:"13px",fontSize:15,marginTop:4}}>
        📅 {editItem?"Modifier":"Enregistrer"} le rendez-vous
      </button>
    </div>
  );
}

function AppointmentsPage({data,setData,currency}){
  const[showForm,setShowForm]=useState(false);
  const[editItem,setEditItem]=useState(null);
  const[filter,setFilter]=useState("tous");
  const[revPrefill,setRevPrefill]=useState(null); // when set, show revenue editor
  const now=new Date();
  const appointments=data.appointments||[];
  const filtered=appointments.filter(a=>{
    if(filter==="aujourd'hui")return new Date(a.date).toDateString()===now.toDateString();
    if(filter==="à venir")return new Date(a.date)>=new Date(now.toDateString());
    if(filter==="confirmé")return a.status==="confirmé";
    if(filter==="en attente")return a.status==="en attente";
    if(filter==="terminé")return a.status==="terminé";
    return true;
  }).sort((a,b)=>new Date(a.date)-new Date(b.date)||(a.timeStart||"").localeCompare(b.timeStart||""));

  const deleteAppt=(id)=>{
    if(!window.confirm("Supprimer définitivement ce rendez-vous ?"))return;
    if(!window.confirm("Êtes-vous sûr ? Cette action est irréversible."))return;
    const nd={...data,appointments:(data.appointments||[]).filter(a=>a.id!==id)};
    setData(nd);save(nd);
  };

  const handleAnnuler=(a)=>{
    if(!window.confirm("Annuler ce rendez-vous ?"))return;
    const raison=window.prompt("Raison de l'annulation (optionnel) :","");
    if(raison===null)return; // user pressed Cancel on prompt
    const nd={...data};
    // Mark appointment as annulé with raison
    nd.appointments=(nd.appointments||[]).map(x=>x.id===a.id?{...x,status:"annulé",cancellationReason:raison,cancellationDate:new Date().toISOString().split("T")[0]}:x);
    // Add a note on the client
    if(a.clientId){
      const clientNote={id:gid(),date:new Date().toISOString().split("T")[0],text:`RDV annulé du ${fmtD(a.date)}${raison?` — ${raison}`:""}`,type:"cancellation"};
      nd.clients=nd.clients.map(c=>c.id===a.clientId?{...c,clientNotes:[...(c.clientNotes||[]),clientNote]}:c);
    }
    setData(nd);save(nd);
  };

  const markStatus=(id,status)=>{const nd={...data,appointments:appointments.map(a=>a.id===id?{...a,status}:a)};setData(nd);save(nd);};

  const handleTermine=(a)=>{
    if(!window.confirm(`Marquer ce RDV comme terminé et créer la fiche lavage ?`))return;
    // Build prefill for RevenueForm, then open it
    const prefill={
      date:a.date,timeStart:a.timeStart||"",timeEnd:a.timeEnd||"",
      clientId:a.clientId,clientFirst:a.clientFirst||"",clientLast:a.clientLast||"",clientPhone:a.clientPhone||"",
      vehicleId:a.vehicleId,plate:a.plate||"",brand:a.brand||"",model:a.model||"",vehicleSize:a.vehicleSize||"berline",
      technicians:a.technicians||[],prestations:a.services||[],customPrestation:a.customService||"",
      amount:a.estimatedPrice?String(a.estimatedPrice):"",isGift:false,
      paymentMethod:a.paymentMethod||"espèce",paidToTechs:[],
      deposit:a.deposit||"",depositTechs:a.depositTechs||[],depositTechAmounts:a.depositTechAmounts||{},depositSplitMode:a.depositSplitMode||"equitable",
      locationStreetNum:a.locationStreetNum||"",locationStreetName:a.locationStreetName||"",
      locationZip:a.locationZip||"",locationCity:a.locationCity||"",location:a.location||"",
      remarks:a.notes||"",difficulty:3,duration:a.duration||0,
      carPhoto:null,invoiceFile:null,fromAppointmentId:a.id,_apptIdToDelete:a.id
    };
    // Mark appointment as terminé
    const nd={...data,appointments:appointments.map(x=>x.id===a.id?{...x,status:"terminé"}:x)};
    setData(nd);save(nd);
    setRevPrefill(prefill);
  };

  const handleRevSave=()=>{
    const apptId=revPrefill&&revPrefill._apptIdToDelete;
    setRevPrefill(null);
    if(apptId){
      // Read fresh data from localStorage to avoid stale closure
      try{
        const raw=localStorage.getItem(SK);
        if(raw){
          const fresh=JSON.parse(raw);
          fresh.appointments=(fresh.appointments||[]).filter(x=>x.id!==apptId);
          setData(fresh);
        }
      }catch(e){
        const nd2={...data,appointments:(data.appointments||[]).filter(x=>x.id!==apptId)};
        setData(nd2);
      }
    }
  };

  const todayCount=appointments.filter(a=>new Date(a.date).toDateString()===now.toDateString()).length;
  const upcomingCount=appointments.filter(a=>new Date(a.date)>=new Date(now.toDateString())&&a.status!=="annulé"&&a.status!=="terminé").length;

  // If revPrefill set, show Revenue editor in modal
  if(revPrefill){
    return(
      <Modal title="Fiche Lavage 🧼" onClose={()=>setRevPrefill(null)}>
        <RevenueForm data={data} setData={setData} prefill={revPrefill} onSave={handleRevSave}/>
      </Modal>
    );
  }

  return(
    <div style={{paddingBottom:90}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
        <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:12,padding:"10px",textAlign:"center"}}><div style={{fontSize:9,color:"#666"}}>AUJOURD'HUI</div><div style={{color:"#00d4aa",fontWeight:700,fontSize:18}}>{todayCount}</div></div>
        <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:12,padding:"10px",textAlign:"center"}}><div style={{fontSize:9,color:"#666"}}>À VENIR</div><div style={{color:"#ffa500",fontWeight:700,fontSize:18}}>{upcomingCount}</div></div>
        <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:12,padding:"10px",textAlign:"center"}}><div style={{fontSize:9,color:"#666"}}>TOTAL</div><div style={{color:"#a78bfa",fontWeight:700,fontSize:18}}>{appointments.length}</div></div>
      </div>
      <div style={{display:"flex",gap:5,marginBottom:10,flexWrap:"wrap"}}>
        {["tous","aujourd'hui","à venir","confirmé","en attente","terminé"].map(f=>(
          <button key={f} onClick={()=>setFilter(f)} style={{background:filter===f?"#1e1e1e":"transparent",border:"1px solid #252525",color:filter===f?"#fff":"#555",padding:"4px 9px",borderRadius:20,fontSize:10,cursor:"pointer",fontWeight:filter===f?600:400}}>{f}</button>
        ))}
      </div>
      <button onClick={()=>{setEditItem(null);setShowForm(true);}} style={{...btn("linear-gradient(135deg,#7c3aed,#5b21b6)","#fff"),width:"100%",padding:"11px",marginBottom:12,fontSize:13}}>📅 Nouveau rendez-vous</button>
      {filtered.length===0
        ?<div style={{textAlign:"center",color:"#444",fontSize:13,padding:"40px 0"}}>Aucun rendez-vous</div>
        :filtered.map(a=>{
          const c=data.clients.find(cl=>cl.id===a.clientId);
          const v=data.vehicles.find(vv=>vv.id===a.vehicleId);
          const sc=STATUS_COLORS[a.status]||"#666";
          const isToday=new Date(a.date).toDateString()===now.toDateString();
          const isActive=a.status!=="annulé"&&a.status!=="terminé";
          return(
            <div key={a.id} style={{background:"#111",borderLeft:`3px solid ${sc}`,border:`1px solid #1e1e1e`,borderRadius:12,padding:"11px 13px",marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{color:"#fff",fontWeight:700,fontSize:14}}>{v?`${v.brand} ${v.model}`:a.plate||"Véhicule"}</div>
                  <div style={{color:"#888",fontSize:12}}>{c?`${c.firstName} ${c.lastName}`:`${a.clientFirst||""} ${a.clientLast||""}`.trim()||"—"}</div>
                  <div style={{color:"#666",fontSize:11,marginTop:2}}>
                    {isToday?<span style={{color:"#00d4aa",fontWeight:600}}>Aujourd'hui</span>:fmtD(a.date)}
                    {a.timeStart?` · ${a.timeStart}${a.timeEnd?` → ${a.timeEnd}`:""}` : ""}
                    {a.duration>0?` (${fmtT(a.duration)})`:""}
                  </div>
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3,flexShrink:0}}>
                  <span style={{background:`${sc}22`,color:sc,borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:700}}>{a.status}</span>
                  {a.priority==="urgente"&&<span style={{background:"#ff475722",color:"#ff4757",borderRadius:20,padding:"2px 7px",fontSize:9,fontWeight:700}}>🔴 URGENT</span>}
                  {a.priority==="haute"&&<span style={{background:"#ffa50022",color:"#ffa500",borderRadius:20,padding:"2px 7px",fontSize:9,fontWeight:700}}>⚡ HAUTE</span>}
                </div>
              </div>
              {a.technicians&&a.technicians.length>0&&<div style={{color:"#555",fontSize:11,marginBottom:3}}>👤 {a.technicians.join(", ")}</div>}
              {a.services&&a.services.length>0&&<div style={{color:"#444",fontSize:11,marginBottom:3}}>{a.services.join(" · ")}{a.customService?` · ${a.customService}`:""}</div>}
              {a.estimatedPrice&&<div style={{color:"#00d4aa",fontSize:12,marginBottom:3}}>💰 {parseFloat(a.estimatedPrice).toFixed(2)} {currency}{a.deposit?` · Acompte: ${parseFloat(a.deposit).toFixed(2)} ${currency}${a.depositTechs&&a.depositTechs.length>0?` (${a.depositTechs.join(", ")})`:""}`:""}</div>}
              {a.location&&<div style={{color:"#444",fontSize:11,marginBottom:3}}>📍 {a.location}</div>}

                )}

// ===================== TECHNICIAN TRACKER PAGE =====================
function TechnicianTrackerPage({data,setData,currency}){
  const s=data.settings||{};
  const techs=s.technicians||[];
  const[newTech,setNewTech]=useState("");
  const[showTransferForm,setShowTransferForm]=useState(false);
  const[editTransfer,setEditTransfer]=useState(null);
  const[subView,setSubView]=useState("soldes"); // "soldes" | "historique"
  const upd=(k,v)=>{const nd={...data,settings:{...s,[k]:v}};setData(nd);save(nd);};
  const addTech=()=>{const t=newTech.trim();if(!t||techs.includes(t))return;upd("technicians",[...techs,t]);setNewTech("");};
  const removeTech=t=>{if(!window.confirm(`Supprimer ${t} ?`))return;upd("technicians",techs.filter(x=>x!==t));};
  const deleteTransfer=id=>{if(!window.confirm("Supprimer ce transfert ?"))return;setData({...data,transfers:(data.transfers||[]).filter(t=>t.id!==id)});};
  const cur=(data.settings&&data.settings.currency)||currency||"€";
  const transfers=(data.transfers||[]).sort((a,b)=>new Date(b.date)-new Date(a.date));

  // Compute balances from revenues, expenses, AND transfers
  const balances={};
  techs.forEach(a=>{balances[a]={};techs.forEach(b=>{if(a!==b)balances[a][b]=0;});});

  const addDebt=(debtor,creditor,amount)=>{
    if(debtor===creditor||amount<=0)return;
    if(balances[debtor]&&balances[debtor][creditor]!==undefined)balances[debtor][creditor]-=amount;
    if(balances[creditor]&&balances[creditor][debtor]!==undefined)balances[creditor][debtor]+=amount;
  };

  data.revenues.forEach(rev=>{
    if(!rev.technicians||rev.technicians.length===0)return;
    const receivers=rev.paidToTechs||(rev.paidToTech?[rev.paidToTech]:[]);
    if(receivers.length===0)return;
    const workers=rev.technicians;
    // Use stored techAmounts if available (exact), else divide equally
    const techAmts=rev.techAmounts||{};
    workers.forEach(w=>{
      const workerShare=techAmts[w]!==undefined?techAmts[w]:rev.amount/workers.length;
      receivers.forEach(r=>{
        if(r===w)return;
        // receiver r holds the cash and owes worker w their share
        // Each receiver holds their stored amount (or equal share)
        const receiverHeld=techAmts[r]!==undefined?techAmts[r]:rev.amount/receivers.length;
        // r owes w: w's share proportionally covered by r
        addDebt(r,w,workerShare/receivers.length);
      });
    });
  });

  data.expenses.forEach(exp=>{
    const payers=exp.paidByTechs||(exp.paidByTech?[exp.paidByTech]:[]);
    if(payers.length===0||techs.length<2)return;
    // Use stored techAmounts if available
    const techAmts=exp.techAmounts||{};
    const sharePerTech=exp.amount/techs.length;
    techs.forEach(t=>{
      if(payers.includes(t))return;
      payers.forEach(p=>{
        // t owes p their share of what p paid
        const pPaid=techAmts[p]!==undefined?techAmts[p]:exp.amount/payers.length;
        addDebt(t,p,sharePerTech/payers.length);
      });
    });
  });

  // Transfers reduce debts
  transfers.forEach(tr=>{
    if(!balances[tr.from]||!balances[tr.to])return;
    addDebt(tr.to,tr.from,tr.amount); // from paid to → reduces from's debt to to
  });

  // Simplify: for each pair, net balance
  const debts=[];
  const seen=new Set();
  techs.forEach(a=>{
    techs.forEach(b=>{
      if(a===b)return;
      const key=[a,b].sort().join("||");
      if(seen.has(key))return;
      seen.add(key);
      const net=(balances[a]?balances[a][b]||0:0)-(balances[b]?balances[b][a]||0:0);
      if(Math.abs(net)>0.005){
        const debtor=net<0?a:b;
        const creditor=net<0?b:a;
        debts.push({debtor,creditor,amount:Math.abs(net)});
      }
    });
  });

  // Revenue stats per tech
  const techStats=techs.map(t=>{
    const revs=data.revenues.filter(r=>r.technicians&&r.technicians.includes(t));
    const total=revs.reduce((s,r)=>{
      const amts=r.techAmounts||{};
      return s+(amts[t]!==undefined?parseFloat(amts[t]):r.amount/Math.max(r.technicians.length,1));
    },0);
    const received=data.revenues.filter(r=>(r.paidToTechs||(r.paidToTech?[r.paidToTech]:[])).includes(t)).reduce((s,r)=>{
      const amts=r.techAmounts||{};
      return s+(amts[t]!==undefined?parseFloat(amts[t]):r.amount/Math.max((r.paidToTechs||[r.paidToTech]).filter(Boolean).length,1));
    },0);
    const expPaid=data.expenses.filter(e=>(e.paidByTechs||(e.paidByTech?[e.paidByTech]:[])).includes(t)).reduce((s,e)=>{
      const amts=e.techAmounts||{};
      return s+(amts[t]!==undefined?parseFloat(amts[t]):e.amount/Math.max((e.paidByTechs||[e.paidByTech]).filter(Boolean).length,1));
    },0);
    const sent=transfers.filter(tr=>tr.from===t).reduce((s,tr)=>s+tr.amount,0);
    const recv=transfers.filter(tr=>tr.to===t).reduce((s,tr)=>s+tr.amount,0);
    return{name:t,revs:revs.length,share:total,received,expPaid,sent,recv};
  });

  if(showTransferForm||editTransfer){
    return(
      <Modal title={editTransfer?"Modifier le transfert ↔️":"Nouveau transfert 💸"} onClose={()=>{setShowTransferForm(false);setEditTransfer(null);}}>
        <TransferForm data={data} setData={setData} editItem={editTransfer} onSave={()=>{setShowTransferForm(false);setEditTransfer(null);}}/>
      </Modal>
    );
  }

  return(
    <div style={{paddingBottom:90}}>
      {/* Technician management */}
      <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:14,marginBottom:12}}>
        <div style={{fontSize:12,color:"#666",fontWeight:600,marginBottom:10}}>👤 ÉQUIPE</div>
        {techs.length===0&&<div style={{color:"#444",fontSize:12,marginBottom:10,fontStyle:"italic"}}>Aucun technicien configuré.</div>}
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
          {techs.map(t=>(

// ===================== GITHUB SETTINGS SECTION =====================
function GitHubSettings({ghCfg,onSave}){
  const[cfg,setCfg]=useState({token:ghCfg.token||"",owner:ghCfg.owner||"",repo:ghCfg.repo||"",branch:ghCfg.branch||"main",path:ghCfg.path||"data.json"});
  const set=(k,v)=>setCfg(c=>({...c,[k]:v}));
  const[testing,setTesting]=useState(false);
  const[testMsg,setTestMsg]=useState("");

  const testAndSave=async()=>{
    if(!cfg.token||!cfg.owner||!cfg.repo)return alert("Token, Owner et Repo sont requis.");
    setTesting(true);setTestMsg("Test de la connexion…");
    const res=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}`,{headers:ghHeaders(cfg.token)});
    if(res.ok){setTestMsg("✅ Connexion OK ! Paramètres sauvegardés.");saveGHCfg(cfg);onSave(cfg);}
    else{setTestMsg("❌ Échec — vérifiez votre token et votre repo.");}
    setTesting(false);
  };
  const disconnect=()=>{const empty={token:"",owner:"",repo:"",branch:"main",path:"data.json"};saveGHCfg(empty);onSave(empty);setCfg(empty);setTestMsg("");};

  return(
    <div style={{background:"#0a0f1a",border:"1px solid #00d4aa33",borderRadius:14,padding:14,marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:12,color:"#00d4aa",fontWeight:700}}>🔗 SYNCHRONISATION GITHUB</div>
        {ghCfg.token&&<button onClick={disconnect} style={{background:"transparent",border:"1px solid #ff4757",color:"#ff4757",borderRadius:8,padding:"3px 8px",cursor:"pointer",fontSize:10}}>Déconnecter</button>}
      </div>
      {!ghCfg.token&&(
        <div style={{background:"#0a1a14",border:"1px solid #00d4aa22",borderRadius:10,padding:"10px 12px",marginBottom:12,fontSize:11,color:"#666",lineHeight:1.6}}>
          <b style={{color:"#00d4aa"}}>Comment connecter GitHub :</b><br/>
          1. Va sur <b style={{color:"#ccc"}}>github.com → Settings → Developer settings → Personal access tokens → Tokens (classic)</b><br/>
          2. Clique <b style={{color:"#ccc"}}>Generate new token (classic)</b><br/>
          3. Coche uniquement la permission <b style={{color:"#ccc"}}>repo</b><br/>
          4. Copie le token généré et colle-le ci-dessous<br/>
          5. Ton associé fait pareil avec <b style={{color:"#ccc"}}>son propre token</b> (même repo)
        </div>
      )}
      <Field label="Personal Access Token (github.com → Settings → Developer settings)">
        <input style={{...inp,fontFamily:"monospace",fontSize:11}} type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" value={cfg.token} onChange={e=>set("token",e.target.value)}/>
      </Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Field label="Votre username GitHub (owner)">
          <input style={inp} placeholder="ex: jean-dupont" value={cfg.owner} onChange={e=>set("owner",e.target.value)}/>
        </Field>
        <Field label="Nom du repository">
          <input style={inp} placeholder="ex: mon-detailing" value={cfg.repo} onChange={e=>set("repo",e.target.value)}/>
        </Field>
        <Field label="Branche">
          <input style={inp} placeholder="main" value={cfg.branch} onChange={e=>set("branch",e.target.value)}/>
        </Field>
        <Field label="Fichier données">
          <input style={inp} placeholder="data.json" value={cfg.path} onChange={e=>set("path",e.target.value)}/>
        </Field>
      </div>
      {testMsg&&<div style={{background:testMsg.startsWith("✅")?"#0a1a14":"#1a0a0a",border:`1px solid ${testMsg.startsWith("✅")?"#00d4aa33":"#ff475733"}`,borderRadius:10,padding:"8px 12px",marginBottom:10,fontSize:12,color:testMsg.startsWith("✅")?"#00d4aa":"#ff4757"}}>{testMsg}</div>}
      <button onClick={testAndSave} disabled={testing} style={{...btn("linear-gradient(135deg,#00d4aa,#0099cc)","#000"),width:"100%",padding:"11px",fontSize:13}}>
        {testing?"⏳ Test en cours…":"🔗 Tester & Sauvegarder la connexion"}
      </button>
    </div>
  );
}

  const[ghCfg,setGhCfg]=useState(()=>loadGHCfg());
  const[ghSha,setGhSha]=useState(null);
  const[ghStatus,setGhStatus]=useState("idle");
  const[ghMsg,setGhMsg]=useState("");
  const ghConnected=!!(ghCfg.token&&ghCfg.owner&&ghCfg.repo);
  const saveTimerRef=useRef(null);
  const ghShaRef=useRef(null);

  // On mount: load from GitHub if configured — ALWAYS overrides localStorage
  useEffect(()=>{
    if(!ghConnected)return;
    setGhStatus("loading");setGhMsg("Chargement depuis GitHub…");
    ghLoadData(ghCfg).then(res=>{
      if(res.status==="ok"){
        setData(res.data);save(res.data);
        ghShaRef.current=res.sha;setGhSha(res.sha);
        setGhStatus("ok");setGhMsg("✅ Synchronisé depuis GitHub");
      }else if(res.status==="empty"){
        // Repo ok, fichier pas encore créé → on pousse les données locales
        setGhStatus("saving");setGhMsg("Première sync — création du fichier…");
        ghSaveData(ghCfg,data,null).then(r=>{
          if(r.ok){ghShaRef.current=r.sha;setGhSha(r.sha);setGhStatus("ok");setGhMsg("✅ Données initiales envoyées sur GitHub");}
          else{setGhStatus("error");setGhMsg("❌ Impossible de créer data.json: "+( r.error||""));}
        });
      }else if(res.status==="authfail"){
        setGhStatus("error");setGhMsg("❌ Token invalide ou expiré — vérifie dans Réglages");
      }else{
        setGhStatus("error");setGhMsg(`❌ Erreur: ${JSON.stringify(res)}`);
      }
    }).catch((e)=>{
      setGhStatus("error");setGhMsg("❌ Exception: "+(e&&e.message?e.message:String(e)));
    });
  },[ghConnected]);

  // Sync wrapper — replaces setData everywhere in app (passed as prop)
  const setDataAndSync=useCallback((nd)=>{
    setData(nd);save(nd);
    if(!ghConnected)return;
    if(saveTimerRef.current)clearTimeout(saveTimerRef.current);
    setGhStatus("saving");setGhMsg("Sauvegarde sur GitHub…");
    saveTimerRef.current=setTimeout(async()=>{
      const sha=ghShaRef.current;
      const r=await ghSaveData(ghCfg,nd,sha);
      if(r.ok){ghShaRef.current=r.sha;setGhSha(r.sha);setGhStatus("ok");setGhMsg("✅ Sauvegardé sur GitHub");}
      else{setGhStatus("error");setGhMsg(`❌ Erreur: ${r.error||"GitHub"}`);}
    },2000);
  },[ghConnected,ghCfg]);

  // Manual refresh from GitHub
  const ghRefresh=async()=>{
    if(!ghConnected)return;
    setGhStatus("loading");setGhMsg("Rechargement depuis GitHub…");
    const res=await ghLoadData(ghCfg);
    if(res.status==="ok"){setData(res.data);save(res.data);ghShaRef.current=res.sha;setGhSha(res.sha);setGhStatus("ok");setGhMsg("✅ Rechargé depuis GitHub");}
    else if(res.status==="empty"){setGhStatus("ok");setGhMsg("✅ Connecté — aucune donnée sur GitHub encore");}
    else if(res.status==="authfail"){setGhStatus("error");setGhMsg("❌ Token invalide ou expiré — vérifie dans Réglages");}
    else{setGhStatus("error");setGhMsg(`❌ Reload: ${res.code||res.status||"?"} ${res.msg||""}`);}
  };

  const SyncBanner=()=>{
    if(!ghConnected||(ghStatus==="idle"&&!ghMsg))return null;
    const clr={loading:"#0099cc",saving:"#7c3aed",ok:"#00a882",error:"#ff4757"}[ghStatus]||"#333";
    return(
      <div style={{background:clr,color:"#fff",fontSize:11,fontWeight:600,textAlign:"center",padding:"5px 12px",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        <span>{ghStatus==="loading"||ghStatus==="saving"?"⏳ ":""}{ghMsg}</span>
        {(ghStatus==="ok"||ghStatus==="error")&&<button onClick={ghRefresh} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",borderRadius:6,padding:"2px 8px",cursor:"pointer",fontSize:10,fontWeight:700}}>↻ Réessayer</button>}
      </div>
    );
  };

  return(
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"#0a0a0a",fontFamily:"'DM Sans',sans-serif",color:"#fff",position:"relative"}}>
      {/* Header */}
      <div style={{position:"sticky",top:0,zIndex:100,background:"rgba(10,10,10,0.96)",backdropFilter:"blur(20px)",borderBottom:"1px solid #161616"}}>
        <div style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:10}}>
          {companyLogo?<img src={companyLogo} style={{width:36,height:36,objectFit:"cover",borderRadius:9,border:"1px solid #222"}}/>:<div style={{width:36,height:36,background:"linear-gradient(135deg,#00d4aa,#0099cc)",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>✨</div>}
          <div style={{flex:1}}>
            <div style={{fontSize:16,fontWeight:700,color:"#fff",fontFamily:"'Syne',sans-serif",lineHeight:1.2}}>{companyName}</div>
            <div style={{fontSize:10,color:"#444"}}>{new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"})}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            {ghConnected&&<div style={{width:7,height:7,borderRadius:"50%",background:{loading:"#0099cc",saving:"#7c3aed",ok:"#00d4aa",error:"#ff4757",idle:"#444"}[ghStatus]||"#444"}} title="Statut GitHub"/>}
            <div style={{fontSize:10,color:"#00d4aa",background:"#0a1a14",border:"1px solid #00d4aa22",padding:"3px 8px",borderRadius:20}}>{data.revenues.length} lavages</div>
          </div>
        </div>
        <SyncBanner/>
      </div>

      {/* Sub-tabs for Annuaire */}
      {tab===2&&(
        <div style={{display:"flex",gap:0,background:"#0f0f0f",borderBottom:"1px solid #1a1a1a",padding:"0 14px"}}>
          {[["👤","Clients"],["🚗","Voitures"],["👥","Équipe"]].map(([icon,label],i)=>(
            <button key={i} onClick={()=>setSubTab(i)} style={{flex:1,background:"none",border:"none",padding:"10px 0 8px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,borderBottom:`2px solid ${subTab===i?"#00d4aa":"transparent"}`}}>
              <span style={{fontSize:16,filter:subTab===i?"none":"grayscale(100%) opacity(0.4)"}}>{icon}</span>
              <span style={{fontSize:10,color:subTab===i?"#00d4aa":"#444",fontWeight:subTab===i?700:400}}>{label}</span>
            </button>
          ))}
        </div>
      )}

      {/* Content */}
      <div style={{padding:"14px 14px 0"}}>
        {tab===0&&<HomePage data={data} setData={setDataAndSync} currency={currency}/>}
        {tab===1&&<StatsPage data={data} setData={setDataAndSync} currency={currency}/>}
        {tab===2&&subTab===0&&<ClientsPage data={data} setData={setDataAndSync} currency={currency}/>}
        {tab===2&&subTab===1&&<VehiclesPage data={data} setData={setDataAndSync} currency={currency}/>}
        {tab===2&&subTab===2&&<TechnicianTrackerPage data={data} setData={setDataAndSync} currency={currency}/>}
        {tab===3&&<AppointmentsPage data={data} setData={setDataAndSync} currency={currency}/>}
        {tab===4&&<HistoryPage data={data} setData={setDataAndSync} currency={currency}/>}
        {tab===5&&<SettingsPage data={data} setData={setDataAndSync} ghCfg={ghCfg} onGhCfgSave={cfg=>{setGhCfg(cfg);setTimeout(()=>ghRefresh(),500);}}/>}
      </div>

      {/* FAB */}
      {tab<5&&<FAB onRev={()=>setShowRev(true)} onExp={()=>setShowExp(true)} onTransfer={()=>setShowTransfer(true)}/>}

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(10,10,10,0.97)",backdropFilter:"blur(20px)",borderTop:"1px solid #161616",display:"flex",zIndex:200,paddingBottom:"env(safe-area-inset-bottom)"}}>
        {tabs.map(([icon,label],i)=>(
          <button key={i} onClick={()=>setTab(i)} style={{flex:1,background:"none",border:"none",padding:"9px 0 7px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span style={{fontSize:19,filter:tab===i?"none":"grayscale(100%) opacity(0.35)"}}>{icon}</span>
            <span style={{fontSize:8,color:tab===i?"#00d4aa":"#333",fontWeight:tab===i?700:400,letterSpacing:0.2}}>{label}</span>
            {tab===i&&<div style={{width:3,height:3,borderRadius:"50%",background:"#00d4aa"}}/>}
          </button>
        ))}
      </div>

      {showRev&&<Modal title="Nouveau revenu 💰" onClose={()=>setShowRev(false)}><RevenueForm data={data} setData={setDataAndSync} onSave={()=>setShowRev(false)}/></Modal>}
      {showExp&&<Modal title="Nouvelle dépense 🔴" onClose={()=>setShowExp(false)}><ExpenseForm data={data} setData={setDataAndSync} onSave={()=>setShowExp(false)}/></Modal>}
      {showTransfer&&<Modal title="Nouveau transfert 💸" onClose={()=>setShowTransfer(false)}><TransferForm data={data} setData={setDataAndSync} onSave={()=>setShowTransfer(false)}/></Modal>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
