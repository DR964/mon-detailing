const DEF={settings:{companyName:"Mon Détailing",companyLogo:null,currency:"€",technicians:[],services:[...DEF_SERVICES]},revenues:[],expenses:[],clients:[],vehicles:[],locations:[],appointments:[],transfers:[]};

// --- GitHub config helpers (stored separately in localStorage) ---
const loadGHCfg=()=>{try{const r=localStorage.getItem(GH_CFG_KEY);return r?JSON.parse(r):{};}catch{return{};}};
const saveGHCfg=cfg=>{try{localStorage.setItem(GH_CFG_KEY,JSON.stringify(cfg));}catch{}};

// --- Local cache (only used as temporary cache when GitHub is configured) ---
const load=()=>{
  // If GitHub is configured, always start with DEF and let GitHub load override
  const ghCfgRaw=loadGHCfg();
  if(ghCfgRaw&&ghCfgRaw.token&&ghCfgRaw.owner&&ghCfgRaw.repo){
    // Try local cache first for instant render, GitHub will override shortly
    try{const r=localStorage.getItem(SK);if(r){const d=JSON.parse(r);return{...DEF,...d,settings:{...DEF.settings,...(d.settings||{})}};}}catch{}
    return DEF;
  }
  // No GitHub → use localStorage
  try{const r=localStorage.getItem(SK);if(r){const d=JSON.parse(r);return{...DEF,...d,settings:{...DEF.settings,...(d.settings||{})}};}}catch{}
  try{const r=localStorage.getItem("detailing_v5");if(r){const d=JSON.parse(r);return{...DEF,...d,settings:{...DEF.settings,...(d.settings||{})}};}}catch{}
  try{const r=localStorage.getItem("detailing_v4");if(r){const d=JSON.parse(r);return{...DEF,...d,settings:{...DEF.settings,...(d.settings||{})}};}}catch{}
  return DEF;
};
const save=d=>{try{localStorage.setItem(SK,JSON.stringify(d));}catch{}};
const clearLocalData=()=>{try{localStorage.removeItem(SK);localStorage.removeItem("detailing_v5");localStorage.removeItem("detailing_v4");}catch{}};

// --- GitHub API helpers ---
const ghHeaders=token=>({'Authorization':`token ${token}`,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'});

const ghLoadData=async(cfg)=>{
  const{token,owner,repo,branch="main",path="data.json"}=cfg;
  if(!token||!owner||!repo)return{status:"nocfg"};
  try{
    // Utilise l'API blob pour lire sans limite de taille
    // 1. Get file metadata + SHA
    const metaRes=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`,{headers:ghHeaders(token)});
    if(metaRes.status===404)return{status:"empty"};
    if(metaRes.status===401||metaRes.status===403)return{status:"authfail"};
    if(!metaRes.ok)return{status:"error",code:metaRes.status};
    const meta=await metaRes.json();
    const sha=meta.sha;
    const blobSha=meta.sha;
    // 2. Fetch blob directement (pas de limite 1MB)
    const blobRes=await fetch(`https://api.github.com/repos/${owner}/${repo}/git/blobs/${blobSha}`,{headers:{...ghHeaders(token),'Accept':'application/vnd.github.raw+json'}});
    if(!blobRes.ok)return{status:"error",code:blobRes.status};
    const raw=(await blobRes.text()).trim();
    if(!raw||raw==='{}'||raw==='{ }')return{status:"empty",sha};
    const decoded=JSON.parse(raw);
    // Merge local photos back (photos are stripped before GH upload)
    const localRaw=localStorage.getItem(SK);
    const localData=localRaw?JSON.parse(localRaw):null;
    const mergedData={...DEF,...decoded,settings:{...DEF.settings,...(decoded.settings||{})}};
    if(localData){
      // Restore photos from local cache into GH data
      mergedData.revenues=mergedData.revenues.map(r=>{
        const loc=localData.revenues&&localData.revenues.find(lr=>lr.id===r.id);
        return loc&&loc.carPhoto?{...r,carPhoto:loc.carPhoto,invoiceFile:loc.invoiceFile||r.invoiceFile}:r;
      });
      mergedData.expenses=mergedData.expenses.map(e=>{
        const loc=localData.expenses&&localData.expenses.find(le=>le.id===e.id);
        return loc&&loc.receiptPhoto?{...e,receiptPhoto:loc.receiptPhoto,invoiceFile:loc.invoiceFile||e.invoiceFile}:e;
      });
      if(!mergedData.settings.companyLogo&&localData.settings&&localData.settings.companyLogo){
        mergedData.settings={...mergedData.settings,companyLogo:localData.settings.companyLogo};
      }
    }
    return{status:"ok",data:mergedData,sha};
  }catch(e){return{status:"error",msg:e.message};}
};

// Strip base64 photos before sending to GitHub (too large)
const stripPhotos=(obj)=>{
  if(!obj||typeof obj!=='object')return obj;
  if(Array.isArray(obj))return obj.map(stripPhotos);
  const out={};
  for(const k in obj){
    if((k==='carPhoto'||k==='companyLogo'||k==='invoiceFile'||k==='receiptPhoto')&&typeof obj[k]==='string'&&obj[k].startsWith('data:')){
      out[k]=null; // remove base64 photos
    }else{
      out[k]=stripPhotos(obj[k]);
    }
  }
  return out;
};

const ghSaveData=async(cfg,dataObj,sha)=>{
  const{token,owner,repo,branch="main",path="data.json"}=cfg;
  if(!token||!owner||!repo)return{ok:false,sha};
  const stripped=stripPhotos(dataObj);
  const _json=JSON.stringify(stripped,null,2);
  const _enc=new TextEncoder().encode(_json);
  let _bin='';_enc.forEach(b=>_bin+=String.fromCharCode(b));
  const content=btoa(_bin);
  const body={message:`Update detailing data — ${new Date().toLocaleString('fr-FR')}`,content,branch};
  if(sha)body.sha=sha;
  try{
    const res=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`,{method:'PUT',headers:ghHeaders(token),body:JSON.stringify(body)});
    if(!res.ok){const e=await res.json();return{ok:false,error:e.message,sha};}
    const j=await res.json();
    return{ok:true,sha:j.content.sha};
  }catch(e){return{ok:false,error:e.message,sha};}
};

// ===================== IMAGE COMPRESSION =====================
const compressImage=(dataUrl,maxW=800,maxH=600,quality=0.7)=>new Promise(resolve=>{
  const img=new Image();
  img.onload=()=>{
    let w=img.width,h=img.height;
    if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
    if(h>maxH){w=Math.round(w*maxH/h);h=maxH;}
    const c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    resolve(c.toDataURL('image/jpeg',quality));
  };
  img.onerror=()=>resolve(dataUrl);
  img.src=dataUrl;
});

// ===================== SPLIT SECTION (répartition entre techs) =====================
// accent: "green" pour revenus/acompte, "red" pour dépenses
function SplitSection({label,techs,total,splitMode,onSplitMode,selections,onSelections,techAmounts,onTechAmounts,currency,accent="green"}){
  const c1=accent==="green"?"#00d4aa":"#ff4757";
  const c2=accent==="green"?"#0a1a14":"#1a0a0a";
  const c3=accent==="green"?"#00d4aa33":"#ff475733";
  const c4=accent==="green"?"#00d4aa22":"#ff475722";
  const icon=accent==="green"?"💰":"💸";
  if(!techs||techs.length===0)return null;

  const equitableShare=selections.length>0&&total>0?(total/selections.length):0;
  const manualAssigned=selections.reduce((s,t)=>s+parseFloat((techAmounts||{})[t]||0),0);
  const manualDiff=total-manualAssigned;
  const manualOk=Math.abs(manualDiff)<0.01;

  return(
    <Field label={label}>
      <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:12,padding:"10px 12px"}}>
        {/* Mode toggle */}
        <div style={{display:"flex",gap:6,marginBottom:10}}>
          {["equitable","manuel"].map(m=>(
            <button key={m} type="button" onClick={()=>onSplitMode(m)}
              style={{flex:1,background:splitMode===m?c2:"#1a1a1a",border:`1px solid ${splitMode===m?c1:"#252525"}`,color:splitMode===m?c1:"#666",borderRadius:8,padding:"6px",cursor:"pointer",fontSize:11,fontWeight:700}}>
              {m==="equitable"?"⚖️ Équitable":"✍️ Manuel"}
            </button>
          ))}
        </div>
        {/* Tech rows */}
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {techs.map(t=>{
            const sel=selections.includes(t);
            const manualAmt=(techAmounts||{})[t]||"";
            return(
              <div key={t} style={{display:"flex",alignItems:"center",gap:8}}>
                <button type="button"
                  onClick={()=>onSelections(sel?selections.filter(x=>x!==t):[...selections,t])}
                  style={{background:sel?c2:"#1a1a1a",border:`1px solid ${sel?c1:"#252525"}`,color:sel?c1:"#888",borderRadius:8,padding:"7px 12px",cursor:"pointer",fontSize:12,fontWeight:sel?700:400,flex:1,textAlign:"left",transition:"all 0.15s"}}>
                  {icon} {t}
                </button>
                {sel&&splitMode==="manuel"&&(
                  <input type="number" placeholder="0.00" value={manualAmt}
                    onChange={e=>onTechAmounts({...(techAmounts||{}),[t]:e.target.value})}
                    style={{...inp,width:85,textAlign:"right",fontSize:13,padding:"7px 8px",
                      border:`1px solid ${manualAmt&&Math.abs(manualDiff)<0.01?"#00d4aa":"#ff475588"}`}}/>
                )}
                {sel&&splitMode==="equitable"&&total>0&&(
                  <span style={{color:c1,fontSize:13,fontWeight:700,minWidth:72,textAlign:"right",flexShrink:0}}>
                    {equitableShare.toFixed(2)} {currency}
                  </span>
                )}
              </div>
            );
          })}
        </div>
        {/* Summary bar */}
        {selections.length>0&&total>0&&(
          <div style={{marginTop:10,background:splitMode==="equitable"?c2:(manualOk?c2:"#1a0505"),border:`1px solid ${splitMode==="equitable"?c3:(manualOk?c3:"#ff475566")}`,borderRadius:8,padding:"7px 11px",fontSize:12}}>
            {splitMode==="equitable"?(
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{color:"#888"}}>⚖️ Part par personne</span>
                <span style={{color:c1,fontWeight:700}}>{equitableShare.toFixed(2)} {currency}</span>
              </div>
            ):(
              <div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{color:manualOk?"#888":"#ff4757"}}>
                    {manualOk?"✅ Total réparti":"⚠️ À répartir"}
                  </span>
                  <span style={{color:manualOk?c1:"#ff4757",fontWeight:700}}>
                    {manualOk?`${total.toFixed(2)} ${currency}`:`${Math.abs(manualDiff).toFixed(2)} ${currency} restant`}
                  </span>
                </div>
                {!manualOk&&(
                  <div style={{marginTop:4,display:"flex",gap:4,flexWrap:"wrap"}}>
                    <span style={{color:"#555",fontSize:10}}>Réparti : {manualAssigned.toFixed(2)} {currency} / Total : {total.toFixed(2)} {currency}</span>
                    <button type="button"
                      onClick={()=>{
                        // Auto-fill remaining to first unset selected tech
                        const unset=selections.find(t=>!parseFloat((techAmounts||{})[t]||0));
                        if(unset){
                          const alreadySet=selections.filter(t=>t!==unset).reduce((s,t)=>s+parseFloat((techAmounts||{})[t]||0),0);
                          onTechAmounts({...(techAmounts||{}),[unset]:(total-alreadySet).toFixed(2)});
                        }
                      }}
                      style={{background:"#7c3aed22",border:"1px solid #7c3aed44",color:"#a78bfa",borderRadius:6,padding:"2px 7px",cursor:"pointer",fontSize:10,fontWeight:700}}>
                      Auto ✨
                    </button>
                  </div>
                )}
              </div>
            )}
          </div>
        )}
      </div>
    </Field>
  );
}

function BarChart({data,color="#00d4aa",height=90}){
  const max=Math.max(...data.map(d=>d.value),1);
  const fmtVal=v=>{if(v===0)return"";if(v>=1000)return`${(v/1000).toFixed(1)}k`;return v%1===0?v:v.toFixed(1);};
  return(
    <div style={{display:"flex",alignItems:"flex-end",gap:3,height:height+20,padding:"0 2px"}}>
      {data.map((d,i)=>{
        const barH=Math.max(2,(d.value/max)*(height-18));
        return(
          <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",height:"100%"}}>
            {d.value>0&&<span style={{fontSize:7,color:d.highlight?"#ff6b35":color,fontWeight:700,marginBottom:2,whiteSpace:"nowrap",textAlign:"center"}}>{fmtVal(d.value)}</span>}
            <div style={{width:"100%",height:barH,background:d.highlight?"#ff6b35":color,borderRadius:"3px 3px 0 0",opacity:d.value===0?0.15:1,transition:"height 0.4s"}}/>
            <span style={{fontSize:8,color:"#666",marginTop:2,whiteSpace:"nowrap"}}>{d.label}</span>
          </div>
        );
      })}
    </div>
  );
}

// ===================== CLIENT SEARCH =====================
function ClientSearch({data,value,onSelect,onClear,label="Client"}){
  const[q,setQ]=useState(value||"");
  const[show,setShow]=useState(false);
  const filtered=data.clients.filter(c=>`${c.firstName} ${c.lastName}`.toLowerCase().includes(q.toLowerCase()));
  const pick=c=>{setQ(`${c.firstName} ${c.lastName}`);setShow(false);onSelect(c);};
  return(
    <div style={{position:"relative"}}>
      <input style={inp} placeholder="Rechercher un client..." value={q}
        onChange={e=>{setQ(e.target.value);setShow(true);if(!e.target.value)onClear&&onClear();}}
        onFocus={()=>setShow(true)}/>
      {show&&q&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#1a1a1a",border:"1px solid #252525",borderRadius:10,zIndex:300,maxHeight:140,overflowY:"auto"}}>
          {filtered.map(c=>(
            <div key={c.id} onClick={()=>pick(c)} style={{padding:"9px 11px",cursor:"pointer",color:"#fff",fontSize:13,borderBottom:"1px solid #252525"}}>
              👤 {c.firstName} {c.lastName} {c.phone?`— ${c.phone}`:""}
            </div>
          ))}
          {filtered.length===0&&<div style={{padding:"9px 11px",color:"#666",fontSize:12}}>Aucun client trouvé</div>}
        </div>
      )}
    </div>
  );
}

  const pick=v=>{setQ(`${v.plate} — ${v.brand} ${v.model}`);setShow(false);onSelect(v);};
  return(
    <div style={{position:"relative"}}>
      <input style={inp} placeholder="Plaque, marque, modèle..." value={q}
        onChange={e=>{setQ(e.target.value);setShow(true);onClear&&onClear();}}
        onFocus={()=>setShow(true)}/>
      {show&&q&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#1a1a1a",border:"1px solid #252525",borderRadius:10,zIndex:300,maxHeight:140,overflowY:"auto"}}>
          {filtered.map(v=>(
            <div key={v.id} onClick={()=>pick(v)} style={{padding:"9px 11px",cursor:"pointer",color:"#fff",fontSize:13,borderBottom:"1px solid #252525"}}>
              🚗 {v.plate} — {v.brand} {v.model}
            </div>
          ))}
          {filtered.length===0&&<div style={{padding:"9px 11px",color:"#666",fontSize:12}}>Nouveau véhicule ↓</div>}
        </div>
      )}
    </div>
  );
}

// ===================== ADDRESS FIELDS =====================
function AddressFields({streetNum,streetName,zip,city,onChange}){
  const set=(k,v)=>onChange({streetNum,streetName,zip,city,[k]:v});
  return(
    <div style={{display:"grid",gridTemplateColumns:"80px 1fr",gap:6,marginBottom:0}}>
      <input style={inp} placeholder="N° rue" value={streetNum||""} onChange={e=>set("streetNum",e.target.value)}/>
      <input style={inp} placeholder="Nom de rue" value={streetName||""} onChange={e=>set("streetName",e.target.value)}/>
      <input style={inp} placeholder="Code postal" value={zip||""} onChange={e=>set("zip",e.target.value)}/>
      <input style={inp} placeholder="Ville" value={city||""} onChange={e=>set("city",e.target.value)}/>
    </div>
  );
}
function fmtAddr(streetNum,streetName,zip,city){return [streetNum,streetName,zip,city].filter(Boolean).join(" ")||"";}

// ===================== LOCATION SEARCH =====================
function LocationSearch({data,value,onChange,onSave}){
  const[q,setQ]=useState(value||"");
  const[show,setShow]=useState(false);
  const locs=data.locations||[];
  const filtered=locs.filter(l=>l.toLowerCase().includes(q.toLowerCase()));
  const pick=l=>{setQ(l);setShow(false);onChange(l);};
  const handleBlur=()=>{
    setTimeout(()=>{
      setShow(false);
      if(q&&!locs.includes(q)){onSave&&onSave(q);}
      onChange(q);
    },200);
  };
  return(
    <div style={{position:"relative"}}>
      <input style={inp} placeholder="Ville, adresse..." value={q}
        onChange={e=>{setQ(e.target.value);setShow(true);onChange(e.target.value);}}
        onFocus={()=>setShow(true)}
        onBlur={handleBlur}/>
      {show&&q&&filtered.length>0&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#1a1a1a",border:"1px solid #252525",borderRadius:10,zIndex:300,maxHeight:120,overflowY:"auto"}}>
          {filtered.map((l,i)=>(
            <div key={i} onClick={()=>pick(l)} style={{padding:"9px 11px",cursor:"pointer",color:"#fff",fontSize:13,borderBottom:"1px solid #252525"}}>
              📍 {l}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ===================== PHOTO UPLOAD =====================
function PhotoUpload({photo,onPhoto,onRemove,label="Photo",vehicleSize}){
  const handleFile=async e=>{
    const f=e.target.files[0];
    if(!f)return;
    const r=new FileReader();
    r.onload=async ev=>{const compressed=await compressImage(ev.target.result,800,600,0.7);onPhoto(compressed);};
    r.readAsDataURL(f);
  };
  return(
    <div style={{display:"flex",gap:10,alignItems:"center"}}>
      {photo
        ?<div style={{position:"relative"}}>
          <img src={photo} style={{width:80,height:60,objectFit:"cover",borderRadius:8,border:"1px solid #252525"}}/>
          <button onClick={onRemove} style={{position:"absolute",top:-6,right:-6,background:"#ff4757",border:"none",color:"#fff",width:18,height:18,borderRadius:"50%",cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>
        :<div style={{width:80,height:60,background:"#1a1a1a",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,border:"2px dashed #252525"}}>{vehicleEmoji(vehicleSize)}</div>
      }
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        <label style={{background:"#1e1e1e",border:"1px solid #252525",color:"#ccc",padding:"6px 11px",borderRadius:8,cursor:"pointer",fontSize:12,textAlign:"center"}}>
          📷 Caméra
          <input type="file" accept="image/*" capture="environment" onChange={handleFile} style={{display:"none"}}/>
        </label>
        <label style={{background:"#1e1e1e",border:"1px solid #252525",color:"#ccc",padding:"6px 11px",borderRadius:8,cursor:"pointer",fontSize:12,textAlign:"center"}}>
          🖼 Galerie / Fichiers
          <input type="file" accept="image/*,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document" onChange={handleFile} style={{display:"none"}}/>
        </label>
      </div>
    </div>
  );
}

// ===================== GENERIC FILE UPLOAD =====================
function DocUpload({file,onFile,label="Document"}){
  const handleFile=e=>{
    const f=e.target.files[0];
    if(!f)return;
    const r=new FileReader();
    r.onload=ev=>onFile({name:f.name,data:ev.target.result,type:f.type});
    r.readAsDataURL(f);
  };
  return(
    <div>
      {file&&(
        <div style={{background:"#0a1a14",border:"1px solid #00d4aa33",borderRadius:8,padding:"6px 10px",marginBottom:6,fontSize:12,color:"#00d4aa"}}>
          ✅ {file.name}

      )}

        <label style={{flex:1,background:"#1a1a1a",border:"1px dashed #333",color:"#666",padding:"8px",borderRadius:10,cursor:"pointer",fontSize:12,textAlign:"center"}}>
          📷 Photo/Caméra
          <input type="file" accept="image/*" capture="environment" onChange={handleFile} style={{display:"none"}}/>
        </label>
        <label style={{flex:1,background:"#1a1a1a",border:"1px dashed #333",color:"#666",padding:"8px",borderRadius:10,cursor:"pointer",fontSize:12,textAlign:"center"}}>

          <input type="file" accept="image/*,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,.pdf,.doc,.docx,.jpg,.jpeg,.png" onChange={handleFile} style={{display:"none"}}/>

// ===================== ADD / EDIT REVENUE FORM =====================
function RevenueForm({data,setData,onSave,editItem,prefill}){
  const today=new Date().toISOString().split("T")[0];
  const techs=(data.settings&&data.settings.technicians)||[];
  const services=(data.settings&&data.settings.services)||DEF_SERVICES;
  const base=editItem||prefill||{};
  const[form,setForm]=useState({
    date:today,timeStart:"",timeEnd:"",
    vehicleId:"",plate:"",brand:"",model:"",vehicleSize:"berline",difficulty:3,
    clientId:"",clientFirst:"",clientLast:"",clientPhone:"",
    clientStreetNum:"",clientStreetName:"",clientZip:"",clientCity:"",clientNote:3,
    amount:"",locationStreetNum:"",locationStreetName:"",locationZip:"",locationCity:"",
    paymentMethod:"espèce",paidToTech:"",remarks:"",invoiceNumber:"",
    invoiceFile:null,carPhoto:null,isGift:false,
    technicians:[],prestations:[],customPrestation:"",
    ...base,
    clientStreetNum:base.clientStreetNum||"",clientStreetName:base.clientStreetName||"",
    clientZip:base.clientZip||"",clientCity:base.clientCity||"",
    locationStreetNum:base.locationStreetNum||"",locationStreetName:base.locationStreetName||"",
    locationZip:base.locationZip||"",locationCity:base.locationCity||"",
    vehicleSize:base.vehicleSize||"berline",
    paidToTechs:base.paidToTechs||(base.paidToTech?[base.paidToTech]:[]),
    invoiceNumber:base.invoiceNumber||"",
    splitMode:base.splitMode||"equitable",
    techAmounts:base.techAmounts||{},
    deposit:base.deposit||"",
    depositTechs:base.depositTechs||[],
    depositTechAmounts:base.depositTechAmounts||{},
    depositSplitMode:base.depositSplitMode||"equitable"
  });
  const[newVehicle,setNewVehicle]=useState(!editItem&&!prefill);
  const[newClient,setNewClient]=useState(!editItem&&!prefill);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const dur=dMin(form.timeStart,form.timeEnd);

  // Vehicle selected → auto-fill owner
  const selectVehicle=v=>{
    set("vehicleId",v.id);set("plate",v.plate);set("brand",v.brand);set("model",v.model);set("vehicleSize",v.size||"berline");
    setNewVehicle(false);
    // Auto-fill owner if vehicle has one
    if(v.ownerId){
      const owner=data.clients.find(c=>c.id===v.ownerId);
      if(owner){
        setForm(f=>({...f,vehicleId:v.id,plate:v.plate,brand:v.brand,model:v.model,vehicleSize:v.size||"berline",
          clientId:owner.id,clientFirst:owner.firstName,clientLast:owner.lastName,clientPhone:owner.phone||"",
          clientNote:owner.note||3,clientStreetNum:owner.streetNum||"",clientStreetName:owner.streetName||"",
          clientZip:owner.zip||"",clientCity:owner.city||""}));
        setNewClient(false);
        return;
      }
    }
  };
  const clearVehicle=()=>{set("vehicleId","");setNewVehicle(true);};
  const selectClient=c=>{set("clientId",c.id);set("clientFirst",c.firstName);set("clientLast",c.lastName);set("clientPhone",c.phone||"");set("clientNote",c.note||3);set("clientStreetNum",c.streetNum||"");set("clientStreetName",c.streetName||"");set("clientZip",c.zip||"");set("clientCity",c.city||"");setNewClient(false);};
  const clearClient=()=>{set("clientId","");setNewClient(true);};

  const saveLocation=loc=>{
    if(!loc)return;
    // location is saved atomically in handleSave below
  };

  const handleSave=()=>{
    if(!form.isGift&&!form.amount)return alert("Montant requis");
    if(!form.plate&&!form.vehicleId)return alert("Véhicule requis");
    // Validate split in manuel mode
    if(!form.isGift&&(form.paidToTechs||[]).length>0&&(form.splitMode||"equitable")==="manuel"){
      const total=parseFloat(form.amount||0);
      const assigned=((form.paidToTechs||[])).reduce((s,t)=>s+parseFloat((form.techAmounts||{})[t]||0),0);
      if(Math.abs(total-assigned)>0.01)return alert(`⚠️ La répartition ne correspond pas au montant total.\nTotal : ${total.toFixed(2)} — Réparti : ${assigned.toFixed(2)}\nDifférence : ${(total-assigned).toFixed(2)}`);
    }
    // Validate deposit split in manuel mode
    const depositAmt=parseFloat(form.deposit||0);
    if(depositAmt>0&&(form.depositTechs||[]).length>0&&(form.depositSplitMode||"equitable")==="manuel"){
      const assigned=(form.depositTechs||[]).reduce((s,t)=>s+parseFloat((form.depositTechAmounts||{})[t]||0),0);
      if(Math.abs(depositAmt-assigned)>0.01)return alert(`⚠️ La répartition de l'acompte ne correspond pas.\nAcompte : ${depositAmt.toFixed(2)} — Réparti : ${assigned.toFixed(2)}`);
    }
    const nd={...data};
    let cid=form.clientId,vid=form.vehicleId;
    if(!cid&&form.clientFirst){
      const addr=fmtAddr(form.clientStreetNum,form.clientStreetName,form.clientZip,form.clientCity);
      const nc={id:gid(),firstName:form.clientFirst,lastName:form.clientLast,phone:form.clientPhone,address:addr,streetNum:form.clientStreetNum,streetName:form.clientStreetName,zip:form.clientZip,city:form.clientCity,note:form.clientNote};
      nd.clients=[...nd.clients,nc];cid=nc.id;
    }
    if(!vid&&form.plate){
      const pt=form.plate.toUpperCase().replace(/[^A-Z0-9]/g,"");
      const ev=nd.vehicles.find(v=>v.plate===pt);
      if(ev){vid=ev.id;}else{const nv={id:gid(),plate:pt,brand:form.brand,model:form.model,size:form.vehicleSize||"berline",ownerId:cid||""};nd.vehicles=[...nd.vehicles,nv];vid=nv.id;}
    }
    // Update vehicle ownerId if not set and we have a client
    if(vid&&cid){const vi=nd.vehicles.findIndex(v=>v.id===vid);if(vi>=0&&!nd.vehicles[vi].ownerId){nd.vehicles=[...nd.vehicles];nd.vehicles[vi]={...nd.vehicles[vi],ownerId:cid};}}
    const location=fmtAddr(form.locationStreetNum,form.locationStreetName,form.locationZip,form.locationCity);
    if(location){const locs=nd.locations||[];if(!locs.includes(location))nd.locations=[...locs,location];}
    // Compute paidToTechs default: if single tech and none selected, auto-assign
    let paidToTechs=form.paidToTechs||[];
    if(paidToTechs.length===0&&form.technicians&&form.technicians.length===1)paidToTechs=[form.technicians[0]];
    // Compute techAmounts: equitable → auto-fill, manuel → use as-is
    const finalAmt=form.isGift?0:parseFloat(form.amount||0);
    let finalTechAmounts=form.techAmounts||{};
    if((form.splitMode||"equitable")==="equitable"&&paidToTechs.length>0&&finalAmt>0){
      const share=finalAmt/paidToTechs.length;
      finalTechAmounts={};
      paidToTechs.forEach(t=>{finalTechAmounts[t]=parseFloat(share.toFixed(2));});
    }
    // Compute deposit techAmounts
    const finalDepositAmt=parseFloat(form.deposit||0);
    let finalDepositTechAmounts=form.depositTechAmounts||{};
    if((form.depositSplitMode||"equitable")==="equitable"&&(form.depositTechs||[]).length>0&&finalDepositAmt>0){
      const share=finalDepositAmt/(form.depositTechs||[]).length;
      finalDepositTechAmounts={};
      (form.depositTechs||[]).forEach(t=>{finalDepositTechAmounts[t]=parseFloat(share.toFixed(2));});
    }
    const rev={...form,id:editItem?form.id:gid(),clientId:cid,vehicleId:vid,amount:finalAmt,duration:dur,type:"revenue",location,paidToTechs,paidToTech:paidToTechs[0]||"",techAmounts:finalTechAmounts,depositTechAmounts:finalDepositTechAmounts};
    if(editItem){
      nd.revenues=nd.revenues.map(r=>r.id===rev.id?rev:r);
    }else{
      nd.revenues=[...nd.revenues,rev];
    }
    setData(nd);onSave();
  };

  return(
    <div>
      <Field label="Photo du véhicule (couverture)">
        <PhotoUpload photo={form.carPhoto} onPhoto={v=>set("carPhoto",v)} onRemove={()=>set("carPhoto",null)} vehicleSize={form.vehicleSize}/>
      </Field>

      <Field label="Véhicule" required>
        <VehicleSearch data={data} onSelect={selectVehicle} onClear={clearVehicle}
          initialValue={editItem&&form.plate?`${form.plate} — ${form.brand} ${form.model}`:""}/>
      </Field>
      {(newVehicle||!form.vehicleId)&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:12}}>
          <input style={inp} placeholder="Plaque *" value={form.plate} onChange={e=>set("plate",e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,""))}/>
          <input style={inp} placeholder="Marque" value={form.brand} onChange={e=>set("brand",e.target.value)}/>
          <input style={inp} placeholder="Modèle" value={form.model} onChange={e=>set("model",e.target.value)}/>
        </div>
      )}
      <Field label="Taille du véhicule">
        <select style={inp} value={form.vehicleSize||"berline"} onChange={e=>set("vehicleSize",e.target.value)}>
          {CAR_SIZES.map(s=><option key={s}>{s}</option>)}
        </select>
      </Field>

      <Field label="Client (propriétaire)">
        {form.clientId&&!newClient
          ?<div style={{background:"#0a1a14",border:"1px solid #00d4aa33",borderRadius:10,padding:"9px 11px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{color:"#00d4aa",fontSize:13}}>👤 {form.clientFirst} {form.clientLast}</span>
            <button onClick={clearClient} style={{background:"none",border:"none",color:"#666",cursor:"pointer",fontSize:18,padding:0}}>×</button>
          </div>
          :<ClientSearch data={data} value={""} onSelect={selectClient} onClear={clearClient}/>
        }
        <label style={{display:"flex",alignItems:"center",gap:6,marginTop:6,color:"#777",fontSize:12,cursor:"pointer"}}>
          <input type="checkbox" checked={newClient||!form.clientId} onChange={e=>{setNewClient(e.target.checked);if(e.target.checked)clearClient();}}/>
          Nouveau client
        </label>
      </Field>
      {(newClient||!form.clientId)&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:12}}>
          <input style={inp} placeholder="Prénom" value={form.clientFirst} onChange={e=>set("clientFirst",e.target.value)}/>
          <input style={inp} placeholder="Nom" value={form.clientLast} onChange={e=>set("clientLast",e.target.value)}/>
          <input style={inp} placeholder="Téléphone" value={form.clientPhone} onChange={e=>set("clientPhone",e.target.value)}/>
          <input style={inp} placeholder="N° rue" value={form.clientStreetNum||""} onChange={e=>set("clientStreetNum",e.target.value)}/>
          <input style={{...inp,gridColumn:"1/-1"}} placeholder="Nom de rue" value={form.clientStreetName||""} onChange={e=>set("clientStreetName",e.target.value)}/>
          <input style={inp} placeholder="Code postal" value={form.clientZip||""} onChange={e=>set("clientZip",e.target.value)}/>
          <input style={inp} placeholder="Ville" value={form.clientCity||""} onChange={e=>set("clientCity",e.target.value)}/>
          <div style={{gridColumn:"1/-1"}}>
            <label style={{fontSize:11,color:"#777",display:"block",marginBottom:4}}>Note client</label>
            <StarRating value={form.clientNote} onChange={v=>set("clientNote",v)}/>
          </div>
        </div>
      )}

      <Field label="Difficulté"><EmojiRating value={form.difficulty} onChange={v=>set("difficulty",v)}/></Field>

      <Field label="Technicien(s) ayant effectué le lavage">
        <TechnicianPicker technicians={techs} value={form.technicians} onChange={v=>set("technicians",v)}/>
      </Field>

      <Field label="Prestations réalisées">
        <ServicesPicker services={services} value={form.prestations} onChange={v=>set("prestations",v)} customService={form.customPrestation} onCustomChange={v=>set("customPrestation",v)}/>
      </Field>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Field label="Date" required><input type="date" style={inp} value={form.date} onChange={e=>set("date",e.target.value)}/></Field>
        <Field label="Heure début"><input type="time" style={inp} value={form.timeStart} onChange={e=>set("timeStart",e.target.value)}/></Field>
        <Field label="Heure fin"><input type="time" style={inp} value={form.timeEnd} onChange={e=>set("timeEnd",e.target.value)}/></Field>
        <Field label="N° Facture"><input style={inp} placeholder="FAC-001" value={form.invoiceNumber||""} onChange={e=>set("invoiceNumber",e.target.value)}/></Field>
      </div>
      <Field label="Lieu de la prestation">
        <AddressFields streetNum={form.locationStreetNum} streetName={form.locationStreetName} zip={form.locationZip} city={form.locationCity}
          onChange={v=>setForm(f=>({...f,locationStreetNum:v.streetNum,locationStreetName:v.streetName,locationZip:v.zip,locationCity:v.city}))}/>
      </Field>
      {dur>0&&<div style={{background:"#0a1a14",border:"1px solid #00d4aa33",borderRadius:10,padding:"7px 11px",marginBottom:12,color:"#00d4aa",fontSize:13}}>⏱ Durée : <strong>{fmtT(dur)}</strong></div>}

      <Field label="Montant">
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <input type="number" style={{...inp,flex:1}} placeholder="0.00" value={form.amount} onChange={e=>set("amount",e.target.value)} disabled={form.isGift}/>
          <label style={{display:"flex",alignItems:"center",gap:6,color:"#777",fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>
            <input type="checkbox" checked={form.isGift} onChange={e=>set("isGift",e.target.checked)}/> 🎁 Offert
          </label>
        </div>
      </Field>
      <Field label="Encaissement">
        <select style={inp} value={form.paymentMethod} onChange={e=>set("paymentMethod",e.target.value)}>
          {["espèce","carte","chèque","virement"].map(m=><option key={m}>{m}</option>)}
        </select>
      </Field>
      {/* Acompte éventuel (pré-rempli depuis le RDV) */}
      {(parseFloat(form.deposit||0)>0||(form.fromAppointmentId))&&(
        <Field label="Acompte versé">
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
            <input type="number" style={{...inp,flex:1}} placeholder="0.00" value={form.deposit||""} onChange={e=>set("deposit",e.target.value)}/>
            <span style={{color:"#555",fontWeight:600}}>{(data.settings&&data.settings.currency)||"€"}</span>
          </div>
          {techs.length>0&&parseFloat(form.deposit||0)>0&&(
            <SplitSection
              label="🏦 Qui a encaissé l'acompte ?"
              techs={techs}
              total={parseFloat(form.deposit||0)}
              splitMode={form.depositSplitMode||"equitable"}
              onSplitMode={v=>set("depositSplitMode",v)}
              selections={form.depositTechs||[]}
              onSelections={v=>set("depositTechs",v)}
              techAmounts={form.depositTechAmounts||{}}
              onTechAmounts={v=>set("depositTechAmounts",v)}
              currency={(data.settings&&data.settings.currency)||"€"}
              accent="green"
            />
          )}
        </Field>
      )}
      {techs.length>0&&(
        <SplitSection
          label="💰 Qui a encaissé ?"
          techs={techs}
          total={form.isGift?0:parseFloat(form.amount||0)}
          splitMode={form.splitMode||"equitable"}
          onSplitMode={v=>set("splitMode",v)}
          selections={form.paidToTechs||[]}
          onSelections={v=>set("paidToTechs",v)}
          techAmounts={form.techAmounts||{}}
          onTechAmounts={v=>set("techAmounts",v)}
          currency={(data.settings&&data.settings.currency)||"€"}
          accent="green"
        />
      )}
      <Field label="Remarques"><textarea style={{...inp,minHeight:60,resize:"vertical"}} value={form.remarks} onChange={e=>set("remarks",e.target.value)}/></Field>
      <Field label="Facture">
        <DocUpload file={form.invoiceFile} onFile={v=>set("invoiceFile",v)}/>
      </Field>

      <button onClick={handleSave} style={{...btn("linear-gradient(135deg,#00d4aa,#00a882)","#000"),width:"100%",padding:"13px",fontSize:15,marginTop:4}}>
        ✅ {editItem?"Modifier":"Enregistrer"} le revenu
      </button>
    </div>
  );
}

// ===================== ADD / EDIT EXPENSE FORM =====================
function ExpenseForm({data,setData,onSave,editItem}){
  const today=new Date().toISOString().split("T")[0];
  const techs=(data.settings&&data.settings.technicians)||[];
  const mkItem=()=>({id:gid(),ref:"",description:"",qty:1,unitPrice:""});
  const[form,setForm]=useState(editItem?{...editItem,items:editItem.items||[mkItem()],locationStreetNum:editItem.locationStreetNum||"",locationStreetName:editItem.locationStreetName||"",locationZip:editItem.locationZip||"",locationCity:editItem.locationCity||"",paidByTechs:editItem.paidByTechs||(editItem.paidByTech?[editItem.paidByTech]:[]),splitMode:editItem.splitMode||"equitable",techAmounts:editItem.techAmounts||{}}:{
    items:[mkItem()],supplier:"",locationStreetNum:"",locationStreetName:"",locationZip:"",locationCity:"",date:today,
    paymentMethod:"espèce",invoiceFile:null,remarks:"",paidByTechs:[],splitMode:"equitable",techAmounts:{}
  });
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const setItem=(idx,k,v)=>setForm(f=>{const items=[...f.items];items[idx]={...items[idx],[k]:v};return{...f,items};});
  const addItem=()=>setForm(f=>({...f,items:[...f.items,mkItem()]}));
  const removeItem=idx=>setForm(f=>({...f,items:f.items.filter((_,i)=>i!==idx)}));
  const total=form.items.reduce((s,it)=>s+(parseFloat(it.qty||0)*parseFloat(it.unitPrice||0)),0);
  const cur=(data.settings&&data.settings.currency)||"€";
  const saveLocation=loc=>{if(!loc)return;};
  const handleSave=()=>{
    if(!form.items[0].description)return alert("Au moins un article requis");
    if(total<=0)return alert("Montant total requis");
    // Validate split in manuel mode
    if((form.paidByTechs||[]).length>0&&(form.splitMode||"equitable")==="manuel"){
      const assigned=(form.paidByTechs||[]).reduce((s,t)=>s+parseFloat((form.techAmounts||{})[t]||0),0);
      if(Math.abs(total-assigned)>0.01)return alert(`⚠️ La répartition ne correspond pas au montant total.\nTotal : ${total.toFixed(2)} ${cur} — Réparti : ${assigned.toFixed(2)} ${cur}\nDifférence : ${(total-assigned).toFixed(2)} ${cur}`);
    }
    const location=fmtAddr(form.locationStreetNum,form.locationStreetName,form.locationZip,form.locationCity);
    // Compute techAmounts for equitable split
    let finalTechAmounts=form.techAmounts||{};
    if((form.splitMode||"equitable")==="equitable"&&(form.paidByTechs||[]).length>0&&total>0){
      const share=total/(form.paidByTechs||[]).length;
      finalTechAmounts={};
      (form.paidByTechs||[]).forEach(t=>{finalTechAmounts[t]=parseFloat(share.toFixed(2));});
    }
    const exp={...form,id:editItem?form.id:gid(),amount:total,type:"expense",productName:form.items.map(it=>it.description).join(", "),location,paidByTechs:form.paidByTechs||[],paidByTech:(form.paidByTechs||[])[0]||"",techAmounts:finalTechAmounts};
    const nd={...data};
    if(location){const locs=nd.locations||[];if(!locs.includes(location))nd.locations=[...locs,location];}
    if(editItem){nd.expenses=nd.expenses.map(e=>e.id===exp.id?exp:e);}
    else{nd.expenses=[...nd.expenses,exp];}
    setData(nd);onSave();
  };
  return(
    <div>
      <Field label="Fournisseur / Magasin">
        <input style={inp} placeholder="Amazon, Meguiar's, Norauto..." value={form.supplier||""} onChange={e=>set("supplier",e.target.value)}/>
      </Field>
      <div style={{marginBottom:12}}>
        <label style={{display:"block",fontSize:11,color:"#777",marginBottom:5,textTransform:"uppercase",letterSpacing:0.5}}>Articles <span style={{color:"#ff6b35"}}>*</span></label>
        {form.items.map((item,idx)=>(
          <div key={item.id} style={{background:"#1a1a1a",border:"1px solid #252525",borderRadius:10,padding:"9px",marginBottom:8}}>
            <div style={{display:"flex",gap:6,marginBottom:6}}>
              <input style={{...inp,flex:"0 0 80px",fontSize:12}} placeholder="Réf." value={item.ref} onChange={e=>setItem(idx,"ref",e.target.value)}/>
              <input style={{...inp,flex:1,fontSize:12}} placeholder="Description *" value={item.description} onChange={e=>setItem(idx,"description",e.target.value)}/>
              {form.items.length>1&&<button onClick={()=>removeItem(idx)} style={{background:"#ff475715",border:"1px solid #ff4757",color:"#ff4757",borderRadius:8,width:28,height:28,cursor:"pointer",flexShrink:0,fontSize:15,lineHeight:1}}>×</button>}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              <div style={{display:"flex",alignItems:"center",gap:5}}><span style={{fontSize:11,color:"#666",whiteSpace:"nowrap"}}>Qté</span><input type="number" style={{...inp,fontSize:12}} min="1" value={item.qty} onChange={e=>setItem(idx,"qty",e.target.value)}/></div>
              <div style={{display:"flex",alignItems:"center",gap:5}}><span style={{fontSize:11,color:"#666",whiteSpace:"nowrap"}}>Prix unit.</span><input type="number" style={{...inp,fontSize:12}} placeholder="0.00" value={item.unitPrice} onChange={e=>setItem(idx,"unitPrice",e.target.value)}/></div>
            </div>
            {item.qty&&item.unitPrice?<div style={{textAlign:"right",fontSize:12,color:"#00d4aa",marginTop:4}}>= {(parseFloat(item.qty)*parseFloat(item.unitPrice)).toFixed(2)} {cur}</div>:null}
          </div>
        ))}
        <button onClick={addItem} style={{width:"100%",background:"#0a1a14",border:"1px dashed #00d4aa44",color:"#00d4aa",borderRadius:10,padding:"8px",cursor:"pointer",fontSize:12,fontWeight:600}}>+ Ajouter un article</button>
        {total>0&&<div style={{background:"#0a1a14",border:"1px solid #00d4aa33",borderRadius:10,padding:"7px 11px",marginTop:8,display:"flex",justifyContent:"space-between"}}><span style={{color:"#666",fontSize:12}}>TOTAL</span><span style={{color:"#00d4aa",fontWeight:700,fontSize:15}}>{total.toFixed(2)} {cur}</span></div>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Field label="Date" required><input type="date" style={inp} value={form.date} onChange={e=>set("date",e.target.value)}/></Field>
        <Field label="Paiement"><select style={inp} value={form.paymentMethod} onChange={e=>set("paymentMethod",e.target.value)}>{["espèce","carte","chèque","virement","prélèvement"].map(m=><option key={m}>{m}</option>)}</select></Field>
      </div>
      {techs.length>0&&(
        <SplitSection
          label="💸 Qui a avancé l'argent ?"
          techs={techs}
          total={total}
          splitMode={form.splitMode||"equitable"}
          onSplitMode={v=>set("splitMode",v)}
          selections={form.paidByTechs||[]}
          onSelections={v=>set("paidByTechs",v)}
          techAmounts={form.techAmounts||{}}
          onTechAmounts={v=>set("techAmounts",v)}
          currency={cur}
          accent="red"
        />
      )}
      <Field label="Lieu / Magasin">
        <AddressFields streetNum={form.locationStreetNum} streetName={form.locationStreetName} zip={form.locationZip} city={form.locationCity}
          onChange={v=>setForm(f=>({...f,locationStreetNum:v.streetNum,locationStreetName:v.streetName,locationZip:v.zip,locationCity:v.city}))}/>
      </Field>
      <Field label="Photo ticket / reçu">
        <PhotoUpload photo={form.receiptPhoto} onPhoto={async v=>{const c=await compressImage(v,600,800,0.75);set("receiptPhoto",c);}} onRemove={()=>set("receiptPhoto",null)}/>
      </Field>
      <Field label="Remarques"><textarea style={{...inp,minHeight:60,resize:"vertical"}} value={form.remarks} onChange={e=>set("remarks",e.target.value)}/></Field>
      <Field label="Facture"><DocUpload file={form.invoiceFile} onFile={v=>set("invoiceFile",v)}/></Field>
      <button onClick={handleSave} style={{...btn("linear-gradient(135deg,#ff4757,#cc1a2e)","#fff"),width:"100%",padding:"13px",fontSize:15,marginTop:4}}>
        ✅ {editItem?"Modifier":"Enregistrer"} la dépense
      </button>
    </div>
  );
}

// ===================== TX DETAIL =====================
function TxDetail({tx,data,setData,onClose,currency:currencyProp}){
  const[editMode,setEditMode]=useState(false);
  const currency=currencyProp||(data.settings&&data.settings.currency)||"€";
  const v=data.vehicles.find(v=>v.id===tx.vehicleId);
  const c=data.clients.find(c=>c.id===tx.clientId);

  const deleteTx=()=>{
    if(!window.confirm("Supprimer cette fiche ?"))return;
    const nd={...data};
    if(tx.type==="revenue")nd.revenues=nd.revenues.filter(r=>r.id!==tx.id);
    else nd.expenses=nd.expenses.filter(e=>e.id!==tx.id);
    setData(nd);save(nd);onClose();
  };

  if(editMode){
    return(
      <Modal title={tx.type==="revenue"?"Modifier le lavage":"Modifier la dépense"} onClose={()=>setEditMode(false)}>
        {tx.type==="revenue"
          ?<RevenueForm data={data} setData={setData} editItem={tx} onSave={()=>{setEditMode(false);onClose();}}/>
          :<ExpenseForm data={data} setData={setData} editItem={tx} onSave={()=>{setEditMode(false);onClose();}}/>
        }
      </Modal>
    );
  }

  // Expense invoice view
  if(tx.type==="expense"){
    return(
      <Modal title="Fiche Dépense" onClose={onClose}>
        {/* En-tête facture */}
        <div style={{background:"linear-gradient(135deg,#1a0a0a,#111)",border:"1px solid #ff475733",borderRadius:14,overflow:"hidden",marginBottom:12}}>
          <div style={{padding:"14px 16px",borderBottom:"1px solid #ff475722",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontSize:20,fontWeight:800,color:"#fff",fontFamily:"'Syne',sans-serif"}}>{tx.supplier||"Dépense"}</div>
              <div style={{fontSize:12,color:"#666",marginTop:2}}>{fmtD(tx.date)}{tx.location?" · "+tx.location:""}</div>
              {(tx.paidByTechs&&tx.paidByTechs.length>0)&&<div style={{fontSize:11,color:"#ff6b35",marginTop:3}}>💸 Payé par : {tx.paidByTechs.join(", ")}</div>}
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{fontSize:10,color:"#ff4757",background:"#ff475715",padding:"3px 8px",borderRadius:20,border:"1px solid #ff475733",fontWeight:700,marginBottom:4}}>DÉPENSE</div>
              <div style={{fontSize:11,color:"#666"}}>{tx.paymentMethod||""}</div>
            </div>
          </div>
          {/* Tableau articles */}
          {tx.items&&tx.items.length>0&&(
            <div style={{padding:"0 16px"}}>
              <div style={{display:"flex",padding:"8px 0",borderBottom:"1px solid #2a2a2a"}}>
                <span style={{fontSize:10,color:"#555",fontWeight:700,flex:1}}>ARTICLE</span>
                <span style={{fontSize:10,color:"#555",fontWeight:700,width:30,textAlign:"center"}}>QTÉ</span>
                <span style={{fontSize:10,color:"#555",fontWeight:700,width:55,textAlign:"right"}}>P.U.</span>
                <span style={{fontSize:10,color:"#555",fontWeight:700,width:65,textAlign:"right"}}>TOTAL</span>
              </div>
              {tx.items.map((it,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",padding:"9px 0",borderBottom:"1px solid #1a1a1a"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,color:"#fff",fontWeight:600}}>{it.description}</div>
                    {it.ref&&<div style={{fontSize:10,color:"#444",marginTop:1}}>Réf: {it.ref}</div>}
                  </div>
                  <span style={{width:30,textAlign:"center",fontSize:12,color:"#888"}}>{it.qty||1}</span>
                  <span style={{width:55,textAlign:"right",fontSize:12,color:"#888"}}>{parseFloat(it.unitPrice||0).toFixed(2)}</span>
                  <span style={{width:65,textAlign:"right",fontSize:14,color:"#ff4757",fontWeight:700}}>{(parseFloat(it.qty||1)*parseFloat(it.unitPrice||0)).toFixed(2)}</span>
                </div>
              ))}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0"}}>
                <span style={{fontSize:13,color:"#fff",fontWeight:700,letterSpacing:1}}>TOTAL TTC</span>
                <span style={{fontSize:20,color:"#ff4757",fontWeight:800,fontFamily:"'Syne',sans-serif"}}>{fmt(tx.amount,currency)}</span>
              </div>
            </div>
          )}
          {/* Photo ticket */}
          {tx.receiptPhoto&&<img src={tx.receiptPhoto} style={{width:"100%",maxHeight:220,objectFit:"cover",borderTop:"1px solid #2a2a2a",display:"block"}}/>}
        </div>
        {/* Infos complémentaires */}
        {tx.remarks&&(
          <div style={{background:"#1a1a1a",borderRadius:10,padding:"10px 12px",marginBottom:10}}>
            <div style={{fontSize:10,color:"#666",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>Remarques</div>
            <div style={{color:"#ccc",fontSize:13,lineHeight:1.5}}>{tx.remarks}</div>
          </div>
        )}
        {tx.invoiceFile&&(
          <div style={{background:"#0a0a14",border:"1px solid #7c3aed33",borderRadius:10,padding:"10px 12px",marginBottom:10}}>
            <div style={{fontSize:10,color:"#a78bfa",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>Facture jointe</div>
            <a href={tx.invoiceFile.data} download={tx.invoiceFile.name} style={{color:"#a78bfa",fontSize:13,textDecoration:"none"}}>📎 {tx.invoiceFile.name}</a>
          </div>
        )}
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <button onClick={()=>setEditMode(true)} style={{...btn("#1e1e1e","#fff"),flex:1}}>✏️ Modifier</button>
          <button onClick={deleteTx} style={{...btn("#1a0a0a","#ff4757"),flex:1,border:"1px solid #ff4757"}}>🗑 Supprimer</button>
        </div>
      </Modal>
    );
  }

  const allPrestations=[...(tx.prestations||[]),...(tx.customPrestation?[tx.customPrestation]:[])];
  const perItem=!tx.isGift&&tx.amount>0&&allPrestations.length>0?tx.amount/allPrestations.length:0;

  return(
    <Modal title="Fiche Lavage" onClose={onClose}>
      {/* ── BLOC FACTURE PRINCIPAL ── */}
      <div style={{background:"linear-gradient(160deg,#0a1a14,#0d0d0d)",border:"1px solid #00d4aa44",borderRadius:16,overflow:"hidden",marginBottom:10}}>

        {/* Photo véhicule */}
        {tx.carPhoto&&<img src={tx.carPhoto} style={{width:"100%",height:150,objectFit:"cover",display:"block"}}/>}

        {/* En-tête : véhicule + badge */}
        <div style={{padding:"14px 16px 10px",borderBottom:"1px solid #00d4aa18",display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:22,fontWeight:800,color:"#fff",fontFamily:"'Syne',sans-serif",lineHeight:1.1}}>
              {vehicleEmoji(tx.vehicleSize)} {v?`${v.brand} ${v.model}`:(tx.plate||"Véhicule")}
            </div>
            {tx.plate&&<div style={{fontSize:12,color:"#555",marginTop:3}}>Immatriculation : <span style={{color:"#aaa",fontWeight:600}}>{tx.plate}</span>{tx.vehicleSize&&<span style={{color:"#444"}}> · {tx.vehicleSize}</span>}</div>}
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontSize:10,color:"#00d4aa",background:"#00d4aa18",padding:"3px 10px",borderRadius:20,border:"1px solid #00d4aa44",fontWeight:700,marginBottom:4}}>
              {tx.isGift?"🎁 OFFERT":"✅ LAVAGE"}
            </div>
            {tx.invoiceNumber&&<div style={{fontSize:11,color:"#555",fontWeight:600}}>N° {tx.invoiceNumber}</div>}
          </div>
        </div>

        {/* Infos date / lieu / paiement */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:0,borderBottom:"1px solid #00d4aa18"}}>
          {[
            ["📅 Date", fmtD(tx.date)],
            ["💳 Paiement", tx.paymentMethod||"—"],
            tx.timeStart?["🕐 Horaire", `${tx.timeStart}${tx.timeEnd?" → "+tx.timeEnd:""}`]:null,
            tx.duration>0?["⏱ Durée", fmtT(tx.duration)]:null,
            tx.location?["📍 Lieu", tx.location]:null,
            tx.difficulty?["💪 Difficulté", "💪".repeat(tx.difficulty||1)]:null,
          ].filter(Boolean).map(([lbl,val],i)=>(
            <div key={i} style={{padding:"8px 16px",borderBottom:"1px solid #151515",borderRight:i%2===0?"1px solid #151515":"none"}}>
              <div style={{fontSize:9,color:"#555",marginBottom:1,textTransform:"uppercase",letterSpacing:0.5}}>{lbl}</div>
              <div style={{fontSize:12,color:"#ccc",fontWeight:500}}>{val}</div>
            </div>
          ))}
        </div>

        {/* Client */}
        {c&&(
          <div style={{padding:"10px 16px",borderBottom:"1px solid #00d4aa18",display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:32,height:32,background:"#0a1a14",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,border:"1px solid #00d4aa33",flexShrink:0}}>👤</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,color:"#fff",fontWeight:700}}>{c.firstName} {c.lastName}</div>
              {c.phone&&<div style={{fontSize:11,color:"#555"}}>📞 {c.phone}</div>}
              {(c.address||c.city)&&<div style={{fontSize:11,color:"#444",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>🏠 {c.address||[c.streetNum,c.streetName,c.zip,c.city].filter(Boolean).join(" ")}</div>}
            </div>
            {c.note>0&&<div style={{flexShrink:0,display:"flex",gap:1}}>{"★".repeat(c.note).split("").map((_,i)=><span key={i} style={{color:"#ffd700",fontSize:12}}>★</span>)}</div>}
          </div>
        )}

        {/* Techniciens */}
        {tx.technicians&&tx.technicians.length>0&&(
          <div style={{padding:"10px 16px",borderBottom:"1px solid #00d4aa18"}}>
            <div style={{fontSize:9,color:"#555",marginBottom:6,textTransform:"uppercase",letterSpacing:0.5}}>Technicien(s)</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {tx.technicians.map(t=><span key={t} style={{background:"#0a1a14",border:"1px solid #00d4aa33",color:"#00d4aa",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:600}}>👤 {t}</span>)}
            </div>
            {tx.paidToTechs&&tx.paidToTechs.length>0&&(
              <div style={{fontSize:10,color:"#444",marginTop:5}}>💰 Encaissé par : <span style={{color:"#7c3aed"}}>{tx.paidToTechs.join(", ")}</span></div>
            )}
          </div>
        )}

        {/* Tableau prestations */}
        {allPrestations.length>0&&(
          <div style={{padding:"0 16px"}}>
            <div style={{display:"flex",padding:"8px 0",borderBottom:"1px solid #1e1e1e"}}>
              <span style={{fontSize:9,color:"#444",fontWeight:700,flex:1,textTransform:"uppercase",letterSpacing:0.5}}>Prestation</span>
              <span style={{fontSize:9,color:"#444",fontWeight:700,width:75,textAlign:"right",textTransform:"uppercase",letterSpacing:0.5}}>Montant</span>
            </div>
            {allPrestations.map((p,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",padding:"9px 0",borderBottom:"1px solid #141414"}}>
                <div style={{flex:1,fontSize:13,color:"#e0e0e0",fontWeight:500}}>
                  <span style={{color:"#00d4aa44",marginRight:6}}>›</span>{p}
                </div>
                <span style={{width:75,textAlign:"right",fontSize:13,color:perItem>0?"#00d4aa":"#444",fontWeight:600}}>
                  {perItem>0?`${perItem.toFixed(2)} ${currency}`:"—"}
                </span>
              </div>
            ))}
            {/* Total */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 0 14px",borderTop:"1px solid #252525",marginTop:2}}>
              <span style={{fontSize:14,color:"#fff",fontWeight:800,letterSpacing:0.5,fontFamily:"'Syne',sans-serif"}}>TOTAL TTC</span>
              <span style={{fontSize:22,color:tx.isGift?"#555":"#00d4aa",fontWeight:800,fontFamily:"'Syne',sans-serif"}}>
                {tx.isGift?"🎁 Offert":fmt(tx.amount,currency)}
              </span>
            </div>
          </div>
        )}

        {/* Total */}
        {allPrestations.length===0&&(
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px",borderTop:"1px solid #1a1a1a"}}>
            <span style={{fontSize:14,color:"#fff",fontWeight:800,letterSpacing:0.5,fontFamily:"'Syne',sans-serif"}}>TOTAL TTC</span>
            <span style={{fontSize:22,color:tx.isGift?"#555":"#00d4aa",fontWeight:800,fontFamily:"'Syne',sans-serif"}}>
              {tx.isGift?"🎁 Offert":fmt(tx.amount,currency)}
            </span>
          </div>
        )}
        {/* Acompte */}
        {parseFloat(tx.deposit||0)>0&&(
          <div style={{padding:"8px 16px 12px",borderTop:"1px solid #1a1a1a"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
              <span style={{fontSize:11,color:"#666"}}>🏦 Acompte reçu</span>
              <span style={{fontSize:13,color:"#7c3aed",fontWeight:700}}>— {fmt(parseFloat(tx.deposit),currency)}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:11,color:"#666"}}>Reste à payer</span>
              <span style={{fontSize:14,color:"#ffa500",fontWeight:700}}>{fmt(Math.max(0,tx.amount-parseFloat(tx.deposit)),currency)}</span>
            </div>
            {tx.depositTechs&&tx.depositTechs.length>0&&(
              <div style={{fontSize:10,color:"#444",marginTop:4}}>Acompte encaissé par : <span style={{color:"#7c3aed"}}>{tx.depositTechs.join(", ")}</span></div>
            )}
          </div>
        )}
      </div>

      {/* Remarques */}
      {tx.remarks&&(
        <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:12,padding:"11px 14px",marginBottom:10}}>
          <div style={{fontSize:9,color:"#555",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>💬 Remarques</div>
          <div style={{color:"#aaa",fontSize:13,lineHeight:1.5}}>{tx.remarks}</div>
        </div>
      )}

      {/* Facture jointe */}
      {tx.invoiceFile&&(
        <div style={{background:"#0a0a14",border:"1px solid #7c3aed33",borderRadius:12,padding:"10px 14px",marginBottom:10}}>
          <div style={{fontSize:9,color:"#a78bfa",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>📎 Facture jointe</div>
          <a href={tx.invoiceFile.data} download={tx.invoiceFile.name} style={{color:"#a78bfa",fontSize:13,textDecoration:"none",fontWeight:600}}>{tx.invoiceFile.name}</a>
        </div>
      )}

      {/* Actions */}
      <div style={{display:"flex",gap:8,marginTop:4}}>
        <button onClick={()=>setEditMode(true)} style={{...btn("#1e1e1e","#fff"),flex:1}}>✏️ Modifier</button>
        <button onClick={deleteTx} style={{...btn("#1a0a0a","#ff4757"),flex:1,border:"1px solid #ff4757"}}>🗑 Supprimer</button>
      </div>
    </Modal>
  );
}
