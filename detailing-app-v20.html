                      <span key={i} style={{background:"#0a0f1a",border:"1px solid #1e3a5f",borderRadius:20,padding:"3px 9px",fontSize:10,color:"#60a5fa",fontWeight:500}}>{c}</span>
                    ))}
                  </div>
                </div>

                {/* Surfaces compatibles (vert) + incompatibles (rouge) */}
                <div>
                  <div style={{fontSize:9,color:"#4ade80",fontWeight:700,letterSpacing:0.8,marginBottom:6}}>✅ SURFACES COMPATIBLES</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>
                    {p.compatible.map((s,i)=>(
                      <span key={i} style={{background:"#0a140a",border:"1px solid #1a4a1a",borderRadius:20,padding:"3px 9px",fontSize:10,color:"#4ade80",fontWeight:500}}>{s}</span>
                    ))}
                  </div>
                  <div style={{fontSize:9,color:"#f87171",fontWeight:700,letterSpacing:0.8,marginBottom:6}}>🚫 SURFACES INCOMPATIBLES</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                    {p.incompatible.map((s,i)=>(
                      <span key={i} style={{background:"#140a0a",border:"1px solid #4a1a1a",borderRadius:20,padding:"3px 9px",fontSize:10,color:"#f87171",fontWeight:500}}>{s}</span>
                    ))}
                  </div>
                </div>

                {/* Dilution table */}
                {p.dilutions.length>0&&(
                  <div>
                    <div style={{fontSize:9,color:"#fbbf24",fontWeight:700,letterSpacing:0.8,marginBottom:6}}>⚗️ DILUTIONS</div>
                    <div style={{background:"#080808",borderRadius:10,overflow:"hidden",border:"1px solid #1a1a1a"}}>
                      {p.dilutions.map((d,i)=>(
                        <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderBottom:i<p.dilutions.length-1?"1px solid #111":"none"}}>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{color:"#ddd",fontSize:11,fontWeight:600}}>{d.label}</div>
                            <div style={{color:"#666",fontSize:9,marginTop:1}}>{d.info}</div>
                          </div>
                          <span style={{background:`${p.hex}20`,color:p.hex,fontFamily:"monospace",fontWeight:800,fontSize:12,borderRadius:6,padding:"3px 9px",flexShrink:0,whiteSpace:"nowrap"}}>{d.ratio}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Tip */}
                <div style={{background:"#111",border:"1px solid #222",borderRadius:8,padding:"7px 10px",display:"flex",gap:7,alignItems:"flex-start"}}>
                  <span style={{fontSize:14,flexShrink:0}}>💡</span>
                  <div style={{color:"#aaa",fontSize:10,lineHeight:1.5,fontStyle:"italic"}}>{p.tip}</div>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ===================== STATS PAGE =====================
function StatsPage({data,setData,currency}){
  const now=new Date();
  const[period,setPeriod]=useState("year");
  const[dim,setDim]=useState("month"); // dimension = group by
  const[chartType,setChartType]=useState("bar3d");
  const[detailSlice,setDetailSlice]=useState(null); // clicked legend/bar → show detail table
  const[selTx,setSelTx]=useState(null);

  const cur=currency||(data.settings&&data.settings.currency)||"€";

  // Filter by period
  const filtRevs=data.revenues.filter(r=>{
    const d=new Date(r.date);
    if(period==="month")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(period==="year")return d.getFullYear()===now.getFullYear();
    return true;
  });
  const filtExps=data.expenses.filter(e=>{
    const d=new Date(e.date);
    if(period==="month")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(period==="year")return d.getFullYear()===now.getFullYear();
    return true;
  });

  // Global KPIs with ALL data fields
  const totalRev=filtRevs.reduce((s,r)=>s+(r.isGift?0:r.amount),0);
  const totalRevTTC=filtRevs.reduce((s,r)=>s+(r.isGift?0:(r.amountTTC||r.amount)),0);
  const totalRevHT=filtRevs.reduce((s,r)=>s+(r.isGift?0:(r.amountHT||r.amount)),0);
  const totalTVARevs=totalRevTTC-totalRevHT;
  const totalDiscountRevs=filtRevs.reduce((s,r)=>s+(parseFloat(r.discountAmount||0)),0);
  const totalTravelFees=filtRevs.reduce((s,r)=>s+(parseFloat(r.travelFees||0)),0);
  const totalDeposits=filtRevs.reduce((s,r)=>s+(parseFloat(r.deposit||0)),0);
  const totalGifts=filtRevs.filter(r=>r.isGift).length;
  const totalExp=filtExps.reduce((s,e)=>s+e.amount,0);
  const totalExpHT=filtExps.reduce((s,e)=>s+(e.amountHT||e.amount),0);
  const totalTVAExps=filtExps.reduce((s,e)=>s+(e.totalTVA||0),0);
  const totalDeliveryFees=filtExps.reduce((s,e)=>s+(parseFloat(e.deliveryFees||0)),0);
  const totalDiscountExps=filtExps.reduce((s,e)=>s+(parseFloat(e.discountAmount||0)),0);
  const profit=totalRev-totalExp;
  const rent=totalRev>0?((profit/totalRev)*100):0;
  const avgRevenue=filtRevs.length>0?totalRev/filtRevs.length:0;
  const totalDuration=filtRevs.reduce((s,r)=>s+(r.duration||0),0);
  const avgDuration=filtRevs.length>0?totalDuration/filtRevs.length:0;
  const ratioEH=totalDuration>0?totalRev/(totalDuration/60):0;

  // Dimension definitions — each has: key, label, applies(metric), getRows(revs,exps)→[{label,revs,exps,key}]
  // metrics per dimension: what can be computed
  const ALL_DIMS=[
    {key:"month",label:"📅 Mois",icon:"📅",
     metrics:["revenue","ht","tva","count","duration","ratio","expenses","profit","rentability","deposits","travelFees","discounts","gifts"],
     getRows:()=>MONTHS.map((m,i)=>({label:m,key:i,revs:filtRevs.filter(r=>new Date(r.date).getMonth()===i),exps:filtExps.filter(e=>new Date(e.date).getMonth()===i),highlight:i===now.getMonth()}))},
    {key:"week",label:"📆 Semaine",icon:"📆",
     metrics:["revenue","ht","tva","count","duration","ratio","expenses","profit","rentability","deposits","travelFees","discounts"],
     getRows:()=>{const fd=new Date(now.getFullYear(),now.getMonth(),1);return[0,1,2,3].map(i=>{const s=new Date(fd);s.setDate(fd.getDate()+i*7);const e2=new Date(s);e2.setDate(s.getDate()+6);return{label:`S${i+1}`,key:i,revs:filtRevs.filter(r=>{const d=new Date(r.date);return d>=s&&d<=e2;}),exps:filtExps.filter(ex=>{const d=new Date(ex.date);return d>=s&&d<=e2;})};});}},
    {key:"technician",label:"👤 Technicien",icon:"👤",
     metrics:["revenue","ht","count","expenses","profit","deposits"],
     getRows:()=>{const techs=(data.settings&&data.settings.technicians)||[];return techs.map(t=>({label:t,key:t,revs:filtRevs.filter(r=>r.technicians&&r.technicians.includes(t)),exps:filtExps.filter(e=>e.paidByTechs&&e.paidByTechs.includes(t))}));}},
    {key:"service",label:"🛠 Prestation",icon:"🛠",
     metrics:["revenue","ht","count","ratio","travelFees","discounts"],
     getRows:()=>{const svcs=[...new Set(filtRevs.flatMap(r=>r.prestations||[]))].slice(0,10);return svcs.map(s=>({label:s.length>12?s.slice(0,12)+"…":s,labelFull:s,key:s,revs:filtRevs.filter(r=>r.prestations&&r.prestations.includes(s)),exps:[]}));}},
    {key:"city",label:"📍 Ville",icon:"📍",
     metrics:["revenue","ht","count","ratio","travelFees","expenses","profit"],
     getRows:()=>{const cityMap={};filtRevs.forEach(r=>{const c=(r.locationCity||"").trim()||"Sans ville";if(!cityMap[c])cityMap[c]=[];cityMap[c].push(r);});return Object.entries(cityMap).sort((a,b)=>b[1].length-a[1].length).slice(0,10).map(([c,revs])=>({label:c.length>12?c.slice(0,12)+"…":c,labelFull:c,key:c,revs,exps:[]}));}},
    {key:"vehicleSize",label:"🚗 Taille",icon:"🚗",
     metrics:["revenue","ht","count","duration","ratio","discounts","travelFees"],
     getRows:()=>CAR_SIZES.map(s=>({label:s,key:s,revs:filtRevs.filter(r=>r.vehicleSize===s),exps:[]}))},
    {key:"payment",label:"💳 Paiement",icon:"💳",
     metrics:["revenue","count","deposits"],
     getRows:()=>["espèce","carte","chèque","virement"].map(m=>({label:m,key:m,revs:filtRevs.filter(r=>r.paymentMethod===m),exps:[]}))},
    {key:"supplier",label:"🏪 Fournisseur",icon:"🏪",
     metrics:["expenses","count","tva","discounts","deliveryFees"],
     getRows:()=>{const sm={};filtExps.forEach(e=>{const s=e.supplier||"Sans fournisseur";if(!sm[s])sm[s]=[];sm[s].push(e);});return Object.entries(sm).sort((a,b)=>b[1].reduce((s,e)=>s+e.amount,0)-a[1].reduce((s,e)=>s+e.amount,0)).slice(0,10).map(([s,exps])=>({label:s.length>12?s.slice(0,12)+"…":s,labelFull:s,key:s,revs:[],exps}));}},
    {key:"difficulty",label:"💪 Difficulté",icon:"💪",
     metrics:["revenue","ht","count","duration","ratio","travelFees"],
     getRows:()=>[1,2,3,4,5].map(d=>({label:"💪".repeat(d),key:d,revs:filtRevs.filter(r=>(r.difficulty||0)===d),exps:[]}))},
  ];

  const METRIC_DEFS={
    revenue:{label:"Revenus TTC",unit:cur,fn:(revs)=>revs.filter(r=>!r.isGift).reduce((s,r)=>s+r.amount,0),color:"#00d4aa"},
    ht:{label:"Revenus HT",unit:cur,fn:(revs)=>revs.filter(r=>!r.isGift).reduce((s,r)=>s+(r.amountHT||r.amount),0),color:"#00b894"},
    tva:{label:"TVA Revenus",unit:cur,fn:(revs)=>revs.filter(r=>!r.isGift).reduce((s,r)=>s+(parseFloat(r.amountTTC||r.amount)-(r.amountHT||parseFloat(r.amountTTC||r.amount))),0),color:"#6c5ce7"},
    count:{label:"Nb Lavages",unit:"",fn:(revs)=>revs.length,color:"#a78bfa"},
    duration:{label:"Durée (h)",unit:"h",fn:(revs)=>revs.reduce((s,r)=>s+(r.duration||0),0)/60,color:"#0099cc"},
    ratio:{label:"€/heure",unit:cur+"/h",fn:(revs)=>{const tot=revs.reduce((s,r)=>s+r.amount,0);const dur=revs.reduce((s,r)=>s+(r.duration||0),0);return dur>0?tot/(dur/60):0;},color:"#ffd700"},
    expenses:{label:"Dépenses TTC",unit:cur,fn:(_,exps)=>exps.reduce((s,e)=>s+e.amount,0),color:"#ff4757"},
    profit:{label:"Bénéfice",unit:cur,fn:(revs,exps)=>revs.reduce((s,r)=>s+(r.isGift?0:r.amount),0)-exps.reduce((s,e)=>s+e.amount,0),color:"#ff6b35"},
    rentability:{label:"Rentabilité %",unit:"%",fn:(revs,exps)=>{const r=revs.reduce((s,r)=>s+(r.isGift?0:r.amount),0);const e=exps.reduce((s,e)=>s+e.amount,0);return r>0?((r-e)/r*100):0;},color:"#ffa500"},
    deposits:{label:"Acomptes",unit:cur,fn:(revs)=>revs.reduce((s,r)=>s+(parseFloat(r.deposit||0)),0),color:"#7c3aed"},
    travelFees:{label:"Frais dépl.",unit:cur,fn:(revs)=>revs.reduce((s,r)=>s+(parseFloat(r.travelFees||0)),0),color:"#60a5fa"},
    discounts:{label:"Réductions",unit:cur,fn:(revs,exps)=>revs.reduce((s,r)=>s+(parseFloat(r.discountAmount||0)),0)+exps.reduce((s,e)=>s+(parseFloat(e.discountAmount||0)),0),color:"#ffd700"},
    gifts:{label:"Offerts",unit:"",fn:(revs)=>revs.filter(r=>r.isGift).length,color:"#fd79a8"},
    deliveryFees:{label:"Frais livraison",unit:cur,fn:(_,exps)=>exps.reduce((s,e)=>s+(parseFloat(e.deliveryFees||0)),0),color:"#e17055"},
  };

  const[metric,setMetric]=useState("revenue");
  const activeDimDef=ALL_DIMS.find(d=>d.key===dim)||ALL_DIMS[0];
  const availMetrics=activeDimDef.metrics;
  // If current metric not available for dim, default to first available
  const safeMetric=availMetrics.includes(metric)?metric:availMetrics[0];
  const mDef=METRIC_DEFS[safeMetric];

  const rows=activeDimDef.getRows();
  const rowValues=rows.map(r=>({...r,value:mDef.fn(r.revs,r.exps)}));
  const maxVal=Math.max(...rowValues.map(r=>r.value),0.01);

  const PIE_COLORS=["#00d4aa","#7c3aed","#ff6b35","#ffd700","#00aaff","#ff4757","#a78bfa","#00e5bb","#fd79a8","#e17055"];

  const fmtVal=(v)=>{
    if(v===0)return"0";
    if(mDef.unit==="%")return v.toFixed(1)+"%";
    if(mDef.unit==="h")return v.toFixed(1)+"h";
    if(mDef.unit==="")return Math.round(v).toString();
    if(Math.abs(v)>=1000)return(v/1000).toFixed(1)+"k";
    return v.toFixed(0);
  };

  const fmtValFull=(v)=>{
    if(mDef.unit==="%")return v.toFixed(1)+"%";
    if(mDef.unit==="h")return fmtT(Math.round(v*60));
    if(mDef.unit==="")return Math.round(v).toString();
    return fmt(v,cur);
  };

  // Detail panel — clicked row
  const DetailPanel=({row,onClose})=>{
    const revs=[...row.revs].sort((a,b)=>new Date(b.date)-new Date(a.date));
    const exps=[...row.exps].sort((a,b)=>new Date(b.date)-new Date(a.date));
    const totRev=revs.filter(r=>!r.isGift).reduce((s,r)=>s+r.amount,0);
    const totExp=exps.reduce((s,e)=>s+e.amount,0);
    const totHT=revs.reduce((s,r)=>s+(r.amountHT||r.amount),0);
    const totTVA=revs.reduce((s,r)=>s+(parseFloat(r.amountTTC||r.amount)-(r.amountHT||0)),0);
    const totDep=revs.reduce((s,r)=>s+(parseFloat(r.deposit||0)),0);
    const totTravel=revs.reduce((s,r)=>s+(parseFloat(r.travelFees||0)),0);
    const totDisc=revs.reduce((s,r)=>s+(parseFloat(r.discountAmount||0)),0)+exps.reduce((s,e)=>s+(parseFloat(e.discountAmount||0)),0);
    const totDur=revs.reduce((s,r)=>s+(r.duration||0),0);
    const ratEH=totDur>0?totRev/(totDur/60):0;
    return(
      <Modal title={`📊 ${row.labelFull||row.label}`} onClose={onClose}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
          {[[`✅ Lavages`,revs.length,""],[`💰 CA TTC`,totRev,cur],[`📄 CA HT`,totHT,cur],[`🏛 TVA`,totTVA,cur],[`✨ Bénéfice`,totRev-totExp,cur],[`🔴 Dépenses`,totExp,cur],[`🏦 Acomptes`,totDep,cur],[`🚗 Frais dépl.`,totTravel,cur],[`🎟 Réductions`,totDisc,cur],[`⏱ Durée`,totDur,"min"],[`📈 €/h`,ratEH,cur+"/h"],[`🎁 Offerts`,revs.filter(r=>r.isGift).length,""]].filter(([,v])=>v>0||typeof v==="number").map(([l,v,u],i)=>(
            <div key={i} style={{background:"#1a1a1a",borderRadius:10,padding:"9px 11px"}}>
              <div style={{fontSize:9,color:"#888",marginBottom:2}}>{l}</div>
              <div style={{color:"#fff",fontWeight:700,fontSize:13}}>{u===cur?fmt(v,cur):u==="min"?fmtT(v):u===cur+"/h"?fmt(v,cur)+"/h":v}</div>
            </div>
          ))}
        </div>
        {revs.length>0&&(
          <>
            <div style={{fontSize:10,color:"#888",fontWeight:700,marginBottom:8}}>LAVAGES ({revs.length})</div>
            {revs.slice(0,20).map(r=>{const v=data.vehicles.find(vx=>vx.id===r.vehicleId);const c=data.clients.find(cx=>cx.id===r.clientId);return(
              <div key={r.id} onClick={()=>setSelTx(r)} style={{background:"#1a1a1a",borderRadius:10,padding:"9px 11px",marginBottom:6,display:"flex",gap:10,alignItems:"center",cursor:"pointer",border:"1px solid #2a2a2a"}}>
                {r.carPhoto?<img src={r.carPhoto} style={{width:44,height:33,objectFit:"cover",borderRadius:6,flexShrink:0}}/>:<div style={{width:44,height:33,background:"#252525",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>{vehicleEmoji(r.vehicleSize)}</div>}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{color:"#fff",fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{v?`${v.brand} ${v.model}`:r.plate||"Véhicule"}</div>
                  <div style={{color:"#888",fontSize:11}}>{c?`${c.firstName} ${c.lastName}`:"—"} · {fmtD(r.date)}</div>
                  {(r.prestations&&r.prestations.length>0)&&<div style={{color:"#999",fontSize:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.prestations.join(" · ")}</div>}
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{color:r.isGift?"#888":"#00d4aa",fontWeight:700,fontSize:13}}>{r.isGift?"🎁":fmt(r.amount,cur)}</div>
                  {r.amountHT>0&&<div style={{color:"#999",fontSize:10}}>HT: {fmt(r.amountHT,cur)}</div>}
                  {parseFloat(r.travelFees||0)>0&&<div style={{color:"#60a5fa",fontSize:10}}>🚗 {fmt(r.travelFees,cur)}</div>}
                  {parseFloat(r.discountAmount||0)>0&&<div style={{color:"#ffa500",fontSize:10}}>🎟 -{fmt(r.discountAmount,cur)}</div>}
                </div>
              </div>
            );})}
          </>
        )}
        {exps.length>0&&(
          <>
            <div style={{fontSize:10,color:"#ff6b35",fontWeight:700,marginBottom:8,marginTop:8}}>DÉPENSES ({exps.length})</div>
            {exps.slice(0,10).map(e=>(
              <div key={e.id} onClick={()=>setSelTx(e)} style={{background:"#1a0a0a",borderRadius:10,padding:"9px 11px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",border:"1px solid #2a1a1a"}}>
                <div>
                  <div style={{color:"#ff6b35",fontSize:12,fontWeight:600}}>{e.supplier||"Dépense"}</div>
                  <div style={{color:"#888",fontSize:11}}>{fmtD(e.date)}{e.paymentMethod?` · ${e.paymentMethod}`:""}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{color:"#ff4757",fontWeight:700}}>{fmt(e.amount,cur)}</div>
                  {e.amountHT>0&&<div style={{color:"#999",fontSize:10}}>HT: {fmt(e.amountHT,cur)}</div>}
                </div>
              </div>
            ))}
          </>
        )}
      </Modal>
    );
  };

  // 3D Bar chart component
  const Bar3D=({row,idx,isSelected,onClick})=>{
    const pct=maxVal>0?row.value/maxVal:0;
    const h=Math.max(4,Math.round(pct*120));
    const col=PIE_COLORS[idx%PIE_COLORS.length];
    const depth=6;
    return(
      <div onClick={onClick} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",height:155,cursor:"pointer",position:"relative",minWidth:0}}>
        {row.value>0&&<span style={{fontSize:7,color:isSelected?"#fff":col,fontWeight:700,marginBottom:2,textAlign:"center",lineHeight:1.2,maxWidth:"100%"}}>{fmtVal(row.value)}</span>}
        {/* 3D Bar */}
        <div style={{position:"relative",width:"75%"}}>
          {/* Top face */}
          <div style={{position:"absolute",top:-depth/2,left:depth/2,right:-depth/2,height:depth,background:isSelected?"#fff":col,opacity:0.7,borderRadius:"2px 2px 0 0",transform:"skewX(-20deg)"}}/>
          {/* Side face */}
          <div style={{position:"absolute",top:-depth/2,right:-depth/2,width:depth,height:h,background:isSelected?"#ccc":col,opacity:0.4,transform:"skewY(-20deg)"}}/>
          {/* Front face */}
          <div style={{height:h,background:isSelected?`linear-gradient(180deg,#fff,#ccc)`:`linear-gradient(180deg,${col},${col}99)`,borderRadius:"3px 3px 0 0",border:isSelected?`2px solid #fff`:`1px solid ${col}66`}}/>
        </div>
        <span style={{fontSize:7,color:isSelected?"#fff":"#999",marginTop:4,textAlign:"center",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"100%",lineHeight:1.3,fontWeight:isSelected?700:400}}>{row.label}</span>
      </div>
    );
  };

  // Line chart
  const LineChart=()=>{
    const pts=rowValues.map((d,i)=>({x:16+i/(Math.max(rowValues.length-1,1))*268,y:10+(1-(maxVal>0?d.value/maxVal:0))*100}));
    const pathD=pts.length>1?pts.map((p,i)=>`${i===0?"M":"L"} ${p.x} ${p.y}`).join(" "):"";
    const area=pts.length>1?`${pathD} L ${pts[pts.length-1].x} 115 L ${pts[0].x} 115 Z`:"";
    return(
      <div style={{position:"relative"}}>
        <svg width="100%" height="130" viewBox="0 0 300 130" style={{overflow:"visible"}}>
          <defs><linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={mDef.color} stopOpacity="0.3"/><stop offset="100%" stopColor={mDef.color} stopOpacity="0"/></linearGradient></defs>
          {area&&<path d={area} fill="url(#areaGrad)"/>}
          {pathD&&<path d={pathD} fill="none" stroke={mDef.color} strokeWidth="2.5" strokeLinejoin="round"/>}
          {pts.map((p,i)=>(
            <g key={i} onClick={()=>setDetailSlice(rowValues[i])} style={{cursor:"pointer"}}>
              <circle cx={p.x} cy={p.y} r="6" fill="transparent"/>
              <circle cx={p.x} cy={p.y} r={detailSlice&&detailSlice.key===rowValues[i].key?5:3.5} fill={detailSlice&&detailSlice.key===rowValues[i].key?"#fff":mDef.color} stroke={mDef.color} strokeWidth="2"/>
              {rowValues[i].value>0&&<text x={p.x} y={p.y-9} textAnchor="middle" fontSize="7.5" fill={mDef.color} fontWeight="bold">{fmtVal(rowValues[i].value)}</text>}
            </g>
          ))}
        </svg>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:2,paddingLeft:12,paddingRight:12}}>
          {rowValues.map((d,i)=><span key={i} style={{fontSize:7,color:detailSlice&&detailSlice.key===d.key?"#fff":"#999",flex:1,textAlign:"center",overflow:"hidden",whiteSpace:"nowrap",fontWeight:detailSlice&&detailSlice.key===d.key?700:400}}>{d.label}</span>)}
        </div>
      </div>
    );
  };

  // Pie chart with legend at BOTTOM
  const PieChart=()=>{
    const total=rowValues.reduce((s,d)=>s+Math.max(0,d.value),0);
    if(total===0)return<div style={{textAlign:"center",color:"#999",padding:"30px 0",fontSize:12}}>Aucune donnée</div>;
    const cx=120,cy=90,r=72;
    let angle=-Math.PI/2;
    const slices=rowValues.filter(d=>d.value>0).map((d,i)=>{
      const sweep=(d.value/total)*2*Math.PI;
      const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
      angle+=sweep;
      const x2=cx+r*Math.cos(angle),y2=cy+r*Math.sin(angle);
      const large=sweep>Math.PI?1:0;
      const midA=angle-sweep/2;
      const pct=Math.round((d.value/total)*100);
      const sel=detailSlice&&detailSlice.key===d.key;
      return{path:`M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`,color:PIE_COLORS[i%PIE_COLORS.length],label:d.label,pct,value:d.value,sweep,d,sel,midA};
    });
    return(
      <div>
        <div style={{display:"flex",justifyContent:"center"}}>
          <svg width="240" height="180" viewBox="0 0 240 180">
            {slices.map((s,i)=>(
              <g key={i} onClick={()=>setDetailSlice(s.d)} style={{cursor:"pointer"}}>
                <path d={s.path} fill={s.color} stroke={s.sel?"#fff":"#0a0a0a"} strokeWidth={s.sel?2.5:1.5} transform={s.sel?`translate(${Math.cos(s.midA)*5},${Math.sin(s.midA)*5})`:""}/>
                {s.sweep>0.28&&<text x={cx+(r*0.65)*Math.cos(s.midA)} y={cy+(r*0.65)*Math.sin(s.midA)} textAnchor="middle" dominantBaseline="middle" fontSize="9" fill="#fff" fontWeight="bold">{s.pct}%</text>}
              </g>
            ))}
          </svg>
        </div>
        {/* Legend at bottom, clickable */}
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8,justifyContent:"center"}}>
          {slices.map((s,i)=>(
            <div key={i} onClick={()=>setDetailSlice(s.d)} style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",background:s.sel?"#2a2a2a":"#1a1a1a",border:`1px solid ${s.sel?s.color:"#252525"}`,borderRadius:20,padding:"3px 10px",transition:"all 0.15s"}}>
              <div style={{width:9,height:9,borderRadius:"50%",background:s.color,flexShrink:0}}/>
              <span style={{fontSize:10,color:s.sel?"#fff":"#ccc",maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.label}</span>
              <span style={{fontSize:10,color:s.color,fontWeight:700}}>{fmtVal(s.value)}</span>
            </div>
          ))}
        </div>
      </div>
    );
  };

  return(
    <div style={{paddingBottom:90}}>
      {/* ── KPIs ── */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:12}}>
        {[["CA TTC",fmt(totalRev,cur),"#00d4aa","#0a1a14","#00d4aa22"],["Dépenses",fmt(totalExp,cur),"#ff4757","#1a0a0a","#ff475722"],["Bénéfice",fmt(profit,cur),profit>=0?"#00d4aa":"#ff4757",profit>=0?"#0a1a14":"#1a0a0a",profit>=0?"#00d4aa22":"#ff475722"]].map(([l,v,c,bg,b],i)=>(
          <div key={i} style={{background:bg,border:`1px solid ${b}`,borderRadius:12,padding:"9px",textAlign:"center"}}>
            <div style={{fontSize:8,color:"#999",marginBottom:2,textTransform:"uppercase"}}>{l}</div>
            <div style={{color:c,fontWeight:700,fontSize:13,lineHeight:1.2}}>{v}</div>
          </div>
        ))}
      </div>

      {/* ── Extra KPIs row ── */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:12}}>
        {[[`${filtRevs.length}`,`Lavages`,"#a78bfa"],[`${rent.toFixed(0)}%`,`Rentab.`,rent>=50?"#00d4aa":"#ff6b35"],[fmtT(totalDuration),`Durée`,"#60a5fa"],[fmt(avgRevenue,cur),`Moy/lavage`,"#ffd700"]].map(([v,l,c],i)=>(
          <div key={i} style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:10,padding:"7px",textAlign:"center"}}>
            <div style={{color:c,fontWeight:800,fontSize:13,lineHeight:1}}>{v}</div>
            <div style={{fontSize:8,color:"#888",marginTop:2}}>{l}</div>
          </div>
        ))}
      </div>

      {/* ── All extra KPIs ── */}
      {(totalTVARevs>0||totalDiscountRevs>0||totalTravelFees>0||totalDeposits>0||totalGifts>0||totalTVAExps>0||totalDeliveryFees>0||totalDiscountExps>0)&&(
        <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:12,marginBottom:12}}>
          <div style={{fontSize:10,color:"#888",fontWeight:700,marginBottom:8}}>DONNÉES COMPLÈTES</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {totalRevHT>0&&<div style={{background:"#1a1a1a",borderRadius:8,padding:"7px 10px"}}><div style={{fontSize:8,color:"#888"}}>CA HT</div><div style={{color:"#00b894",fontWeight:700,fontSize:12}}>{fmt(totalRevHT,cur)}</div></div>}
            {totalTVARevs>0&&<div style={{background:"#1a1a1a",borderRadius:8,padding:"7px 10px"}}><div style={{fontSize:8,color:"#888"}}>TVA collectée</div><div style={{color:"#6c5ce7",fontWeight:700,fontSize:12}}>{fmt(totalTVARevs,cur)}</div></div>}
            {totalDiscountRevs>0&&<div style={{background:"#1a1a1a",borderRadius:8,padding:"7px 10px"}}><div style={{fontSize:8,color:"#888"}}>🎟 Réductions revenus</div><div style={{color:"#ffa500",fontWeight:700,fontSize:12}}>-{fmt(totalDiscountRevs,cur)}</div></div>}
            {totalTravelFees>0&&<div style={{background:"#1a1a1a",borderRadius:8,padding:"7px 10px"}}><div style={{fontSize:8,color:"#888"}}>🚗 Frais déplacement</div><div style={{color:"#60a5fa",fontWeight:700,fontSize:12}}>{fmt(totalTravelFees,cur)}</div></div>}
            {totalDeposits>0&&<div style={{background:"#1a1a1a",borderRadius:8,padding:"7px 10px"}}><div style={{fontSize:8,color:"#888"}}>🏦 Acomptes reçus</div><div style={{color:"#7c3aed",fontWeight:700,fontSize:12}}>{fmt(totalDeposits,cur)}</div></div>}
            {totalGifts>0&&<div style={{background:"#1a1a1a",borderRadius:8,padding:"7px 10px"}}><div style={{fontSize:8,color:"#888"}}>🎁 Lavages offerts</div><div style={{color:"#fd79a8",fontWeight:700,fontSize:12}}>{totalGifts}</div></div>}
            {totalExpHT>0&&<div style={{background:"#1a1a1a",borderRadius:8,padding:"7px 10px"}}><div style={{fontSize:8,color:"#888"}}>Dépenses HT</div><div style={{color:"#e17055",fontWeight:700,fontSize:12}}>{fmt(totalExpHT,cur)}</div></div>}
            {totalTVAExps>0&&<div style={{background:"#1a1a1a",borderRadius:8,padding:"7px 10px"}}><div style={{fontSize:8,color:"#888"}}>TVA dépenses</div><div style={{color:"#d63031",fontWeight:700,fontSize:12}}>{fmt(totalTVAExps,cur)}</div></div>}
            {totalDeliveryFees>0&&<div style={{background:"#1a1a1a",borderRadius:8,padding:"7px 10px"}}><div style={{fontSize:8,color:"#888"}}>🚚 Frais livraison</div><div style={{color:"#e17055",fontWeight:700,fontSize:12}}>{fmt(totalDeliveryFees,cur)}</div></div>}
            {totalDiscountExps>0&&<div style={{background:"#1a1a1a",borderRadius:8,padding:"7px 10px"}}><div style={{fontSize:8,color:"#888"}}>🎟 Réductions dépenses</div><div style={{color:"#ffa500",fontWeight:700,fontSize:12}}>-{fmt(totalDiscountExps,cur)}</div></div>}
            {ratioEH>0&&<div style={{background:"#1a1a1a",borderRadius:8,padding:"7px 10px"}}><div style={{fontSize:8,color:"#888"}}>📈 Ratio €/heure</div><div style={{color:"#ffd700",fontWeight:700,fontSize:12}}>{fmt(ratioEH,cur)}/h</div></div>}
          </div>
        </div>
      )}

      {/* ── Interactive Chart ── */}
      <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:14,marginBottom:12}}>
        <div style={{fontSize:12,color:"#ccc",fontWeight:700,marginBottom:10}}>📊 GRAPHIQUES INTERACTIFS</div>

        {/* Period */}
        <div style={{marginBottom:10}}>
          <div style={{fontSize:9,color:"#888",marginBottom:5,textTransform:"uppercase",letterSpacing:0.5}}>PÉRIODE</div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {[["month","Ce mois"],["year","Cette année"],["all","Tout"]].map(([v,l])=>(
              <button key={v} onClick={()=>setPeriod(v)} style={{background:period===v?"#fff":"#1a1a1a",border:`1px solid ${period===v?"#fff":"#2e2e2e"}`,color:period===v?"#000":"#aaa",padding:"4px 11px",borderRadius:20,fontSize:10,cursor:"pointer",fontWeight:period===v?700:400}}>{l}</button>
            ))}
          </div>
        </div>

        {/* Unified dimension list */}
        <div style={{marginBottom:10}}>
          <div style={{fontSize:9,color:"#888",marginBottom:5,textTransform:"uppercase",letterSpacing:0.5}}>DIMENSION</div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {ALL_DIMS.map(d=>(
              <button key={d.key} onClick={()=>{setDim(d.key);setDetailSlice(null);if(!d.metrics.includes(metric))setMetric(d.metrics[0]);}} style={{background:dim===d.key?"#7c3aed":"#1a1a1a",border:`1px solid ${dim===d.key?"#7c3aed":"#2e2e2e"}`,color:dim===d.key?"#fff":"#aaa",padding:"4px 10px",borderRadius:20,fontSize:10,cursor:"pointer",fontWeight:dim===d.key?700:400}}>{d.label}</button>
            ))}
          </div>
        </div>

        {/* Metric — only show compatible ones */}
        <div style={{marginBottom:10}}>
          <div style={{fontSize:9,color:"#888",marginBottom:5,textTransform:"uppercase",letterSpacing:0.5}}>DONNÉES</div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {Object.entries(METRIC_DEFS).map(([k,m])=>{
              const available=availMetrics.includes(k);
              return(
                <button key={k} onClick={()=>{if(available){setMetric(k);setDetailSlice(null);}}} disabled={!available}
                  style={{background:safeMetric===k?m.color:"#1a1a1a",border:`1px solid ${safeMetric===k?m.color:"#2e2e2e"}`,color:safeMetric===k?"#000":available?"#aaa":"#3a3a3a",padding:"4px 10px",borderRadius:20,fontSize:10,cursor:available?"pointer":"not-allowed",fontWeight:safeMetric===k?700:400,opacity:available?1:0.4,textDecoration:!available?"line-through":"none"}}>
                  {m.label}
                </button>
              );
            })}

        </div>

        {/* Chart type */}
        <div style={{marginBottom:12}}>
          <div style={{fontSize:9,color:"#888",marginBottom:5,textTransform:"uppercase",letterSpacing:0.5}}>TYPE</div>
          <div style={{display:"flex",gap:5}}>
            {[["bar3d","▐ Barres 3D"],["line","∿ Ligne"],["pie","◉ Camembert"]].map(([v,l])=>(
              <button key={v} onClick={()=>setChartType(v)} style={{background:chartType===v?"#ff6b35":"#1a1a1a",border:`1px solid ${chartType===v?"#ff6b35":"#2e2e2e"}`,color:chartType===v?"#fff":"#aaa",padding:"4px 12px",borderRadius:20,fontSize:10,cursor:"pointer",fontWeight:chartType===v?700:400}}>{l}</button>
            ))}
          </div>
        </div>

        {/* Chart area */}
        {rowValues.length===0||rowValues.every(r=>r.value===0)
          ?<div style={{height:80,display:"flex",alignItems:"center",justifyContent:"center",color:"#999",fontSize:12}}>Aucune donnée</div>
          :(
            <>
              {chartType==="bar3d"&&(
                <div style={{overflowX:"auto"}}>
                  <div style={{display:"flex",alignItems:"flex-end",gap:4,minWidth:Math.max(rowValues.length*28,280),height:165,padding:"0 4px"}}>
                    {rowValues.map((row,i)=>(
                      <Bar3D key={row.key} row={row} idx={i} isSelected={detailSlice&&detailSlice.key===row.key} onClick={()=>setDetailSlice(detailSlice&&detailSlice.key===row.key?null:row)}/>
                    ))}
                  </div>
                </div>
              )}
              {chartType==="line"&&<LineChart/>}
              {chartType==="pie"&&<PieChart/>}
            </>
          )
        }

        {/* Bar chart legend at bottom (clickable) — only for bar3d */}
        {chartType==="bar3d"&&rowValues.some(r=>r.value>0)&&(
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:10,paddingTop:10,borderTop:"1px solid #1e1e1e",justifyContent:"center"}}>
            {rowValues.filter(r=>r.value>0).map((row,i)=>(
              <div key={row.key} onClick={()=>setDetailSlice(detailSlice&&detailSlice.key===row.key?null:row)} style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer",background:detailSlice&&detailSlice.key===row.key?"#2a2a2a":"#1a1a1a",border:`1px solid ${detailSlice&&detailSlice.key===row.key?PIE_COLORS[rowValues.indexOf(row)%PIE_COLORS.length]:"#2e2e2e"}`,borderRadius:20,padding:"3px 10px"}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:PIE_COLORS[rowValues.indexOf(row)%PIE_COLORS.length],flexShrink:0}}/>
                <span style={{fontSize:10,color:detailSlice&&detailSlice.key===row.key?"#fff":"#ccc",maxWidth:70,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{row.label}</span>
                <span style={{fontSize:10,color:PIE_COLORS[rowValues.indexOf(row)%PIE_COLORS.length],fontWeight:700}}>{fmtValFull(row.value)}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Detail panel when slice selected */}
      {detailSlice&&<DetailPanel row={detailSlice} onClose={()=>setDetailSlice(null)}/>}
      {selTx&&<TxDetail tx={selTx} data={data} setData={setData} currency={currency} onClose={()=>setSelTx(null)}/>}
    </div>
  );
}


// ===================== CLIENTS PAGE =====================
function ClientsPage({data,setData,currency}){
  const[sort,setSort]=useState("revenue"),[dir,setDir]=useState("desc"),[sel,setSel]=useState(null),[search,setSearch]=useState(""),[editSel,setEditSel]=useState(null);

  const enrich=data.clients.map(c=>{
    const revs=data.revenues.filter(r=>r.clientId===c.id);
    const vehicles=[...new Set(revs.map(r=>r.vehicleId).filter(Boolean))].map(vid=>data.vehicles.find(v=>v.id===vid)).filter(Boolean);
    return{...c,revs,totalRevenue:revs.reduce((s,r)=>s+r.amount,0),vehicles};
  });

  const sorted=[...enrich].filter(c=>`${c.firstName} ${c.lastName}`.toLowerCase().includes(search.toLowerCase())).sort((a,b)=>{
    const m=dir==="desc"?-1:1;
    if(sort==="revenue")return m*(a.totalRevenue-b.totalRevenue);
    if(sort==="note")return m*((a.note||0)-(b.note||0));
    if(sort==="date"){const ar=a.revs.length>0?new Date(a.revs[a.revs.length-1].date):0;const br=b.revs.length>0?new Date(b.revs[b.revs.length-1].date):0;return m*(ar-br);}
    return 0;
  });

  const SB=({f,l})=><button onClick={()=>{if(sort===f)setDir(d=>d==="asc"?"desc":"asc");else{setSort(f);setDir("desc");}}} style={{background:sort===f?"#1e1e1e":"transparent",border:"1px solid #252525",color:sort===f?"#fff":"#666",padding:"4px 9px",borderRadius:20,fontSize:10,cursor:"pointer"}}>{l} {sort===f?(dir==="desc"?"↓":"↑"):""}</button>;

  // Edit client modal
  const EditClient=({client,onClose})=>{
    const[form,setForm]=useState({...client});

      const addr=[form.streetNum,form.streetName,form.zip,form.city].filter(Boolean).join(" ");
      const nd={...data,clients:data.clients.map(c=>c.id===form.id?{...form,address:addr}:c)};
      setData(nd);save(nd);onClose();
    };
    return(
      <Modal title="Modifier le client" onClose={onClose}>
        <Field label="Prénom"><input style={inp} value={form.firstName||""} onChange={e=>set("firstName",e.target.value)}/></Field>
        <Field label="Nom"><input style={inp} value={form.lastName||""} onChange={e=>set("lastName",e.target.value)}/></Field>
        <Field label="Téléphone"><input style={inp} value={form.phone||""} onChange={e=>set("phone",e.target.value)}/></Field>
        <div style={{display:"grid",gridTemplateColumns:"80px 1fr",gap:6,marginBottom:12}}>
          <div><label style={{fontSize:11,color:"#777",display:"block",marginBottom:4}}>N° rue</label><input style={inp} value={form.streetNum||""} onChange={e=>set("streetNum",e.target.value)}/></div>
          <div><label style={{fontSize:11,color:"#777",display:"block",marginBottom:4}}>Nom de rue</label><input style={inp} value={form.streetName||""} onChange={e=>set("streetName",e.target.value)}/></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:12}}>
          <div><label style={{fontSize:11,color:"#777",display:"block",marginBottom:4}}>Code postal</label><input style={inp} value={form.zip||""} onChange={e=>set("zip",e.target.value)}/></div>
          <div><label style={{fontSize:11,color:"#777",display:"block",marginBottom:4}}>Ville</label><input style={inp} value={form.city||""} onChange={e=>set("city",e.target.value)}/></div>
        </div>
        <Field label="Note"><StarRating value={form.note||0} onChange={v=>set("note",v)}/></Field>
        <button onClick={handleSave} style={{...btn("linear-gradient(135deg,#00d4aa,#00a882)","#000"),width:"100%",padding:"13px",fontSize:15,marginTop:4}}>✅ Sauvegarder</button>
      </Modal>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{color:"#fff",fontWeight:600,fontSize:14}}>{c.firstName} {c.lastName}</div>
                <StarRating value={c.note||0} size={13} readonly/>

        return(

                  <div style={{fontSize:9,color:"#888",marginBottom:2}}>MOY./PASSAGE</div>
                  <div style={{color:"#7c3aed",fontWeight:800,fontSize:15,fontFamily:"'Syne',sans-serif"}}>{fmt(avgAmount,currency)}</div>

const STATUS_COLORS={"confirmé":"#00d4aa","en attente":"#ffa500","annulé":"#ff4757","terminé":"#7c3aed"};

function AppointmentForm({data,setData,onSave,editItem}){
  const today=new Date().toISOString().split("T")[0];
  const techs=(data.settings&&data.settings.technicians)||[];
  const services=(data.settings&&data.settings.services)||DEF_SERVICES;
  const[form,setForm]=useState(editItem?{...editItem,locationStreetNum:editItem.locationStreetNum||"",locationStreetName:editItem.locationStreetName||"",locationZip:editItem.locationZip||"",locationCity:editItem.locationCity||"",invoiceNumber:editItem.invoiceNumber||"",notes:editItem.notes||"",depositSplitMode:editItem.depositSplitMode||"equitable",depositTechs:editItem.depositTechs||[],depositTechAmounts:editItem.depositTechAmounts||{}}:{
    date:today,timeStart:"",timeEnd:"",
    clientId:"",clientFirst:"",clientLast:"",clientPhone:"",
    vehicleId:"",plate:"",brand:"",model:"",
    services:[],customService:"",technicians:[],
    status:"en attente",priority:"normale",
    estimatedPrice:"",deposit:"",paymentMethod:"espèce",
    depositSplitMode:"equitable",depositTechs:[],depositTechAmounts:{},
    locationStreetNum:"",locationStreetName:"",locationZip:"",locationCity:"",
    notes:"",reminderSent:false,invoiceNumber:"",
    indoorOutdoor:"extérieur",vehicleSize:"berline"
  });
  const[newClient,setNewClient]=useState(!editItem);
  const[newVehicle,setNewVehicle]=useState(!editItem);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const dur=dMin(form.timeStart,form.timeEnd);
  const selectClient=c=>{set("clientId",c.id);set("clientFirst",c.firstName);set("clientLast",c.lastName);set("clientPhone",c.phone||"");setNewClient(false);};
  // Vehicle selected → auto-fill owner
  const selectVehicle=v=>{
    set("vehicleId",v.id);set("plate",v.plate);set("brand",v.brand);set("model",v.model);set("vehicleSize",v.size||"berline");setNewVehicle(false);
    if(v.ownerId){
      const owner=data.clients.find(c=>c.id===v.ownerId);
      if(owner){setForm(f=>({...f,vehicleId:v.id,plate:v.plate,brand:v.brand,model:v.model,vehicleSize:v.size||"berline",clientId:owner.id,clientFirst:owner.firstName,clientLast:owner.lastName,clientPhone:owner.phone||""}));setNewClient(false);}
    }
  };
  const saveLocation=loc=>{if(!loc)return;};
  const handleSave=()=>{
    if(!form.date)return alert("Date requise");
    if(!form.clientFirst&&!form.clientId)return alert("Client requis");
    // Validate deposit split
    const depositAmt=parseFloat(form.deposit||0);
    if(depositAmt>0&&(form.depositTechs||[]).length>0&&(form.depositSplitMode||"equitable")==="manuel"){
      const assigned=(form.depositTechs||[]).reduce((s,t)=>s+parseFloat((form.depositTechAmounts||{})[t]||0),0);
      if(Math.abs(depositAmt-assigned)>0.01)return alert(`⚠️ La répartition de l'acompte ne correspond pas.\nAcompte : ${depositAmt.toFixed(2)} — Réparti : ${assigned.toFixed(2)}`);
    }
    const nd={...data};
    let cid=form.clientId,vid=form.vehicleId;
    if(!cid&&form.clientFirst){const nc={id:gid(),firstName:form.clientFirst,lastName:form.clientLast,phone:form.clientPhone,note:3};nd.clients=[...nd.clients,nc];cid=nc.id;}
    if(!vid&&form.plate){const pt=form.plate.toUpperCase().replace(/[^A-Z0-9]/g,"");const ev=nd.vehicles.find(v=>v.plate===pt);if(ev){vid=ev.id;}else{const nv={id:gid(),plate:pt,brand:form.brand,model:form.model,size:form.vehicleSize||"berline",ownerId:cid||""};nd.vehicles=[...nd.vehicles,nv];vid=nv.id;}}
    if(vid&&cid){const vi=nd.vehicles.findIndex(v=>v.id===vid);if(vi>=0&&!nd.vehicles[vi].ownerId){nd.vehicles=[...nd.vehicles];nd.vehicles[vi]={...nd.vehicles[vi],ownerId:cid};}}
    const location=fmtAddr(form.locationStreetNum,form.locationStreetName,form.locationZip,form.locationCity);
    if(location){const locs=nd.locations||[];if(!locs.includes(location))nd.locations=[...locs,location];}
    // Compute depositTechAmounts for equitable split
    let finalDepositTechAmounts=form.depositTechAmounts||{};
    if((form.depositSplitMode||"equitable")==="equitable"&&(form.depositTechs||[]).length>0&&depositAmt>0){
      const share=depositAmt/(form.depositTechs||[]).length;
      finalDepositTechAmounts={};
      (form.depositTechs||[]).forEach(t=>{finalDepositTechAmounts[t]=parseFloat(share.toFixed(2));});
    }
    const appt={...form,id:editItem?form.id:gid(),clientId:cid,vehicleId:vid,duration:dur,location,depositTechAmounts:finalDepositTechAmounts};
    nd.appointments=nd.appointments||[];
    if(editItem){nd.appointments=nd.appointments.map(a=>a.id===appt.id?appt:a);}
    else{nd.appointments=[...nd.appointments,appt];}
    setData(nd);onSave();
  };
  return(
    <div>
      {/* VÉHICULE EN PREMIER */}

        <VehicleSearch data={data} onSelect={selectVehicle} onClear={()=>{set("vehicleId","");setNewVehicle(true);}} initialValue={editItem&&form.plate?`${form.plate} — ${form.brand} ${form.model}`:""}/>
        <label style={{display:"flex",alignItems:"center",gap:6,marginTop:6,color:"#777",fontSize:12,cursor:"pointer"}}><input type="checkbox" checked={newVehicle||!form.vehicleId} onChange={e=>{setNewVehicle(e.target.checked);if(e.target.checked)set("vehicleId","");}}/> Nouveau véhicule</label>
      </Field>
      {(newVehicle||!form.vehicleId)&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:12}}>
          <input style={inp} placeholder="Plaque" value={form.plate} onChange={e=>set("plate",e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,""))}/>
          <input style={inp} placeholder="Marque" value={form.brand} onChange={e=>set("brand",e.target.value)}/>
          <input style={inp} placeholder="Modèle" value={form.model} onChange={e=>set("model",e.target.value)}/>
        </div>
      )}
      {/* CLIENT ENSUITE — auto-rempli si propriétaire connu */}
      <Field label="Client (propriétaire)" required>
        {form.clientId&&!newClient
          ?<div style={{background:"#0a1a14",border:"1px solid #00d4aa33",borderRadius:10,padding:"9px 11px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{color:"#00d4aa",fontSize:13}}>👤 {form.clientFirst} {form.clientLast}</span>
            <button onClick={()=>{set("clientId","");setNewClient(true);}} style={{background:"none",border:"none",color:"#aaa",cursor:"pointer",fontSize:18,padding:0}}>×</button>
          </div>
          :<ClientSearch data={data} value={""} onSelect={selectClient} onClear={()=>{set("clientId","");setNewClient(true);}}/>
        }
        <label style={{display:"flex",alignItems:"center",gap:6,marginTop:6,color:"#777",fontSize:12,cursor:"pointer"}}><input type="checkbox" checked={newClient||!form.clientId} onChange={e=>{setNewClient(e.target.checked);if(e.target.checked)set("clientId","");}}/> Nouveau client</label>
      </Field>
      {(newClient||!form.clientId)&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:12}}>
          <input style={inp} placeholder="Prénom" value={form.clientFirst} onChange={e=>set("clientFirst",e.target.value)}/>
          <input style={inp} placeholder="Nom" value={form.clientLast} onChange={e=>set("clientLast",e.target.value)}/>
          <input style={{...inp,gridColumn:"1/-1"}} placeholder="Téléphone" value={form.clientPhone} onChange={e=>set("clientPhone",e.target.value)}/>
        </div>
      )}
      <Field label="Prestations prévues">
        <ServicesPicker services={services} value={form.services} onChange={v=>set("services",v)} customService={form.customService} onCustomChange={v=>set("customService",v)}/>
      </Field>
      <Field label="Technicien(s) assigné(s)">
        <TechnicianPicker technicians={techs} value={form.technicians} onChange={v=>set("technicians",v)}/>
      </Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Field label="Date" required><input type="date" style={inp} value={form.date} onChange={e=>set("date",e.target.value)}/></Field>
        <Field label="Statut">
          <select style={{...inp,color:STATUS_COLORS[form.status]||"#fff"}} value={form.status} onChange={e=>set("status",e.target.value)}>
            {["en attente","confirmé","annulé","terminé"].map(s=><option key={s} style={{color:STATUS_COLORS[s]}}>{s}</option>)}
          </select>

        <Field label="Heure début"><input type="time" style={inp} value={form.timeStart} onChange={e=>set("timeStart",e.target.value)}/></Field>
        <Field label="Heure fin"><input type="time" style={inp} value={form.timeEnd} onChange={e=>set("timeEnd",e.target.value)}/></Field>
        <Field label="Taille véhicule"><select style={inp} value={form.vehicleSize} onChange={e=>set("vehicleSize",e.target.value)}>{["citadine","berline","SUV","monospace","utilitaire","moto","autre"].map(s=><option key={s}>{s}</option>)}</select></Field>
        <Field label="Lieu de travail"><select style={inp} value={form.indoorOutdoor} onChange={e=>set("indoorOutdoor",e.target.value)}><option value="extérieur">🌤 Extérieur</option><option value="intérieur">🏠 Garage</option><option value="domicile client">🏡 Domicile client</option></select></Field>
        <Field label="Prix estimé"><input type="number" style={inp} placeholder="0.00" value={form.estimatedPrice} onChange={e=>set("estimatedPrice",e.target.value)}/></Field>
        <Field label="Acompte"><input type="number" style={inp} placeholder="0.00" value={form.deposit} onChange={e=>set("deposit",e.target.value)}/></Field>

        <Field label="Priorité"><select style={inp} value={form.priority} onChange={e=>set("priority",e.target.value)}>{["basse","normale","haute","urgente"].map(p=><option key={p}>{p}</option>)}</select></Field>

        />
      )}
      {dur>0&&<div style={{background:"#0a1a14",border:"1px solid #00d4aa33",borderRadius:10,padding:"7px 11px",marginBottom:12,color:"#00d4aa",fontSize:13}}>⏱ Durée estimée : <strong>{fmtT(dur)}</strong></div>}
      <Field label="Lieu / Adresse">

      </Field>

      <Field label="Rappel client"><label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}><input type="checkbox" checked={form.reminderSent} onChange={e=>set("reminderSent",e.target.checked)}/><span style={{color:"#777",fontSize:12}}>Rappel envoyé</span></label></Field>
      <button onClick={handleSave} style={{...btn("linear-gradient(135deg,#7c3aed,#5b21b6)","#fff"),width:"100%",padding:"13px",fontSize:15,marginTop:4}}>
        📅 {editItem?"Modifier":"Enregistrer"} le rendez-vous
      </button>
    </div>
  );
}

        {isActive&&appt.status!=="confirmé"&&<button onClick={onConfirm} style={{...btn("#0a1a14","#00d4aa"),flex:1,border:"1px solid #00d4aa55"}}>✅ Confirmé</button>}

}

function AppointmentsPage({data,setData,currency}){
  const[showForm,setShowForm]=useState(false);
  const[editItem,setEditItem]=useState(null);
  const[filter,setFilter]=useState("tous");
  const[revPrefill,setRevPrefill]=useState(null);
  const[selAppt,setSelAppt]=useState(null);
  const now=new Date();
  const appointments=data.appointments||[];
  const filtered=appointments.filter(a=>{
    if(filter==="aujourd'hui")return new Date(a.date).toDateString()===now.toDateString();
    if(filter==="à venir")return new Date(a.date)>=new Date(now.toDateString());
    if(filter==="confirmé")return a.status==="confirmé";
    if(filter==="en attente")return a.status==="en attente";
    if(filter==="terminé")return a.status==="terminé";
    return true;
  }).sort((a,b)=>new Date(a.date)-new Date(b.date)||(a.timeStart||"").localeCompare(b.timeStart||""));

  const deleteAppt=(id)=>{
    if(!window.confirm("Supprimer définitivement ce rendez-vous ?"))return;
    if(!window.confirm("Êtes-vous sûr ? Cette action est irréversible."))return;
    const nd={...data,appointments:(data.appointments||[]).filter(a=>a.id!==id)};
    setData(nd);save(nd);
  };

  const handleAnnuler=(a)=>{
    if(!window.confirm("Annuler ce rendez-vous ?"))return;
    const raison=window.prompt("Raison de l'annulation (optionnel) :","");
    if(raison===null)return; // user pressed Cancel on prompt
    const nd={...data};
    // Mark appointment as annulé with raison
    nd.appointments=(nd.appointments||[]).map(x=>x.id===a.id?{...x,status:"annulé",cancellationReason:raison,cancellationDate:new Date().toISOString().split("T")[0]}:x);
    // Add a note on the client
    if(a.clientId){
      const clientNote={id:gid(),date:new Date().toISOString().split("T")[0],text:`RDV annulé du ${fmtD(a.date)}${raison?` — ${raison}`:""}`,type:"cancellation"};
      nd.clients=nd.clients.map(c=>c.id===a.clientId?{...c,clientNotes:[...(c.clientNotes||[]),clientNote]}:c);
    }
    setData(nd);save(nd);
  };

  const markStatus=(id,status)=>{const nd={...data,appointments:appointments.map(a=>a.id===id?{...a,status}:a)};setData(nd);save(nd);};

  const handleTermine=(a)=>{
    if(!window.confirm(`Marquer ce RDV comme terminé et créer la fiche lavage ?`))return;
    // Build prefill for RevenueForm, then open it
    const prefill={
      date:a.date,timeStart:a.timeStart||"",timeEnd:a.timeEnd||"",
      clientId:a.clientId,clientFirst:a.clientFirst||"",clientLast:a.clientLast||"",clientPhone:a.clientPhone||"",
      vehicleId:a.vehicleId,plate:a.plate||"",brand:a.brand||"",model:a.model||"",vehicleSize:a.vehicleSize||"berline",
      technicians:a.technicians||[],prestations:a.services||[],customPrestation:a.customService||"",
      amount:a.estimatedPrice?String(a.estimatedPrice):"",isGift:false,
      paymentMethod:a.paymentMethod||"espèce",paidToTechs:[],
      deposit:a.deposit||"",depositTechs:a.depositTechs||[],depositTechAmounts:a.depositTechAmounts||{},depositSplitMode:a.depositSplitMode||"equitable",
      locationStreetNum:a.locationStreetNum||"",locationStreetName:a.locationStreetName||"",
      locationZip:a.locationZip||"",locationCity:a.locationCity||"",location:a.location||"",

    if(apptId){

      try{
        const raw=localStorage.getItem(SK);

          const fresh=JSON.parse(raw);
          fresh.appointments=(fresh.appointments||[]).filter(x=>x.id!==apptId);

        }

        :filtered.map(a=>{

                )}

                <button onClick={()=>deleteAppt(a.id)} style={{background:"#1a0a0a",border:"1px solid #ff475733",color:"#ff4757",borderRadius:9,padding:"7px 11px",cursor:"pointer",fontSize:13}}>🗑</button>

      )}
      {selAppt&&(

          onConfirm={()=>{markStatus(selAppt.id,"confirmé");setSelAppt(null);}}
          onTermine={()=>{handleTermine(selAppt);setSelAppt(null);}}
          onAnnuler={()=>{handleAnnuler(selAppt);setSelAppt(null);}}/>
      )}
    </div>
  );
}

(tx.date)}</span></div>${tx.paymentMethod?`<div class="row-item"><span>Mode paiement</span><span>${tx.paymentMethod}</span></div>`:""}<div class="total">${parseFloat(tx.amount).toFixed(2)} ${cur}</div></div><div style="text-align:center;margin-top:24px;font-size:11px;color:#aaa;">Généré le ${new Date().toLocaleDateString("fr-FR")}</div><br/><button onclick="window.print()" style="background:#7c3aed;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer;display:block;margin:0 auto;">🖨️ Imprimer</button></body></html>`);

              {tx.txType==="expense"&&(tx.receiptPhoto?<img src={tx.receiptPhoto} style={{width:52,height:52,objectFit:"cover",borderRadius:7,flexShrink:0,border:"1px solid #ff475733"}}/>:<div style={{width:52,height:52,background:"#1a0a0a",borderRadius:7,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0,border:"1px solid #ff475722",gap:1}}>🛒<span style={{fontSize:8,color:"#ff4757",fontWeight:700}}>{tx.items?tx.items.length:1} art.</span></div>)}
              {isCancelled&&<div style={{width:52,height:40,background:"#1a0a0a",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>❌</div>}

                {tx.txType==="expense"&&tx.items&&tx.items.length>0&&(
                  <div style={{marginTop:2}}>
                    {tx.items.map((it,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"baseline",gap:4,color:"#ccc",fontSize:11,lineHeight:1.55,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                        {parseFloat(it.qty||1)>1&&<span style={{color:"#888",fontSize:10,flexShrink:0}}>{it.qty}×</span>}
                        <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{it.description}</span>
                      </div>

                )}
                {clientName&&!isCancelled&&tx.txType==="revenue"&&<div style={{color:"#ccc",fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>👤 {clientName}</div>}

                <div style={{color:"#999",fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{isCancelled?`Annulé le ${fmtD(tx.date)}`:infoParts.join(" · ")}</div>
              </div>
              <div style={{color:accentColor,fontWeight:700,fontSize:14,flexShrink:0}}>{isCancelled?"❌":tx.txType==="revenue"?"+":"-"}{isCancelled?"":tx.isGift?"🎁":fmt(tx.amount,currency)}</div>
            </div>
          );
        })
      }
      {sel&&<TxDetail tx={sel} data={data} setData={setData} currency={currency} onClose={()=>setSel(null)}/>}
      {selTransfer&&<TransferDetail tx={selTransfer} data={data} setData={setData} currency={currency} onClose={()=>setSelTransfer(null)}/>}

}

function TransferForm({data,setData,onSave,editItem}){
  const today=new Date().toISOString().split("T")[0];
  const techs=(data.settings&&data.settings.technicians)||[];
  const cur=(data.settings&&data.settings.currency)||"€";
  const[form,setForm]=useState(editItem?{...editItem}:{
    date:today,from:"",to:"",amount:"",note:"",paymentMethod:"espèce"
  });
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const handleSave=()=>{
    if(!form.from||!form.to)return alert("Sélectionnez l'émetteur et le destinataire");
    if(form.from===form.to)return alert("L'émetteur et le destinataire doivent être différents");

    const transfer={...form,id:(editItem&&editItem.id)?form.id:gid(),amount:parseFloat(form.amount),type:"transfer"};

          </select>
        </Field>
        <div style={{paddingBottom:12,fontSize:20,color:"#aaa",textAlign:"center"}}>→</div>
        <Field label="À (destinataire)">
          <select style={{...inp,borderColor:(form.to?"#00d4aa":"#252525")}} value={form.to} onChange={e=>set("to",e.target.value)}>
            <option value="">Choisir…</option>
            {techs.filter(t=>t!==form.from).map(t=><option key={t} value={t}>{t}</option>)}

      </Field>

        <div style={{background:"linear-gradient(135deg,#0a0f1a,#111)",border:"1px solid #7c3aed44",borderRadius:12,padding:"12px 14px",marginBottom:12,textAlign:"center"}}>
          <div style={{fontSize:12,color:"#a78bfa",marginBottom:4}}>RÉCAPITULATIF</div>
          <div style={{fontSize:16,color:"#fff",fontWeight:700}}>

// ===================== TECHNICIAN TRACKER PAGE =====================
function TechnicianTrackerPage({data,setData,currency}){
  const s=data.settings||{};
  const techs=s.technicians||[];
  const[newTech,setNewTech]=useState("");
  const[showTransferForm,setShowTransferForm]=useState(false);
  const[editTransfer,setEditTransfer]=useState(null);
  const[subView,setSubView]=useState("soldes"); // "soldes" only
  const upd=(k,v)=>{const nd={...data,settings:{...s,[k]:v}};setData(nd);save(nd);};
  const addTech=()=>{const t=newTech.trim();if(!t||techs.includes(t))return;upd("technicians",[...techs,t]);setNewTech("");};
  const removeTech=t=>{if(!window.confirm(`Supprimer ${t} ?`))return;upd("technicians",techs.filter(x=>x!==t));};
  const deleteTransfer=id=>{if(!window.confirm("Supprimer ce transfert ?"))return;setData({...data,transfers:(data.transfers||[]).filter(t=>t.id!==id)});};
  const cur=(data.settings&&data.settings.currency)||currency||"€";
  const transfers=(data.transfers||[]).sort((a,b)=>new Date(b.date)-new Date(a.date));

  // Compute balances from revenues, expenses, AND transfers
  const balances={};
  techs.forEach(a=>{balances[a]={};techs.forEach(b=>{if(a!==b)balances[a][b]=0;});});

  const addDebt=(debtor,creditor,amount)=>{
    if(debtor===creditor||amount<=0)return;
    if(balances[debtor]&&balances[debtor][creditor]!==undefined)balances[debtor][creditor]-=amount;
    if(balances[creditor]&&balances[creditor][debtor]!==undefined)balances[creditor][debtor]+=amount;
  };

  // REVENUES: each receiver holds cash that belongs (partly) to workers
  data.revenues.forEach(rev=>{
    if(!rev.technicians||rev.technicians.length===0)return;
    const receivers=rev.paidToTechs||(rev.paidToTech?[rev.paidToTech]:[]);
    if(receivers.length===0)return;
    const workers=rev.technicians;
    const techAmts=rev.techAmounts||{};
    const nR=receivers.length;
    workers.forEach(w=>{
      if(receivers.includes(w))return;
      const earned=techAmts[w]!==undefined?parseFloat(techAmts[w]):rev.amount/workers.length;
      receivers.forEach(r=>{addDebt(r,w,earned/nR);});
    });
  });
  // EXPENSES: payer advanced cash for everyone
  data.expenses.forEach(exp=>{
    const payers=exp.paidByTechs||(exp.paidByTech?[exp.paidByTech]:[]);
    if(payers.length===0||techs.length<2)return;
    const nP=payers.length;
    const sharePerTech=exp.amount/techs.length;
    techs.forEach(t=>{
      if(payers.includes(t))return;
      payers.forEach(p=>{addDebt(t,p,sharePerTech/nP);});
    });
  });

  // Transfers reduce debts
  transfers.forEach(tr=>{
    if(!balances[tr.from]||!balances[tr.to])return;
    addDebt(tr.to,tr.from,tr.amount); // from paid to → reduces from's debt to to
  });

  // Simplify: for each pair, net balance
  const debts=[];
  const seen=new Set();
  techs.forEach(a=>{
    techs.forEach(b=>{
      if(a===b)return;
      const key=[a,b].sort().join("||");
      if(seen.has(key))return;
      seen.add(key);
      const net=(balances[a]?balances[a][b]||0:0)-(balances[b]?balances[b][a]||0:0);
      if(Math.abs(net)>0.005){
        const debtor=net<0?a:b;
        const creditor=net<0?b:a;
        debts.push({debtor,creditor,amount:Math.abs(net)});
      }
    });
  });

  // Revenue stats per tech
  const techStats=techs.map(t=>{
    const revs=data.revenues.filter(r=>r.technicians&&r.technicians.includes(t));
    const total=revs.reduce((s,r)=>{
      const amts=r.techAmounts||{};
      return s+(amts[t]!==undefined?parseFloat(amts[t]):r.amount/Math.max(r.technicians.length,1));
    },0);
    const received=data.revenues.filter(r=>(r.paidToTechs||(r.paidToTech?[r.paidToTech]:[])).includes(t)).reduce((s,r)=>{
      const amts=r.techAmounts||{};
      return s+(amts[t]!==undefined?parseFloat(amts[t]):r.amount/Math.max((r.paidToTechs||[r.paidToTech]).filter(Boolean).length,1));
    },0);
    const expPaid=data.expenses.filter(e=>(e.paidByTechs||(e.paidByTech?[e.paidByTech]:[])).includes(t)).reduce((s,e)=>{
      const amts=e.techAmounts||{};
      return s+(amts[t]!==undefined?parseFloat(amts[t]):e.amount/Math.max((e.paidByTechs||[e.paidByTech]).filter(Boolean).length,1));
    },0);
    const sent=transfers.filter(tr=>tr.from===t).reduce((s,tr)=>s+tr.amount,0);
    const recv=transfers.filter(tr=>tr.to===t).reduce((s,tr)=>s+tr.amount,0);
    return{name:t,revs:revs.length,share:total,received,expPaid,sent,recv};
  });

  if(showTransferForm||editTransfer){
    return(
      <Modal title={editTransfer?"Modifier le transfert ↔️":"Nouveau transfert 💸"} onClose={()=>{setShowTransferForm(false);setEditTransfer(null);}}>
        <TransferForm data={data} setData={setData} editItem={editTransfer} onSave={()=>{setShowTransferForm(false);setEditTransfer(null);}}/>
      </Modal>
    );
  }

  return(
    <div style={{paddingBottom:90}}>
      {/* Technician management */}
      <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:14,marginBottom:12}}>
        <div style={{fontSize:12,color:"#aaa",fontWeight:600,marginBottom:10}}>👤 ÉQUIPE</div>
        {techs.length===0&&<div style={{color:"#888",fontSize:12,marginBottom:10,fontStyle:"italic"}}>Aucun technicien configuré.</div>}
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
          {techs.map(t=>(
            <div key={t} style={{display:"flex",alignItems:"center",gap:4,background:"#1a1a1a",border:"1px solid #252525",borderRadius:20,padding:"4px 10px"}}>
              <span style={{color:"#fff",fontSize:12}}>👤 {t}</span>
              <button onClick={()=>removeTech(t)} style={{background:"none",border:"none",color:"#ff4757",cursor:"pointer",fontSize:16,padding:0,lineHeight:1}}>×</button>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:6}}>
          <input style={{...inp,flex:1}} placeholder="Nom du technicien..." value={newTech} onChange={e=>setNewTech(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTech()}/>
          <button onClick={addTech} style={{...btn("linear-gradient(135deg,#00d4aa,#00a882)","#000"),padding:"9px 14px",flexShrink:0}}>+ Ajouter</button>
        </div>
      </div>

      

      {subView==="soldes"&&(
        <>
          {/* Stats per tech */}          {techStats.length>0&&(
            <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:14,marginBottom:12}}>
              <div style={{fontSize:12,color:"#aaa",fontWeight:600,marginBottom:10}}>📊 PERFORMANCES</div>
              {techStats.map(t=>(
                <div key={t.name} style={{background:"#1a1a1a",borderRadius:12,padding:"11px 13px",marginBottom:8}}>
                  <div style={{fontWeight:700,color:"#fff",marginBottom:8,fontSize:14}}>👤 {t.name}</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                    <div style={{background:"#111",borderRadius:8,padding:"7px 10px"}}><div style={{fontSize:9,color:"#999"}}>LAVAGES</div><div style={{color:"#fff",fontWeight:600}}>{t.revs}</div></div>
                    <div style={{background:"#111",borderRadius:8,padding:"7px 10px"}}><div style={{fontSize:9,color:"#999"}}>PART REVENUS</div><div style={{color:"#00d4aa",fontWeight:600}}>{fmt(t.share,cur)}</div></div>
                    <div style={{background:"#111",borderRadius:8,padding:"7px 10px"}}><div style={{fontSize:9,color:"#999"}}>ENCAISSÉ</div><div style={{color:"#7c3aed",fontWeight:600}}>{fmt(t.received,cur)}</div></div>
                    <div style={{background:"#111",borderRadius:8,padding:"7px 10px"}}><div style={{fontSize:9,color:"#999"}}>DÉPENSES</div><div style={{color:"#ff4757",fontWeight:600}}>{fmt(t.expPaid,cur)}</div></div>
                    {(t.sent>0||t.recv>0)&&<>
                      <div style={{background:"#111",borderRadius:8,padding:"7px 10px"}}><div style={{fontSize:9,color:"#999"}}>TRANSFERTS ENVOYÉS</div><div style={{color:"#a78bfa",fontWeight:600}}>{fmt(t.sent,cur)}</div></div>
                      <div style={{background:"#111",borderRadius:8,padding:"7px 10px"}}><div style={{fontSize:9,color:"#999"}}>TRANSFERTS REÇUS</div><div style={{color:"#a78bfa",fontWeight:600}}>{fmt(t.recv,cur)}</div></div>
                    </>}
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Debts */}
          <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:14,marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontSize:12,color:"#aaa",fontWeight:600}}>💸 SOLDES & DETTES</div>
              <button onClick={()=>setShowTransferForm(true)} style={{...btn("linear-gradient(135deg,#7c3aed,#5b21b6)","#fff"),fontSize:11,padding:"5px 12px"}}>+ Nouveau transfert</button>
            </div>
            {debts.length===0
              ?<div style={{color:"#888",fontSize:13,textAlign:"center",padding:"20px 0"}}>✅ Aucune dette — tout est équilibré !</div>
              :debts.map((d,i)=>(
                <div key={i} style={{background:"#1a0a0a",border:"1px solid #ff475733",borderRadius:10,padding:"11px 13px",marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <span style={{color:"#ff6b35",fontWeight:700}}>👤 {d.debtor}</span>
                      <span style={{color:"#999",fontSize:12}}> doit à </span>
                      <span style={{color:"#00d4aa",fontWeight:700}}>👤 {d.creditor}</span>
                    </div>
                    <div style={{color:"#ff4757",fontWeight:700,fontSize:16}}>{fmt(d.amount,cur)}</div>
                  </div>
                  <button onClick={()=>setEditTransfer({id:null,from:d.debtor,to:d.creditor,amount:d.amount.toFixed(2),date:new Date().toISOString().split("T")[0],note:`Remboursement dette`,paymentMethod:"espèce"})}
                    style={{background:"#7c3aed22",border:"1px solid #7c3aed44",color:"#a78bfa",borderRadius:8,padding:"5px 12px",cursor:"pointer",fontSize:11,fontWeight:600,marginTop:8,width:"100%"}}>
                    💸 Enregistrer le remboursement
                  </button>
                </div>
              ))
            }
          </div>
        </>
      )}

    </div>
  );
}

function SettingsToggle({val,onChange,label,sub}){
  return(
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid #161616"}}>
      <div style={{flex:1,minWidth:0,paddingRight:12}}>
        <div style={{color:"#ddd",fontSize:13}}>{label}</div>
        {sub&&<div style={{color:"#555",fontSize:10,marginTop:1}}>{sub}</div>}
      </div>
      <button onClick={()=>onChange(!val)} style={{width:46,height:26,borderRadius:13,background:val?"#00d4aa22":"#1a1a1a",border:`2px solid ${val?"#00d4aa":"#333"}`,cursor:"pointer",position:"relative",flexShrink:0,transition:"all 0.2s"}}>
        <div style={{width:18,height:18,borderRadius:"50%",background:val?"#00d4aa":"#555",position:"absolute",top:2,left:val?24:2,transition:"all 0.2s",boxShadow:val?"0 0 6px #00d4aa66":""}}/>
      </button>
    </div>
  );
}
function SettingsSec({isOpen,onToggle,icon,title,danger,children}){
  return(
    <div style={{background:danger?"#130a0a":"#111",border:`1px solid ${danger?"#ff475733":"#1e1e1e"}`,borderRadius:14,marginBottom:10,overflow:"hidden"}}>
      <button onClick={onToggle} style={{width:"100%",background:"none",border:"none",padding:"13px 14px",display:"flex",alignItems:"center",gap:10,cursor:"pointer",textAlign:"left"}}>
        <span style={{fontSize:18,flexShrink:0}}>{icon}</span>
        <span style={{color:danger?"#ff6b6b":"#ccc",fontWeight:700,fontSize:13,flex:1}}>{title}</span>
        <span style={{color:"#333",fontSize:16,display:"block",transform:isOpen?"rotate(90deg)":"none",transition:"transform 0.2s"}}>›</span>
      </button>
      {isOpen&&<div style={{padding:"2px 14px 14px"}}>{children}</div>}
    </div>
  );
}
function SettingsTechniciens({techs,onAdd,onRemove}){
  const[nt,setNt]=useState("");
  const addTech=()=>{const t=nt.trim();if(!t||techs.includes(t))return;onAdd(t);setNt("");};
  return(
    <>
      {techs.length===0&&<div style={{color:"#333",fontSize:12,textAlign:"center",padding:"10px 0 8px"}}>Aucun technicien — ajoutez-en un ci-dessous</div>}
      <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
        {techs.map(t=>(
          <div key={t} style={{display:"flex",alignItems:"center",gap:5,background:"#0a1a14",border:"1px solid #00d4aa33",borderRadius:20,padding:"5px 12px"}}>
            <span style={{color:"#00d4aa",fontSize:12,fontWeight:600}}>👤 {t}</span>
            <button onClick={()=>{if(window.confirm(`Supprimer ${t} de l'équipe ?`))onRemove(t);}} style={{background:"none",border:"none",color:"#ff475788",cursor:"pointer",fontSize:14,padding:0,lineHeight:1}}>×</button>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:6}}>
        <input style={{...inp,flex:1}} placeholder="Nom du technicien..." value={nt} onChange={e=>setNt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTech()}/>
        <button onClick={addTech} style={{...btn("linear-gradient(135deg,#00d4aa,#0099cc)","#000"),padding:"9px 14px",flexShrink:0,fontSize:13}}>+</button>
      </div>
    </>
  );
}

function SettingsPage({data,setData,ghCfg,onGhCfgSave}){
  const s=data.settings||{};

  // updImmediate : pour les cases, selects, toggles → sauvegarde directe
  const updImmediate=(k,v)=>{const nd={...data,settings:{...s,[k]:v}};setData(nd);save(nd);};

  // Pour les champs texte : état local + sauvegarde onBlur seulement (évite sync GitHub à chaque frappe)
  const[localSettings,setLocalSettings]=useState({
    companyName:s.companyName||"",phone:s.phone||"",email:s.email||"",siret:s.siret||"",
    website:s.website||"",tvaRate:s.tvaRate||"",invoiceFooter:s.invoiceFooter||"",
    defaultLocation:s.defaultLocation||"",invoicePrefix:s.invoicePrefix||"FAC",
  });
  // Sync local state when settings change externally (e.g. import)
  useEffect(()=>{
    setLocalSettings({
      companyName:s.companyName||"",phone:s.phone||"",email:s.email||"",siret:s.siret||"",
      website:s.website||"",tvaRate:s.tvaRate||"",invoiceFooter:s.invoiceFooter||"",
      defaultLocation:s.defaultLocation||"",invoicePrefix:s.invoicePrefix||"FAC",
    });
  },[data.settings]);

  const setLocal=(k,v)=>setLocalSettings(ls=>({...ls,[k]:v}));
  // Flush local text fields to data+save on blur
  const flushLocal=()=>{
    const merged={...s,...localSettings};
    const nd={...data,settings:merged};
    setData(nd);save(nd);
  };

  const handleLogo=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>updImmediate("companyLogo",ev.target.result);r.readAsDataURL(f);};
  const exportAll=()=>{const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:"application/json"}));a.download=`backup_${new Date().toLocaleDateString("fr-FR").replace(/\//g,"-")}.json`;a.click();};
  const importAll=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);setData(d);alert("✅ Données importées !");}catch{alert("❌ Fichier invalide");}};r.readAsText(f);};
  const reset=()=>{if(window.confirm("⚠️ Supprimer TOUTES les données (local + GitHub) ?")){clearLocalData();setData(DEF);save(DEF);}};
  const clearLocalCache=()=>{if(window.confirm("🧹 Effacer le cache local ?\nLes données GitHub seront rechargées au prochain démarrage.")){clearLocalData();window.location.reload();}};

  const services=s.services||[...DEF_SERVICES];
  const[newSvc,setNewSvc]=useState("");
  const addSvc=()=>{const sv=newSvc.trim();if(!sv||services.includes(sv))return;updImmediate("services",[...services,sv]);setNewSvc("");};
  const removeSvc=sv=>updImmediate("services",services.filter(x=>x!==sv));

  const[open,setOpen]=useState({identity:true,display:false,defaults:false,services:false,techs:false,stats:false,backup:false,github:false,danger:false});
  const tog=k=>setOpen(o=>({...o,[k]:!o[k]}));

  const ACCENT_PRESETS=["#00d4aa","#00aaff","#7c3aed","#ff6b35","#f59e0b","#10b981","#ec4899","#ef4444","#06b6d4"];
  const accentColor=s.accentColor||"#00d4aa";

  const diffNames=s.difficultyNames||["Très facile","Facile","Moyen","Difficile","Très difficile"];
  const setDiffName=(i,v)=>{const d=[...diffNames];d[i]=v;updImmediate("difficultyNames",d);};

  const totalRev=data.revenues.reduce((a,r)=>a+r.amount,0);
  const totalExp=data.expenses.reduce((a,e)=>a+e.amount,0);

  const techs=s.technicians||[];
  const addTech=t=>updImmediate("technicians",[...techs,t]);
  const remTech=t=>updImmediate("technicians",techs.filter(x=>x!==t));

  const TI=({label,field,placeholder,type})=>(
    <Field label={label}>
      <input type={type||"text"} style={inp} value={localSettings[field]} placeholder={placeholder}
        onChange={e=>setLocal(field,e.target.value)} onBlur={flushLocal}/>
    </Field>
  );

  return(
    <div style={{paddingBottom:80}}>

      {/* IDENTITÉ */}
      <SettingsSec isOpen={open.identity} onToggle={()=>tog("identity")} icon="🏢" title="Identité de l'entreprise">
        <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:14}}>
          {s.companyLogo
            ?<img src={s.companyLogo} style={{width:68,height:68,objectFit:"cover",borderRadius:14,border:"1px solid #252525",flexShrink:0}}/>
            :<div style={{width:68,height:68,background:"#1a1a1a",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,border:"2px dashed #252525",flexShrink:0}}>🏢</div>}
          <div style={{display:"flex",flexDirection:"column",gap:5,flex:1}}>
            <label style={{background:"#1e1e1e",border:"1px solid #252525",color:"#ccc",padding:"7px 12px",borderRadius:8,cursor:"pointer",fontSize:12,textAlign:"center"}}>📷 Caméra<input type="file" accept="image/*" capture="environment" onChange={handleLogo} style={{display:"none"}}/></label>
            <label style={{background:"#1e1e1e",border:"1px solid #252525",color:"#ccc",padding:"7px 12px",borderRadius:8,cursor:"pointer",fontSize:12,textAlign:"center"}}>🖼 Galerie<input type="file" accept="image/*" onChange={handleLogo} style={{display:"none"}}/></label>
            {s.companyLogo&&<button onClick={()=>updImmediate("companyLogo",null)} style={{background:"transparent",border:"1px solid #ff475744",color:"#ff4757",padding:"5px 10px",borderRadius:8,cursor:"pointer",fontSize:11}}>✕ Supprimer</button>}

        <TI label="TVA (%)" field="tvaRate" placeholder="20 — vide si non applicable" type="number"/>
        <Field label="Mention pied de facture">
          <textarea style={{...inp,minHeight:50,resize:"vertical"}} value={localSettings.invoiceFooter} placeholder="Ex : TVA non applicable, Art. 293B CGI"
            onChange={e=>setLocal("invoiceFooter",e.target.value)} onBlur={flushLocal}/>

      </SettingsSec>

      {/* AFFICHAGE */}

            <option value="CHF">CHF Franc suisse</option>
            <option value="MAD">MAD Dirham marocain</option>

            <option value="TND">TND Dinar tunisien</option>

        <div style={{fontSize:10,color:"#555",fontWeight:700,letterSpacing:0.8,marginBottom:4}}>OPTIONS D'AFFICHAGE</div>

              <span style={{color:"#ccc",fontSize:11}}>{sv}</span>
              <button onClick={()=>removeSvc(sv)} style={{background:"none",border:"none",color:"#ff4757",cursor:"pointer",fontSize:14,padding:0,lineHeight:1}}>×</button>

        <button onClick={()=>{if(window.confirm("Remettre les prestations par défaut ?"))updImmediate("services",[...DEF_SERVICES]);}} style={{background:"transparent",border:"1px solid #252525",color:"#555",borderRadius:8,padding:"7px 12px",cursor:"pointer",fontSize:11,marginTop:8,width:"100%"}}>↺ Remettre les prestations par défaut</button>

          ))}

        <div style={{background:"#0a1a14",border:"1px solid #00d4aa22",borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",marginBottom:6}}>
