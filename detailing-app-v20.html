          <span style={{color:"#00d4aa",fontWeight:800,fontSize:16,fontFamily:"'Syne',sans-serif"}}>{fmt(totalRev,s.currency||"€")}</span>
        </div>
        <div style={{background:"#1a0a0a",border:"1px solid #ff475522",borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between"}}>
          <span style={{color:"#888",fontSize:12}}>Total dépenses</span>
          <span style={{color:"#ff4757",fontWeight:800,fontSize:16,fontFamily:"'Syne',sans-serif"}}>{fmt(totalExp,s.currency||"€")}</span>
        </div>
      </SettingsSec>

      {/* SAUVEGARDE */}
      <SettingsSec isOpen={open.backup} onToggle={()=>tog("backup")} icon="💾" title="Sauvegarde & données">
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <button onClick={exportAll} style={{background:"#0a1a14",border:"1px solid #00d4aa33",color:"#00d4aa",padding:"12px",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>📥 Exporter toutes les données (JSON)</button>
          <label style={{background:"#0a0a1a",border:"1px solid #7c3aed33",color:"#a78bfa",padding:"12px",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:600,textAlign:"center",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>📤 Importer une sauvegarde<input type="file" accept=".json" onChange={importAll} style={{display:"none"}}/></label>
        </div>
        <div style={{marginTop:10,background:"#1a1a1a",borderRadius:9,padding:"9px 12px",fontSize:11,color:"#555",lineHeight:1.5}}>
          💡 L'export contient toutes vos données : clients, véhicules, revenus, dépenses, RDV et réglages. Idéal pour migrer vers un autre appareil ou sauvegarder.
        </div>
      </SettingsSec>

      {/* GITHUB */}
      <SettingsSec isOpen={open.github} onToggle={()=>tog("github")} icon="🔗" title="Synchronisation GitHub">
        <GitHubSettings ghCfg={ghCfg||{}} onSave={onGhCfgSave||(() => {})}/>
        {ghCfg&&ghCfg.token&&(
          <div style={{marginTop:12}}>
            <div style={{fontSize:11,color:"#555",marginBottom:8,lineHeight:1.5}}>GitHub configuré. Si ce navigateur affiche de vieilles données, efface le cache local pour forcer le rechargement.</div>
            <button onClick={clearLocalCache} style={{background:"#7c3aed15",border:"1px solid #7c3aed44",color:"#a78bfa",padding:"11px",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:600,width:"100%"}}>🧹 Effacer cache local et recharger depuis GitHub</button>
          </div>
        )}
      </SettingsSec>

      {/* ZONE DANGEREUSE */}
      <SettingsSec isOpen={open.danger} onToggle={()=>tog("danger")} icon="⚠️" title="Zone dangereuse" danger>
        <div style={{fontSize:12,color:"#888",marginBottom:12,lineHeight:1.5}}>Ces actions sont irréversibles. Exportez une sauvegarde avant de continuer.</div>
        <button onClick={reset} style={{background:"#ff475715",border:"1px solid #ff475766",color:"#ff6b6b",padding:"12px",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:700,width:"100%"}}>🗑 Effacer toutes les données</button>
      </SettingsSec>
    </div>
  );
}

// ===================== FAB =====================
function FAB({onRev,onExp,onTransfer}){
  const[open,setOpen]=useState(false);
  return(
    <div style={{position:"fixed",bottom:82,right:16,zIndex:500,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8}}>
      {open&&<>
        {onTransfer&&<button onClick={()=>{setOpen(false);onTransfer();}} style={{background:"#000",border:"2px solid #7c3aed",color:"#a78bfa",borderRadius:10,padding:"9px 14px",cursor:"pointer",fontWeight:700,fontSize:13,boxShadow:"0 4px 20px #7c3aed33",fontFamily:"'Syne',sans-serif"}}>💸 Transfert</button>}
        <button onClick={()=>{setOpen(false);onRev();}} style={{background:"#000",border:"2px solid #00d4aa",color:"#00d4aa",borderRadius:10,padding:"9px 14px",cursor:"pointer",fontWeight:700,fontSize:13,boxShadow:"0 4px 20px #00d4aa33",fontFamily:"'Syne',sans-serif"}}>✅ Revenu</button>
        <button onClick={()=>{setOpen(false);onExp();}} style={{background:"#000",border:"2px solid #ff4757",color:"#ff4757",borderRadius:10,padding:"9px 14px",cursor:"pointer",fontWeight:700,fontSize:13,boxShadow:"0 4px 20px #ff475733",fontFamily:"'Syne',sans-serif"}}>🔴 Dépense</button>
      </>}
      <button onClick={()=>setOpen(o=>!o)} style={{width:54,height:54,borderRadius:"50%",background:open?"#1a1a1a":"linear-gradient(135deg,#00d4aa,#0099cc)",border:open?"2px solid #333":"none",color:"#fff",fontSize:26,cursor:"pointer",boxShadow:"0 6px 25px rgba(0,212,170,0.45)",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",transform:open?"rotate(45deg)":"rotate(0deg)"}}>+</button>
    </div>
  );
}

// ===================== GITHUB SETTINGS SECTION =====================
function GitHubSettings({ghCfg,onSave}){
  const[cfg,setCfg]=useState({token:ghCfg.token||"",owner:ghCfg.owner||"",repo:ghCfg.repo||"",branch:ghCfg.branch||"main",path:ghCfg.path||"data.json"});
  const set=(k,v)=>setCfg(c=>({...c,[k]:v}));
  const[testing,setTesting]=useState(false);
  const[testMsg,setTestMsg]=useState("");

  const testAndSave=async()=>{
    if(!cfg.token||!cfg.owner||!cfg.repo)return alert("Token, Owner et Repo sont requis.");
    setTesting(true);setTestMsg("Test de la connexion…");
    const res=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}`,{headers:ghHeaders(cfg.token)});
    if(res.ok){setTestMsg("✅ Connexion OK ! Paramètres sauvegardés.");saveGHCfg(cfg);onSave(cfg);}
    else{setTestMsg("❌ Échec — vérifiez votre token et votre repo.");}
    setTesting(false);
  };
  const disconnect=()=>{const empty={token:"",owner:"",repo:"",branch:"main",path:"data.json"};saveGHCfg(empty);onSave(empty);setCfg(empty);setTestMsg("");};

  return(
    <div style={{background:"#0a0f1a",border:"1px solid #00d4aa33",borderRadius:14,padding:14,marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:12,color:"#00d4aa",fontWeight:700}}>🔗 SYNCHRONISATION GITHUB</div>
        {ghCfg.token&&<button onClick={disconnect} style={{background:"transparent",border:"1px solid #ff4757",color:"#ff4757",borderRadius:8,padding:"3px 8px",cursor:"pointer",fontSize:10}}>Déconnecter</button>}
      </div>
      {!ghCfg.token&&(
        <div style={{background:"#0a1a14",border:"1px solid #00d4aa22",borderRadius:10,padding:"10px 12px",marginBottom:12,fontSize:11,color:"#aaa",lineHeight:1.6}}>
          <b style={{color:"#00d4aa"}}>Comment connecter GitHub :</b><br/>
          1. Va sur <b style={{color:"#ccc"}}>github.com → Settings → Developer settings → Personal access tokens → Tokens (classic)</b><br/>
          2. Clique <b style={{color:"#ccc"}}>Generate new token (classic)</b><br/>
          3. Coche uniquement la permission <b style={{color:"#ccc"}}>repo</b><br/>
          4. Copie le token généré et colle-le ci-dessous<br/>
          5. Ton associé fait pareil avec <b style={{color:"#ccc"}}>son propre token</b> (même repo)
        </div>
      )}
      <Field label="Personal Access Token (github.com → Settings → Developer settings)">
        <input style={{...inp,fontFamily:"monospace",fontSize:11}} type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" value={cfg.token} onChange={e=>set("token",e.target.value)}/>
      </Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Field label="Votre username GitHub (owner)">
          <input style={inp} placeholder="ex: jean-dupont" value={cfg.owner} onChange={e=>set("owner",e.target.value)}/>
        </Field>
        <Field label="Nom du repository">
          <input style={inp} placeholder="ex: mon-detailing" value={cfg.repo} onChange={e=>set("repo",e.target.value)}/>
        </Field>
        <Field label="Branche">
          <input style={inp} placeholder="main" value={cfg.branch} onChange={e=>set("branch",e.target.value)}/>
        </Field>
        <Field label="Fichier données">
          <input style={inp} placeholder="data.json" value={cfg.path} onChange={e=>set("path",e.target.value)}/>
        </Field>
      </div>
      {testMsg&&<div style={{background:testMsg.startsWith("✅")?"#0a1a14":"#1a0a0a",border:`1px solid ${testMsg.startsWith("✅")?"#00d4aa33":"#ff475733"}`,borderRadius:10,padding:"8px 12px",marginBottom:10,fontSize:12,color:testMsg.startsWith("✅")?"#00d4aa":"#ff4757"}}>{testMsg}</div>}
      <button onClick={testAndSave} disabled={testing} style={{...btn("linear-gradient(135deg,#00d4aa,#0099cc)","#000"),width:"100%",padding:"11px",fontSize:13}}>
        {testing?"⏳ Test en cours…":"🔗 Tester & Sauvegarder la connexion"}
      </button>
    </div>
  );
}

// ===================== APP =====================
function App(){
  const[data,setData]=useState(()=>load());
  const[tab,setTab]=useState(0);
  const[showRev,setShowRev]=useState(false),[showExp,setShowExp]=useState(false),[showTransfer,setShowTransfer]=useState(false);
  const{currency="€",companyName="Mon Détailing",companyLogo=null}=data.settings||{};
  const[subTab,setSubTab]=useState(0);
  const tabs=[["📋","Accueil"],["📊","Stats"],["📁","Annuaire"],["📅","RDV"],["🧪","Produits"],["⚙️","Réglages"]];

  // --- GitHub sync state ---
  const[ghCfg,setGhCfg]=useState(()=>loadGHCfg());
  const[ghSha,setGhSha]=useState(null);
  const[ghStatus,setGhStatus]=useState("idle");
  const[ghMsg,setGhMsg]=useState("");
  const ghConnected=!!(ghCfg.token&&ghCfg.owner&&ghCfg.repo);
  const saveTimerRef=useRef(null);
  const ghShaRef=useRef(null);

  // On mount: load from GitHub if configured — ALWAYS overrides localStorage
  useEffect(()=>{
    if(!ghConnected)return;
    setGhStatus("loading");setGhMsg("Chargement depuis GitHub…");
    ghLoadData(ghCfg).then(res=>{
      if(res.status==="ok"){
        setData(res.data);save(res.data);
        ghShaRef.current=res.sha;setGhSha(res.sha);
        setGhStatus("ok");setGhMsg("✅ Synchronisé depuis GitHub");
      }else if(res.status==="empty"){
        // Repo ok, fichier pas encore créé → on pousse les données locales
        setGhStatus("saving");setGhMsg("Première sync — création du fichier…");
        ghSaveData(ghCfg,data,null).then(r=>{
          if(r.ok){ghShaRef.current=r.sha;setGhSha(r.sha);setGhStatus("ok");setGhMsg("✅ Données initiales envoyées sur GitHub");}
          else{setGhStatus("error");setGhMsg("❌ Impossible de créer data.json: "+( r.error||""));}
        });
      }else if(res.status==="authfail"){
        setGhStatus("error");setGhMsg("❌ Token invalide ou expiré — vérifie dans Réglages");
      }else{
        setGhStatus("error");setGhMsg(`❌ Erreur: ${JSON.stringify(res)}`);
      }
    }).catch((e)=>{
      setGhStatus("error");setGhMsg("❌ Exception: "+(e&&e.message?e.message:String(e)));
    });
  },[ghConnected]);

  // Sync wrapper — replaces setData everywhere in app (passed as prop)
  const setDataAndSync=useCallback((nd)=>{
    setData(nd);save(nd);
    if(!ghConnected)return;
    if(saveTimerRef.current)clearTimeout(saveTimerRef.current);
    setGhStatus("saving");setGhMsg("Sauvegarde sur GitHub…");
    saveTimerRef.current=setTimeout(async()=>{
      const sha=ghShaRef.current;
      const r=await ghSaveData(ghCfg,nd,sha);
      if(r.ok){ghShaRef.current=r.sha;setGhSha(r.sha);setGhStatus("ok");setGhMsg("✅ Sauvegardé sur GitHub");}
      else{setGhStatus("error");setGhMsg(`❌ Erreur: ${r.error||"GitHub"}`);}
    },2000);
  },[ghConnected,ghCfg]);

  // Manual refresh from GitHub
  const ghRefresh=async()=>{
    if(!ghConnected)return;
    setGhStatus("loading");setGhMsg("Rechargement depuis GitHub…");
    const res=await ghLoadData(ghCfg);
    if(res.status==="ok"){setData(res.data);save(res.data);ghShaRef.current=res.sha;setGhSha(res.sha);setGhStatus("ok");setGhMsg("✅ Rechargé depuis GitHub");}
    else if(res.status==="empty"){setGhStatus("ok");setGhMsg("✅ Connecté — aucune donnée sur GitHub encore");}
    else if(res.status==="authfail"){setGhStatus("error");setGhMsg("❌ Token invalide ou expiré — vérifie dans Réglages");}
    else{setGhStatus("error");setGhMsg(`❌ Reload: ${res.code||res.status||"?"} ${res.msg||""}`);}
  };

  const SyncBanner=()=>{
    const[visible,setVisible]=useState(true);
    useEffect(()=>{
      // Errors stay visible; loading/saving/ok auto-dismiss after 3s
      if(ghStatus==="ok"||ghStatus==="saving"||ghStatus==="loading"){
        setVisible(true);
        const t=setTimeout(()=>setVisible(false),3000);
        return()=>clearTimeout(t);
      }else if(ghStatus==="error"){
        setVisible(true);
      }
    },[ghStatus,ghMsg]);
    if(!ghConnected||!visible||(ghStatus==="idle"&&!ghMsg))return null;
    const bg={loading:"#0a1520",saving:"#0d0a18",ok:"#0a1510",error:"#180a0a"}[ghStatus]||"#111";
    const border={loading:"#0099cc55",saving:"#7c3aed55",ok:"#00d4aa55",error:"#ff475755"}[ghStatus]||"#333";
    const txtClr={loading:"#60a5fa",saving:"#a78bfa",ok:"#00d4aa",error:"#ff6b6b"}[ghStatus]||"#aaa";
    return(
      <div style={{background:bg,borderBottom:`1px solid ${border}`,fontSize:11,fontWeight:600,padding:"5px 14px",display:"flex",alignItems:"center",gap:8}}>
        <span style={{color:txtClr,flex:1}}>{ghStatus==="loading"||ghStatus==="saving"?"⏳ ":ghStatus==="ok"?"✅ ":ghStatus==="error"?"❌ ":""}{ghMsg}</span>
        {ghStatus==="error"&&<button onClick={()=>{setVisible(false);ghRefresh();}} style={{background:"rgba(255,71,87,0.15)",border:"1px solid #ff475766",color:"#ff6b6b",borderRadius:6,padding:"2px 9px",cursor:"pointer",fontSize:10,fontWeight:700,flexShrink:0}}>↻</button>}
        {ghStatus==="error"&&<button onClick={()=>setVisible(false)} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:14,padding:"0 2px",flexShrink:0}}>×</button>}
      </div>
    );
  };

  return(
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"#0a0a0a",fontFamily:"'DM Sans',sans-serif",color:"#fff",position:"relative"}}>
      {/* Header */}
      <div style={{position:"sticky",top:0,zIndex:100,background:"rgba(10,10,10,0.96)",backdropFilter:"blur(20px)",borderBottom:"1px solid #161616"}}>
        <div style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:10}}>
          {companyLogo?<img src={companyLogo} style={{width:36,height:36,objectFit:"cover",borderRadius:9,border:"1px solid #222"}}/>:<div style={{width:36,height:36,background:"linear-gradient(135deg,#00d4aa,#0099cc)",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>✨</div>}
          <div style={{flex:1}}>
            <div style={{fontSize:16,fontWeight:700,color:"#fff",fontFamily:"'Syne',sans-serif",lineHeight:1.2}}>{companyName}</div>
            <div style={{fontSize:10,color:"#888"}}>{new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"})}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            {ghConnected&&<div style={{width:7,height:7,borderRadius:"50%",background:{loading:"#0099cc",saving:"#7c3aed",ok:"#00d4aa",error:"#ff4757",idle:"#444"}[ghStatus]||"#444"}} title="Statut GitHub"/>}
            <div style={{fontSize:10,color:"#00d4aa",background:"#0a1a14",border:"1px solid #00d4aa22",padding:"3px 8px",borderRadius:20}}>{data.revenues.length} lavages</div>
          </div>
        </div>
        <SyncBanner/>
      </div>

      {/* Sub-tabs for Annuaire */}
      {tab===2&&(
        <div style={{display:"flex",gap:0,background:"#0f0f0f",borderBottom:"1px solid #1a1a1a",padding:"0 14px"}}>
          {[["👤","Clients"],["🚗","Voitures"],["👥","Équipe"]].map(([icon,label],i)=>(
            <button key={i} onClick={()=>setSubTab(i)} style={{flex:1,background:"none",border:"none",padding:"10px 0 8px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,borderBottom:`2px solid ${subTab===i?"#00d4aa":"transparent"}`}}>
              <span style={{fontSize:16,filter:subTab===i?"none":"grayscale(100%) opacity(0.4)"}}>{icon}</span>
              <span style={{fontSize:10,color:subTab===i?"#00d4aa":"#444",fontWeight:subTab===i?700:400}}>{label}</span>
            </button>
          ))}
        </div>
      )}

      {/* Content */}
      <div style={{padding:"14px 14px 0"}}>
        {tab===0&&<HistoryPage data={data} setData={setDataAndSync} currency={currency}/>}
        {tab===1&&<StatsPage data={data} setData={setDataAndSync} currency={currency}/>}
        {tab===2&&subTab===0&&<ClientsPage data={data} setData={setDataAndSync} currency={currency}/>}
        {tab===2&&subTab===1&&<VehiclesPage data={data} setData={setDataAndSync} currency={currency}/>}
        {tab===2&&subTab===2&&<TechnicianTrackerPage data={data} setData={setDataAndSync} currency={currency}/>}
        {tab===3&&<AppointmentsPage data={data} setData={setDataAndSync} currency={currency}/>}
        {tab===4&&<HomePage data={data} setData={setDataAndSync} currency={currency}/>}
        {tab===5&&<SettingsPage data={data} setData={setDataAndSync} ghCfg={ghCfg} onGhCfgSave={cfg=>{setGhCfg(cfg);setTimeout(()=>ghRefresh(),500);}}/>}
      </div>

      {/* FAB */}
      {tab<5&&<FAB onRev={()=>setShowRev(true)} onExp={()=>setShowExp(true)} onTransfer={()=>setShowTransfer(true)}/>}

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(10,10,10,0.97)",backdropFilter:"blur(20px)",borderTop:"1px solid #161616",display:"flex",zIndex:200,paddingBottom:"env(safe-area-inset-bottom)"}}>
        {tabs.map(([icon,label],i)=>(
          <button key={i} onClick={()=>setTab(i)} style={{flex:1,background:"none",border:"none",padding:"9px 0 7px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span style={{fontSize:19,filter:tab===i?"none":"grayscale(100%) opacity(0.35)"}}>{icon}</span>
            <span style={{fontSize:8,color:tab===i?"#00d4aa":"#333",fontWeight:tab===i?700:400,letterSpacing:0.2}}>{label}</span>
            {tab===i&&<div style={{width:3,height:3,borderRadius:"50%",background:"#00d4aa"}}/>}
          </button>
        ))}
      </div>

      {showRev&&<Modal title="Nouveau revenu 💰" onClose={()=>setShowRev(false)}><RevenueForm data={data} setData={setDataAndSync} onSave={()=>setShowRev(false)}/></Modal>}
      {showExp&&<Modal title="Nouvelle dépense 🔴" onClose={()=>setShowExp(false)}><ExpenseForm data={data} setData={setDataAndSync} onSave={()=>setShowExp(false)}/></Modal>}
      {showTransfer&&<Modal title="Nouveau transfert 💸" onClose={()=>setShowTransfer(false)}><TransferForm data={data} setData={setDataAndSync} onSave={()=>setShowTransfer(false)}/></Modal>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
