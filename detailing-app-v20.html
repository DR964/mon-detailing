// ===================== ADD / EDIT REVENUE FORM =====================
function RevenueForm({data,setData,onSave,editItem,prefill}){
  const today=new Date().toISOString().split("T")[0];
  const techs=(data.settings&&data.settings.technicians)||[];
  const services=(data.settings&&data.settings.services)||DEF_SERVICES;
  const base=editItem||prefill||{};
  const[form,setForm]=useState({
    date:today,timeStart:"",timeEnd:"",
    vehicleId:"",plate:"",brand:"",model:"",vehicleSize:"berline",difficulty:3,
    clientId:"",clientFirst:"",clientLast:"",clientPhone:"",
    clientStreetNum:"",clientStreetName:"",clientZip:"",clientCity:"",clientNote:3,
    amount:"",amountHT:"",taxRate:20,priceMode:"ttc",
    locationStreetNum:"",locationStreetName:"",locationZip:"",locationCity:"",
    paymentMethod:"espèce",paidToTech:"",remarks:"",invoiceNumber:"",
    invoiceFile:null,carPhoto:null,isGift:false,
    technicians:[],prestations:[],customPrestation:"",
    servicePrices:{},travelFees:"",discount:"",discountType:"amount",
    ...base,
    clientStreetNum:base.clientStreetNum||"",clientStreetName:base.clientStreetName||"",
    clientZip:base.clientZip||"",clientCity:base.clientCity||"",
    locationStreetNum:base.locationStreetNum||"",locationStreetName:base.locationStreetName||"",
    locationZip:base.locationZip||"",locationCity:base.locationCity||"",
    vehicleSize:base.vehicleSize||"berline",
    paidToTechs:base.paidToTechs||(base.paidToTech?[base.paidToTech]:[]),
    invoiceNumber:base.invoiceNumber||"",
    splitMode:base.splitMode||"equitable",
    techAmounts:base.techAmounts||{},
    deposit:base.deposit||"",
    depositTechs:base.depositTechs||[],
    depositTechAmounts:base.depositTechAmounts||{},
    depositSplitMode:base.depositSplitMode||"equitable",
    taxRate:base.taxRate||20,priceMode:base.priceMode||"ttc",
    amountHT:base.amountHT||"",
    servicePrices:base.servicePrices||{},
    travelFees:base.travelFees||"",
    discount:base.discount||"",discountType:base.discountType||"amount"
  });
  const[newVehicle,setNewVehicle]=useState(!editItem&&!prefill);
  const[newClient,setNewClient]=useState(!editItem&&!prefill);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const dur=dMin(form.timeStart,form.timeEnd);

  // Vehicle selected → auto-fill owner
  const selectVehicle=v=>{
    set("vehicleId",v.id);set("plate",v.plate);set("brand",v.brand);set("model",v.model);set("vehicleSize",v.size||"berline");
    setNewVehicle(false);
    // Auto-fill owner if vehicle has one
    if(v.ownerId){
      const owner=data.clients.find(c=>c.id===v.ownerId);
      if(owner){
        setForm(f=>({...f,vehicleId:v.id,plate:v.plate,brand:v.brand,model:v.model,vehicleSize:v.size||"berline",
          clientId:owner.id,clientFirst:owner.firstName,clientLast:owner.lastName,clientPhone:owner.phone||"",
          clientNote:owner.note||3,clientStreetNum:owner.streetNum||"",clientStreetName:owner.streetName||"",
          clientZip:owner.zip||"",clientCity:owner.city||""}));
        setNewClient(false);
        return;
      }
    }
  };
  const clearVehicle=()=>{set("vehicleId","");setNewVehicle(true);};
  const selectClient=c=>{set("clientId",c.id);set("clientFirst",c.firstName);set("clientLast",c.lastName);set("clientPhone",c.phone||"");set("clientNote",c.note||3);set("clientStreetNum",c.streetNum||"");set("clientStreetName",c.streetName||"");set("clientZip",c.zip||"");set("clientCity",c.city||"");setNewClient(false);};
  const clearClient=()=>{set("clientId","");setNewClient(true);};

  const saveLocation=loc=>{
    if(!loc)return;
    // location is saved atomically in handleSave below
  };

  const handleSave=()=>{
    if(!form.isGift&&!form.amount)return alert("Montant requis");
    if(!form.plate&&!form.vehicleId)return alert("Véhicule requis");
    // Compute final amount with travel fees and discount
    const baseTTC=form.isGift?0:parseFloat(form.amount||0);
    const travel=parseFloat(form.travelFees||0);
    const taxRate=parseFloat(form.taxRate||20);
    const baseHT=calcHT(baseTTC,taxRate);
    let discRaw=parseFloat(form.discount||0);
    let disc=0;
    if(form.discountBase==="ht"){
      // discount on HT
      const discHT=form.discountType==="percent"?baseHT*discRaw/100:discRaw;
      disc=discHT*(1+taxRate/100); // convert to TTC
    } else {
      disc=form.discountType==="percent"?baseTTC*discRaw/100:discRaw;
    }
    const finalTTC=Math.max(0,baseTTC+travel-disc);
    const finalHT=calcHT(finalTTC,taxRate);
    if(!form.isGift&&(form.paidToTechs||[]).length>0&&(form.splitMode||"equitable")==="manuel"){
      const total=finalTTC;
      const assigned=((form.paidToTechs||[])).reduce((s,t)=>s+parseFloat((form.techAmounts||{})[t]||0),0);
      if(Math.abs(total-assigned)>0.01)return alert(`⚠️ La répartition ne correspond pas au montant total.\nTotal : ${total.toFixed(2)} — Réparti : ${assigned.toFixed(2)}\nDifférence : ${(total-assigned).toFixed(2)}`);
    }
    const depositAmt=parseFloat(form.deposit||0);
    if(depositAmt>0&&(form.depositTechs||[]).length>0&&(form.depositSplitMode||"equitable")==="manuel"){
      const assigned=(form.depositTechs||[]).reduce((s,t)=>s+parseFloat((form.depositTechAmounts||{})[t]||0),0);
      if(Math.abs(depositAmt-assigned)>0.01)return alert(`⚠️ La répartition de l'acompte ne correspond pas.\nAcompte : ${depositAmt.toFixed(2)} — Réparti : ${assigned.toFixed(2)}`);
    }
    const nd={...data};
    let cid=form.clientId,vid=form.vehicleId;
    if(!cid&&form.clientFirst){
      const addr=fmtAddr(form.clientStreetNum,form.clientStreetName,form.clientZip,form.clientCity);
      const nc={id:gid(),firstName:form.clientFirst,lastName:form.clientLast,phone:form.clientPhone,address:addr,streetNum:form.clientStreetNum,streetName:form.clientStreetName,zip:form.clientZip,city:form.clientCity,note:form.clientNote};
      nd.clients=[...nd.clients,nc];cid=nc.id;
    }
    if(!vid&&form.plate){
      const pt=form.plate.toUpperCase().replace(/[^A-Z0-9]/g,"");
      const ev=nd.vehicles.find(v=>v.plate===pt);
      if(ev){vid=ev.id;}else{const nv={id:gid(),plate:pt,brand:form.brand,model:form.model,size:form.vehicleSize||"berline",ownerId:cid||""};nd.vehicles=[...nd.vehicles,nv];vid=nv.id;}
    }
    if(vid&&cid){const vi=nd.vehicles.findIndex(v=>v.id===vid);if(vi>=0&&!nd.vehicles[vi].ownerId){nd.vehicles=[...nd.vehicles];nd.vehicles[vi]={...nd.vehicles[vi],ownerId:cid};}}
    const location=fmtAddr(form.locationStreetNum,form.locationStreetName,form.locationZip,form.locationCity);
    if(location){const locs=nd.locations||[];if(!locs.includes(location))nd.locations=[...locs,location];}
    let paidToTechs=form.paidToTechs||[];
    if(paidToTechs.length===0&&form.technicians&&form.technicians.length===1)paidToTechs=[form.technicians[0]];
    let finalTechAmounts=form.techAmounts||{};
    if((form.splitMode||"equitable")==="equitable"&&paidToTechs.length>0&&finalTTC>0){
      const share=finalTTC/paidToTechs.length;finalTechAmounts={};
      paidToTechs.forEach(t=>{finalTechAmounts[t]=parseFloat(share.toFixed(2));});
    }
    const finalDepositAmt=parseFloat(form.deposit||0);
    let finalDepositTechAmounts=form.depositTechAmounts||{};
    if((form.depositSplitMode||"equitable")==="equitable"&&(form.depositTechs||[]).length>0&&finalDepositAmt>0){
      const share=finalDepositAmt/(form.depositTechs||[]).length;finalDepositTechAmounts={};
      (form.depositTechs||[]).forEach(t=>{finalDepositTechAmounts[t]=parseFloat(share.toFixed(2));});
    }
    const rev={...form,id:editItem?form.id:gid(),clientId:cid,vehicleId:vid,
      amount:finalTTC,amountHT:finalHT,taxRate,travelFees:travel,
      discount:parseFloat(form.discount||0),discountType:form.discountType||"amount",discountAmount:disc,
      duration:dur,type:"revenue",location,paidToTechs,paidToTech:paidToTechs[0]||"",
      techAmounts:finalTechAmounts,depositTechAmounts:finalDepositTechAmounts};
    if(editItem){
      nd.revenues=nd.revenues.map(r=>r.id===rev.id?rev:r);
    }else{
      nd.revenues=[...nd.revenues,rev];
    }
    setData(nd);onSave();
  };

  return(
    <div>
      <Field label="Photo du véhicule (couverture)">
        <PhotoUpload photo={form.carPhoto} onPhoto={v=>set("carPhoto",v)} onRemove={()=>set("carPhoto",null)} vehicleSize={form.vehicleSize}/>
      </Field>

      <Field label="Véhicule" required>
        <VehicleSearch data={data} onSelect={selectVehicle} onClear={clearVehicle}
          initialValue={editItem&&form.plate?`${form.plate} — ${form.brand} ${form.model}`:""}/>
      </Field>
      {(newVehicle||!form.vehicleId)&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:12}}>
          <input style={inp} placeholder="Plaque *" value={form.plate} onChange={e=>set("plate",e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,""))}/>
          <input style={inp} placeholder="Marque" value={form.brand} onChange={e=>set("brand",e.target.value)}/>
          <input style={inp} placeholder="Modèle" value={form.model} onChange={e=>set("model",e.target.value)}/>
        </div>
      )}
      <Field label="Taille du véhicule">
        <select style={inp} value={form.vehicleSize||"berline"} onChange={e=>set("vehicleSize",e.target.value)}>
          {CAR_SIZES.map(s=><option key={s}>{s}</option>)}
        </select>
      </Field>

      <Field label="Client (propriétaire)">
        {form.clientId&&!newClient
          ?<div style={{background:"#0a1a14",border:"1px solid #00d4aa33",borderRadius:10,padding:"9px 11px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{color:"#00d4aa",fontSize:13}}>👤 {form.clientFirst} {form.clientLast}</span>
            <button onClick={clearClient} style={{background:"none",border:"none",color:"#aaa",cursor:"pointer",fontSize:18,padding:0}}>×</button>
          </div>
          :<ClientSearch data={data} value={""} onSelect={selectClient} onClear={clearClient}/>
        }
        <label style={{display:"flex",alignItems:"center",gap:6,marginTop:6,color:"#777",fontSize:12,cursor:"pointer"}}>
          <input type="checkbox" checked={newClient||!form.clientId} onChange={e=>{setNewClient(e.target.checked);if(e.target.checked)clearClient();}}/>
          Nouveau client
        </label>
      </Field>
      {(newClient||!form.clientId)&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:12}}>
          <input style={inp} placeholder="Prénom" value={form.clientFirst} onChange={e=>set("clientFirst",e.target.value)}/>
          <input style={inp} placeholder="Nom" value={form.clientLast} onChange={e=>set("clientLast",e.target.value)}/>
          <input style={inp} placeholder="Téléphone" value={form.clientPhone} onChange={e=>set("clientPhone",e.target.value)}/>
          <input style={inp} placeholder="N° rue" value={form.clientStreetNum||""} onChange={e=>set("clientStreetNum",e.target.value)}/>
          <input style={{...inp,gridColumn:"1/-1"}} placeholder="Nom de rue" value={form.clientStreetName||""} onChange={e=>set("clientStreetName",e.target.value)}/>
          <input style={inp} placeholder="Code postal" value={form.clientZip||""} onChange={e=>set("clientZip",e.target.value)}/>
          <input style={inp} placeholder="Ville" value={form.clientCity||""} onChange={e=>set("clientCity",e.target.value)}/>
          <div style={{gridColumn:"1/-1"}}>
            <label style={{fontSize:11,color:"#777",display:"block",marginBottom:4}}>Note client</label>
            <StarRating value={form.clientNote} onChange={v=>set("clientNote",v)}/>
          </div>
        </div>
      )}

      <Field label="Difficulté"><EmojiRating value={form.difficulty} onChange={v=>set("difficulty",v)}/></Field>

      <Field label="Technicien(s) ayant effectué le lavage">
        <TechnicianPicker technicians={techs} value={form.technicians} onChange={v=>set("technicians",v)}/>
      </Field>

      <Field label="Prestations réalisées">
        <ServicesPicker services={services} value={form.prestations} onChange={v=>set("prestations",v)} customService={form.customPrestation} onCustomChange={v=>set("customPrestation",v)}
          servicePrices={form.servicePrices} onServicePrices={v=>set("servicePrices",v)}/>
      </Field>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Field label="Date" required><input type="date" style={inp} value={form.date} onChange={e=>set("date",e.target.value)}/></Field>
        <Field label="Heure début"><input type="time" style={inp} value={form.timeStart} onChange={e=>set("timeStart",e.target.value)}/></Field>
        <Field label="Heure fin"><input type="time" style={inp} value={form.timeEnd} onChange={e=>set("timeEnd",e.target.value)}/></Field>
        <Field label="N° Facture"><input style={inp} placeholder="FAC-001" value={form.invoiceNumber||""} onChange={e=>set("invoiceNumber",e.target.value)}/></Field>
      </div>
      <Field label="Lieu de la prestation">
        <AddressFields streetNum={form.locationStreetNum} streetName={form.locationStreetName} zip={form.locationZip} city={form.locationCity}
          onChange={v=>setForm(f=>({...f,locationStreetNum:v.streetNum,locationStreetName:v.streetName,locationZip:v.zip,locationCity:v.city}))}/>
      </Field>
      {dur>0&&<div style={{background:"#0a1a14",border:"1px solid #00d4aa33",borderRadius:10,padding:"7px 11px",marginBottom:12,color:"#00d4aa",fontSize:13}}>⏱ Durée : <strong>{fmtT(dur)}</strong></div>}

      <Field label="Montant">
        <div style={{display:"flex",gap:6,marginBottom:6}}>
          <button onClick={()=>set("priceMode","ht")} style={{flex:1,background:form.priceMode==="ht"?"#0a1a14":"#1a1a1a",border:`1px solid ${form.priceMode==="ht"?"#00d4aa":"#333"}`,color:form.priceMode==="ht"?"#00d4aa":"#666",borderRadius:8,fontSize:11,cursor:"pointer",fontWeight:700,padding:"6px"}}>Saisir HT</button>
          <button onClick={()=>set("priceMode","ttc")} style={{flex:1,background:form.priceMode==="ttc"?"#0a1a14":"#1a1a1a",border:`1px solid ${form.priceMode==="ttc"?"#00d4aa":"#333"}`,color:form.priceMode==="ttc"?"#00d4aa":"#666",borderRadius:8,fontSize:11,cursor:"pointer",fontWeight:700,padding:"6px"}}>Saisir TTC</button>
          <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}><span style={{fontSize:10,color:"#aaa"}}>TVA</span><input type="number" style={{...inp,width:52,fontSize:12}} min="0" max="20" value={form.taxRate||20} onChange={e=>{const tax=e.target.value;set("taxRate",tax);if(form.priceMode==="ht"&&form.amount){set("amountTTC",calcTTC(parseFloat(form.amount)||0,parseFloat(tax)||0).toFixed(2));}else if(form.priceMode==="ttc"&&form.amount){set("amountHT",calcHT(parseFloat(form.amount)||0,parseFloat(tax)||0).toFixed(2));}}}/><span style={{fontSize:10,color:"#aaa"}}>%</span></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:6}}>
          <div>
            <div style={{fontSize:9,color:"#999",marginBottom:2}}>Prix HT</div>
            <input type="number" style={{...inp,border:`1px solid ${form.priceMode==="ht"?"#00d4aa":"#252525"}`}} placeholder="0.00" 
              value={form.priceMode==="ht"?form.amount:(form.amountHT||"")} disabled={form.isGift}
              onChange={e=>{if(form.priceMode==="ht"){set("amount",e.target.value);set("amountHT",e.target.value);set("amountTTC",calcTTC(parseFloat(e.target.value)||0,parseFloat(form.taxRate||20)).toFixed(2));}else{set("amountHT",e.target.value);set("amount",calcTTC(parseFloat(e.target.value)||0,parseFloat(form.taxRate||20)).toFixed(2));set("amountTTC",calcTTC(parseFloat(e.target.value)||0,parseFloat(form.taxRate||20)).toFixed(2));}}}/>
          </div>
          <div>
            <div style={{fontSize:9,color:"#999",marginBottom:2}}>Prix TTC</div>
            <input type="number" style={{...inp,border:`1px solid ${form.priceMode==="ttc"?"#00d4aa":"#252525"}`}} placeholder="0.00"
              value={form.priceMode==="ttc"?form.amount:(form.amountTTC||"")} disabled={form.isGift}
              onChange={e=>{if(form.priceMode==="ttc"){set("amount",e.target.value);set("amountTTC",e.target.value);set("amountHT",calcHT(parseFloat(e.target.value)||0,parseFloat(form.taxRate||20)).toFixed(2));}else{set("amountTTC",e.target.value);set("amount",e.target.value);set("amountHT",calcHT(parseFloat(e.target.value)||0,parseFloat(form.taxRate||20)).toFixed(2));}}}/>
          </div>
        </div>
        <label style={{display:"flex",alignItems:"center",gap:6,color:"#777",fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>
          <input type="checkbox" checked={form.isGift} onChange={e=>set("isGift",e.target.checked)}/> 🎁 Offert
        </label>
      </Field>
      <Field label="🚗 Frais de déplacement TTC">
        <input type="number" style={inp} placeholder="0.00" value={form.travelFees||""} onChange={e=>set("travelFees",e.target.value)}/>
      </Field>
      <Field label="🎟 Promotion / Réduction">
        <div style={{display:"flex",gap:5}}>
          <input type="number" style={{...inp,flex:1}} placeholder="0" value={form.discount||""} onChange={e=>set("discount",e.target.value)}/>
          <select style={{...inp,width:65,flexShrink:0}} value={form.discountType||"amount"} onChange={e=>set("discountType",e.target.value)}>
            <option value="amount">{(data.settings&&data.settings.currency)||"€"}</option>
            <option value="percent">%</option>
          </select>
          <select style={{...inp,width:65,flexShrink:0}} value={form.discountBase||"ttc"} onChange={e=>set("discountBase",e.target.value)}>
            <option value="ttc">/ TTC</option>
            <option value="ht">/ HT</option>
          </select>
        </div>
        <div style={{fontSize:10,color:"#888",marginTop:3}}>Réduction appliquée sur le {(form.discountBase||"ttc").toUpperCase()}</div>
      </Field>
      <Field label="Encaissement">
        <select style={inp} value={form.paymentMethod} onChange={e=>set("paymentMethod",e.target.value)}>
          {["espèce","carte","chèque","virement"].map(m=><option key={m}>{m}</option>)}
        </select>
      </Field>
      {/* Acompte éventuel (pré-rempli depuis le RDV) */}
      {(parseFloat(form.deposit||0)>0||(form.fromAppointmentId))&&(
        <Field label="Acompte versé">
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
            <input type="number" style={{...inp,flex:1}} placeholder="0.00" value={form.deposit||""} onChange={e=>set("deposit",e.target.value)}/>
            <span style={{color:"#999",fontWeight:600}}>{(data.settings&&data.settings.currency)||"€"}</span>
          </div>
          {techs.length>0&&parseFloat(form.deposit||0)>0&&(
            <SplitSection
              label="🏦 Qui a encaissé l'acompte ?"
              techs={techs}
              total={parseFloat(form.deposit||0)}
              splitMode={form.depositSplitMode||"equitable"}
              onSplitMode={v=>set("depositSplitMode",v)}
              selections={form.depositTechs||[]}
              onSelections={v=>set("depositTechs",v)}
              techAmounts={form.depositTechAmounts||{}}
              onTechAmounts={v=>set("depositTechAmounts",v)}
              currency={(data.settings&&data.settings.currency)||"€"}
              accent="green"
            />
          )}
        </Field>
      )}
      {techs.length>0&&(
        <SplitSection
          label="💰 Qui a encaissé ?"
          techs={techs}
          total={form.isGift?0:parseFloat(form.amount||0)}
          splitMode={form.splitMode||"equitable"}
          onSplitMode={v=>set("splitMode",v)}
          selections={form.paidToTechs||[]}
          onSelections={v=>set("paidToTechs",v)}
          techAmounts={form.techAmounts||{}}
          onTechAmounts={v=>set("techAmounts",v)}
          currency={(data.settings&&data.settings.currency)||"€"}
          accent="green"
        />
      )}
      <Field label="Remarques"><textarea style={{...inp,minHeight:60,resize:"vertical"}} value={form.remarks} onChange={e=>set("remarks",e.target.value)}/></Field>
      <Field label="Facture">
        <DocUpload file={form.invoiceFile} onFile={v=>set("invoiceFile",v)}/>
      </Field>

      <button onClick={handleSave} style={{...btn("linear-gradient(135deg,#00d4aa,#00a882)","#000"),width:"100%",padding:"13px",fontSize:15,marginTop:4}}>
        ✅ {editItem?"Modifier":"Enregistrer"} le revenu
      </button>
    </div>
  );
}

// ===================== TAX HELPER =====================
const calcHT=(ttc,tax)=>ttc/(1+(tax/100));
const calcTTC=(ht,tax)=>ht*(1+(tax/100));

// ===================== ADD / EDIT EXPENSE FORM =====================
function ExpenseForm({data,setData,onSave,editItem}){
  const today=new Date().toISOString().split("T")[0];
  const techs=(data.settings&&data.settings.technicians)||[];
  const mkItem=()=>({id:gid(),ref:"",description:"",qty:1,unitPrice:"",taxRate:20,priceMode:"ttc"});
  const[form,setForm]=useState(editItem?{...editItem,
    items:(editItem.items||[mkItem()]).map(it=>({...it,taxRate:it.taxRate!==undefined?it.taxRate:20,priceMode:it.priceMode||"ttc"})),
    locationStreetNum:editItem.locationStreetNum||"",locationStreetName:editItem.locationStreetName||"",
    locationZip:editItem.locationZip||"",locationCity:editItem.locationCity||"",
    paidByTechs:editItem.paidByTechs||(editItem.paidByTech?[editItem.paidByTech]:[]),
    splitMode:editItem.splitMode||"equitable",techAmounts:editItem.techAmounts||{},
    time:editItem.time||"",deliveryFees:editItem.deliveryFees||"",
    discount:editItem.discount||"",discountType:editItem.discountType||"amount"
  }:{
    items:[mkItem()],supplier:"",locationStreetNum:"",locationStreetName:"",locationZip:"",locationCity:"",date:today,time:"",
    paymentMethod:"espèce",invoiceFile:null,remarks:"",paidByTechs:[],splitMode:"equitable",techAmounts:{},deliveryFees:"",
    discount:"",discountType:"amount"
  });
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const setItem=(idx,k,v)=>setForm(f=>{
    const items=[...f.items];
    const it={...items[idx],[k]:v};
    // Auto-calc HT/TTC
    if(k==="unitPrice"&&it.priceMode==="ttc"){it.unitPriceHT=calcHT(parseFloat(v)||0,parseFloat(it.taxRate)||0).toFixed(4);}
    if(k==="unitPrice"&&it.priceMode==="ht"){it.unitPriceTTC=calcTTC(parseFloat(v)||0,parseFloat(it.taxRate)||0).toFixed(4);}
    if(k==="unitPriceHT"){it.unitPrice=v;it.unitPriceTTC=calcTTC(parseFloat(v)||0,parseFloat(it.taxRate)||0).toFixed(4);}
    if(k==="unitPriceTTC"){it.unitPrice=calcHT(parseFloat(v)||0,parseFloat(it.taxRate)||0).toFixed(4);it.unitPriceTTC=v;}
    if(k==="taxRate"){
      if(it.priceMode==="ht"&&it.unitPrice){it.unitPriceTTC=calcTTC(parseFloat(it.unitPrice)||0,parseFloat(v)||0).toFixed(4);}
      else if(it.priceMode==="ttc"&&it.unitPrice){it.unitPriceHT=calcHT(parseFloat(it.unitPrice)||0,parseFloat(v)||0).toFixed(4);}
    }
    items[idx]=it;return{...f,items};
  });
  const addItem=()=>setForm(f=>({...f,items:[...f.items,mkItem()]}));
  const removeItem=idx=>setForm(f=>({...f,items:f.items.filter((_,i)=>i!==idx)}));
  
  const getItemTTC=(it)=>{
    const qty=parseFloat(it.qty||0);
    if(it.priceMode==="ttc") return qty*parseFloat(it.unitPrice||0);
    return qty*calcTTC(parseFloat(it.unitPrice||0),parseFloat(it.taxRate||0));
  };
  const getItemHT=(it)=>{
    const qty=parseFloat(it.qty||0);
    if(it.priceMode==="ht") return qty*parseFloat(it.unitPrice||0);
    return qty*calcHT(parseFloat(it.unitPrice||0),parseFloat(it.taxRate||0));
  };
  
  const deliveryTTC=parseFloat(form.deliveryFees||0);
  const subtotalTTC=form.items.reduce((s,it)=>s+getItemTTC(it),0)+deliveryTTC;
  const subtotalHT=form.items.reduce((s,it)=>s+getItemHT(it),0)+deliveryTTC/1.2;
  let discountAmt=0;
  if(parseFloat(form.discount||0)>0){
    if(form.discountBase==="ht"){
      const discHT=form.discountType==="percent"?subtotalHT*(parseFloat(form.discount||0)/100):parseFloat(form.discount||0);
      discountAmt=discHT*1.2; // convert HT discount to TTC (approx avg 20%)
    } else {
      discountAmt=form.discountType==="percent"?subtotalTTC*(parseFloat(form.discount||0)/100):parseFloat(form.discount||0);
    }
  }
  const totalHT=subtotalHT;
  const totalTTC=Math.max(0,subtotalTTC-discountAmt);
  const totalTVA=totalTTC-totalHT+discountAmt/1.2;
  const cur=(data.settings&&data.settings.currency)||"€";

  const handleSave=()=>{
    if(!form.items[0].description)return alert("Au moins un article requis");
    if(totalTTC<=0)return alert("Montant total requis");
    if((form.paidByTechs||[]).length>0&&(form.splitMode||"equitable")==="manuel"){
      const assigned=(form.paidByTechs||[]).reduce((s,t)=>s+parseFloat((form.techAmounts||{})[t]||0),0);
      if(Math.abs(totalTTC-assigned)>0.01)return alert(`⚠️ La répartition ne correspond pas.\nTotal : ${totalTTC.toFixed(2)} ${cur} — Réparti : ${assigned.toFixed(2)} ${cur}`);
    }
    const location=fmtAddr(form.locationStreetNum,form.locationStreetName,form.locationZip,form.locationCity);
    let finalTechAmounts=form.techAmounts||{};
    if((form.splitMode||"equitable")==="equitable"&&(form.paidByTechs||[]).length>0&&totalTTC>0){
      const share=totalTTC/(form.paidByTechs||[]).length;finalTechAmounts={};
      (form.paidByTechs||[]).forEach(t=>{finalTechAmounts[t]=parseFloat(share.toFixed(2));});
    }
    const exp={...form,id:editItem?form.id:gid(),amount:totalTTC,amountHT:totalHT,totalTVA,type:"expense",
      productName:form.items.map(it=>it.description).join(", "),location,
      paidByTechs:form.paidByTechs||[],paidByTech:(form.paidByTechs||[])[0]||"",techAmounts:finalTechAmounts,
      discountAmount:discountAmt};
    const nd={...data};
    if(location){const locs=nd.locations||[];if(!locs.includes(location))nd.locations=[...locs,location];}
    if(editItem){nd.expenses=nd.expenses.map(e=>e.id===exp.id?exp:e);}
    else{nd.expenses=[...nd.expenses,exp];}
    setData(nd);onSave();
  };
  return(
    <div>
      <Field label="Fournisseur / Magasin">
        <input style={inp} placeholder="Amazon, Meguiar's, Norauto..." value={form.supplier||""} onChange={e=>set("supplier",e.target.value)}/>
      </Field>
      <div style={{marginBottom:12}}>
        <label style={{display:"block",fontSize:11,color:"#777",marginBottom:5,textTransform:"uppercase",letterSpacing:0.5}}>Articles <span style={{color:"#ff6b35"}}>*</span></label>
        {form.items.map((item,idx)=>{
          const itemTTC=getItemTTC(item);
          const itemHT=getItemHT(item);
          return(
          <div key={item.id} style={{background:"#1a1a1a",border:"1px solid #252525",borderRadius:10,padding:"9px",marginBottom:8}}>
            <div style={{display:"flex",gap:6,marginBottom:6}}>
              <input style={{...inp,flex:"0 0 70px",fontSize:12}} placeholder="Réf." value={item.ref} onChange={e=>setItem(idx,"ref",e.target.value)}/>
              <input style={{...inp,flex:1,fontSize:12}} placeholder="Description *" value={item.description} onChange={e=>setItem(idx,"description",e.target.value)}/>
              {form.items.length>1&&<button onClick={()=>removeItem(idx)} style={{background:"#ff475715",border:"1px solid #ff4757",color:"#ff4757",borderRadius:8,width:28,height:28,cursor:"pointer",flexShrink:0,fontSize:15,lineHeight:1}}>×</button>}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:5,marginBottom:5}}>
              <div style={{display:"flex",alignItems:"center",gap:4}}><span style={{fontSize:10,color:"#aaa",whiteSpace:"nowrap"}}>Qté</span><input type="number" style={{...inp,fontSize:12}} min="1" value={item.qty} onChange={e=>setItem(idx,"qty",e.target.value)}/></div>
              <div style={{display:"flex",alignItems:"center",gap:4}}><span style={{fontSize:10,color:"#aaa",whiteSpace:"nowrap"}}>TVA%</span><input type="number" style={{...inp,fontSize:12}} min="0" max="20" value={item.taxRate} onChange={e=>setItem(idx,"taxRate",e.target.value)}/></div>
              <div style={{display:"flex",gap:3}}>
                <button onClick={()=>setItem(idx,"priceMode","ht")} style={{flex:1,background:item.priceMode==="ht"?"#0a1a14":"#111",border:`1px solid ${item.priceMode==="ht"?"#00d4aa":"#333"}`,color:item.priceMode==="ht"?"#00d4aa":"#666",borderRadius:6,fontSize:10,cursor:"pointer",fontWeight:700}}>HT</button>
                <button onClick={()=>setItem(idx,"priceMode","ttc")} style={{flex:1,background:item.priceMode==="ttc"?"#0a1a14":"#111",border:`1px solid ${item.priceMode==="ttc"?"#00d4aa":"#333"}`,color:item.priceMode==="ttc"?"#00d4aa":"#666",borderRadius:6,fontSize:10,cursor:"pointer",fontWeight:700}}>TTC</button>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
              <div>
                <div style={{fontSize:9,color:"#999",marginBottom:2}}>Prix HT</div>
                <input type="number" style={{...inp,fontSize:12,border:`1px solid ${item.priceMode==="ht"?"#00d4aa":"#252525"}`}} placeholder="0.00" 
                  value={item.priceMode==="ht"?item.unitPrice:(item.unitPriceHT||"")} 
                  onChange={e=>item.priceMode==="ht"?setItem(idx,"unitPrice",e.target.value):setItem(idx,"unitPriceHT",e.target.value)}/>
              </div>
              <div>
                <div style={{fontSize:9,color:"#999",marginBottom:2}}>Prix TTC</div>
                <input type="number" style={{...inp,fontSize:12,border:`1px solid ${item.priceMode==="ttc"?"#00d4aa":"#252525"}`}} placeholder="0.00"
                  value={item.priceMode==="ttc"?item.unitPrice:(item.unitPriceTTC||"")}
                  onChange={e=>item.priceMode==="ttc"?setItem(idx,"unitPrice",e.target.value):setItem(idx,"unitPriceTTC",e.target.value)}/>
              </div>
            </div>
            {(itemHT>0||itemTTC>0)&&<div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#00d4aa",marginTop:5}}>
              <span>HT: {itemHT.toFixed(2)} {cur}</span><span>TTC: {itemTTC.toFixed(2)} {cur}</span>
            </div>}
          </div>
          );
        })}
        <button onClick={addItem} style={{width:"100%",background:"#0a1a14",border:"1px dashed #00d4aa44",color:"#00d4aa",borderRadius:10,padding:"8px",cursor:"pointer",fontSize:12,fontWeight:600}}>+ Ajouter un article</button>
      </div>
      <Field label="🚚 Frais de livraison TTC">
        <input type="number" style={inp} placeholder="0.00" value={form.deliveryFees||""} onChange={e=>set("deliveryFees",e.target.value)}/>
      </Field>
      <Field label="🎟 Promotion / Réduction">
        <div style={{display:"flex",gap:5}}>
          <input type="number" style={{...inp,flex:1}} placeholder="0" value={form.discount||""} onChange={e=>set("discount",e.target.value)}/>
          <select style={{...inp,width:65,flexShrink:0}} value={form.discountType||"amount"} onChange={e=>set("discountType",e.target.value)}>
            <option value="amount">{cur}</option>
            <option value="percent">%</option>
          </select>
          <select style={{...inp,width:65,flexShrink:0}} value={form.discountBase||"ttc"} onChange={e=>set("discountBase",e.target.value)}>
            <option value="ttc">/ TTC</option>
            <option value="ht">/ HT</option>
          </select>
        </div>
        <div style={{fontSize:10,color:"#888",marginTop:3}}>Réduction appliquée sur le {(form.discountBase||"ttc").toUpperCase()}</div>
      </Field>
      {totalTTC>0&&(
        <div style={{background:"#0a1a14",border:"1px solid #00d4aa33",borderRadius:10,padding:"10px 12px",marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:"#888",fontSize:12}}>TOTAL HT</span><span style={{color:"#aaa",fontWeight:600}}>{totalHT.toFixed(2)} {cur}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:"#888",fontSize:12}}>TVA</span><span style={{color:"#888",fontWeight:600}}>{totalTVA.toFixed(2)} {cur}</span></div>
          {deliveryTTC>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:"#888",fontSize:12}}>🚚 Livraison TTC</span><span style={{color:"#888",fontWeight:600}}>{deliveryTTC.toFixed(2)} {cur}</span></div>}
          {discountAmt>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:"#ffa500",fontSize:12}}>🎟 Réduction</span><span style={{color:"#ffa500",fontWeight:600}}>- {discountAmt.toFixed(2)} {cur}</span></div>}
          <div style={{display:"flex",justifyContent:"space-between",borderTop:"1px solid #00d4aa22",paddingTop:6,marginTop:2}}><span style={{color:"#00d4aa",fontWeight:700,fontSize:13}}>TOTAL TTC</span><span style={{color:"#00d4aa",fontWeight:800,fontSize:16}}>{totalTTC.toFixed(2)} {cur}</span></div>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Field label="Date" required><input type="date" style={inp} value={form.date} onChange={e=>set("date",e.target.value)}/></Field>
        <Field label="Heure"><input type="time" style={inp} value={form.time||""} onChange={e=>set("time",e.target.value)}/></Field>
        <Field label="Paiement"><select style={inp} value={form.paymentMethod} onChange={e=>set("paymentMethod",e.target.value)}>{["espèce","carte","chèque","virement","prélèvement"].map(m=><option key={m}>{m}</option>)}</select></Field>
      </div>
      {techs.length>0&&(
        <SplitSection label="💸 Qui a avancé l'argent ?" techs={techs} total={totalTTC}
          splitMode={form.splitMode||"equitable"} onSplitMode={v=>set("splitMode",v)}
          selections={form.paidByTechs||[]} onSelections={v=>set("paidByTechs",v)}
          techAmounts={form.techAmounts||{}} onTechAmounts={v=>set("techAmounts",v)}
          currency={cur} accent="red"/>
      )}
      <Field label="Lieu / Magasin">
        <AddressFields streetNum={form.locationStreetNum} streetName={form.locationStreetName} zip={form.locationZip} city={form.locationCity}
          onChange={v=>setForm(f=>({...f,locationStreetNum:v.streetNum,locationStreetName:v.streetName,locationZip:v.zip,locationCity:v.city}))}/>
      </Field>
      <Field label="Photo ticket / reçu">
        <PhotoUpload photo={form.receiptPhoto} onPhoto={async v=>{const c=await compressImage(v,600,800,0.75);set("receiptPhoto",c);}} onRemove={()=>set("receiptPhoto",null)}/>
      </Field>
      <Field label="Remarques"><textarea style={{...inp,minHeight:60,resize:"vertical"}} value={form.remarks} onChange={e=>set("remarks",e.target.value)}/></Field>
      <Field label="Facture"><DocUpload file={form.invoiceFile} onFile={v=>set("invoiceFile",v)}/></Field>
      <button onClick={handleSave} style={{...btn("linear-gradient(135deg,#ff4757,#cc1a2e)","#fff"),width:"100%",padding:"13px",fontSize:15,marginTop:4}}>
        ✅ {editItem?"Modifier":"Enregistrer"} la dépense
      </button>
    </div>
  );
}

// ===================== TX DETAIL =====================
function TxDetail({tx,data,setData,onClose,currency:currencyProp}){
  const[editMode,setEditMode]=useState(false);
  const[viewTransfer,setViewTransfer]=useState(false);
  const currency=currencyProp||(data.settings&&data.settings.currency)||"€";
  const v=data.vehicles.find(v=>v.id===tx.vehicleId);
  const c=data.clients.find(c=>c.id===tx.clientId);
  const companyName=(data.settings&&data.settings.companyName)||"Mon Détailing";
  const companyLogo=(data.settings&&data.settings.companyLogo)||null;

  const handlePrint=()=>{
    const printWin=window.open("","_blank","width=800,height=900");
    const content=document.getElementById("tx-printable");
    if(!content){alert("Rien à imprimer.");return;}
    printWin.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Fiche</title><style>*{box-sizing:border-box;margin:0;padding:0;}body{background:#fff;font-family:Arial,sans-serif;color:#111;padding:20px;max-width:600px;margin:0 auto;}@media print{body{padding:8px;}}</style></head><body>${content.innerHTML}</body></html>`);
    printWin.document.close();
    setTimeout(()=>{printWin.print();},400);
  };

  const deleteTx=()=>{
    if(!window.confirm("Supprimer cette fiche ?"))return;
    const nd={...data};
    if(tx.type==="revenue")nd.revenues=nd.revenues.filter(r=>r.id!==tx.id);
    else if(tx.type==="expense")nd.expenses=nd.expenses.filter(e=>e.id!==tx.id);
    else if(tx.type==="transfer")nd.transfers=(nd.transfers||[]).filter(t=>t.id!==tx.id);
    setData(nd);save(nd);onClose();
  };

  if(editMode){
    if(tx.type==="transfer"){
      return(
        <Modal title="Modifier le transfert ↔️" onClose={()=>setEditMode(false)}>
          <TransferForm data={data} setData={setData} editItem={tx} onSave={()=>{setEditMode(false);onClose();}}/>
        </Modal>
      );
    }
    return(
      <Modal title={tx.type==="revenue"?"Modifier le lavage":"Modifier la dépense"} onClose={()=>setEditMode(false)}>
        {tx.type==="revenue"
          ?<RevenueForm data={data} setData={setData} editItem={tx} onSave={()=>{setEditMode(false);onClose();}}/>
          :<ExpenseForm data={data} setData={setData} editItem={tx} onSave={()=>{setEditMode(false);onClose();}}/>
        }
      </Modal>
    );
  }

  // Transfer invoice view
  if(tx.type==="transfer"){
    return(
      <Modal title="Fiche Transfert" onClose={onClose}>
        <div id="tx-printable" style={{background:"linear-gradient(135deg,#0a0f1a,#111)",border:"1px solid #7c3aed55",borderRadius:14,overflow:"hidden",marginBottom:12,color:"#fff",padding:"16px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
            <div>
              {companyLogo?<img src={companyLogo} style={{width:44,height:44,objectFit:"cover",borderRadius:8,marginBottom:8}}/>:null}
              <div style={{fontSize:16,fontWeight:800,color:"#fff",fontFamily:"'Syne',sans-serif"}}>{companyName}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:10,color:"#a78bfa",background:"#7c3aed22",padding:"3px 10px",borderRadius:20,border:"1px solid #7c3aed44",fontWeight:700,marginBottom:4}}>💸 TRANSFERT</div>
              <div style={{fontSize:11,color:"#888"}}>{fmtD(tx.date)}</div>
            </div>
          </div>
          <div style={{borderTop:"1px solid #7c3aed33",borderBottom:"1px solid #7c3aed33",padding:"14px 0",marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
              <div style={{textAlign:"center",flex:1}}>
                <div style={{fontSize:9,color:"#888",marginBottom:4}}>DE</div>
                <div style={{fontSize:16,fontWeight:800,color:"#ff6b35",fontFamily:"'Syne',sans-serif"}}>👤 {tx.from}</div>
              </div>
              <div style={{fontSize:24,color:"#7c3aed"}}>→</div>
              <div style={{textAlign:"center",flex:1}}>
                <div style={{fontSize:9,color:"#888",marginBottom:4}}>À</div>
                <div style={{fontSize:16,fontWeight:800,color:"#00d4aa",fontFamily:"'Syne',sans-serif"}}>👤 {tx.to}</div>
              </div>
            </div>
          </div>
          <div style={{textAlign:"center",marginBottom:14}}>
            <div style={{fontSize:10,color:"#888",marginBottom:4}}>MONTANT TRANSFÉRÉ</div>
            <div style={{fontSize:32,fontWeight:800,color:"#a78bfa",fontFamily:"'Syne',sans-serif"}}>{fmt(tx.amount,currency)}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {tx.paymentMethod&&<div style={{background:"rgba(124,58,237,0.1)",borderRadius:8,padding:"8px 10px"}}><div style={{fontSize:9,color:"#888",marginBottom:2}}>MÉTHODE</div><div style={{color:"#ccc",fontSize:12,fontWeight:600}}>{tx.paymentMethod}</div></div>}
            {tx.date&&<div style={{background:"rgba(124,58,237,0.1)",borderRadius:8,padding:"8px 10px"}}><div style={{fontSize:9,color:"#888",marginBottom:2}}>DATE</div><div style={{color:"#ccc",fontSize:12,fontWeight:600}}>{fmtD(tx.date)}</div></div>}
          </div>
          {tx.note&&<div style={{marginTop:12,background:"rgba(124,58,237,0.1)",borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:9,color:"#888",marginBottom:4}}>NOTE / MOTIF</div><div style={{color:"#ccc",fontSize:12}}>{tx.note}</div></div>}
        </div>
        <div style={{display:"flex",gap:8,marginTop:4}}>
          <button onClick={()=>setEditMode(true)} style={{...btn("#1e1e1e","#fff"),flex:1}}>✏️ Modifier</button>
          <button onClick={handlePrint} style={{...btn("#0a1a14","#00d4aa"),flex:1,border:"1px solid #00d4aa33"}}>🖨 Imprimer</button>
          <button onClick={deleteTx} style={{...btn("#1a0a0a","#ff4757"),flex:1,border:"1px solid #ff4757"}}>🗑 Supprimer</button>
        </div>
      </Modal>
    );
  }

  // Expense invoice view
  if(tx.type==="expense"){
    return(
      <Modal title="Fiche Dépense" onClose={onClose}>
        <div id="tx-printable">
        {/* En-tête facture */}
        <div style={{background:"linear-gradient(135deg,#1a0a0a,#111)",border:"1px solid #ff475733",borderRadius:14,overflow:"hidden",marginBottom:12}}>
          <div style={{padding:"14px 16px",borderBottom:"1px solid #ff475722",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <div style={{fontSize:20,fontWeight:800,color:"#fff",fontFamily:"'Syne',sans-serif"}}>{tx.supplier||"Dépense"}</div>
              <div style={{fontSize:12,color:"#aaa",marginTop:2}}>{fmtD(tx.date)}{tx.time?` · ${tx.time}`:"" }{tx.location?" · "+tx.location:""}</div>
              {(tx.paidByTechs&&tx.paidByTechs.length>0)&&<div style={{fontSize:11,color:"#ff6b35",marginTop:3}}>💸 Payé par : {tx.paidByTechs.join(", ")}</div>}
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{fontSize:10,color:"#ff4757",background:"#ff475715",padding:"3px 8px",borderRadius:20,border:"1px solid #ff475733",fontWeight:700,marginBottom:4}}>DÉPENSE</div>
              <div style={{fontSize:11,color:"#aaa"}}>{tx.paymentMethod||""}</div>
            </div>
          </div>
          {/* Ticket de caisse - articles empilés verticalement */}
          {tx.items&&tx.items.length>0&&(
            <div style={{padding:"0 16px"}}>
              <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #2a2a2a"}}>
                <span style={{fontSize:10,color:"#999",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>Articles</span>
                <span style={{fontSize:10,color:"#999",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>Total</span>
              </div>
              {tx.items.map((it,i)=>{
                const qty=parseFloat(it.qty||1);
                const pu=parseFloat(it.unitPrice||0);
                const lineHT=it.priceMode==="ht"?qty*pu:qty*(pu/(1+(parseFloat(it.taxRate||0)/100)));
                const lineTTC=it.priceMode==="ttc"?qty*pu:qty*(pu*(1+(parseFloat(it.taxRate||0)/100)));
                const tva=parseFloat(it.taxRate||0);
                return(
                <div key={i} style={{padding:"10px 0",borderBottom:"1px solid #1a1a1a"}}>
                  {/* Article name + total TTC */}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,color:"#fff",fontWeight:600,lineHeight:1.3}}>{it.description}</div>
                      {it.ref&&<div style={{fontSize:10,color:"#888",marginTop:1}}>Réf: {it.ref}</div>}
                    </div>
                    <span style={{fontSize:14,color:"#ff4757",fontWeight:700,marginLeft:10,flexShrink:0}}>{lineTTC.toFixed(2)} {currency}</span>
                  </div>
                  {/* Details: qty × pu + TVA */}
                  <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                    <span style={{fontSize:10,color:"#888"}}>{qty} × {pu.toFixed(2)} {it.priceMode==="ht"?"HT":"TTC"}</span>
                    {tva>0&&<span style={{fontSize:10,color:"#888"}}>TVA {tva}%</span>}
                    {lineHT>0&&<span style={{fontSize:10,color:"#888"}}>HT: {lineHT.toFixed(2)} {currency}</span>}
                  </div>
                </div>
                );
              })}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0"}}>
                {tx.amountHT>0&&(
                  <div style={{flex:1}}>
                    <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0"}}><span style={{fontSize:11,color:"#888"}}>TOTAL HT</span><span style={{fontSize:13,color:"#aaa",fontWeight:600}}>{parseFloat(tx.amountHT).toFixed(2)} {currency}</span></div>
                    {tx.deliveryFees>0&&<div style={{display:"flex",justifyContent:"space-between",padding:"4px 0"}}><span style={{fontSize:11,color:"#888"}}>🚚 Livraison</span><span style={{fontSize:12,color:"#888"}}>{parseFloat(tx.deliveryFees).toFixed(2)} {currency}</span></div>}
                    {tx.discountAmount>0&&<div style={{display:"flex",justifyContent:"space-between",padding:"4px 0"}}><span style={{fontSize:11,color:"#ffa500"}}>🎟 Réduction{tx.discountType==="percent"?` (${tx.discount}%)`:" "}</span><span style={{fontSize:12,color:"#ffa500"}}>- {parseFloat(tx.discountAmount).toFixed(2)} {currency}</span></div>}
                    <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderTop:"1px solid #252525",marginTop:4}}>
                      <span style={{fontSize:13,color:"#fff",fontWeight:700,letterSpacing:1}}>TOTAL TTC</span>
                      <span style={{fontSize:20,color:"#ff4757",fontWeight:800,fontFamily:"'Syne',sans-serif"}}>{fmt(tx.amount,currency)}</span>
                    </div>
                  </div>
                )}
                {!tx.amountHT&&(
                  <>
                    <span style={{fontSize:13,color:"#fff",fontWeight:700,letterSpacing:1}}>TOTAL TTC</span>
                    <span style={{fontSize:20,color:"#ff4757",fontWeight:800,fontFamily:"'Syne',sans-serif"}}>{fmt(tx.amount,currency)}</span>
                  </>
                )}
              </div>
            </div>
          )}
          {/* Photo ticket */}
          {tx.receiptPhoto&&<img src={tx.receiptPhoto} style={{width:"100%",maxHeight:220,objectFit:"cover",borderTop:"1px solid #2a2a2a",display:"block"}}/>}
        </div>
        {/* Infos complémentaires */}
        {tx.remarks&&(
          <div style={{background:"#1a1a1a",borderRadius:10,padding:"10px 12px",marginBottom:10}}>
            <div style={{fontSize:10,color:"#aaa",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>Remarques</div>
            <div style={{color:"#ccc",fontSize:13,lineHeight:1.5}}>{tx.remarks}</div>
          </div>
        )}
        {tx.invoiceFile&&(
          <div style={{background:"#0a0a14",border:"1px solid #7c3aed33",borderRadius:10,padding:"10px 12px",marginBottom:10}}>
            <div style={{fontSize:10,color:"#a78bfa",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>Facture jointe</div>
            <a href={tx.invoiceFile.data} download={tx.invoiceFile.name} style={{color:"#a78bfa",fontSize:13,textDecoration:"none"}}>📎 {tx.invoiceFile.name}</a>
          </div>
        )}
        <div style={{display:"flex",gap:8,marginTop:8}}>
          <button onClick={()=>setEditMode(true)} style={{...btn("#1e1e1e","#fff"),flex:1}}>✏️ Modifier</button>
          <button onClick={handlePrint} style={{...btn("#0a1a14","#00d4aa"),flex:1,border:"1px solid #00d4aa33"}}>🖨 Imprimer</button>
          <button onClick={deleteTx} style={{...btn("#1a0a0a","#ff4757"),flex:1,border:"1px solid #ff4757"}}>🗑 Supprimer</button>
        </div>
        </div>
      </Modal>
    );
  }

  const allPrestations=[...(tx.prestations||[]),...(tx.customPrestation?[tx.customPrestation]:[])];
  const perItem=!tx.isGift&&tx.amount>0&&allPrestations.length>0?tx.amount/allPrestations.length:0;

  return(
    <Modal title="Fiche Lavage" onClose={onClose}>
      <div id="tx-printable">
      {/* ── BLOC FACTURE PRINCIPAL ── */}
      <div style={{background:"linear-gradient(160deg,#0a1a14,#0d0d0d)",border:"1px solid #00d4aa44",borderRadius:16,overflow:"hidden",marginBottom:10}}>

        {/* Photo véhicule */}
        {tx.carPhoto&&<img src={tx.carPhoto} style={{width:"100%",height:150,objectFit:"cover",display:"block"}}/>}

        {/* En-tête : véhicule + badge */}
        <div style={{padding:"14px 16px 10px",borderBottom:"1px solid #00d4aa18",display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:22,fontWeight:800,color:"#fff",fontFamily:"'Syne',sans-serif",lineHeight:1.1}}>
              {vehicleEmoji(tx.vehicleSize)} {v?`${v.brand} ${v.model}`:(tx.plate||"Véhicule")}
            </div>
            {tx.plate&&<div style={{fontSize:12,color:"#999",marginTop:3}}>Immatriculation : <span style={{color:"#aaa",fontWeight:600}}>{tx.plate}</span>{tx.vehicleSize&&<span style={{color:"#888"}}> · {tx.vehicleSize}</span>}</div>}
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontSize:10,color:"#00d4aa",background:"#00d4aa18",padding:"3px 10px",borderRadius:20,border:"1px solid #00d4aa44",fontWeight:700,marginBottom:4}}>
              {tx.isGift?"🎁 OFFERT":"✅ LAVAGE"}
            </div>
            {tx.invoiceNumber&&<div style={{fontSize:11,color:"#999",fontWeight:600}}>N° {tx.invoiceNumber}</div>}
          </div>
        </div>

        {/* Infos date / lieu / paiement */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:0,borderBottom:"1px solid #00d4aa18"}}>
          {[
            ["📅 Date", fmtD(tx.date)],
            ["💳 Paiement", tx.paymentMethod||"—"],
            tx.timeStart?["🕐 Horaire", `${tx.timeStart}${tx.timeEnd?" → "+tx.timeEnd:""}`]:null,
            tx.duration>0?["⏱ Durée", fmtT(tx.duration)]:null,
            tx.location?["📍 Lieu", tx.location]:null,
            tx.difficulty?["💪 Difficulté", "💪".repeat(tx.difficulty||1)]:null,
          ].filter(Boolean).map(([lbl,val],i)=>(
            <div key={i} style={{padding:"8px 16px",borderBottom:"1px solid #151515",borderRight:i%2===0?"1px solid #151515":"none"}}>
              <div style={{fontSize:9,color:"#999",marginBottom:1,textTransform:"uppercase",letterSpacing:0.5}}>{lbl}</div>
              <div style={{fontSize:12,color:"#ccc",fontWeight:500}}>{val}</div>
            </div>
          ))}
        </div>

        {/* Client */}
        {c&&(
          <div style={{padding:"10px 16px",borderBottom:"1px solid #00d4aa18",display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:32,height:32,background:"#0a1a14",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,border:"1px solid #00d4aa33",flexShrink:0}}>👤</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,color:"#fff",fontWeight:700}}>{c.firstName} {c.lastName}</div>
              {c.phone&&<div style={{fontSize:11,color:"#999"}}>📞 {c.phone}</div>}
              {(c.address||c.city)&&<div style={{fontSize:11,color:"#888",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>🏠 {c.address||[c.streetNum,c.streetName,c.zip,c.city].filter(Boolean).join(" ")}</div>}
            </div>
            {c.note>0&&<div style={{flexShrink:0,display:"flex",gap:1}}>{"★".repeat(c.note).split("").map((_,i)=><span key={i} style={{color:"#ffd700",fontSize:12}}>★</span>)}</div>}
          </div>
        )}

        {/* Techniciens */}
        {tx.technicians&&tx.technicians.length>0&&(
          <div style={{padding:"10px 16px",borderBottom:"1px solid #00d4aa18"}}>
            <div style={{fontSize:9,color:"#999",marginBottom:6,textTransform:"uppercase",letterSpacing:0.5}}>Technicien(s)</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {tx.technicians.map(t=><span key={t} style={{background:"#0a1a14",border:"1px solid #00d4aa33",color:"#00d4aa",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:600}}>👤 {t}</span>)}
            </div>
            {tx.paidToTechs&&tx.paidToTechs.length>0&&(
              <div style={{fontSize:10,color:"#888",marginTop:5}}>💰 Encaissé par : <span style={{color:"#7c3aed"}}>{tx.paidToTechs.join(", ")}</span></div>
            )}
          </div>
        )}

        {/* Tableau prestations */}
        {allPrestations.length>0&&(
          <div style={{padding:"0 16px"}}>
            <div style={{display:"flex",padding:"8px 0",borderBottom:"1px solid #1e1e1e"}}>
              <span style={{fontSize:9,color:"#888",fontWeight:700,flex:1,textTransform:"uppercase",letterSpacing:0.5}}>Prestation</span>
              <span style={{fontSize:9,color:"#888",fontWeight:700,width:75,textAlign:"right",textTransform:"uppercase",letterSpacing:0.5}}>Montant TTC</span>
            </div>
            {allPrestations.map((p,i)=>{
              const sp=tx.servicePrices&&tx.servicePrices[p]?parseFloat(tx.servicePrices[p]):0;
              const auto=!sp&&!tx.isGift&&tx.amount>0?tx.amount/allPrestations.length:0;
              const display=sp||auto;
              return(
              <div key={i} style={{display:"flex",alignItems:"center",padding:"9px 0",borderBottom:"1px solid #141414"}}>
                <div style={{flex:1,fontSize:13,color:"#e0e0e0",fontWeight:500}}>
                  <span style={{color:"#00d4aa44",marginRight:6}}>›</span>{p}
                </div>
                <span style={{width:75,textAlign:"right",fontSize:13,color:display>0?"#00d4aa":"#444",fontWeight:600}}>
                  {display>0?`${display.toFixed(2)} ${currency}`:"—"}
                </span>
              </div>
              );
            })}
            {/* Travel fees */}
            {tx.travelFees>0&&(
              <div style={{display:"flex",alignItems:"center",padding:"7px 0",borderBottom:"1px solid #141414"}}>
                <div style={{flex:1,fontSize:12,color:"#888"}}>🚗 Frais de déplacement</div>
                <span style={{width:75,textAlign:"right",fontSize:12,color:"#888"}}>{parseFloat(tx.travelFees).toFixed(2)} {currency}</span>
              </div>
            )}
            {/* Discount */}
            {tx.discountAmount>0&&(
              <div style={{display:"flex",alignItems:"center",padding:"7px 0",borderBottom:"1px solid #141414"}}>
                <div style={{flex:1,fontSize:12,color:"#ffa500"}}>🎟 Réduction{tx.discountType==="percent"?` (${tx.discount}%)`:" "}</div>
                <span style={{width:75,textAlign:"right",fontSize:12,color:"#ffa500"}}>- {parseFloat(tx.discountAmount).toFixed(2)} {currency}</span>
              </div>
            )}
            {/* HT / TTC totals */}
            {tx.amountHT>0&&(
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderTop:"1px solid #1e1e1e",marginTop:2}}>
                <span style={{fontSize:12,color:"#aaa"}}>TOTAL HT</span>
                <span style={{fontSize:14,color:"#aaa",fontWeight:700}}>{parseFloat(tx.amountHT).toFixed(2)} {currency}</span>
              </div>
            )}
            {tx.amountHT>0&&(
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0"}}>
                <span style={{fontSize:12,color:"#aaa"}}>TVA ({tx.taxRate||20}%)</span>
                <span style={{fontSize:12,color:"#aaa"}}>{(tx.amount-tx.amountHT).toFixed(2)} {currency}</span>
              </div>
            )}
            {/* Total TTC */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 0 14px",borderTop:"1px solid #252525",marginTop:2}}>
              <span style={{fontSize:14,color:"#fff",fontWeight:800,letterSpacing:0.5,fontFamily:"'Syne',sans-serif"}}>TOTAL TTC</span>
              <span style={{fontSize:22,color:tx.isGift?"#555":"#00d4aa",fontWeight:800,fontFamily:"'Syne',sans-serif"}}>
                {tx.isGift?"🎁 Offert":fmt(tx.amount,currency)}
              </span>
            </div>
          </div>
        )}

        {/* Total */}
        {allPrestations.length===0&&(
          <div style={{padding:"14px 16px",borderTop:"1px solid #1a1a1a"}}>
            {tx.amountHT>0&&(
              <>
                {tx.travelFees>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,color:"#aaa"}}>🚗 Frais de déplacement</span><span style={{fontSize:12,color:"#888"}}>{parseFloat(tx.travelFees).toFixed(2)} {currency}</span></div>}
                {tx.discountAmount>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,color:"#ffa500"}}>🎟 Réduction</span><span style={{fontSize:12,color:"#ffa500"}}>- {parseFloat(tx.discountAmount).toFixed(2)} {currency}</span></div>}
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,color:"#aaa"}}>TOTAL HT</span><span style={{fontSize:14,color:"#aaa",fontWeight:700}}>{parseFloat(tx.amountHT).toFixed(2)} {currency}</span></div>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:12,color:"#aaa"}}>TVA ({tx.taxRate||20}%)</span><span style={{fontSize:12,color:"#aaa"}}>{(tx.amount-tx.amountHT).toFixed(2)} {currency}</span></div>
              </>
            )}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:14,color:"#fff",fontWeight:800,letterSpacing:0.5,fontFamily:"'Syne',sans-serif"}}>TOTAL TTC</span>
              <span style={{fontSize:22,color:tx.isGift?"#555":"#00d4aa",fontWeight:800,fontFamily:"'Syne',sans-serif"}}>
                {tx.isGift?"🎁 Offert":fmt(tx.amount,currency)}
              </span>
            </div>
          </div>
        )}
        {/* Acompte */}
        {parseFloat(tx.deposit||0)>0&&(
          <div style={{padding:"8px 16px 12px",borderTop:"1px solid #1a1a1a"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
              <span style={{fontSize:11,color:"#aaa"}}>🏦 Acompte reçu</span>
              <span style={{fontSize:13,color:"#7c3aed",fontWeight:700}}>— {fmt(parseFloat(tx.deposit),currency)}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:11,color:"#aaa"}}>Reste à payer</span>
              <span style={{fontSize:14,color:"#ffa500",fontWeight:700}}>{fmt(Math.max(0,tx.amount-parseFloat(tx.deposit)),currency)}</span>
            </div>
            {tx.depositTechs&&tx.depositTechs.length>0&&(
              <div style={{fontSize:10,color:"#888",marginTop:4}}>Acompte encaissé par : <span style={{color:"#7c3aed"}}>{tx.depositTechs.join(", ")}</span></div>
            )}
          </div>
        )}
      </div>

      {/* Remarques */}
      {tx.remarks&&(
        <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:12,padding:"11px 14px",marginBottom:10}}>
          <div style={{fontSize:9,color:"#999",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>💬 Remarques</div>
          <div style={{color:"#aaa",fontSize:13,lineHeight:1.5}}>{tx.remarks}</div>
        </div>
      )}

      {/* Facture jointe */}
      {tx.invoiceFile&&(
        <div style={{background:"#0a0a14",border:"1px solid #7c3aed33",borderRadius:12,padding:"10px 14px",marginBottom:10}}>
          <div style={{fontSize:9,color:"#a78bfa",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>📎 Facture jointe</div>
          <a href={tx.invoiceFile.data} download={tx.invoiceFile.name} style={{color:"#a78bfa",fontSize:13,textDecoration:"none",fontWeight:600}}>{tx.invoiceFile.name}</a>
        </div>
      )}

      {/* Actions */}
      <div style={{display:"flex",gap:8,marginTop:4}}>
        <button onClick={()=>setEditMode(true)} style={{...btn("#1e1e1e","#fff"),flex:1}}>✏️ Modifier</button>
        <button onClick={handlePrint} style={{...btn("#0a1a14","#00d4aa"),flex:1,border:"1px solid #00d4aa33"}}>🖨 Imprimer</button>
        <button onClick={deleteTx} style={{...btn("#1a0a0a","#ff4757"),flex:1,border:"1px solid #ff4757"}}>🗑 Supprimer</button>
      </div>
      </div>
    </Modal>
  );
}
