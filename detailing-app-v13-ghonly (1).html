<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ===================== STORAGE =====================
const SK="detailing_v6";
const GH_CFG_KEY="detailing_github_cfg";
const DEF_SERVICES=["Lavage extérieur","Lavage intérieur","Lavage complet","Polissage","Céramique","Protection peinture","Traitement vitres","Nettoyage moteur","Décontamination","Lustrage","Rénovation phares","Tapis & sellerie","Correction peinture","Nano-coating"];
const CAR_SIZES=["citadine","berline","SUV","monospace","utilitaire","moto","autre"];
const DEF={settings:{companyName:"Mon Détailing",companyLogo:null,currency:"€",technicians:[],services:[...DEF_SERVICES]},revenues:[],expenses:[],clients:[],vehicles:[],locations:[],appointments:[]};

// --- GitHub config helpers (stored separately in localStorage) ---
const loadGHCfg=()=>{try{const r=localStorage.getItem(GH_CFG_KEY);return r?JSON.parse(r):{};}catch{return{};}};
const saveGHCfg=cfg=>{try{localStorage.setItem(GH_CFG_KEY,JSON.stringify(cfg));}catch{}};

// --- Local cache (only used as temporary cache when GitHub is configured) ---
const load=()=>{
  // If GitHub is configured, always start with DEF and let GitHub load override
  const ghCfgRaw=loadGHCfg();
  if(ghCfgRaw&&ghCfgRaw.token&&ghCfgRaw.owner&&ghCfgRaw.repo){
    // Try local cache first for instant render, GitHub will override shortly
    try{const r=localStorage.getItem(SK);if(r){const d=JSON.parse(r);return{...DEF,...d,settings:{...DEF.settings,...(d.settings||{})}};}}catch{}
    return DEF;
  }
  // No GitHub → use localStorage
  try{const r=localStorage.getItem(SK);if(r){const d=JSON.parse(r);return{...DEF,...d,settings:{...DEF.settings,...(d.settings||{})}};}}catch{}
  try{const r=localStorage.getItem("detailing_v5");if(r){const d=JSON.parse(r);return{...DEF,...d,settings:{...DEF.settings,...(d.settings||{})}};}}catch{}
  try{const r=localStorage.getItem("detailing_v4");if(r){const d=JSON.parse(r);return{...DEF,...d,settings:{...DEF.settings,...(d.settings||{})}};}}catch{}
  return DEF;
};
const save=d=>{try{localStorage.setItem(SK,JSON.stringify(d));}catch{}};
const clearLocalData=()=>{try{localStorage.removeItem(SK);localStorage.removeItem("detailing_v5");localStorage.removeItem("detailing_v4");}catch{}};

// --- GitHub API helpers ---
const ghHeaders=token=>({'Authorization':`token ${token}`,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'});

const ghLoadData=async(cfg)=>{
  const{token,owner,repo,branch="main",path="data.json"}=cfg;
  if(!token||!owner||!repo)return null;
  try{
    const res=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`,{headers:ghHeaders(token)});
    if(res.status===404)return null; // file doesn't exist yet
    if(!res.ok)return null;
    const json=await res.json();
    const _b64=json.content.replace(/\n/g,'');
    const _bin2=atob(_b64);
    const _arr=new Uint8Array(_bin2.length);
    for(let _i=0;_i<_bin2.length;_i++)_arr[_i]=_bin2.charCodeAt(_i);
    const decoded=JSON.parse(new TextDecoder('utf-8').decode(_arr));
    return{data:{...DEF,...decoded,settings:{...DEF.settings,...(decoded.settings||{})}},sha:json.sha};
  }catch{return null;}
};

const ghSaveData=async(cfg,dataObj,sha)=>{
  const{token,owner,repo,branch="main",path="data.json"}=cfg;
  if(!token||!owner||!repo)return{ok:false,sha};
  const _json=JSON.stringify(dataObj,null,2);
  const _enc=new TextEncoder().encode(_json);
  let _bin='';_enc.forEach(b=>_bin+=String.fromCharCode(b));
  const content=btoa(_bin);
  const body={message:`Update detailing data — ${new Date().toLocaleString('fr-FR')}`,content,branch};
  if(sha)body.sha=sha;
  try{
    const res=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`,{method:'PUT',headers:ghHeaders(token),body:JSON.stringify(body)});
    if(!res.ok){const e=await res.json();return{ok:false,error:e.message,sha};}
    const j=await res.json();
    return{ok:true,sha:j.content.sha};
  }catch(e){return{ok:false,error:e.message,sha};}
};

// ===================== UTILS =====================
const gid=()=>Math.random().toString(36).substr(2,9)+Date.now().toString(36);
const fmt=(n,c="€")=>`${Number(n||0).toFixed(2)} ${c}`;
const fmtD=d=>d?new Date(d).toLocaleDateString("fr-FR"):"";
const fmtT=min=>{if(!min)return"0min";const h=Math.floor(min/60),m=min%60;return h>0?`${h}h${m>0?m+"min":""}`:`${m}min`;};
const dMin=(s,e)=>{if(!s||!e)return 0;const[sh,sm]=s.split(":").map(Number);const[eh,em]=e.split(":").map(Number);return Math.max(0,(eh*60+em)-(sh*60+sm));};
const DAYS=["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
const MONTHS=["Jan","Fév","Mar","Avr","Mai","Juin","Juil","Août","Sep","Oct","Nov","Déc"];
const MONTHS_FULL=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];

// ===================== STYLE TOKENS =====================

// ===================== FILE INPUT HELPER =====================
// Accept all sources: camera, gallery, files
function FileInput({accept,capture,onChange,children,style}){
  const ref=useRef();
  return(
    <label style={{cursor:"pointer",...style}}>
      {children}
      <input ref={ref} type="file" accept={accept} onChange={onChange} style={{display:"none"}}/>

// ===================== SHARED COMPONENTS =====================
function Modal({title,onClose,children}){

      <div style={{background:"#111",borderRadius:"20px 20px 0 0",maxHeight:"94vh",overflow:"hidden",display:"flex",flexDirection:"column",border:"1px solid #222",borderBottom:"none"}}>

          <button onClick={onClose} style={{background:"#222",border:"none",color:"#fff",width:28,height:28,borderRadius:"50%",cursor:"pointer",fontSize:15}}>×</button>

function Field({label,children,required}){
  return(
    <div style={{marginBottom:12}}>
      <label style={{display:"block",fontSize:11,color:"#777",marginBottom:5,textTransform:"uppercase",letterSpacing:0.5}}>{label}{required&&<span style={{color:"#ff6b35"}}> *</span>}</label>

}

function InfoBlock({label,value,accent}){

    <div style={{background:"#1a1a1a",borderRadius:10,padding:"9px 11px"}}>
      <div style={{fontSize:10,color:"#666",marginBottom:2}}>{label}</div>

}

function EmojiRating({value,onChange,readonly}){

    <div style={{display:"flex",gap:4}}>
      {[1,2,3,4,5].map(i=>(
        <button key={i} onClick={()=>!readonly&&onChange&&onChange(i)} style={{background:"none",border:"none",fontSize:22,cursor:readonly?"default":"pointer",opacity:i<=value?1:0.2,padding:0}}>💪</button>
      ))}

  );
}

function StarRating({value,onChange,size=18,readonly}){
  return(
    <div style={{display:"flex",gap:1}}>
      {[1,2,3,4,5].map(i=>(
        <button key={i} onClick={()=>!readonly&&onChange&&onChange(i)} style={{background:"none",border:"none",fontSize:size,cursor:readonly?"default":"pointer",color:i<=value?"#ffd700":"#2a2a2a",padding:0}}>★</button>
      ))}
    </div>

}

// ===================== TECHNICIAN PICKER =====================
function TechnicianPicker({technicians,value,onChange}){
  if(!technicians||technicians.length===0)return(
    <div style={{color:"#444",fontSize:12,fontStyle:"italic"}}>Aucun technicien — ajoutez-en dans les Réglages.</div>
  );
  return(
    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
      {technicians.map(t=>{
        const sel=(value||[]).includes(t);
        return(
          <button key={t} onClick={()=>{const cur=value||[];onChange(sel?cur.filter(x=>x!==t):[...cur,t]);}}
            style={{background:sel?"#0a1a14":"#1a1a1a",border:`1px solid ${sel?"#00d4aa":"#252525"}`,color:sel?"#00d4aa":"#888",borderRadius:20,padding:"5px 12px",cursor:"pointer",fontSize:12,fontWeight:sel?700:400}}>
            👤 {t}
          </button>
        );
      })}
    </div>
  );
}

// ===================== SERVICES PICKER =====================
function ServicesPicker({services,value,onChange,customService,onCustomChange}){
  const list=services&&services.length>0?services:DEF_SERVICES;
  return(
    <div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:6}}>
        {list.map(s=>{
          const sel=(value||[]).includes(s);
          return(
            <button key={s} onClick={()=>{const cur=value||[];onChange(sel?cur.filter(x=>x!==s):[...cur,s]);}}
              style={{background:sel?"#0a1a14":"#1a1a1a",border:`1px solid ${sel?"#00d4aa":"#252525"}`,color:sel?"#00d4aa":"#666",borderRadius:20,padding:"4px 10px",cursor:"pointer",fontSize:11,fontWeight:sel?700:400}}>
              {s}
            </button>
          );
        })}
      </div>
      <input style={inp} placeholder="Prestation personnalisée..." value={customService||""} onChange={e=>onCustomChange(e.target.value)}/>
    </div>

}

function BarChart({data,color="#00d4aa",height=90}){
  const max=Math.max(...data.map(d=>d.value),1);
  const fmtVal=v=>{if(v===0)return"";if(v>=1000)return`${(v/1000).toFixed(1)}k`;return v%1===0?v:v.toFixed(1);};
  return(
    <div style={{display:"flex",alignItems:"flex-end",gap:3,height:height+20,padding:"0 2px"}}>
      {data.map((d,i)=>{
        const barH=Math.max(2,(d.value/max)*(height-18));
        return(
          <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",height:"100%"}}>
            {d.value>0&&<span style={{fontSize:7,color:d.highlight?"#ff6b35":color,fontWeight:700,marginBottom:2,whiteSpace:"nowrap",textAlign:"center"}}>{fmtVal(d.value)}</span>}
            <div style={{width:"100%",height:barH,background:d.highlight?"#ff6b35":color,borderRadius:"3px 3px 0 0",opacity:d.value===0?0.15:1,transition:"height 0.4s"}}/>
            <span style={{fontSize:8,color:"#666",marginTop:2,whiteSpace:"nowrap"}}>{d.label}</span>
          </div>
        );
      })}
    </div>
  );
}

// ===================== CLIENT SEARCH =====================
function ClientSearch({data,value,onSelect,onClear,label="Client"}){
  const[q,setQ]=useState(value||"");
  const[show,setShow]=useState(false);
  const filtered=data.clients.filter(c=>`${c.firstName} ${c.lastName}`.toLowerCase().includes(q.toLowerCase()));
  const pick=c=>{setQ(`${c.firstName} ${c.lastName}`);setShow(false);onSelect(c);};
  return(
    <div style={{position:"relative"}}>
      <input style={inp} placeholder="Rechercher un client..." value={q}
        onChange={e=>{setQ(e.target.value);setShow(true);if(!e.target.value)onClear&&onClear();}}
        onFocus={()=>setShow(true)}/>
      {show&&q&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#1a1a1a",border:"1px solid #252525",borderRadius:10,zIndex:300,maxHeight:140,overflowY:"auto"}}>
          {filtered.map(c=>(
            <div key={c.id} onClick={()=>pick(c)} style={{padding:"9px 11px",cursor:"pointer",color:"#fff",fontSize:13,borderBottom:"1px solid #252525"}}>
              👤 {c.firstName} {c.lastName} {c.phone?`— ${c.phone}`:""}
            </div>
          ))}
          {filtered.length===0&&<div style={{padding:"9px 11px",color:"#666",fontSize:12}}>Aucun client trouvé</div>}
        </div>
      )}
    </div>
  );
}

// ===================== VEHICLE SEARCH =====================
function VehicleSearch({data,onSelect,onClear,initialValue=""}){
  const[q,setQ]=useState(initialValue);
  const[show,setShow]=useState(false);
  const filtered=data.vehicles.filter(v=>`${v.plate} ${v.brand} ${v.model}`.toLowerCase().includes(q.toLowerCase()));
  const pick=v=>{setQ(`${v.plate} — ${v.brand} ${v.model}`);setShow(false);onSelect(v);};
  return(
    <div style={{position:"relative"}}>
      <input style={inp} placeholder="Plaque, marque, modèle..." value={q}
        onChange={e=>{setQ(e.target.value);setShow(true);onClear&&onClear();}}
        onFocus={()=>setShow(true)}/>
      {show&&q&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#1a1a1a",border:"1px solid #252525",borderRadius:10,zIndex:300,maxHeight:140,overflowY:"auto"}}>
          {filtered.map(v=>(
            <div key={v.id} onClick={()=>pick(v)} style={{padding:"9px 11px",cursor:"pointer",color:"#fff",fontSize:13,borderBottom:"1px solid #252525"}}>

// ===================== ADDRESS FIELDS =====================
function AddressFields({streetNum,streetName,zip,city,onChange}){

  return(
    <div style={{display:"grid",gridTemplateColumns:"80px 1fr",gap:6,marginBottom:0}}>
      <input style={inp} placeholder="N° rue" value={streetNum||""} onChange={e=>set("streetNum",e.target.value)}/>
      <input style={inp} placeholder="Nom de rue" value={streetName||""} onChange={e=>set("streetName",e.target.value)}/>
      <input style={inp} placeholder="Code postal" value={zip||""} onChange={e=>set("zip",e.target.value)}/>
      <input style={inp} placeholder="Ville" value={city||""} onChange={e=>set("city",e.target.value)}/>
    </div>

}
function fmtAddr(streetNum,streetName,zip,city){return [streetNum,streetName,zip,city].filter(Boolean).join(" ")||"";}

// ===================== LOCATION SEARCH =====================
function LocationSearch({data,value,onChange,onSave}){
  const[q,setQ]=useState(value||"");
  const[show,setShow]=useState(false);
  const locs=data.locations||[];
  const filtered=locs.filter(l=>l.toLowerCase().includes(q.toLowerCase()));
  const pick=l=>{setQ(l);setShow(false);onChange(l);};
  const handleBlur=()=>{
    setTimeout(()=>{
      setShow(false);
      if(q&&!locs.includes(q)){onSave&&onSave(q);}
      onChange(q);
    },200);
  };
  return(
    <div style={{position:"relative"}}>
      <input style={inp} placeholder="Ville, adresse..." value={q}
        onChange={e=>{setQ(e.target.value);setShow(true);onChange(e.target.value);}}
        onFocus={()=>setShow(true)}
        onBlur={handleBlur}/>
      {show&&q&&filtered.length>0&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#1a1a1a",border:"1px solid #252525",borderRadius:10,zIndex:300,maxHeight:120,overflowY:"auto"}}>
          {filtered.map((l,i)=>(
            <div key={i} onClick={()=>pick(l)} style={{padding:"9px 11px",cursor:"pointer",color:"#fff",fontSize:13,borderBottom:"1px solid #252525"}}>
              📍 {l}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ===================== PHOTO UPLOAD =====================
function PhotoUpload({photo,onPhoto,onRemove,label="Photo"}){
  const handleFile=e=>{
    const f=e.target.files[0];
    if(!f)return;
    const r=new FileReader();
    r.onload=ev=>onPhoto(ev.target.result);
    r.readAsDataURL(f);
  };
  return(
    <div style={{display:"flex",gap:10,alignItems:"center"}}>
      {photo
        ?<div style={{position:"relative"}}>
          <img src={photo} style={{width:80,height:60,objectFit:"cover",borderRadius:8,border:"1px solid #252525"}}/>
          <button onClick={onRemove} style={{position:"absolute",top:-6,right:-6,background:"#ff4757",border:"none",color:"#fff",width:18,height:18,borderRadius:"50%",cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>
        :<div style={{width:80,height:60,background:"#1a1a1a",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,border:"2px dashed #252525"}}>🚗</div>
      }
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        <label style={{background:"#1e1e1e",border:"1px solid #252525",color:"#ccc",padding:"6px 11px",borderRadius:8,cursor:"pointer",fontSize:12,textAlign:"center"}}>
          📷 Caméra
          <input type="file" accept="image/*" capture="environment" onChange={handleFile} style={{display:"none"}}/>
        </label>
        <label style={{background:"#1e1e1e",border:"1px solid #252525",color:"#ccc",padding:"6px 11px",borderRadius:8,cursor:"pointer",fontSize:12,textAlign:"center"}}>
          🖼 Galerie / Fichiers
          <input type="file" accept="image/*,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document" onChange={handleFile} style={{display:"none"}}/>
        </label>
      </div>
    </div>
  );
}

// ===================== GENERIC FILE UPLOAD =====================
function DocUpload({file,onFile,label="Document"}){
  const handleFile=e=>{
    const f=e.target.files[0];
    if(!f)return;
    const r=new FileReader();
    r.onload=ev=>onFile({name:f.name,data:ev.target.result,type:f.type});
    r.readAsDataURL(f);
  };
  return(
    <div>
      {file&&(
        <div style={{background:"#0a1a14",border:"1px solid #00d4aa33",borderRadius:8,padding:"6px 10px",marginBottom:6,fontSize:12,color:"#00d4aa"}}>

        <label style={{flex:1,background:"#1a1a1a",border:"1px dashed #333",color:"#666",padding:"8px",borderRadius:10,cursor:"pointer",fontSize:12,textAlign:"center"}}>
          📷 Photo/Caméra
          <input type="file" accept="image/*" capture="environment" onChange={handleFile} style={{display:"none"}}/>
        </label>
        <label style={{flex:1,background:"#1a1a1a",border:"1px dashed #333",color:"#666",padding:"8px",borderRadius:10,cursor:"pointer",fontSize:12,textAlign:"center"}}>
          📂 Fichiers

        </label>

  );
}

// ===================== ADD / EDIT REVENUE FORM =====================
function RevenueForm({data,setData,onSave,editItem,prefill}){
  const today=new Date().toISOString().split("T")[0];
  const techs=(data.settings&&data.settings.technicians)||[];
  const services=(data.settings&&data.settings.services)||DEF_SERVICES;
  const base=editItem||prefill||{};
  const[form,setForm]=useState({
    date:today,timeStart:"",timeEnd:"",
    vehicleId:"",plate:"",brand:"",model:"",vehicleSize:"berline",difficulty:3,
    clientId:"",clientFirst:"",clientLast:"",clientPhone:"",
    clientStreetNum:"",clientStreetName:"",clientZip:"",clientCity:"",clientNote:3,
    amount:"",locationStreetNum:"",locationStreetName:"",locationZip:"",locationCity:"",
    paymentMethod:"espèce",paidToTech:"",remarks:"",invoiceNumber:"",
    invoiceFile:null,carPhoto:null,isGift:false,
    technicians:[],prestations:[],customPrestation:"",
    ...base,
    clientStreetNum:base.clientStreetNum||"",clientStreetName:base.clientStreetName||"",
    clientZip:base.clientZip||"",clientCity:base.clientCity||"",
    locationStreetNum:base.locationStreetNum||"",locationStreetName:base.locationStreetName||"",
    locationZip:base.locationZip||"",locationCity:base.locationCity||"",
    vehicleSize:base.vehicleSize||"berline",
    paidToTechs:base.paidToTechs||(base.paidToTech?[base.paidToTech]:[]),
    invoiceNumber:base.invoiceNumber||""
  });
  const[newVehicle,setNewVehicle]=useState(!editItem&&!prefill);
  const[newClient,setNewClient]=useState(!editItem&&!prefill);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const dur=dMin(form.timeStart,form.timeEnd);

  // Vehicle selected → auto-fill owner
  const selectVehicle=v=>{
    set("vehicleId",v.id);set("plate",v.plate);set("brand",v.brand);set("model",v.model);set("vehicleSize",v.size||"berline");
    setNewVehicle(false);
    // Auto-fill owner if vehicle has one
    if(v.ownerId){
      const owner=data.clients.find(c=>c.id===v.ownerId);
      if(owner){
        setForm(f=>({...f,vehicleId:v.id,plate:v.plate,brand:v.brand,model:v.model,vehicleSize:v.size||"berline",
          clientId:owner.id,clientFirst:owner.firstName,clientLast:owner.lastName,clientPhone:owner.phone||"",
          clientNote:owner.note||3,clientStreetNum:owner.streetNum||"",clientStreetName:owner.streetName||"",
          clientZip:owner.zip||"",clientCity:owner.city||""}));
        setNewClient(false);
        return;
      }
    }
  };
  const clearVehicle=()=>{set("vehicleId","");setNewVehicle(true);};
  const selectClient=c=>{set("clientId",c.id);set("clientFirst",c.firstName);set("clientLast",c.lastName);set("clientPhone",c.phone||"");set("clientNote",c.note||3);set("clientStreetNum",c.streetNum||"");set("clientStreetName",c.streetName||"");set("clientZip",c.zip||"");set("clientCity",c.city||"");setNewClient(false);};
  const clearClient=()=>{set("clientId","");setNewClient(true);};

  const saveLocation=loc=>{
    if(!loc)return;
    const locs=data.locations||[];
    if(!locs.includes(loc)){
      const nd={...data,locations:[...locs,loc]};
      setData(nd);save(nd);
    }
  };

  const handleSave=()=>{
    if(!form.isGift&&!form.amount)return alert("Montant requis");
    if(!form.plate&&!form.vehicleId)return alert("Véhicule requis");
    const nd={...data};
    let cid=form.clientId,vid=form.vehicleId;
    if(!cid&&form.clientFirst){
      const addr=fmtAddr(form.clientStreetNum,form.clientStreetName,form.clientZip,form.clientCity);
      const nc={id:gid(),firstName:form.clientFirst,lastName:form.clientLast,phone:form.clientPhone,address:addr,streetNum:form.clientStreetNum,streetName:form.clientStreetName,zip:form.clientZip,city:form.clientCity,note:form.clientNote};
      nd.clients=[...nd.clients,nc];cid=nc.id;
    }
    if(!vid&&form.plate){
      const pt=form.plate.toUpperCase().replace(/[^A-Z0-9]/g,"");
      const ev=nd.vehicles.find(v=>v.plate===pt);
      if(ev){vid=ev.id;}else{const nv={id:gid(),plate:pt,brand:form.brand,model:form.model,size:form.vehicleSize||"berline",ownerId:cid||""};nd.vehicles=[...nd.vehicles,nv];vid=nv.id;}
    }
    // Update vehicle ownerId if not set and we have a client
    if(vid&&cid){const vi=nd.vehicles.findIndex(v=>v.id===vid);if(vi>=0&&!nd.vehicles[vi].ownerId){nd.vehicles=[...nd.vehicles];nd.vehicles[vi]={...nd.vehicles[vi],ownerId:cid};}}
    const location=fmtAddr(form.locationStreetNum,form.locationStreetName,form.locationZip,form.locationCity);
    if(location)saveLocation(location);
    // Compute paidToTechs default: if single tech and none selected, auto-assign
    let paidToTechs=form.paidToTechs||[];
    if(paidToTechs.length===0&&form.technicians&&form.technicians.length===1)paidToTechs=[form.technicians[0]];
    const rev={...form,id:editItem?form.id:gid(),clientId:cid,vehicleId:vid,amount:form.isGift?0:parseFloat(form.amount||0),duration:dur,type:"revenue",location,paidToTechs,paidToTech:paidToTechs[0]||""};
    if(editItem){
      nd.revenues=nd.revenues.map(r=>r.id===rev.id?rev:r);
    }else{
      nd.revenues=[...nd.revenues,rev];
    }
    setData(nd);save(nd);onSave();
  };

  return(
    <div>
      <Field label="Photo du véhicule (couverture)">
        <PhotoUpload photo={form.carPhoto} onPhoto={v=>set("carPhoto",v)} onRemove={()=>set("carPhoto",null)}/>
      </Field>

      <Field label="Véhicule" required>
        <VehicleSearch data={data} onSelect={selectVehicle} onClear={clearVehicle}
          initialValue={editItem&&form.plate?`${form.plate} — ${form.brand} ${form.model}`:""}/>
      </Field>
      {(newVehicle||!form.vehicleId)&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:12}}>
          <input style={inp} placeholder="Plaque *" value={form.plate} onChange={e=>set("plate",e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,""))}/>
          <input style={inp} placeholder="Marque" value={form.brand} onChange={e=>set("brand",e.target.value)}/>
          <input style={inp} placeholder="Modèle" value={form.model} onChange={e=>set("model",e.target.value)}/>
        </div>
      )}
      <Field label="Taille du véhicule">
        <select style={inp} value={form.vehicleSize||"berline"} onChange={e=>set("vehicleSize",e.target.value)}>
          {CAR_SIZES.map(s=><option key={s}>{s}</option>)}
        </select>
      </Field>

      <Field label="Client (propriétaire)">
        {form.clientId&&!newClient
          ?<div style={{background:"#0a1a14",border:"1px solid #00d4aa33",borderRadius:10,padding:"9px 11px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{color:"#00d4aa",fontSize:13}}>👤 {form.clientFirst} {form.clientLast}</span>
            <button onClick={clearClient} style={{background:"none",border:"none",color:"#666",cursor:"pointer",fontSize:18,padding:0}}>×</button>
          </div>
          :<ClientSearch data={data} value={""} onSelect={selectClient} onClear={clearClient}/>
        }
        <label style={{display:"flex",alignItems:"center",gap:6,marginTop:6,color:"#777",fontSize:12,cursor:"pointer"}}>
          <input type="checkbox" checked={newClient||!form.clientId} onChange={e=>{setNewClient(e.target.checked);if(e.target.checked)clearClient();}}/>
          Nouveau client
        </label>
      </Field>
      {(newClient||!form.clientId)&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:12}}>
          <input style={inp} placeholder="Prénom" value={form.clientFirst} onChange={e=>set("clientFirst",e.target.value)}/>
          <input style={inp} placeholder="Nom" value={form.clientLast} onChange={e=>set("clientLast",e.target.value)}/>
          <input style={inp} placeholder="Téléphone" value={form.clientPhone} onChange={e=>set("clientPhone",e.target.value)}/>
          <input style={inp} placeholder="N° rue" value={form.clientStreetNum||""} onChange={e=>set("clientStreetNum",e.target.value)}/>
          <input style={{...inp,gridColumn:"1/-1"}} placeholder="Nom de rue" value={form.clientStreetName||""} onChange={e=>set("clientStreetName",e.target.value)}/>
          <input style={inp} placeholder="Code postal" value={form.clientZip||""} onChange={e=>set("clientZip",e.target.value)}/>
          <input style={inp} placeholder="Ville" value={form.clientCity||""} onChange={e=>set("clientCity",e.target.value)}/>
          <div style={{gridColumn:"1/-1"}}>
            <label style={{fontSize:11,color:"#777",display:"block",marginBottom:4}}>Note client</label>
            <StarRating value={form.clientNote} onChange={v=>set("clientNote",v)}/>
          </div>
        </div>
      )}

      <Field label="Difficulté"><EmojiRating value={form.difficulty} onChange={v=>set("difficulty",v)}/></Field>

      <Field label="Technicien(s) ayant effectué le lavage">
        <TechnicianPicker technicians={techs} value={form.technicians} onChange={v=>set("technicians",v)}/>
      </Field>

      <Field label="Prestations réalisées">
        <ServicesPicker services={services} value={form.prestations} onChange={v=>set("prestations",v)} customService={form.customPrestation} onCustomChange={v=>set("customPrestation",v)}/>
      </Field>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Field label="Date" required><input type="date" style={inp} value={form.date} onChange={e=>set("date",e.target.value)}/></Field>
        <Field label="Heure début"><input type="time" style={inp} value={form.timeStart} onChange={e=>set("timeStart",e.target.value)}/></Field>
        <Field label="Heure fin"><input type="time" style={inp} value={form.timeEnd} onChange={e=>set("timeEnd",e.target.value)}/></Field>
        <Field label="N° Facture"><input style={inp} placeholder="FAC-001" value={form.invoiceNumber||""} onChange={e=>set("invoiceNumber",e.target.value)}/></Field>
      </div>
      <Field label="Lieu de la prestation">
        <AddressFields streetNum={form.locationStreetNum} streetName={form.locationStreetName} zip={form.locationZip} city={form.locationCity}
          onChange={v=>setForm(f=>({...f,locationStreetNum:v.streetNum,locationStreetName:v.streetName,locationZip:v.zip,locationCity:v.city}))}/>
      </Field>
      {dur>0&&<div style={{background:"#0a1a14",border:"1px solid #00d4aa33",borderRadius:10,padding:"7px 11px",marginBottom:12,color:"#00d4aa",fontSize:13}}>⏱ Durée : <strong>{fmtT(dur)}</strong></div>}

      <Field label="Montant">
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <input type="number" style={{...inp,flex:1}} placeholder="0.00" value={form.amount} onChange={e=>set("amount",e.target.value)} disabled={form.isGift}/>
          <label style={{display:"flex",alignItems:"center",gap:6,color:"#777",fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>
            <input type="checkbox" checked={form.isGift} onChange={e=>set("isGift",e.target.checked)}/> 🎁 Offert
          </label>
        </div>
      </Field>
      <Field label="Encaissement">
        <select style={inp} value={form.paymentMethod} onChange={e=>set("paymentMethod",e.target.value)}>
          {["espèce","carte","chèque","virement"].map(m=><option key={m}>{m}</option>)}
        </select>
      </Field>
      {techs.length>0&&(
        <Field label="Argent reçu par (sélectionner ceux qui ont encaissé)">
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {techs.map(t=>{
              const sel=(form.paidToTechs||[]).includes(t);
              return<button key={t} type="button" onClick={()=>{const cur=form.paidToTechs||[];set("paidToTechs",sel?cur.filter(x=>x!==t):[...cur,t]);}}
                style={{background:sel?"#0a1a14":"#1a1a1a",border:`1px solid ${sel?"#00d4aa":"#252525"}`,color:sel?"#00d4aa":"#888",borderRadius:20,padding:"5px 12px",cursor:"pointer",fontSize:12,fontWeight:sel?700:400}}>
                💰 {t}
              </button>;
            })}
          </div>
          {(form.paidToTechs||[]).length>1&&!form.isGift&&form.amount&&(
            <div style={{background:"#0a1a14",border:"1px solid #00d4aa22",borderRadius:8,padding:"6px 10px",marginTop:6,fontSize:12,color:"#00d4aa"}}>
              Part par personne : {(parseFloat(form.amount||0)/(form.paidToTechs||[]).length).toFixed(2)} {(data.settings&&data.settings.currency)||"€"} chacun
            </div>
          )}
        </Field>
      )}
      <Field label="Remarques"><textarea style={{...inp,minHeight:60,resize:"vertical"}} value={form.remarks} onChange={e=>set("remarks",e.target.value)}/></Field>
      <Field label="Facture">
        <DocUpload file={form.invoiceFile} onFile={v=>set("invoiceFile",v)}/>
      </Field>

      <button onClick={handleSave} style={{...btn("linear-gradient(135deg,#00d4aa,#00a882)","#000"),width:"100%",padding:"13px",fontSize:15,marginTop:4}}>
        ✅ {editItem?"Modifier":"Enregistrer"} le revenu
      </button>
    </div>
  );
}

// ===================== ADD / EDIT EXPENSE FORM =====================
function ExpenseForm({data,setData,onSave,editItem}){
  const today=new Date().toISOString().split("T")[0];
  const techs=(data.settings&&data.settings.technicians)||[];
  const mkItem=()=>({id:gid(),ref:"",description:"",qty:1,unitPrice:""});
  const[form,setForm]=useState(editItem?{...editItem,items:editItem.items||[mkItem()],locationStreetNum:editItem.locationStreetNum||"",locationStreetName:editItem.locationStreetName||"",locationZip:editItem.locationZip||"",locationCity:editItem.locationCity||"",paidByTechs:editItem.paidByTechs||(editItem.paidByTech?[editItem.paidByTech]:[])}:{
    items:[mkItem()],supplier:"",locationStreetNum:"",locationStreetName:"",locationZip:"",locationCity:"",date:today,
    paymentMethod:"espèce",invoiceFile:null,remarks:"",paidByTechs:[]
  });
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const setItem=(idx,k,v)=>setForm(f=>{const items=[...f.items];items[idx]={...items[idx],[k]:v};return{...f,items};});
  const addItem=()=>setForm(f=>({...f,items:[...f.items,mkItem()]}));
  const removeItem=idx=>setForm(f=>({...f,items:f.items.filter((_,i)=>i!==idx)}));
  const total=form.items.reduce((s,it)=>s+(parseFloat(it.qty||0)*parseFloat(it.unitPrice||0)),0);
  const cur=(data.settings&&data.settings.currency)||"€";
  const saveLocation=loc=>{if(!loc)return;const locs=data.locations||[];if(!locs.includes(loc)){const nd={...data,locations:[...locs,loc]};setData(nd);save(nd);}};
  const handleSave=()=>{
    if(!form.items[0].description)return alert("Au moins un article requis");
    if(total<=0)return alert("Montant total requis");
    const location=fmtAddr(form.locationStreetNum,form.locationStreetName,form.locationZip,form.locationCity);
    if(location)saveLocation(location);
    const exp={...form,id:editItem?form.id:gid(),amount:total,type:"expense",productName:form.items.map(it=>it.description).join(", "),location,paidByTechs:form.paidByTechs||[],paidByTech:(form.paidByTechs||[])[0]||""};
    const nd={...data};
    if(editItem){nd.expenses=nd.expenses.map(e=>e.id===exp.id?exp:e);}
    else{nd.expenses=[...nd.expenses,exp];}
    setData(nd);save(nd);onSave();
  };
  return(
    <div>
      <Field label="Fournisseur / Magasin">
        <input style={inp} placeholder="Amazon, Meguiar's, Norauto..." value={form.supplier||""} onChange={e=>set("supplier",e.target.value)}/>
      </Field>
      <div style={{marginBottom:12}}>
        <label style={{display:"block",fontSize:11,color:"#777",marginBottom:5,textTransform:"uppercase",letterSpacing:0.5}}>Articles <span style={{color:"#ff6b35"}}>*</span></label>
        {form.items.map((item,idx)=>(
          <div key={item.id} style={{background:"#1a1a1a",border:"1px solid #252525",borderRadius:10,padding:"9px",marginBottom:8}}>
            <div style={{display:"flex",gap:6,marginBottom:6}}>
              <input style={{...inp,flex:"0 0 80px",fontSize:12}} placeholder="Réf." value={item.ref} onChange={e=>setItem(idx,"ref",e.target.value)}/>
              <input style={{...inp,flex:1,fontSize:12}} placeholder="Description *" value={item.description} onChange={e=>setItem(idx,"description",e.target.value)}/>
              {form.items.length>1&&<button onClick={()=>removeItem(idx)} style={{background:"#ff475715",border:"1px solid #ff4757",color:"#ff4757",borderRadius:8,width:28,height:28,cursor:"pointer",flexShrink:0,fontSize:15,lineHeight:1}}>×</button>}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              <div style={{display:"flex",alignItems:"center",gap:5}}><span style={{fontSize:11,color:"#666",whiteSpace:"nowrap"}}>Qté</span><input type="number" style={{...inp,fontSize:12}} min="1" value={item.qty} onChange={e=>setItem(idx,"qty",e.target.value)}/></div>
              <div style={{display:"flex",alignItems:"center",gap:5}}><span style={{fontSize:11,color:"#666",whiteSpace:"nowrap"}}>Prix unit.</span><input type="number" style={{...inp,fontSize:12}} placeholder="0.00" value={item.unitPrice} onChange={e=>setItem(idx,"unitPrice",e.target.value)}/></div>
            </div>
            {item.qty&&item.unitPrice?<div style={{textAlign:"right",fontSize:12,color:"#00d4aa",marginTop:4}}>= {(parseFloat(item.qty)*parseFloat(item.unitPrice)).toFixed(2)} {cur}</div>:null}
          </div>
        ))}
        <button onClick={addItem} style={{width:"100%",background:"#0a1a14",border:"1px dashed #00d4aa44",color:"#00d4aa",borderRadius:10,padding:"8px",cursor:"pointer",fontSize:12,fontWeight:600}}>+ Ajouter un article</button>
        {total>0&&<div style={{background:"#0a1a14",border:"1px solid #00d4aa33",borderRadius:10,padding:"7px 11px",marginTop:8,display:"flex",justifyContent:"space-between"}}><span style={{color:"#666",fontSize:12}}>TOTAL</span><span style={{color:"#00d4aa",fontWeight:700,fontSize:15}}>{total.toFixed(2)} {cur}</span></div>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Field label="Date" required><input type="date" style={inp} value={form.date} onChange={e=>set("date",e.target.value)}/></Field>
        <Field label="Paiement"><select style={inp} value={form.paymentMethod} onChange={e=>set("paymentMethod",e.target.value)}>{["espèce","carte","chèque","virement","prélèvement"].map(m=><option key={m}>{m}</option>)}</select></Field>
      </div>
      {techs.length>0&&(
        <Field label="Payé par (ceux qui ont avancé l'argent)">
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {techs.map(t=>{
              const sel=(form.paidByTechs||[]).includes(t);
              return<button key={t} type="button" onClick={()=>{const cur=form.paidByTechs||[];set("paidByTechs",sel?cur.filter(x=>x!==t):[...cur,t]);}}
                style={{background:sel?"#1a0a0a":"#1a1a1a",border:`1px solid ${sel?"#ff4757":"#252525"}`,color:sel?"#ff4757":"#888",borderRadius:20,padding:"5px 12px",cursor:"pointer",fontSize:12,fontWeight:sel?700:400}}>
                💸 {t}
              </button>;
            })}
          </div>
          {(form.paidByTechs||[]).length>0&&total>0&&(
            <div style={{background:"#1a0a0a",border:"1px solid #ff475722",borderRadius:8,padding:"6px 10px",marginTop:6,fontSize:12,color:"#ff6b35"}}>
              {(form.paidByTechs||[]).length===1
                ? `${form.paidByTechs[0]} a payé ${total.toFixed(2)} ${cur} — les autres doivent leur part`
                : `Part par payeur : ${(total/(form.paidByTechs||[]).length).toFixed(2)} ${cur} chacun`
              }
            </div>
          )}
          <div style={{fontSize:11,color:"#555",marginTop:4}}>La dépense est partagée équitablement entre tous les techniciens.</div>
        </Field>
      )}
      <Field label="Lieu / Magasin">
        <AddressFields streetNum={form.locationStreetNum} streetName={form.locationStreetName} zip={form.locationZip} city={form.locationCity}
          onChange={v=>setForm(f=>({...f,locationStreetNum:v.streetNum,locationStreetName:v.streetName,locationZip:v.zip,locationCity:v.city}))}/>
      </Field>
      <Field label="Remarques"><textarea style={{...inp,minHeight:60,resize:"vertical"}} value={form.remarks} onChange={e=>set("remarks",e.target.value)}/></Field>
      <Field label="Facture"><DocUpload file={form.invoiceFile} onFile={v=>set("invoiceFile",v)}/></Field>
      <button onClick={handleSave} style={{...btn("linear-gradient(135deg,#ff4757,#cc1a2e)","#fff"),width:"100%",padding:"13px",fontSize:15,marginTop:4}}>
        ✅ {editItem?"Modifier":"Enregistrer"} la dépense
      </button>
    </div>
  );
}

// ===================== TX DETAIL =====================
function TxDetail({tx,data,setData,onClose}){
  const[editMode,setEditMode]=useState(false);
  const v=data.vehicles.find(v=>v.id===tx.vehicleId);
  const c=data.clients.find(c=>c.id===tx.clientId);

  const deleteTx=()=>{
    if(!window.confirm("Supprimer cette fiche ?"))return;
    const nd={...data};
    if(tx.type==="revenue")nd.revenues=nd.revenues.filter(r=>r.id!==tx.id);
    else nd.expenses=nd.expenses.filter(e=>e.id!==tx.id);
    setData(nd);save(nd);onClose();
  };

  if(editMode){
    return(
      <Modal title={tx.type==="revenue"?"Modifier le lavage":"Modifier la dépense"} onClose={()=>setEditMode(false)}>
        {tx.type==="revenue"
          ?<RevenueForm data={data} setData={setData} editItem={tx} onSave={()=>{setEditMode(false);onClose();}}/>
          :<ExpenseForm data={data} setData={setData} editItem={tx} onSave={()=>{setEditMode(false);onClose();}}/>
        }
      </Modal>
    );
  }

  return(
    <Modal title={tx.type==="revenue"?"Fiche Lavage":"Fiche Dépense"} onClose={onClose}>
      {tx.carPhoto&&<img src={tx.carPhoto} style={{width:"100%",height:160,objectFit:"cover",borderRadius:12,marginBottom:14}}/>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
        <InfoBlock label="Date" value={fmtD(tx.date)}/>
        <InfoBlock label="Montant" value={tx.isGift?"🎁 Offert":fmt(tx.amount)} accent/>
        {tx.type==="revenue"&&<>
          <InfoBlock label="Durée" value={fmtT(tx.duration)}/>
          <InfoBlock label="Encaissement" value={tx.paymentMethod}/>
          <InfoBlock label="Argent reçu par" value={(tx.paidToTechs&&tx.paidToTechs.length>0)?tx.paidToTechs.join(", "):(tx.paidToTech||"—")}/>
          <InfoBlock label="Taille véhicule" value={tx.vehicleSize||"—"}/>
          <InfoBlock label="Lieu" value={tx.location||"—"}/>
          <InfoBlock label="Difficulté" value={"💪".repeat(tx.difficulty||1)}/>
        </>}
        {tx.type==="expense"&&<>
          <InfoBlock label="Articles" value={tx.productName}/>
          <InfoBlock label="Paiement" value={tx.paymentMethod}/>
          <InfoBlock label="Payé par" value={(tx.paidByTechs&&tx.paidByTechs.length>0)?tx.paidByTechs.join(", "):(tx.paidByTech||"—")}/>
          {tx.location&&<InfoBlock label="Lieu" value={tx.location}/>}
        </>}
      </div>
      {tx.type==="revenue"&&tx.technicians&&tx.technicians.length>0&&(
        <div style={{background:"#1a1a1a",borderRadius:10,padding:"9px 11px",marginBottom:8}}>
          <div style={{fontSize:10,color:"#666",marginBottom:4}}>TECHNICIEN(S)</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5}}>{tx.technicians.map(t=><span key={t} style={{background:"#0a1a14",border:"1px solid #00d4aa33",color:"#00d4aa",borderRadius:20,padding:"2px 8px",fontSize:11}}>👤 {t}</span>)}</div>
        </div>
      )}
      {tx.type==="revenue"&&(tx.prestations&&tx.prestations.length>0||tx.customPrestation)&&(
        <div style={{background:"#1a1a1a",borderRadius:10,padding:"9px 11px",marginBottom:8}}>
          <div style={{fontSize:10,color:"#666",marginBottom:4}}>PRESTATIONS</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
            {(tx.prestations||[]).map(p=><span key={p} style={{background:"#111",border:"1px solid #252525",color:"#ccc",borderRadius:20,padding:"2px 8px",fontSize:11}}>{p}</span>)}
            {tx.customPrestation&&<span style={{background:"#111",border:"1px solid #252525",color:"#ccc",borderRadius:20,padding:"2px 8px",fontSize:11}}>{tx.customPrestation}</span>}
          </div>
        </div>
      )}
      {v&&<div style={{background:"#1a1a1a",borderRadius:10,padding:"9px 11px",marginBottom:8}}><div style={{fontSize:10,color:"#666",marginBottom:2}}>VÉHICULE</div><div style={{color:"#fff",fontWeight:600}}>{v.plate} — {v.brand} {v.model}</div></div>}

// ===================== STATS PAGE =====================
function StatsPage({data,setData,currency}){
  const now=new Date();
  const[period,setPeriod]=useState("year");
  const[chartType,setChartType]=useState("bar"); // bar | line | area
  const[metric,setMetric]=useState("revenue"); // revenue | count | duration | ratio | expenses | profit | rentability
  const[groupBy,setGroupBy]=useState("month"); // month | week | technician | service | city | size | payment
  const[selCity,setSelCity]=useState(null);
  const[selTx,setSelTx]=useState(null);

  const totalRev=data.revenues.reduce((s,r)=>s+r.amount,0);
  const totalExp=data.expenses.reduce((s,e)=>s+e.amount,0);
  const profit=totalRev-totalExp;
  const rent=totalRev>0?((profit/totalRev)*100).toFixed(1):0;

  // Filter revenues by period
  const filteredRevs=data.revenues.filter(r=>{
    const d=new Date(r.date);
    if(period==="year")return d.getFullYear()===now.getFullYear();
    if(period==="month")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    return true; // all
  });
  const filteredExps=data.expenses.filter(e=>{
    const d=new Date(e.date);
    if(period==="year")return d.getFullYear()===now.getFullYear();
    if(period==="month")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    return true;
  });

  // Compute chart data based on groupBy + metric
  const computeData=()=>{
    const getValue=(revs,exps=[])=>{
      if(metric==="revenue")return revs.reduce((s,r)=>s+r.amount,0);
      if(metric==="count")return revs.length;
      if(metric==="duration")return revs.reduce((s,r)=>s+(r.duration||0),0)/60;
      if(metric==="ratio"){const t=revs.reduce((s,r)=>s+r.amount,0),dur=revs.reduce((s,r)=>s+(r.duration||0),0);return dur>0?t/(dur/60):0;}
      if(metric==="expenses")return exps.reduce((s,e)=>s+e.amount,0);
      if(metric==="profit"){return revs.reduce((s,r)=>s+r.amount,0)-exps.reduce((s,e)=>s+e.amount,0);}
      if(metric==="rentability"){const r=revs.reduce((s,r)=>s+r.amount,0),e=exps.reduce((s,e)=>s+e.amount,0);return r>0?(((r-e)/r)*100):0;}
      return 0;
    };

    if(groupBy==="month"){
      const labels=MONTHS;
      return labels.map((m,i)=>{
        const revs=filteredRevs.filter(r=>new Date(r.date).getMonth()===i);
        const exps=filteredExps.filter(e=>new Date(e.date).getMonth()===i);
        return{label:m,value:Math.max(0,getValue(revs,exps)),highlight:i===now.getMonth()};
      });
    }
    if(groupBy==="week"){
      const labels=["S1","S2","S3","S4"];
      const fd=new Date(now.getFullYear(),now.getMonth(),1);
      return labels.map((_,i)=>{
        const revs=filteredRevs.filter(r=>{const d=new Date(r.date);return d.getMonth()===now.getMonth()&&Math.floor((d.getDate()+fd.getDay()-1)/7)===i;});
        const exps=filteredExps.filter(e=>{const d=new Date(e.date);return d.getMonth()===now.getMonth()&&Math.floor((d.getDate()+fd.getDay()-1)/7)===i;});
        return{label:labels[i],value:Math.max(0,getValue(revs,exps))};
      });
    }
    if(groupBy==="technician"){
      const techs=(data.settings&&data.settings.technicians)||[];
      return techs.map(t=>{
        const revs=filteredRevs.filter(r=>r.technicians&&r.technicians.includes(t));
        const exps=filteredExps.filter(e=>e.paidByTechs&&e.paidByTechs.includes(t));
        return{label:t,value:Math.max(0,getValue(revs,exps))};
      });
    }
    if(groupBy==="service"){
      const allServices=[...new Set(filteredRevs.flatMap(r=>r.prestations||[]))].slice(0,8);
      return allServices.map(s=>{
        const revs=filteredRevs.filter(r=>r.prestations&&r.prestations.includes(s));
        return{label:s.length>8?s.slice(0,8)+"…":s,value:Math.max(0,getValue(revs,[]))};
      });
    }
    if(groupBy==="city"){
      const normCity=s=>s?s.trim().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/(?:^|\s)\S/g,c=>c.toUpperCase()):"";
      const cityMap={};
      filteredRevs.forEach(r=>{
        const city=normCity(r.locationCity||(r.location?r.location.trim().split(/\s+/).pop():""));
        if(!city)return;
        if(!cityMap[city])cityMap[city]=[];
        cityMap[city].push(r);
      });
      return Object.entries(cityMap).sort((a,b)=>b[1].length-a[1].length).slice(0,8).map(([city,revs])=>({label:city,value:Math.max(0,getValue(revs,[]))}));
    }
    if(groupBy==="size"){
      return CAR_SIZES.map(s=>{
        const revs=filteredRevs.filter(r=>r.vehicleSize===s);
        return{label:s,value:Math.max(0,getValue(revs,[]))};
      });
    }
    if(groupBy==="payment"){
      const methods=["espèce","carte","chèque","virement"];
      return methods.map(m=>{
        const revs=filteredRevs.filter(r=>r.paymentMethod===m);
        return{label:m,value:Math.max(0,getValue(revs,[]))};
      });
    }
    return [];
  };

  const chartData=computeData();
  const maxVal=Math.max(...chartData.map(d=>d.value),1);

  // City stats for PAR VILLE section
  const normCity=s=>s?s.trim().replace(/\s+/g," ").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/(?:^|\s)\S/g,c=>c.toUpperCase()):"";
  const cityStats={};
  data.revenues.forEach(r=>{
    const rawCity=r.locationCity||(r.location?r.location.trim().split(/\s+/).filter(Boolean).slice(-1)[0]:"");
    const city=normCity(rawCity);if(!city)return;
    const zip=r.locationZip||"";const key=zip?`${city}||${zip}`:city;
    if(!cityStats[key])cityStats[key]={city,zip,count:0,revenue:0,clients:new Set(),revs:[]};
    cityStats[key].count++;cityStats[key].revenue+=r.amount;
    if(r.clientId)cityStats[key].clients.add(r.clientId);
    cityStats[key].revs.push(r);
  });

  const METRICS=[["revenue","💰 Revenus"],["count","🔢 Lavages"],["duration","⏱ Temps (h)"],["ratio","📈 €/heure"],["expenses","🔴 Dépenses"],["profit","✨ Bénéfice"],["rentability","📊 Rentabilité %"]];
  const GROUPS=[["month","📅 Mois"],["week","📆 Semaine"],["technician","👤 Tech."],["service","🛠 Prestation"],["city","📍 Ville"],["size","🚗 Taille"],["payment","💳 Paiement"]];
  const PERIODS=[["month","Ce mois"],["year","Cette année"],["all","Tout"]];
  const CHART_TYPES=[["bar","▐ Barres"],["line","∿ Ligne"],["pie","◉ Camembert"]];

  // Render chart
  const fmtVal=v=>{if(v===0)return"";if(v>=1000)return`${(v/1000).toFixed(1)}k`;return v%1===0?String(Math.round(v)):(v.toFixed(1));};
  const chartH=120;
  const PIE_COLORS=["#00d4aa","#7c3aed","#ff6b35","#ffd700","#00aaff","#ff4757","#a78bfa","#00e5bb"];
  const ChartViz=()=>{
    if(chartType==="bar"){
      return(
        <div style={{display:"flex",alignItems:"flex-end",gap:3,height:chartH+28,padding:"0 2px"}}>
          {chartData.map((d,i)=>{
            const barH=Math.max(2,(d.value/maxVal)*(chartH-18));
            const color=d.highlight?"#ff6b35":"#00d4aa";
            return(
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",height:"100%"}}>
                {d.value>0&&<span style={{fontSize:7,color,fontWeight:700,marginBottom:2,whiteSpace:"nowrap",textAlign:"center"}}>{fmtVal(d.value)}</span>}
                <div style={{width:"100%",height:barH,background:color,borderRadius:"3px 3px 0 0",opacity:d.value===0?0.15:1}}/>
                <span style={{fontSize:7,color:"#666",marginTop:3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"100%",textAlign:"center"}}>{d.label}</span>
              </div>
            );
          })}
        </div>
      );
    }
    if(chartType==="pie"){
      const total=chartData.reduce((s,d)=>s+d.value,0);
      if(total===0)return<div style={{height:80,display:"flex",alignItems:"center",justifyContent:"center",color:"#333",fontSize:12}}>Aucune donnée</div>;
      const cx=80,cy=75,r=65;
      let angle=-Math.PI/2;
      const slices=chartData.filter(d=>d.value>0).map((d,i)=>{
        const sweep=(d.value/total)*2*Math.PI;
        const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
        angle+=sweep;
        const x2=cx+r*Math.cos(angle),y2=cy+r*Math.sin(angle);
        const large=sweep>Math.PI?1:0;
        const midA=angle-sweep/2;
        const lx=cx+(r+14)*Math.cos(midA),ly=cy+(r+14)*Math.sin(midA);
        const pct=Math.round((d.value/total)*100);
        return{path:`M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`,color:PIE_COLORS[i%PIE_COLORS.length],label:d.label,pct,value:d.value,lx,ly,sweep};
      });
      return(
        <div style={{display:"flex",gap:12,alignItems:"center"}}>
          <svg width="160" height="150" viewBox="0 0 160 150">
            {slices.map((s,i)=>(
              <g key={i}>
                <path d={s.path} fill={s.color} stroke="#0a0a0a" strokeWidth="1.5"/>
                {s.sweep>0.3&&<text x={s.lx} y={s.ly} textAnchor="middle" dominantBaseline="middle" fontSize="8" fill="#fff" fontWeight="bold">{s.pct}%</text>}
              </g>
            ))}
          </svg>
          <div style={{flex:1,display:"flex",flexDirection:"column",gap:5}}>
            {slices.map((s,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:10,height:10,borderRadius:2,background:s.color,flexShrink:0}}/>
                <span style={{fontSize:10,color:"#ccc",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.label}</span>
                <span style={{fontSize:10,color:s.color,fontWeight:700}}>{fmtVal(s.value)}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }
    // Line
    const pts=chartData.map((d,i)=>({x:10+(i/(Math.max(chartData.length-1,1)))*(280),y:chartH-8-(d.value/maxVal)*(chartH-20)}));
    const pathD=pts.map((p,i)=>`${i===0?"M":"L"} ${p.x} ${p.y}`).join(" ");
    return(
      <div style={{position:"relative",height:chartH+28}}>
        <svg width="100%" height={chartH+4} viewBox={`0 0 300 ${chartH+4}`} style={{overflow:"visible"}}>
          <path d={pathD} fill="none" stroke="#00d4aa" strokeWidth="2.5" strokeLinejoin="round"/>
          {pts.map((p,i)=>(
            <g key={i}>
              <circle cx={p.x} cy={p.y} r="4" fill={chartData[i].highlight?"#ff6b35":"#00d4aa"}/>
              {chartData[i].value>0&&<text x={p.x} y={p.y-8} textAnchor="middle" fontSize="8" fill="#00d4aa" fontWeight="bold">{fmtVal(chartData[i].value)}</text>}
            </g>
          ))}
        </svg>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
          {chartData.map((d,i)=><span key={i} style={{fontSize:7,color:"#666",flex:1,textAlign:"center",overflow:"hidden",whiteSpace:"nowrap"}}>{d.label}</span>)}
        </div>
      </div>
    );
  };

  return(
    <div style={{paddingBottom:80}}>
      {/* KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
        <div style={{background:"#0a1a14",border:"1px solid #00d4aa22",borderRadius:12,padding:"9px",textAlign:"center"}}><div style={{fontSize:9,color:"#666"}}>REVENUS</div><div style={{color:"#00d4aa",fontWeight:700,fontSize:14}}>{fmt(totalRev,currency)}</div></div>

// ===================== CLIENTS PAGE =====================
function ClientsPage({data,setData,currency}){
  const[sort,setSort]=useState("revenue"),[dir,setDir]=useState("desc"),[sel,setSel]=useState(null),[search,setSearch]=useState(""),[editSel,setEditSel]=useState(null);

  const enrich=data.clients.map(c=>{
    const revs=data.revenues.filter(r=>r.clientId===c.id);
    const vehicles=[...new Set(revs.map(r=>r.vehicleId).filter(Boolean))].map(vid=>data.vehicles.find(v=>v.id===vid)).filter(Boolean);
    return{...c,revs,totalRevenue:revs.reduce((s,r)=>s+r.amount,0),vehicles};
  });

  const sorted=[...enrich].filter(c=>`${c.firstName} ${c.lastName}`.toLowerCase().includes(search.toLowerCase())).sort((a,b)=>{
    const m=dir==="desc"?-1:1;
    if(sort==="revenue")return m*(a.totalRevenue-b.totalRevenue);
    if(sort==="note")return m*((a.note||0)-(b.note||0));
    if(sort==="date"){const ar=a.revs.length>0?new Date(a.revs[a.revs.length-1].date):0;const br=b.revs.length>0?new Date(b.revs[b.revs.length-1].date):0;return m*(ar-br);}
    return 0;
  });

  const SB=({f,l})=><button onClick={()=>{if(sort===f)setDir(d=>d==="asc"?"desc":"asc");else{setSort(f);setDir("desc");}}} style={{background:sort===f?"#1e1e1e":"transparent",border:"1px solid #252525",color:sort===f?"#fff":"#666",padding:"4px 9px",borderRadius:20,fontSize:10,cursor:"pointer"}}>{l} {sort===f?(dir==="desc"?"↓":"↑"):""}</button>;

  // Edit client modal
  const EditClient=({client,onClose})=>{
    const[form,setForm]=useState({...client});
    const set=(k,v)=>setForm(f=>({...f,[k]:v}));
    const handleSave=()=>{
      const addr=[form.streetNum,form.streetName,form.zip,form.city].filter(Boolean).join(" ");
      const nd={...data,clients:data.clients.map(c=>c.id===form.id?{...form,address:addr}:c)};
      setData(nd);save(nd);onClose();
    };
    return(
      <Modal title="Modifier le client" onClose={onClose}>
        <Field label="Prénom"><input style={inp} value={form.firstName||""} onChange={e=>set("firstName",e.target.value)}/></Field>
        <Field label="Nom"><input style={inp} value={form.lastName||""} onChange={e=>set("lastName",e.target.value)}/></Field>
        <Field label="Téléphone"><input style={inp} value={form.phone||""} onChange={e=>set("phone",e.target.value)}/></Field>
        <div style={{display:"grid",gridTemplateColumns:"80px 1fr",gap:6,marginBottom:12}}>
          <div><label style={{fontSize:11,color:"#777",display:"block",marginBottom:4}}>N° rue</label><input style={inp} value={form.streetNum||""} onChange={e=>set("streetNum",e.target.value)}/></div>
          <div><label style={{fontSize:11,color:"#777",display:"block",marginBottom:4}}>Nom de rue</label><input style={inp} value={form.streetName||""} onChange={e=>set("streetName",e.target.value)}/></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:12}}>
          <div><label style={{fontSize:11,color:"#777",display:"block",marginBottom:4}}>Code postal</label><input style={inp} value={form.zip||""} onChange={e=>set("zip",e.target.value)}/></div>
          <div><label style={{fontSize:11,color:"#777",display:"block",marginBottom:4}}>Ville</label><input style={inp} value={form.city||""} onChange={e=>set("city",e.target.value)}/></div>
        </div>
        <Field label="Note"><StarRating value={form.note||0} onChange={v=>set("note",v)}/></Field>
        <button onClick={handleSave} style={{...btn("linear-gradient(135deg,#00d4aa,#00a882)","#000"),width:"100%",padding:"13px",fontSize:15,marginTop:4}}>✅ Sauvegarder</button>
      </Modal>
    );
  };

  return(
    <div style={{paddingBottom:80}}>
      <input style={{...inp,marginBottom:10}} placeholder="🔍 Rechercher..." value={search} onChange={e=>setSearch(e.target.value)}/>
      <div style={{display:"flex",gap:5,marginBottom:12}}><SB f="revenue" l="💰 Revenu"/><SB f="date" l="📅 Date"/><SB f="note" l="⭐ Note"/></div>
      {sorted.length===0
        ?<div style={{textAlign:"center",color:"#444",fontSize:13,padding:"40px 0"}}>Aucun client</div>
        :sorted.map(c=>(
          <div key={c.id} onClick={()=>setSel(c)} style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:12,padding:"11px 13px",marginBottom:8,cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{color:"#fff",fontWeight:600,fontSize:14}}>{c.firstName} {c.lastName}</div>
                <StarRating value={c.note||0} size={13} readonly/>
                {c.vehicles.length>0&&<div style={{color:"#444",fontSize:11,marginTop:3}}>🚗 {c.vehicles.map(v=>`${v.brand} ${v.model}`).join(", ")}</div>}
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{color:"#00d4aa",fontWeight:700,fontSize:15}}>{fmt(c.totalRevenue,currency)}</div>
                <div style={{color:"#444",fontSize:11}}>{c.revs.length} lavage{c.revs.length>1?"s":""}</div>
              </div>
            </div>
          </div>
        ))
      }
      {sel&&(()=>{
        const ec=enrich.find(c=>c.id===sel.id);
        const canDelete=ec.revs.length===0;
        const deleteClient=()=>{
          if(!window.confirm(`Supprimer ${sel.firstName} ${sel.lastName} ?`))return;
          const nd={...data,clients:data.clients.filter(c=>c.id!==sel.id)};
          setData(nd);save(nd);setSel(null);
        };
        return(
          <Modal title={`${sel.firstName} ${sel.lastName}`} onClose={()=>setSel(null)}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
              <InfoBlock label="Téléphone" value={sel.phone||"—"}/>
              <InfoBlock label="Revenu généré" value={fmt(ec.totalRevenue,currency)} accent/>
              <InfoBlock label="Note" value={"★".repeat(sel.note||0)+"☆".repeat(5-(sel.note||0))}/>
              {sel.address&&<InfoBlock label="Adresse" value={sel.address}/>}
            </div>
            {ec.vehicles.length>0&&<div style={{marginBottom:12}}>
              <div style={{fontSize:10,color:"#666",marginBottom:5}}>VÉHICULES</div>
              {ec.vehicles.map(v=><div key={v.id} style={{background:"#1a1a1a",borderRadius:8,padding:"7px 11px",marginBottom:5,fontSize:12,color:"#fff"}}>🚗 {v.plate} — {v.brand} {v.model}</div>)}
            </div>}
            <div style={{fontSize:10,color:"#666",marginBottom:5}}>HISTORIQUE ({ec.revs.length})</div>
            {[...ec.revs].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(r=>{
              const v=data.vehicles.find(vx=>vx.id===r.vehicleId);
              return<div key={r.id} style={{background:"#1a1a1a",borderRadius:10,padding:"9px 11px",marginBottom:7,display:"flex",justifyContent:"space-between"}}>
                <div><div style={{color:"#fff",fontSize:12}}>{v?`${v.brand} ${v.model}`:"Véhicule"}</div><div style={{color:"#444",fontSize:11}}>{fmtD(r.date)} · {"💪".repeat(r.difficulty||0)}</div></div>
                <div style={{color:"#00d4aa",fontWeight:700,fontSize:13}}>{r.isGift?"🎁":fmt(r.amount,currency)}</div>
              </div>;
            })}
            {ec.clientNotes&&ec.clientNotes.length>0&&(
              <div style={{marginTop:8,marginBottom:4}}>
                <div style={{fontSize:10,color:"#666",marginBottom:5}}>NOTES CLIENT</div>
                {[...ec.clientNotes].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(n=>(
                  <div key={n.id} style={{background:n.type==="cancellation"?"#1a0a0a":"#1a1a1a",border:`1px solid ${n.type==="cancellation"?"#ff475733":"#252525"}`,borderRadius:8,padding:"7px 11px",marginBottom:5,fontSize:11,color:n.type==="cancellation"?"#ff6b35":"#888"}}>
                    {n.type==="cancellation"?"❌":"📝"} <span style={{color:"#555",fontSize:10}}>{fmtD(n.date)}</span> — {n.text}
                  </div>
                ))}
              </div>
            )}
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <button onClick={()=>{setSel(null);setEditSel(sel);}} style={{...btn("#1e1e1e","#fff"),flex:1}}>✏️ Modifier</button>
              {canDelete&&<button onClick={deleteClient} style={{...btn("#1a0a0a","#ff4757"),flex:1,border:"1px solid #ff4757"}}>🗑 Supprimer</button>}
            </div>
            {!canDelete&&<div style={{fontSize:11,color:"#444",textAlign:"center",marginTop:6}}>Suppression impossible : {ec.revs.length} lavage{ec.revs.length>1?"s":""} associé{ec.revs.length>1?"s":""}</div>}
          </Modal>
        );
      })()}
      {editSel&&<EditClient client={editSel} onClose={()=>setEditSel(null)}/>}
    </div>
  );
}

          const recRev=[...v.revs].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
          const owner=data.clients.find(c=>c.id===v.ownerId);
          return<div key={v.id} onClick={()=>setSel(v)} style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:12,padding:"10px 12px",marginBottom:8,cursor:"pointer",display:"flex",gap:10,alignItems:"center"}}>
            {recRev&&recRev.carPhoto?<img src={recRev.carPhoto} style={{width:64,height:48,objectFit:"cover",borderRadius:7,flexShrink:0}}/>:<div style={{width:64,height:48,background:"#1a1a1a",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>🚗</div>}
            <div style={{flex:1}}>
              <div style={{color:"#fff",fontWeight:600}}>{v.brand} {v.model}{v.color?<span style={{color:"#555",fontSize:11,fontWeight:400}}> · {v.color}</span>:""}</div>
              <div style={{color:"#555",fontSize:11}}>{v.plate}{v.year?` · ${v.year}`:""}</div>
              {owner&&<div style={{color:"#00d4aa",fontSize:11}}>👤 {owner.firstName} {owner.lastName}</div>}
              <div style={{color:"#444",fontSize:11,marginTop:1}}>{"💪".repeat(Math.round(v.avgDiff))||""} {v.revs.length} lavage{v.revs.length>1?"s":""}{v.size?` · ${v.size}`:""}</div>
            </div>
            <div style={{color:"#00d4aa",fontWeight:700}}>{fmt(v.totalRevenue,currency)}</div>
          </div>;
        })
      }
      {sel&&(()=>{
        const ev=enrich.find(v=>v.id===sel.id);
        const canDelete=ev.revs.length===0;
        const owner=data.clients.find(c=>c.id===sel.ownerId);
        const deleteVehicle=()=>{
          if(!window.confirm(`Supprimer ${sel.brand} ${sel.model} (${sel.plate}) ?`))return;
          const nd={...data,vehicles:data.vehicles.filter(v=>v.id!==sel.id)};
          setData(nd);save(nd);setSel(null);
        };
        return<Modal title={`${sel.brand} ${sel.model}`} onClose={()=>setSel(null)}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
            <InfoBlock label="Plaque" value={sel.plate}/>
            <InfoBlock label="Revenu total" value={fmt(ev.totalRevenue,currency)} accent/>
            <InfoBlock label="Taille" value={sel.size||"—"}/>
            <InfoBlock label="Lavages" value={ev.revs.length}/>
            {sel.color&&<InfoBlock label="Couleur" value={sel.color}/>}
            {sel.year&&<InfoBlock label="Année" value={sel.year}/>}
            {sel.fuel&&<InfoBlock label="Carburant" value={sel.fuel}/>}
            {owner&&<InfoBlock label="Propriétaire" value={`${owner.firstName} ${owner.lastName}`}/>}
            <InfoBlock label="Moy. difficulté" value={"💪".repeat(Math.round(ev.avgDiff))||"—"}/>
            {sel.vin&&<InfoBlock label="VIN" value={sel.vin}/>}
          </div>
          {sel.notes&&<div style={{background:"#1a1a1a",borderRadius:8,padding:"8px 11px",fontSize:12,color:"#888",marginBottom:10}}>💬 {sel.notes}</div>}
          <div style={{fontSize:10,color:"#666",marginBottom:5}}>HISTORIQUE</div>
          {[...ev.revs].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(r=>{
            const c=data.clients.find(cl=>cl.id===r.clientId);
            return<div key={r.id} onClick={()=>{setSel(null);setSelTx(r);}} style={{background:"#1a1a1a",borderRadius:10,padding:"9px 11px",marginBottom:7,display:"flex",justifyContent:"space-between",cursor:"pointer"}}>
              <div><div style={{color:"#fff",fontSize:12}}>{c?`${c.firstName} ${c.lastName}`:"Client"}</div><div style={{color:"#444",fontSize:11}}>{fmtD(r.date)}{r.location?` · ${r.location}`:""}</div></div>
              <div style={{color:"#00d4aa",fontWeight:700,fontSize:13}}>{r.isGift?"🎁":fmt(r.amount,currency)}</div>
            </div>;
          })}
          <div style={{display:"flex",gap:8,marginTop:8}}>
            <button onClick={()=>{setSel(null);setEditVeh(sel);}} style={{...btn("#1e1e1e","#fff"),flex:1}}>✏️ Modifier</button>
            {canDelete&&<button onClick={deleteVehicle} style={{...btn("#1a0a0a","#ff4757"),flex:1,border:"1px solid #ff4757"}}>🗑 Supprimer</button>}
          </div>
          {!canDelete&&<div style={{fontSize:11,color:"#444",textAlign:"center",marginTop:6}}>Suppression impossible : {ev.revs.length} lavage{ev.revs.length>1?"s":""} associé{ev.revs.length>1?"s":""}</div>}
        </Modal>;
      })()}
      {editVeh&&<EditVehicle vehicle={editVeh} onClose={()=>setEditVeh(null)}/>}
      {selTx&&<TxDetail tx={selTx} data={data} setData={setData} onClose={()=>setSelTx(null)}/>}
    </div>
  );
}
