const STATUS_COLORS={"confirmé":"#00d4aa","en attente":"#ffa500","annulé":"#ff4757","terminé":"#7c3aed"};

function AppointmentForm({data,setData,onSave,editItem}){
  const today=new Date().toISOString().split("T")[0];
  const techs=(data.settings&&data.settings.technicians)||[];
  const services=(data.settings&&data.settings.services)||DEF_SERVICES;
  const[form,setForm]=useState(editItem?{...editItem,locationStreetNum:editItem.locationStreetNum||"",locationStreetName:editItem.locationStreetName||"",locationZip:editItem.locationZip||"",locationCity:editItem.locationCity||"",invoiceNumber:editItem.invoiceNumber||"",notes:editItem.notes||""}:{
    date:today,timeStart:"",timeEnd:"",
    clientId:"",clientFirst:"",clientLast:"",clientPhone:"",
    vehicleId:"",plate:"",brand:"",model:"",
    services:[],customService:"",technicians:[],
    status:"en attente",priority:"normale",
    estimatedPrice:"",deposit:"",paymentMethod:"espèce",
    locationStreetNum:"",locationStreetName:"",locationZip:"",locationCity:"",
    notes:"",reminderSent:false,invoiceNumber:"",
    indoorOutdoor:"extérieur",vehicleSize:"berline"
  });
  const[newClient,setNewClient]=useState(!editItem);
  const[newVehicle,setNewVehicle]=useState(!editItem);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const dur=dMin(form.timeStart,form.timeEnd);
  const selectClient=c=>{set("clientId",c.id);set("clientFirst",c.firstName);set("clientLast",c.lastName);set("clientPhone",c.phone||"");setNewClient(false);};
  // Vehicle selected → auto-fill owner
  const selectVehicle=v=>{
    set("vehicleId",v.id);set("plate",v.plate);set("brand",v.brand);set("model",v.model);set("vehicleSize",v.size||"berline");setNewVehicle(false);
    if(v.ownerId){
      const owner=data.clients.find(c=>c.id===v.ownerId);
      if(owner){setForm(f=>({...f,vehicleId:v.id,plate:v.plate,brand:v.brand,model:v.model,vehicleSize:v.size||"berline",clientId:owner.id,clientFirst:owner.firstName,clientLast:owner.lastName,clientPhone:owner.phone||""}));setNewClient(false);}
    }
  };
  const saveLocation=loc=>{if(!loc)return;const locs=data.locations||[];if(!locs.includes(loc)){const nd={...data,locations:[...locs,loc]};setData(nd);save(nd);}};
  const handleSave=()=>{
    if(!form.date)return alert("Date requise");
    if(!form.clientFirst&&!form.clientId)return alert("Client requis");
    const nd={...data};
    let cid=form.clientId,vid=form.vehicleId;
    if(!cid&&form.clientFirst){const nc={id:gid(),firstName:form.clientFirst,lastName:form.clientLast,phone:form.clientPhone,note:3};nd.clients=[...nd.clients,nc];cid=nc.id;}
    if(!vid&&form.plate){const pt=form.plate.toUpperCase().replace(/[^A-Z0-9]/g,"");const ev=nd.vehicles.find(v=>v.plate===pt);if(ev){vid=ev.id;}else{const nv={id:gid(),plate:pt,brand:form.brand,model:form.model,size:form.vehicleSize||"berline",ownerId:cid||""};nd.vehicles=[...nd.vehicles,nv];vid=nv.id;}}
    if(vid&&cid){const vi=nd.vehicles.findIndex(v=>v.id===vid);if(vi>=0&&!nd.vehicles[vi].ownerId){nd.vehicles=[...nd.vehicles];nd.vehicles[vi]={...nd.vehicles[vi],ownerId:cid};}}
    const location=fmtAddr(form.locationStreetNum,form.locationStreetName,form.locationZip,form.locationCity);
    if(location)saveLocation(location);
    const appt={...form,id:editItem?form.id:gid(),clientId:cid,vehicleId:vid,duration:dur,location};
    nd.appointments=nd.appointments||[];
    if(editItem){nd.appointments=nd.appointments.map(a=>a.id===appt.id?appt:a);}
    else{nd.appointments=[...nd.appointments,appt];}
    setData(nd);save(nd);onSave();
  };
  return(
    <div>
      {/* VÉHICULE EN PREMIER */}
      <Field label="Véhicule">
        <VehicleSearch data={data} onSelect={selectVehicle} onClear={()=>{set("vehicleId","");setNewVehicle(true);}} initialValue={editItem&&form.plate?`${form.plate} — ${form.brand} ${form.model}`:""}/>
        <label style={{display:"flex",alignItems:"center",gap:6,marginTop:6,color:"#777",fontSize:12,cursor:"pointer"}}><input type="checkbox" checked={newVehicle||!form.vehicleId} onChange={e=>{setNewVehicle(e.target.checked);if(e.target.checked)set("vehicleId","");}}/> Nouveau véhicule</label>
      </Field>
      {(newVehicle||!form.vehicleId)&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:12}}>
          <input style={inp} placeholder="Plaque" value={form.plate} onChange={e=>set("plate",e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,""))}/>
          <input style={inp} placeholder="Marque" value={form.brand} onChange={e=>set("brand",e.target.value)}/>
          <input style={inp} placeholder="Modèle" value={form.model} onChange={e=>set("model",e.target.value)}/>
        </div>
      )}
      {/* CLIENT ENSUITE — auto-rempli si propriétaire connu */}
      <Field label="Client (propriétaire)" required>
        {form.clientId&&!newClient
          ?<div style={{background:"#0a1a14",border:"1px solid #00d4aa33",borderRadius:10,padding:"9px 11px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{color:"#00d4aa",fontSize:13}}>👤 {form.clientFirst} {form.clientLast}</span>
            <button onClick={()=>{set("clientId","");setNewClient(true);}} style={{background:"none",border:"none",color:"#666",cursor:"pointer",fontSize:18,padding:0}}>×</button>
          </div>
          :<ClientSearch data={data} value={""} onSelect={selectClient} onClear={()=>{set("clientId","");setNewClient(true);}}/>
        }
        <label style={{display:"flex",alignItems:"center",gap:6,marginTop:6,color:"#777",fontSize:12,cursor:"pointer"}}><input type="checkbox" checked={newClient||!form.clientId} onChange={e=>{setNewClient(e.target.checked);if(e.target.checked)set("clientId","");}}/> Nouveau client</label>
      </Field>
      {(newClient||!form.clientId)&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:12}}>
          <input style={inp} placeholder="Prénom" value={form.clientFirst} onChange={e=>set("clientFirst",e.target.value)}/>
          <input style={inp} placeholder="Nom" value={form.clientLast} onChange={e=>set("clientLast",e.target.value)}/>
          <input style={{...inp,gridColumn:"1/-1"}} placeholder="Téléphone" value={form.clientPhone} onChange={e=>set("clientPhone",e.target.value)}/>
        </div>
      )}
      <Field label="Prestations prévues">
        <ServicesPicker services={services} value={form.services} onChange={v=>set("services",v)} customService={form.customService} onCustomChange={v=>set("customService",v)}/>
      </Field>
      <Field label="Technicien(s) assigné(s)">
        <TechnicianPicker technicians={techs} value={form.technicians} onChange={v=>set("technicians",v)}/>
      </Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Field label="Date" required><input type="date" style={inp} value={form.date} onChange={e=>set("date",e.target.value)}/></Field>
        <Field label="Statut">
          <select style={{...inp,color:STATUS_COLORS[form.status]||"#fff"}} value={form.status} onChange={e=>set("status",e.target.value)}>
            {["en attente","confirmé","annulé","terminé"].map(s=><option key={s} style={{color:STATUS_COLORS[s]}}>{s}</option>)}
          </select>
        </Field>
        <Field label="Heure début"><input type="time" style={inp} value={form.timeStart} onChange={e=>set("timeStart",e.target.value)}/></Field>
        <Field label="Heure fin"><input type="time" style={inp} value={form.timeEnd} onChange={e=>set("timeEnd",e.target.value)}/></Field>
        <Field label="Taille véhicule"><select style={inp} value={form.vehicleSize} onChange={e=>set("vehicleSize",e.target.value)}>{["citadine","berline","SUV","monospace","utilitaire","moto","autre"].map(s=><option key={s}>{s}</option>)}</select></Field>
        <Field label="Lieu de travail"><select style={inp} value={form.indoorOutdoor} onChange={e=>set("indoorOutdoor",e.target.value)}><option value="extérieur">🌤 Extérieur</option><option value="intérieur">🏠 Garage</option><option value="domicile client">🏡 Domicile client</option></select></Field>
        <Field label="Prix estimé"><input type="number" style={inp} placeholder="0.00" value={form.estimatedPrice} onChange={e=>set("estimatedPrice",e.target.value)}/></Field>
        <Field label="Acompte"><input type="number" style={inp} placeholder="0.00" value={form.deposit} onChange={e=>set("deposit",e.target.value)}/></Field>
        <Field label="Paiement"><select style={inp} value={form.paymentMethod} onChange={e=>set("paymentMethod",e.target.value)}>{["espèce","carte","chèque","virement","acompte"].map(m=><option key={m}>{m}</option>)}</select></Field>
        <Field label="Priorité"><select style={inp} value={form.priority} onChange={e=>set("priority",e.target.value)}>{["basse","normale","haute","urgente"].map(p=><option key={p}>{p}</option>)}</select></Field>
        <Field label="N° Facture"><input style={inp} placeholder="FAC-001" value={form.invoiceNumber||""} onChange={e=>set("invoiceNumber",e.target.value)}/></Field>
      </div>
      {dur>0&&<div style={{background:"#0a1a14",border:"1px solid #00d4aa33",borderRadius:10,padding:"7px 11px",marginBottom:12,color:"#00d4aa",fontSize:13}}>⏱ Durée estimée : <strong>{fmtT(dur)}</strong></div>}
      <Field label="Lieu / Adresse">
        <AddressFields streetNum={form.locationStreetNum} streetName={form.locationStreetName} zip={form.locationZip} city={form.locationCity}
          onChange={v=>setForm(f=>({...f,locationStreetNum:v.streetNum,locationStreetName:v.streetName,locationZip:v.zip,locationCity:v.city}))}/>
      </Field>
      <Field label="Notes / Remarques"><textarea style={{...inp,minHeight:70,resize:"vertical"}} placeholder="Instructions, état véhicule..." value={form.notes} onChange={e=>set("notes",e.target.value)}/></Field>
      <Field label="Rappel client"><label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}><input type="checkbox" checked={form.reminderSent} onChange={e=>set("reminderSent",e.target.checked)}/><span style={{color:"#777",fontSize:12}}>Rappel envoyé</span></label></Field>
      <button onClick={handleSave} style={{...btn("linear-gradient(135deg,#7c3aed,#5b21b6)","#fff"),width:"100%",padding:"13px",fontSize:15,marginTop:4}}>
        📅 {editItem?"Modifier":"Enregistrer"} le rendez-vous
      </button>
    </div>
  );
}

function AppointmentsPage({data,setData,currency}){
  const[showForm,setShowForm]=useState(false);
  const[editItem,setEditItem]=useState(null);
  const[filter,setFilter]=useState("tous");
  const[revPrefill,setRevPrefill]=useState(null); // when set, show revenue editor
  const now=new Date();
  const appointments=data.appointments||[];
  const filtered=appointments.filter(a=>{
    if(filter==="aujourd'hui")return new Date(a.date).toDateString()===now.toDateString();
    if(filter==="à venir")return new Date(a.date)>=new Date(now.toDateString());
    if(filter==="confirmé")return a.status==="confirmé";
    if(filter==="en attente")return a.status==="en attente";
    if(filter==="terminé")return a.status==="terminé";
    return true;
  }).sort((a,b)=>new Date(a.date)-new Date(b.date)||(a.timeStart||"").localeCompare(b.timeStart||""));

  const deleteAppt=(id)=>{
    if(!window.confirm("Supprimer définitivement ce rendez-vous ?"))return;
    if(!window.confirm("Êtes-vous sûr ? Cette action est irréversible."))return;
    const nd={...data,appointments:(data.appointments||[]).filter(a=>a.id!==id)};
    setData(nd);save(nd);
  };

  const handleAnnuler=(a)=>{
    if(!window.confirm("Annuler ce rendez-vous ?"))return;
    const raison=window.prompt("Raison de l'annulation (optionnel) :","");
    if(raison===null)return; // user pressed Cancel on prompt
    const nd={...data};
    // Mark appointment as annulé with raison
    nd.appointments=(nd.appointments||[]).map(x=>x.id===a.id?{...x,status:"annulé",cancellationReason:raison,cancellationDate:new Date().toISOString().split("T")[0]}:x);
    // Add a note on the client
    if(a.clientId){
      const clientNote={id:gid(),date:new Date().toISOString().split("T")[0],text:`RDV annulé du ${fmtD(a.date)}${raison?` — ${raison}`:""}`,type:"cancellation"};
      nd.clients=nd.clients.map(c=>c.id===a.clientId?{...c,clientNotes:[...(c.clientNotes||[]),clientNote]}:c);
    }
    setData(nd);save(nd);
  };

  const markStatus=(id,status)=>{const nd={...data,appointments:appointments.map(a=>a.id===id?{...a,status}:a)};setData(nd);save(nd);};

  const handleTermine=(a)=>{
    if(!window.confirm(`Marquer ce RDV comme terminé et créer la fiche lavage ?`))return;
    // Build prefill for RevenueForm, then open it
    const prefill={
      date:a.date,timeStart:a.timeStart||"",timeEnd:a.timeEnd||"",
      clientId:a.clientId,clientFirst:a.clientFirst||"",clientLast:a.clientLast||"",clientPhone:a.clientPhone||"",
      vehicleId:a.vehicleId,plate:a.plate||"",brand:a.brand||"",model:a.model||"",vehicleSize:a.vehicleSize||"berline",
      technicians:a.technicians||[],prestations:a.services||[],customPrestation:a.customService||"",
      amount:a.estimatedPrice?String(a.estimatedPrice):"",isGift:false,
      paymentMethod:a.paymentMethod||"espèce",paidToTechs:[],
      locationStreetNum:a.locationStreetNum||"",locationStreetName:a.locationStreetName||"",
      locationZip:a.locationZip||"",locationCity:a.locationCity||"",location:a.location||"",
      remarks:a.notes||"",difficulty:3,duration:a.duration||0,
      carPhoto:null,invoiceFile:null,fromAppointmentId:a.id,_apptIdToDelete:a.id
    };
    // Mark appointment as terminé
    const nd={...data,appointments:appointments.map(x=>x.id===a.id?{...x,status:"terminé"}:x)};
    setData(nd);save(nd);
    setRevPrefill(prefill);
  };

  const handleRevSave=()=>{
    // After revenue saved, delete the appointment
    if(revPrefill&&revPrefill._apptIdToDelete){
      const nd2={...data,revenues:data.revenues,appointments:(data.appointments||[]).filter(x=>x.id!==revPrefill._apptIdToDelete)};
      setData(nd2);save(nd2);
    }
    setRevPrefill(null);
  };

  const todayCount=appointments.filter(a=>new Date(a.date).toDateString()===now.toDateString()).length;
  const upcomingCount=appointments.filter(a=>new Date(a.date)>=new Date(now.toDateString())&&a.status!=="annulé"&&a.status!=="terminé").length;

  // If revPrefill set, show Revenue editor in modal
  if(revPrefill){
    return(
      <Modal title="Fiche Lavage 🧼" onClose={()=>setRevPrefill(null)}>
        <RevenueForm data={data} setData={setData} prefill={revPrefill} onSave={handleRevSave}/>
      </Modal>
    );
  }

  return(
    <div style={{paddingBottom:90}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
        <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:12,padding:"10px",textAlign:"center"}}><div style={{fontSize:9,color:"#666"}}>AUJOURD'HUI</div><div style={{color:"#00d4aa",fontWeight:700,fontSize:18}}>{todayCount}</div></div>
        <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:12,padding:"10px",textAlign:"center"}}><div style={{fontSize:9,color:"#666"}}>À VENIR</div><div style={{color:"#ffa500",fontWeight:700,fontSize:18}}>{upcomingCount}</div></div>
        <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:12,padding:"10px",textAlign:"center"}}><div style={{fontSize:9,color:"#666"}}>TOTAL</div><div style={{color:"#a78bfa",fontWeight:700,fontSize:18}}>{appointments.length}</div></div>
      </div>
      <div style={{display:"flex",gap:5,marginBottom:10,flexWrap:"wrap"}}>
        {["tous","aujourd'hui","à venir","confirmé","en attente","terminé"].map(f=>(
          <button key={f} onClick={()=>setFilter(f)} style={{background:filter===f?"#1e1e1e":"transparent",border:"1px solid #252525",color:filter===f?"#fff":"#555",padding:"4px 9px",borderRadius:20,fontSize:10,cursor:"pointer",fontWeight:filter===f?600:400}}>{f}</button>
        ))}
      </div>
      <button onClick={()=>{setEditItem(null);setShowForm(true);}} style={{...btn("linear-gradient(135deg,#7c3aed,#5b21b6)","#fff"),width:"100%",padding:"11px",marginBottom:12,fontSize:13}}>📅 Nouveau rendez-vous</button>
      {filtered.length===0
        ?<div style={{textAlign:"center",color:"#444",fontSize:13,padding:"40px 0"}}>Aucun rendez-vous</div>
        :filtered.map(a=>{
          const c=data.clients.find(cl=>cl.id===a.clientId);
          const v=data.vehicles.find(vv=>vv.id===a.vehicleId);
          const sc=STATUS_COLORS[a.status]||"#666";
          const isToday=new Date(a.date).toDateString()===now.toDateString();
          const isActive=a.status!=="annulé"&&a.status!=="terminé";
          return(
            <div key={a.id} style={{background:"#111",borderLeft:`3px solid ${sc}`,border:`1px solid #1e1e1e`,borderRadius:12,padding:"11px 13px",marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{color:"#fff",fontWeight:700,fontSize:14}}>{v?`${v.brand} ${v.model}`:a.plate||"Véhicule"}</div>
                  <div style={{color:"#888",fontSize:12}}>{c?`${c.firstName} ${c.lastName}`:`${a.clientFirst||""} ${a.clientLast||""}`.trim()||"—"}</div>
                  <div style={{color:"#666",fontSize:11,marginTop:2}}>
                    {isToday?<span style={{color:"#00d4aa",fontWeight:600}}>Aujourd'hui</span>:fmtD(a.date)}
                    {a.timeStart?` · ${a.timeStart}${a.timeEnd?` → ${a.timeEnd}`:""}` : ""}
                    {a.duration>0?` (${fmtT(a.duration)})`:""}
                  </div>
                </div>

function HistoryPage({data,setData,currency}){
  const[filter,setFilter]=useState("all"),[period,setPeriod]=useState("month"),[sel,setSel]=useState(null);
  const now=new Date();
  const cancelledAppts=(data.appointments||[]).filter(a=>a.status==="annulé").map(a=>{
    const c=data.clients.find(cl=>cl.id===a.clientId);
    const v=data.vehicles.find(vv=>vv.id===a.vehicleId);
    return{...a,txType:"cancelled",productName:`RDV annulé — ${v?`${v.brand} ${v.model}`:a.plate||"Véhicule"} / ${c?`${c.firstName} ${c.lastName}`:`${a.clientFirst||""} ${a.clientLast||""}`.trim()||"Client"}`,amount:0};
  });
  const allTx=[...data.revenues.map(r=>({...r,txType:"revenue"})),...data.expenses.map(e=>({...e,txType:"expense"})),...cancelledAppts].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const filtered=allTx.filter(tx=>{
    const d=new Date(tx.date);
    if(period==="week"){const w=new Date(now);w.setDate(now.getDate()-7);if(d<w)return false;}
    if(period==="month"&&(d.getMonth()!==now.getMonth()||d.getFullYear()!==now.getFullYear()))return false;
    if(period==="year"&&d.getFullYear()!==now.getFullYear())return false;
    if(filter==="revenue")return tx.txType==="revenue";
    if(filter==="expense")return tx.txType==="expense";
    if(filter==="cancelled")return tx.txType==="cancelled";
    return true;
  });
  const totalRev=filtered.filter(t=>t.txType==="revenue").reduce((s,r)=>s+r.amount,0);
  const totalExp=filtered.filter(t=>t.txType==="expense").reduce((s,e)=>s+e.amount,0);
  const exportCSV=()=>{
    const rows=[["Date","Type","Libellé","Montant","Mode paiement","Lieu"],...filtered.map(tx=>{const v=tx.txType==="revenue"?data.vehicles.find(v=>v.id===tx.vehicleId):null;return[tx.date,tx.txType==="revenue"?"Revenu":"Dépense",tx.txType==="revenue"?(v?`${v.brand} ${v.model}`:"Lavage"):tx.productName,tx.isGift?"Offert":tx.amount,tx.paymentMethod||"",tx.location||""];})];
    const csv=rows.map(r=>r.map(c=>`"${c}"`).join(",")).join("\n");
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"}));a.download=`historique_${new Date().toLocaleDateString("fr-FR").replace(/\//g,"-")}.csv`;a.click();
  };
  return(
    <div style={{paddingBottom:80}}>
      <div style={{display:"flex",gap:5,marginBottom:8,flexWrap:"wrap"}}>
        {["week","month","year","all"].map(p=><button key={p} onClick={()=>setPeriod(p)} style={{background:period===p?"#fff":"#1a1a1a",border:"1px solid #252525",color:period===p?"#000":"#666",padding:"4px 9px",borderRadius:20,fontSize:10,cursor:"pointer",fontWeight:600}}>{p==="week"?"7J":p==="month"?"Mois":p==="year"?"Année":"Tout"}</button>)}
        <button onClick={exportCSV} style={{background:"#1a1a1a",border:"1px solid #252525",color:"#00d4aa",padding:"4px 9px",borderRadius:20,fontSize:10,cursor:"pointer",marginLeft:"auto"}}>📥 CSV</button>
      </div>
      <div style={{display:"flex",gap:5,marginBottom:12}}>
        {["all","revenue","expense","cancelled"].map(f=><button key={f} onClick={()=>setFilter(f)} style={{background:filter===f?"#1e1e1e":"transparent",border:"1px solid #252525",color:filter===f?"#fff":"#666",padding:"4px 9px",borderRadius:20,fontSize:10,cursor:"pointer"}}>{f==="all"?"Tout":f==="revenue"?"✅ Revenus":f==="expense"?"🔴 Dépenses":"❌ Annulés"}</button>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
        <div style={{background:"#0a1a14",border:"1px solid #00d4aa22",borderRadius:12,padding:"9px 12px",textAlign:"center"}}><div style={{fontSize:9,color:"#666"}}>REVENUS</div><div style={{color:"#00d4aa",fontWeight:700,fontSize:15}}>{fmt(totalRev,currency)}</div></div>
        <div style={{background:"#1a0a0a",border:"1px solid #ff475722",borderRadius:12,padding:"9px 12px",textAlign:"center"}}><div style={{fontSize:9,color:"#666"}}>DÉPENSES</div><div style={{color:"#ff4757",fontWeight:700,fontSize:15}}>{fmt(totalExp,currency)}</div></div>
      </div>
      {filtered.length===0
        ?<div style={{textAlign:"center",color:"#444",fontSize:13,padding:"40px 0"}}>Aucune transaction</div>
        :filtered.map(tx=>{
          const v=tx.txType==="revenue"?data.vehicles.find(v=>v.id===tx.vehicleId):null;
          const c=tx.txType==="revenue"?data.clients.find(c=>c.id===tx.clientId):null;
          const label=tx.txType==="revenue"?(v?`${v.brand} ${v.model}`:tx.plate||"Lavage"):tx.txType==="cancelled"?tx.productName:tx.productName;
          const clientName=c?`${c.firstName} ${c.lastName}`:tx.clientFirst?`${tx.clientFirst} ${tx.clientLast||""}`.trim():null;
          const photo=tx.txType==="revenue"?tx.carPhoto:null;
          const infoParts=[fmtD(tx.date),tx.paymentMethod,tx.locationCity||tx.location].filter(Boolean);
          const isCancelled=tx.txType==="cancelled";
          const borderColor=isCancelled?"#ff6b3555":tx.txType==="revenue"?"#00d4aa15":"#ff475715";
          const accentColor=isCancelled?"#ff6b35":tx.txType==="revenue"?"#00d4aa":"#ff4757";
          return(
            <div key={tx.id} onClick={()=>!isCancelled&&setSel(tx)} style={{background:"#111",border:`1px solid ${borderColor}`,borderLeft:`3px solid ${accentColor}`,borderRadius:12,padding:"9px 12px",marginBottom:7,cursor:isCancelled?"default":"pointer",display:"flex",gap:10,alignItems:"center",opacity:isCancelled?0.75:1}}>
              {tx.txType==="revenue"&&(
                photo

                  :<div style={{width:52,height:40,background:"#1a1a1a",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>🚗</div>
              )}
              {tx.txType==="expense"&&(
                <div style={{width:52,height:40,background:"#1a0a0a",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>🛒</div>
              )}
              {isCancelled&&(
                <div style={{width:52,height:40,background:"#1a0a0a",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>❌</div>
              )}
              <div style={{flex:1,minWidth:0}}>
                <div style={{color:isCancelled?"#888":"#fff",fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{label}</div>
                {clientName&&!isCancelled&&<div style={{color:"#aaa",fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>👤 {clientName}</div>}
                {isCancelled&&tx.cancellationReason&&<div style={{color:"#ff6b35",fontSize:11,fontStyle:"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📋 {tx.cancellationReason}</div>}
                <div style={{color:"#444",fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{isCancelled?`Annulé le ${fmtD(tx.date)}`:infoParts.join(" · ")}</div>
              </div>
              <div style={{color:accentColor,fontWeight:700,fontSize:14,flexShrink:0}}>{isCancelled?"❌":tx.txType==="revenue"?"+":"-"}{isCancelled?"":tx.isGift?"🎁":fmt(tx.amount,currency)}</div>
            </div>
          );
        })
      }
      {sel&&<TxDetail tx={sel} data={data} setData={setData} onClose={()=>setSel(null)}/>}
    </div>
  );
}

// ===================== TECHNICIAN TRACKER PAGE =====================
function TechnicianTrackerPage({data,setData,currency}){
  const s=data.settings||{};
  const techs=s.technicians||[];
  const[newTech,setNewTech]=useState("");
  const upd=(k,v)=>{const nd={...data,settings:{...s,[k]:v}};setData(nd);save(nd);};
  const addTech=()=>{const t=newTech.trim();if(!t||techs.includes(t))return;upd("technicians",[...techs,t]);setNewTech("");};
  const removeTech=t=>{if(!window.confirm(`Supprimer ${t} ?`))return;upd("technicians",techs.filter(x=>x!==t));};

  // Compute balances
  // For revenues: each paidToTech received amount/paidToTechs.length
  //   each worker who didn't receive is owed their share (amount/workers.length) by whoever received
  // For expenses: each paidByTech paid amount/paidByTechs.length
  //   each tech who didn't pay owes their share (amount/techs.length) to whoever paid
  const balances={};
  techs.forEach(a=>{balances[a]={};techs.forEach(b=>{if(a!==b)balances[a][b]=0;});});

  const addDebt=(debtor,creditor,amount)=>{
    if(debtor===creditor||amount<=0)return;
    if(balances[debtor]&&balances[debtor][creditor]!==undefined)balances[debtor][creditor]-=amount;
    if(balances[creditor]&&balances[creditor][debtor]!==undefined)balances[creditor][debtor]+=amount;
  };

  data.revenues.forEach(rev=>{
    if(!rev.technicians||rev.technicians.length===0)return;
    const receivers=rev.paidToTechs||(rev.paidToTech?[rev.paidToTech]:[]);
    if(receivers.length===0)return;
    const workers=rev.technicians;
    const sharePerWorker=rev.amount/workers.length;
    const sharePerReceiver=rev.amount/receivers.length;
    // Each worker is owed their share; each receiver holds sharePerReceiver
    // Net: for each receiver r, for each worker w (w≠r), r owes w sharePerWorker
    //      but also if w is also a receiver, it's more complex — net it out
    workers.forEach(w=>{
      receivers.forEach(r=>{
        if(r===w)return;
        // r received sharePerReceiver, w is owed sharePerWorker
        // r owes w their portion: sharePerWorker (w's earnings that r holds part of)
        // Each receiver holds total/receivers.length, but w earned total/workers.length
        // Simplify: receiver r owes worker w: w's share / receivers.length
        addDebt(r, w, sharePerWorker/receivers.length);
      });
    });
  });

  data.expenses.forEach(exp=>{
    const payers=exp.paidByTechs||(exp.paidByTech?[exp.paidByTech]:[]);
    if(payers.length===0||techs.length<2)return;
    const sharePerTech=exp.amount/techs.length;
    const sharePerPayer=exp.amount/payers.length;
    techs.forEach(t=>{
      if(payers.includes(t))return; // payer, doesn't owe themselves
      // t owes their share equally to all payers
      payers.forEach(p=>{
        addDebt(t, p, sharePerTech/payers.length);
      });
    });
    // If multiple payers, balance between payers: each paid sharePerPayer but should pay sharePerTech
    // If sharePerPayer < sharePerTech: payer overpaid → others owe them (handled above)
    // If multiple payers, also check if payers owe each other (they each paid equally so no debt between payers)
  });

  // Simplify: for each pair, net balance
  const debts=[];
  const seen=new Set();
  techs.forEach(a=>{
    techs.forEach(b=>{
      if(a===b)return;
      const key=[a,b].sort().join("||");
      if(seen.has(key))return;
      seen.add(key);
      const net=(balances[a]?balances[a][b]||0:0)-(balances[b]?balances[b][a]||0:0);
      if(Math.abs(net)>0.005){
        const debtor=net<0?a:b;
        const creditor=net<0?b:a;
        debts.push({debtor,creditor,amount:Math.abs(net)});
      }
    });
  });

  // Revenue stats per tech
  const techStats=techs.map(t=>{
    const revs=data.revenues.filter(r=>r.technicians&&r.technicians.includes(t));
    const total=revs.reduce((s,r)=>s+r.amount/Math.max(r.technicians.length,1),0);
    const receivers=r=>r.paidToTechs||( r.paidToTech?[r.paidToTech]:[]);
    const received=data.revenues.filter(r=>receivers(r).includes(t)).reduce((s,r)=>s+r.amount/Math.max(receivers(r).length,1),0);
    const payers=e=>e.paidByTechs||(e.paidByTech?[e.paidByTech]:[]);
    const expPaid=data.expenses.filter(e=>payers(e).includes(t)).reduce((s,e)=>s+e.amount/Math.max(payers(e).length,1),0);
    return{name:t,revs:revs.length,share:total,received,expPaid};
  });

  return(
    <div style={{paddingBottom:90}}>
      {/* Technician management */}
      <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:14,marginBottom:12}}>
        <div style={{fontSize:12,color:"#666",fontWeight:600,marginBottom:10}}>👤 ÉQUIPE</div>
        {techs.length===0&&<div style={{color:"#444",fontSize:12,marginBottom:10,fontStyle:"italic"}}>Aucun technicien configuré.</div>}
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
          {techs.map(t=>(
            <div key={t} style={{display:"flex",alignItems:"center",gap:4,background:"#1a1a1a",border:"1px solid #252525",borderRadius:20,padding:"4px 10px"}}>
              <span style={{color:"#fff",fontSize:12}}>👤 {t}</span>
              <button onClick={()=>removeTech(t)} style={{background:"none",border:"none",color:"#ff4757",cursor:"pointer",fontSize:16,padding:0,lineHeight:1}}>×</button>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:6}}>
          <input style={{...inp,flex:1}} placeholder="Nom du technicien..." value={newTech} onChange={e=>setNewTech(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTech()}/>
          <button onClick={addTech} style={{...btn("linear-gradient(135deg,#00d4aa,#00a882)","#000"),padding:"9px 14px",flexShrink:0}}>+ Ajouter</button>
        </div>
      </div>

      {/* Stats per tech */}
      {techStats.length>0&&(
        <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:14,marginBottom:12}}>
          <div style={{fontSize:12,color:"#666",fontWeight:600,marginBottom:10}}>📊 PERFORMANCES</div>
          {techStats.map(t=>(
            <div key={t.name} style={{background:"#1a1a1a",borderRadius:12,padding:"11px 13px",marginBottom:8}}>
              <div style={{fontWeight:700,color:"#fff",marginBottom:6}}>👤 {t.name}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                <div style={{background:"#111",borderRadius:8,padding:"7px 10px"}}><div style={{fontSize:9,color:"#666"}}>LAVAGES</div><div style={{color:"#fff",fontWeight:600}}>{t.revs}</div></div>
                <div style={{background:"#111",borderRadius:8,padding:"7px 10px"}}><div style={{fontSize:9,color:"#666"}}>PART REVENUS</div><div style={{color:"#00d4aa",fontWeight:600}}>{fmt(t.share,currency)}</div></div>
                <div style={{background:"#111",borderRadius:8,padding:"7px 10px"}}><div style={{fontSize:9,color:"#666"}}>ARGENT ENCAISSÉ</div><div style={{color:"#7c3aed",fontWeight:600}}>{fmt(t.received,currency)}</div></div>
                <div style={{background:"#111",borderRadius:8,padding:"7px 10px"}}><div style={{fontSize:9,color:"#666"}}>DÉPENSES PAYÉES</div><div style={{color:"#ff4757",fontWeight:600}}>{fmt(t.expPaid,currency)}</div></div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Debts */}
      <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:14,marginBottom:12}}>
        <div style={{fontSize:12,color:"#666",fontWeight:600,marginBottom:10}}>💸 SOLDES & DETTES</div>
        {debts.length===0
          ?<div style={{color:"#444",fontSize:13,textAlign:"center",padding:"20px 0"}}>✅ Aucune dette — tout est équilibré !</div>
          :debts.map((d,i)=>(
            <div key={i} style={{background:"#1a0a0a",border:"1px solid #ff475733",borderRadius:10,padding:"11px 13px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <span style={{color:"#ff6b35",fontWeight:700}}>👤 {d.debtor}</span>
                <span style={{color:"#666",fontSize:12}}> doit à </span>
                <span style={{color:"#00d4aa",fontWeight:700}}>👤 {d.creditor}</span>
              </div>
              <div style={{color:"#ff4757",fontWeight:700,fontSize:16}}>{fmt(d.amount,currency)}</div>
            </div>
          ))
        }
      </div>
    </div>
  );
}

            <label style={{background:"#1e1e1e",border:"1px solid #252525",color:"#ccc",padding:"6px 11px",borderRadius:8,cursor:"pointer",fontSize:12,textAlign:"center"}}>📷 Caméra<input type="file" accept="image/*" capture="environment" onChange={handleLogo} style={{display:"none"}}/></label>
            <label style={{background:"#1e1e1e",border:"1px solid #252525",color:"#ccc",padding:"6px 11px",borderRadius:8,cursor:"pointer",fontSize:12,textAlign:"center"}}>🖼 Galerie<input type="file" accept="image/*" onChange={handleLogo} style={{display:"none"}}/></label>
            {s.companyLogo&&<button onClick={()=>upd("companyLogo",null)} style={{background:"transparent",border:"1px solid #ff4757",color:"#ff4757",padding:"4px 10px",borderRadius:8,cursor:"pointer",fontSize:11}}>Supprimer</button>}
          </div>
        </div>
        <Field label="Nom de l'entreprise"><input style={inp} value={s.companyName||""} onChange={e=>upd("companyName",e.target.value)}/></Field>
      </div>
      <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:14,marginBottom:12}}>
        <div style={{fontSize:12,color:"#666",fontWeight:600,marginBottom:10}}>DEVISE</div>
        <select style={inp} value={s.currency||"€"} onChange={e=>upd("currency",e.target.value)}>
          <option value="€">€ Euro</option><option value="$">$ Dollar</option><option value="£">£ Livre</option><option value="CHF">CHF Franc suisse</option>
        </select>
      </div>
      <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:14,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontSize:12,color:"#666",fontWeight:600}}>🛠 PRESTATIONS</div>
          <button onClick={()=>{if(window.confirm("Remettre les prestations par défaut ?"))upd("services",[...DEF_SERVICES]);}} style={{background:"transparent",border:"1px solid #333",color:"#555",borderRadius:8,padding:"3px 8px",cursor:"pointer",fontSize:10}}>↺ Défaut</button>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
          {services.map(sv=>(
            <div key={sv} style={{display:"flex",alignItems:"center",gap:3,background:"#1a1a1a",border:"1px solid #252525",borderRadius:20,padding:"4px 10px"}}>
              <span style={{color:"#ccc",fontSize:11}}>{sv}</span>
              <button onClick={()=>removeSvc(sv)} style={{background:"none",border:"none",color:"#ff4757",cursor:"pointer",fontSize:14,padding:0,lineHeight:1}}>×</button>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:6}}>
          <input style={{...inp,flex:1}} placeholder="Nouvelle prestation..." value={newSvc} onChange={e=>setNewSvc(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addSvc()}/>
          <button onClick={addSvc} style={{...btn("linear-gradient(135deg,#7c3aed,#5b21b6)","#fff"),padding:"9px 14px",flexShrink:0}}>+ Ajouter</button>
        </div>
      </div>
      <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:14,marginBottom:12}}>
        <div style={{fontSize:12,color:"#666",fontWeight:600,marginBottom:10}}>STATISTIQUES</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {[["Clients",data.clients.length],["Véhicules",data.vehicles.length],["Revenus",data.revenues.length],["Dépenses",data.expenses.length],["RDV",(data.appointments||[]).length]].map(([k,v])=>(
            <div key={k} style={{background:"#1a1a1a",borderRadius:10,padding:"9px 11px",display:"flex",justifyContent:"space-between"}}>
              <span style={{color:"#666",fontSize:12}}>{k}</span><span style={{color:"#00d4aa",fontWeight:700}}>{v}</span>
            </div>
          ))}
        </div>
      </div>
      <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:14,padding:14,marginBottom:12}}>
        <div style={{fontSize:12,color:"#666",fontWeight:600,marginBottom:10}}>SAUVEGARDE</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <button onClick={exportAll} style={{background:"#0a1a14",border:"1px solid #00d4aa33",color:"#00d4aa",padding:"11px",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:600}}>📥 Exporter (JSON)</button>
          <label style={{background:"#0a0a1a",border:"1px solid #7c3aed33",color:"#a78bfa",padding:"11px",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:600,textAlign:"center"}}>📤 Importer une sauvegarde<input type="file" accept=".json" onChange={importAll} style={{display:"none"}}/></label>
        </div>
      </div>
      <GitHubSettings ghCfg={ghCfg||{}} onSave={onGhCfgSave||(() => {})}/>
      {ghCfg&&ghCfg.token&&(
      <div style={{background:"#0a0a14",border:"1px solid #7c3aed33",borderRadius:14,padding:14,marginBottom:12}}>
        <div style={{fontSize:12,color:"#a78bfa",fontWeight:700,marginBottom:6}}>🧹 CACHE NAVIGATEUR</div>
        <div style={{fontSize:11,color:"#666",marginBottom:10,lineHeight:1.6}}>GitHub est configuré. Si ce navigateur affiche de vieilles données, efface le cache local pour forcer le rechargement depuis GitHub.</div>
        <button onClick={clearLocalCache} style={{background:"#7c3aed22",border:"1px solid #7c3aed",color:"#a78bfa",padding:"11px",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:600,width:"100%"}}>🧹 Effacer cache local et recharger depuis GitHub</button>
      </div>
      )}
      <div style={{background:"#1a0a0a",border:"1px solid #ff475722",borderRadius:14,padding:14}}>
        <div style={{fontSize:12,color:"#ff4757",fontWeight:600,marginBottom:10}}>⚠️ ZONE DANGEREUSE</div>
        <button onClick={reset} style={{background:"#ff475715",border:"1px solid #ff4757",color:"#ff4757",padding:"11px",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:600,width:"100%"}}>🗑 Effacer toutes les données (irréversible)</button>
      </div>
    </div>
  );
}

// ===================== FAB =====================
function FAB({onRev,onExp}){
  const[open,setOpen]=useState(false);
  return(
    <div style={{position:"fixed",bottom:82,right:16,zIndex:500,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8}}>
      {open&&<>
        <button onClick={()=>{setOpen(false);onRev();}} style={{background:"#000",border:"2px solid #00d4aa",color:"#00d4aa",borderRadius:10,padding:"9px 14px",cursor:"pointer",fontWeight:700,fontSize:13,boxShadow:"0 4px 20px #00d4aa33",fontFamily:"'Syne',sans-serif"}}>✅ Revenu</button>
        <button onClick={()=>{setOpen(false);onExp();}} style={{background:"#000",border:"2px solid #ff4757",color:"#ff4757",borderRadius:10,padding:"9px 14px",cursor:"pointer",fontWeight:700,fontSize:13,boxShadow:"0 4px 20px #ff475733",fontFamily:"'Syne',sans-serif"}}>🔴 Dépense</button>
      </>}
      <button onClick={()=>setOpen(o=>!o)} style={{width:54,height:54,borderRadius:"50%",background:open?"#1a1a1a":"linear-gradient(135deg,#00d4aa,#0099cc)",border:open?"2px solid #333":"none",color:"#fff",fontSize:26,cursor:"pointer",boxShadow:"0 6px 25px rgba(0,212,170,0.45)",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",transform:open?"rotate(45deg)":"rotate(0deg)"}}>+</button>
    </div>
  );
}

// ===================== GITHUB SETTINGS SECTION =====================
function GitHubSettings({ghCfg,onSave}){
  const[cfg,setCfg]=useState({token:ghCfg.token||"",owner:ghCfg.owner||"",repo:ghCfg.repo||"",branch:ghCfg.branch||"main",path:ghCfg.path||"data.json"});
  const set=(k,v)=>setCfg(c=>({...c,[k]:v}));
  const[testing,setTesting]=useState(false);
  const[testMsg,setTestMsg]=useState("");

  const testAndSave=async()=>{
    if(!cfg.token||!cfg.owner||!cfg.repo)return alert("Token, Owner et Repo sont requis.");
    setTesting(true);setTestMsg("Test de la connexion…");
    const res=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}`,{headers:ghHeaders(cfg.token)});
    if(res.ok){setTestMsg("✅ Connexion OK ! Paramètres sauvegardés.");saveGHCfg(cfg);onSave(cfg);}
    else{setTestMsg("❌ Échec — vérifiez votre token et votre repo.");}
    setTesting(false);
  };
  const disconnect=()=>{const empty={token:"",owner:"",repo:"",branch:"main",path:"data.json"};saveGHCfg(empty);onSave(empty);setCfg(empty);setTestMsg("");};

  return(
    <div style={{background:"#0a0f1a",border:"1px solid #00d4aa33",borderRadius:14,padding:14,marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:12,color:"#00d4aa",fontWeight:700}}>🔗 SYNCHRONISATION GITHUB</div>
        {ghCfg.token&&<button onClick={disconnect} style={{background:"transparent",border:"1px solid #ff4757",color:"#ff4757",borderRadius:8,padding:"3px 8px",cursor:"pointer",fontSize:10}}>Déconnecter</button>}
      </div>
      {!ghCfg.token&&(
        <div style={{background:"#0a1a14",border:"1px solid #00d4aa22",borderRadius:10,padding:"10px 12px",marginBottom:12,fontSize:11,color:"#666",lineHeight:1.6}}>
          <b style={{color:"#00d4aa"}}>Comment connecter GitHub :</b><br/>
          1. Va sur <b style={{color:"#ccc"}}>github.com → Settings → Developer settings → Personal access tokens → Tokens (classic)</b><br/>
          2. Clique <b style={{color:"#ccc"}}>Generate new token (classic)</b><br/>
          3. Coche uniquement la permission <b style={{color:"#ccc"}}>repo</b><br/>
          4. Copie le token généré et colle-le ci-dessous<br/>
          5. Ton associé fait pareil avec <b style={{color:"#ccc"}}>son propre token</b> (même repo)
        </div>
      )}
      <Field label="Personal Access Token (github.com → Settings → Developer settings)">
        <input style={{...inp,fontFamily:"monospace",fontSize:11}} type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" value={cfg.token} onChange={e=>set("token",e.target.value)}/>
      </Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Field label="Votre username GitHub (owner)">
          <input style={inp} placeholder="ex: jean-dupont" value={cfg.owner} onChange={e=>set("owner",e.target.value)}/>
        </Field>
        <Field label="Nom du repository">
          <input style={inp} placeholder="ex: mon-detailing" value={cfg.repo} onChange={e=>set("repo",e.target.value)}/>
        </Field>
        <Field label="Branche">
          <input style={inp} placeholder="main" value={cfg.branch} onChange={e=>set("branch",e.target.value)}/>
        </Field>
        <Field label="Fichier données">
          <input style={inp} placeholder="data.json" value={cfg.path} onChange={e=>set("path",e.target.value)}/>
        </Field>
      </div>
      {testMsg&&<div style={{background:testMsg.startsWith("✅")?"#0a1a14":"#1a0a0a",border:`1px solid ${testMsg.startsWith("✅")?"#00d4aa33":"#ff475733"}`,borderRadius:10,padding:"8px 12px",marginBottom:10,fontSize:12,color:testMsg.startsWith("✅")?"#00d4aa":"#ff4757"}}>{testMsg}</div>}
      <button onClick={testAndSave} disabled={testing} style={{...btn("linear-gradient(135deg,#00d4aa,#0099cc)","#000"),width:"100%",padding:"11px",fontSize:13}}>
        {testing?"⏳ Test en cours…":"🔗 Tester & Sauvegarder la connexion"}
      </button>
    </div>
  );
}

// ===================== APP =====================
function App(){
  const[data,setData]=useState(()=>load());
  const[tab,setTab]=useState(0);
  const[showRev,setShowRev]=useState(false),[showExp,setShowExp]=useState(false);
  const{currency="€",companyName="Mon Détailing",companyLogo=null}=data.settings||{};
  const[subTab,setSubTab]=useState(0);
  const tabs=[["🏠","Accueil"],["📊","Stats"],["📁","Annuaire"],["📅","RDV"],["📋","Historique"],["⚙️","Réglages"]];

  // --- GitHub sync state ---
  const[ghCfg,setGhCfg]=useState(()=>loadGHCfg());
  const[ghSha,setGhSha]=useState(null);
  const[ghStatus,setGhStatus]=useState("idle");
  const[ghMsg,setGhMsg]=useState("");
  const ghConnected=!!(ghCfg.token&&ghCfg.owner&&ghCfg.repo);
  const saveTimerRef=useRef(null);
  const ghShaRef=useRef(null);

  // On mount: load from GitHub if configured — ALWAYS overrides localStorage
  useEffect(()=>{
    if(!ghConnected)return;
    setGhStatus("loading");setGhMsg("Chargement depuis GitHub…");
    ghLoadData(ghCfg).then(res=>{
      if(res&&res.data){
        setData(res.data);save(res.data);
        ghShaRef.current=res.sha;setGhSha(res.sha);
        setGhStatus("ok");setGhMsg("✅ Synchronisé depuis GitHub");
      }else{
        // GitHub failed — keep existing local data, show retry option
        setGhStatus("error");setGhMsg("❌ GitHub inaccessible — données locales affichées. Rafraîchis pour réessayer.");
      }
    }).catch(()=>{
      setGhStatus("error");setGhMsg("❌ GitHub inaccessible — données locales affichées. Rafraîchis pour réessayer.");
    });
  },[ghConnected]);

  // Sync wrapper — replaces setData everywhere in app (passed as prop)
  const setDataAndSync=useCallback((nd)=>{
    setData(nd);save(nd);
    if(!ghConnected)return;
    if(saveTimerRef.current)clearTimeout(saveTimerRef.current);
    setGhStatus("saving");setGhMsg("Sauvegarde sur GitHub…");
    saveTimerRef.current=setTimeout(async()=>{
      const sha=ghShaRef.current;
      const r=await ghSaveData(ghCfg,nd,sha);
      if(r.ok){ghShaRef.current=r.sha;setGhSha(r.sha);setGhStatus("ok");setGhMsg("✅ Sauvegardé sur GitHub");}
      else{setGhStatus("error");setGhMsg(`❌ Erreur: ${r.error||"GitHub"}`);}
    },2000);
  },[ghConnected,ghCfg]);

  // Manual refresh from GitHub
  const ghRefresh=async()=>{
    if(!ghConnected)return;
    setGhStatus("loading");setGhMsg("Rechargement depuis GitHub…");
    const res=await ghLoadData(ghCfg);
    if(res&&res.data){setData(res.data);save(res.data);ghShaRef.current=res.sha;setGhSha(res.sha);setGhStatus("ok");setGhMsg("✅ Rechargé depuis GitHub");}
    else{setGhStatus("error");setGhMsg("❌ Impossible de recharger");}
  };

  const SyncBanner=()=>{
    if(!ghConnected||(ghStatus==="idle"&&!ghMsg))return null;
    const clr={loading:"#0099cc",saving:"#7c3aed",ok:"#00a882",error:"#ff4757"}[ghStatus]||"#333";
    return(
      <div style={{background:clr,color:"#fff",fontSize:11,fontWeight:600,textAlign:"center",padding:"5px 12px",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        <span>{ghStatus==="loading"||ghStatus==="saving"?"⏳ ":""}{ghMsg}</span>
        {(ghStatus==="ok"||ghStatus==="error")&&<button onClick={ghRefresh} style={{background:"rgba(255,255,255,0.2)",border:"none",color:"#fff",borderRadius:6,padding:"2px 8px",cursor:"pointer",fontSize:10,fontWeight:700}}>↻ Réessayer</button>}
      </div>
    );
  };

  return(
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"#0a0a0a",fontFamily:"'DM Sans',sans-serif",color:"#fff",position:"relative"}}>
      {/* Header */}
      <div style={{position:"sticky",top:0,zIndex:100,background:"rgba(10,10,10,0.96)",backdropFilter:"blur(20px)",borderBottom:"1px solid #161616"}}>
        <div style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:10}}>
          {companyLogo?<img src={companyLogo} style={{width:36,height:36,objectFit:"cover",borderRadius:9,border:"1px solid #222"}}/>:<div style={{width:36,height:36,background:"linear-gradient(135deg,#00d4aa,#0099cc)",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>✨</div>}
          <div style={{flex:1}}>
            <div style={{fontSize:16,fontWeight:700,color:"#fff",fontFamily:"'Syne',sans-serif",lineHeight:1.2}}>{companyName}</div>
            <div style={{fontSize:10,color:"#444"}}>{new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"})}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            {ghConnected&&<div style={{width:7,height:7,borderRadius:"50%",background:{loading:"#0099cc",saving:"#7c3aed",ok:"#00d4aa",error:"#ff4757",idle:"#444"}[ghStatus]||"#444"}} title="Statut GitHub"/>}
            <div style={{fontSize:10,color:"#00d4aa",background:"#0a1a14",border:"1px solid #00d4aa22",padding:"3px 8px",borderRadius:20}}>{data.revenues.length} lavages</div>
          </div>
        </div>
        <SyncBanner/>
      </div>

      {/* Sub-tabs for Annuaire */}
      {tab===2&&(
        <div style={{display:"flex",gap:0,background:"#0f0f0f",borderBottom:"1px solid #1a1a1a",padding:"0 14px"}}>
          {[["👤","Clients"],["🚗","Voitures"],["👥","Équipe"]].map(([icon,label],i)=>(
            <button key={i} onClick={()=>setSubTab(i)} style={{flex:1,background:"none",border:"none",padding:"10px 0 8px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,borderBottom:`2px solid ${subTab===i?"#00d4aa":"transparent"}`}}>
              <span style={{fontSize:16,filter:subTab===i?"none":"grayscale(100%) opacity(0.4)"}}>{icon}</span>
              <span style={{fontSize:10,color:subTab===i?"#00d4aa":"#444",fontWeight:subTab===i?700:400}}>{label}</span>
            </button>
          ))}
        </div>
      )}

      {/* Content */}
      <div style={{padding:"14px 14px 0"}}>
        {tab===0&&<HomePage data={data} setData={setDataAndSync} currency={currency}/>}
        {tab===1&&<StatsPage data={data} setData={setDataAndSync} currency={currency}/>}
        {tab===2&&subTab===0&&<ClientsPage data={data} setData={setDataAndSync} currency={currency}/>}
        {tab===2&&subTab===1&&<VehiclesPage data={data} setData={setDataAndSync} currency={currency}/>}
        {tab===2&&subTab===2&&<TechnicianTrackerPage data={data} setData={setDataAndSync} currency={currency}/>}
        {tab===3&&<AppointmentsPage data={data} setData={setDataAndSync} currency={currency}/>}
        {tab===4&&<HistoryPage data={data} setData={setDataAndSync} currency={currency}/>}
        {tab===5&&<SettingsPage data={data} setData={setDataAndSync} ghCfg={ghCfg} onGhCfgSave={cfg=>{setGhCfg(cfg);}}/>}
      </div>

      {/* FAB */}
      {tab<5&&<FAB onRev={()=>setShowRev(true)} onExp={()=>setShowExp(true)}/>}

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(10,10,10,0.97)",backdropFilter:"blur(20px)",borderTop:"1px solid #161616",display:"flex",zIndex:200,paddingBottom:"env(safe-area-inset-bottom)"}}>
        {tabs.map(([icon,label],i)=>(
          <button key={i} onClick={()=>setTab(i)} style={{flex:1,background:"none",border:"none",padding:"9px 0 7px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span style={{fontSize:19,filter:tab===i?"none":"grayscale(100%) opacity(0.35)"}}>{icon}</span>
            <span style={{fontSize:8,color:tab===i?"#00d4aa":"#333",fontWeight:tab===i?700:400,letterSpacing:0.2}}>{label}</span>
            {tab===i&&<div style={{width:3,height:3,borderRadius:"50%",background:"#00d4aa"}}/>}
          </button>
        ))}
      </div>

      {showRev&&<Modal title="Nouveau revenu 💰" onClose={()=>setShowRev(false)}><RevenueForm data={data} setData={setDataAndSync} onSave={()=>setShowRev(false)}/></Modal>}
      {showExp&&<Modal title="Nouvelle dépense 🔴" onClose={()=>setShowExp(false)}><ExpenseForm data={data} setData={setDataAndSync} onSave={()=>setShowExp(false)}/></Modal>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
